<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🐾 萌萌裝置測試儀</title>
    <!-- 引入 html2pdf.js 用於生成 PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ================= 溫暖可愛風格 CSS ================= */
        :root {
            --bg-color: #FFF9F2;       /* 奶油白 */
            --text-color: #5C4D42;     /* 拿鐵棕 */
            --primary-color: #FFB4A2;  /* 蜜桃粉 */
            --secondary-color: #FFD6A5;/* 溫暖橘 */
            --accent-color: #FDFFB6;   /* 鵝黃色 */
            --success-color: #CAFFBF;  /* 薄荷綠 */
            --fail-color: #FFADAD;     /* 珊瑚紅 */
            --card-bg: #FFFFFF;
            --shadow: 0 10px 25px rgba(255, 180, 162, 0.2);
            --border-radius: 24px;
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', 'Quicksand', '微軟正黑體', sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 隱藏與顯示的輔助類別 */
        .hidden { display: none !important; }

        /* 主容器 */
        .container {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 800px;
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 4px solid var(--bg-color);
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2.2rem;
            text-shadow: 2px 2px 0px var(--bg-color);
        }

        p.subtitle {
            color: #9A8C81;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        /* 按鈕樣式 */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(255, 180, 162, 0.4);
            margin: 5px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 15px rgba(255, 180, 162, 0.6);
        }
        .btn:active {
            transform: translateY(1px);
        }
        .btn-large {
            font-size: 1.3rem;
            padding: 15px 30px;
            background-color: var(--secondary-color);
            color: var(--text-color);
        }
        .btn-success { background-color: var(--success-color); color: var(--text-color); }
        .btn-fail { background-color: var(--fail-color); color: var(--text-color); }
        .btn-outline { background-color: transparent; border: 2px solid var(--primary-color); color: var(--primary-color); }

        /* 網格選單 (Mode A) */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .grid-item {
            background-color: var(--bg-color);
            border: 2px dashed var(--secondary-color);
            border-radius: 20px;
            padding: 20px 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .grid-item:hover {
            background-color: var(--accent-color);
            transform: scale(1.05);
        }
        .grid-item span.icon { font-size: 2.5rem; }
        .grid-item span.title { font-weight: bold; font-size: 1rem; }
        .grid-item .status { font-size: 0.8rem; margin-top: 5px; border-radius: 10px; padding: 2px 8px; }

        /* 測試執行畫面 */
        #test-area {
            background-color: var(--bg-color);
            border-radius: 20px;
            padding: 20px;
            min-height: 250px;
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border: 2px solid var(--secondary-color);
        }
        
        .judgment-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px dashed var(--secondary-color);
        }

        /* 個別測試區塊專屬樣式 */
        .touch-box {
            width: 100%;
            height: 150px;
            background-color: var(--card-bg);
            border: 2px dashed var(--primary-color);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            touch-action: none;
        }
        .camera-video {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
            background-color: #000;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        .info-table th, .info-table td {
            padding: 8px;
            border-bottom: 1px dashed var(--secondary-color);
        }
        .info-table th { color: var(--primary-color); width: 40%; }

        /* 報告畫面 */
        #report-content {
            text-align: left;
            padding: 20px;
            background-color: white;
            border-radius: 15px;
        }
        .report-header { text-align: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary-color); padding-bottom: 10px; }
        .report-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }
        .badge-pass { background-color: var(--success-color); }
        .badge-fail { background-color: var(--fail-color); }
        .badge-skip { background-color: #e0e0e0; }
        
        /* 頂部進度條 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: var(--bg-color);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 視圖 1：首頁 (選單) -->
        <div id="view-home">
            <h1>🐾 萌萌裝置測試儀</h1>
            <p class="subtitle">來幫你的手機、平板或筆電做個健康檢查吧！</p>
            
            <button class="btn btn-large" onclick="app.startFullTest()">🚀 一鍵完整健檢 (引導模式)</button>
            <button class="btn btn-outline" style="margin-top:10px;" onclick="app.showReport()">📄 查看/下載報告</button>

            <div style="margin-top: 30px; text-align: left;">
                <h3 style="color: var(--primary-color);">🔍 自訂單項測試：</h3>
                <div class="grid-menu" id="home-grid">
                    <!-- JS 動態生成 -->
                </div>
            </div>
        </div>

        <!-- 視圖 2：測試執行中 -->
        <div id="view-test" class="hidden">
            <div class="progress-bar" id="test-progress-bar"><div class="progress-fill" id="test-progress-fill"></div></div>
            <h2 id="current-test-title">🧪 測試標題</h2>
            <p id="current-test-desc" style="color: #9A8C81; margin: 10px 0; font-size: 0.9rem;">測試說明</p>
            
            <div id="test-area">
                <!-- 測試內容動態注入區 -->
            </div>

            <!-- 判定按鈕區 -->
            <div class="judgment-buttons">
                <button class="btn btn-success" onclick="app.recordResult('Pass')">✅ 功能正常</button>
                <button class="btn btn-fail" onclick="app.recordResult('Fail')">❌ 有問題</button>
                <button class="btn" style="background-color: #ddd; color: #555;" onclick="app.recordResult('Skip')">⏭️ 不支援/跳過</button>
            </div>
            
            <div style="margin-top: 20px;">
                <button class="btn btn-outline" onclick="app.goHome()">🏠 中斷並回首頁</button>
            </div>
        </div>

        <!-- 視圖 3：測試報告 -->
        <div id="view-report" class="hidden">
            <div id="report-content">
                <div class="report-header">
                    <h2>📄 萌萌裝置檢測報告</h2>
                    <p id="report-time" style="color: #888; font-size: 0.9rem;"></p>
                </div>
                <div style="margin-bottom: 20px; background: var(--bg-color); padding: 15px; border-radius: 10px;">
                    <h4>💻 基本系統資訊</h4>
                    <p id="report-os" style="font-size: 0.9rem; margin-top:5px; word-break: break-all;"></p>
                </div>
                <h3>📋 測試結果清單</h3>
                <div id="report-list" style="margin-top: 10px;">
                    <!-- JS 動態生成 -->
                </div>
            </div>
            
            <div style="margin-top: 30px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
                <button class="btn" onclick="app.downloadPDF()">📥 下載 PDF 報告</button>
                <button class="btn btn-outline" onclick="app.goHome()">🏠 回首頁</button>
            </div>
        </div>
    </div>

    <!-- 應用程式邏輯 -->
    <script>
        // ================= 測試模組定義 =================
        const testModules = [
            {
                id: 'display', icon: '📱', title: '顯示與觸控', desc: '測試螢幕解析度與多點觸控支援',
                render: (container) => {
                    const ratio = window.devicePixelRatio || 1;
                    container.innerHTML = `
                        <table class="info-table">
                            <tr><th>實體解析度</th><td>${screen.width} x ${screen.height}</td></tr>
                            <tr><th>視窗大小</th><td>${window.innerWidth} x ${window.innerHeight}</td></tr>
                            <tr><th>像素比例 (DPR)</th><td>${ratio}</td></tr>
                        </table>
                        <div class="touch-box" id="touch-target">👉 請在此區塊滑動或多點觸控 👈<br><span id="touch-info" style="font-weight:bold; color:var(--primary-color);"></span></div>
                    `;
                    const box = document.getElementById('touch-target');
                    const info = document.getElementById('touch-info');
                    const updateTouch = (e) => {
                        e.preventDefault();
                        info.innerHTML = `<br>偵測到 ${e.touches.length} 個觸控點！`;
                    };
                    box.addEventListener('touchstart', updateTouch, {passive: false});
                    box.addEventListener('touchmove', updateTouch, {passive: false});
                    box.addEventListener('touchend', (e) => { info.innerHTML = "<br>觸控結束"; });
                },
                cleanup: () => {}
            },
            {
                id: 'media', icon: '📸', title: '相機與音效', desc: '測試鏡頭畫面與喇叭播放',
                stream: null,
                render: function(container) {
                    container.innerHTML = `
                        <video id="cam-video" class="camera-video" autoplay playsinline muted></video>
                        <div style="margin-top:10px;">
                            <button class="btn" id="btn-cam" style="font-size: 0.9rem;">📷 開啟相機</button>
                            <button class="btn" id="btn-sound" style="font-size: 0.9rem;">🎵 測試喇叭音效</button>
                        </div>
                    `;
                    document.getElementById('btn-cam').onclick = async () => {
                        try {
                            this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true });
                            document.getElementById('cam-video').srcObject = this.stream;
                            alert('✅ 成功獲取相機與麥克風權限！');
                        } catch (err) {
                            alert('❌ 無法開啟相機或被拒絕授權: ' + err.message);
                        }
                    };
                    document.getElementById('btn-sound').onclick = () => {
                        // 使用瀏覽器內建 Web Audio API 發出「嗶」聲
                        const ctx = new (window.AudioContext || window.webkitAudioContext)();
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(880, ctx.currentTime); // A5 音符
                        osc.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    };
                },
                cleanup: function() {
                    if (this.stream) {
                        this.stream.getTracks().forEach(track => track.stop());
                        this.stream = null;
                    }
                }
            },
            {
                id: 'sensors', icon: '🧭', title: '裝置感測器', desc: '測試陀螺儀與加速度計 (需實體裝置搖晃)',
                listenerMotion: null, listenerOrientation: null,
                render: function(container) {
                    container.innerHTML = `
                        <button class="btn hidden" id="btn-req-sensor" style="margin-bottom:10px;">🔓 允許 iOS 感測器權限</button>
                        <table class="info-table">
                            <tr><th>陀螺儀 (Alpha/Z)</th><td id="ori-a">等待數據...</td></tr>
                            <tr><th>陀螺儀 (Beta/X)</th><td id="ori-b">等待數據...</td></tr>
                            <tr><th>陀螺儀 (Gamma/Y)</th><td id="ori-g">等待數據...</td></tr>
                            <tr><th>加速度計 (X/Y/Z)</th><td id="accel-data">等待數據...</td></tr>
                        </table>
                    `;
                    
                    const handleOrientation = (e) => {
                        if(e.alpha !== null) {
                            document.getElementById('ori-a').innerText = Math.round(e.alpha) + '°';
                            document.getElementById('ori-b').innerText = Math.round(e.beta) + '°';
                            document.getElementById('ori-g').innerText = Math.round(e.gamma) + '°';
                        }
                    };
                    const handleMotion = (e) => {
                        if(e.accelerationIncludingGravity && e.accelerationIncludingGravity.x !== null) {
                            let x = Math.round(e.accelerationIncludingGravity.x);
                            let y = Math.round(e.accelerationIncludingGravity.y);
                            let z = Math.round(e.accelerationIncludingGravity.z);
                            document.getElementById('accel-data').innerText = `X:${x}, Y:${y}, Z:${z}`;
                        }
                    };

                    this.listenerOrientation = handleOrientation;
                    this.listenerMotion = handleMotion;

                    // iOS 13+ 權限請求
                    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                        const btn = document.getElementById('btn-req-sensor');
                        btn.classList.remove('hidden');
                        btn.onclick = () => {
                            DeviceOrientationEvent.requestPermission().then(res => {
                                if (res === 'granted') {
                                    window.addEventListener('deviceorientation', this.listenerOrientation);
                                    window.addEventListener('devicemotion', this.listenerMotion);
                                    btn.classList.add('hidden');
                                }
                            }).catch(console.error);
                        };
                    } else {
                        window.addEventListener('deviceorientation', this.listenerOrientation);
                        window.addEventListener('devicemotion', this.listenerMotion);
                    }
                },
                cleanup: function() {
                    window.removeEventListener('deviceorientation', this.listenerOrientation);
                    window.removeEventListener('devicemotion', this.listenerMotion);
                }
            },
            {
                id: 'system', icon: '⚙️', title: '硬體與系統', desc: '測試 CPU、記憶體與電池狀態',
                render: async (container) => {
                    const cores = navigator.hardwareConcurrency || '未知';
                    const memory = navigator.deviceMemory ? `>= ${navigator.deviceMemory} GB` : '不支援偵測';
                    container.innerHTML = `
                        <table class="info-table">
                            <tr><th>CPU 邏輯核心</th><td>${cores} 核</td></tr>
                            <tr><th>裝置記憶體估算</th><td>${memory}</td></tr>
                            <tr><th>電池電量</th><td id="batt-level">偵測中...</td></tr>
                            <tr><th>充電狀態</th><td id="batt-charging">偵測中...</td></tr>
                        </table>
                    `;
                    try {
                        if (navigator.getBattery) {
                            const battery = await navigator.getBattery();
                            const updateBattery = () => {
                                document.getElementById('batt-level').innerText = Math.round(battery.level * 100) + '%';
                                document.getElementById('batt-charging').innerText = battery.charging ? '⚡ 充電中' : '🔋 未充電';
                            };
                            updateBattery();
                            battery.onlevelchange = updateBattery;
                            battery.onchargingchange = updateBattery;
                        } else {
                            document.getElementById('batt-level').innerText = '⚠️ 瀏覽器不支援 Battery API';
                            document.getElementById('batt-charging').innerText = '-';
                        }
                    } catch(e) { console.log(e); }
                },
                cleanup: () => {}
            },
            {
                id: 'network', icon: '📡', title: '網路與定位', desc: '測試 GPS 定位與網路連線狀態',
                render: (container) => {
                    const onlineStatus = navigator.onLine ? '🟢 連線中 (Online)' : '🔴 離線 (Offline)';
                    const connType = navigator.connection ? navigator.connection.effectiveType : '未知';
                    
                    container.innerHTML = `
                        <table class="info-table">
                            <tr><th>網路狀態</th><td id="net-status">${onlineStatus}</td></tr>
                            <tr><th>網路類型</th><td>${connType}</td></tr>
                            <tr><th>經緯度定位</th><td id="geo-data">
                                <button class="btn btn-outline" id="btn-geo" style="font-size: 0.8rem; padding: 5px 10px;">📍 獲取位置</button>
                            </td></tr>
                        </table>
                    `;

                    window.addEventListener('online', () => document.getElementById('net-status').innerText = '🟢 連線中 (Online)');
                    window.addEventListener('offline', () => document.getElementById('net-status').innerText = '🔴 離線 (Offline)');

                    document.getElementById('btn-geo').onclick = () => {
                        const geoTd = document.getElementById('geo-data');
                        geoTd.innerHTML = '定位中...';
                        if ("geolocation" in navigator) {
                            navigator.geolocation.getCurrentPosition(
                                (pos) => { geoTd.innerHTML = `緯度: ${pos.coords.latitude.toFixed(4)}<br>經度: ${pos.coords.longitude.toFixed(4)}`; },
                                (err) => { geoTd.innerHTML = `❌ 定位失敗: ${err.message}`; },
                                { timeout: 10000 }
                            );
                        } else {
                            geoTd.innerHTML = '⚠️ 裝置不支援定位';
                        }
                    };
                },
                cleanup: () => {}
            },
            {
                id: 'vibrate', icon: '📳', title: '震動回饋', desc: '測試裝置震動馬達 (不支援 iOS)',
                render: (container) => {
                    container.innerHTML = `
                        <div style="text-align:center;">
                            <button class="btn btn-large" id="btn-vib">📳 點擊測試震動</button>
                            <p style="margin-top:10px; font-size:0.9rem; color:#888;">註：Apple iOS 設備網頁端不支援震動 API</p>
                        </div>
                    `;
                    document.getElementById('btn-vib').onclick = () => {
                        if (navigator.vibrate) {
                            const success = navigator.vibrate([200, 100, 200]);
                            if(!success) alert('裝置可能不支援或震動被攔截');
                        } else {
                            alert('⚠️ 此瀏覽器不支援震動 API');
                        }
                    };
                },
                cleanup: () => {}
            },
            {
                id: 'keyboard', icon: '⌨️', title: '實體鍵盤', desc: '測試外接或筆電實體鍵盤按鍵',
                listener: null,
                render: function(container) {
                    container.innerHTML = `
                        <div style="text-align:center; padding: 20px;">
                            <p>請隨意按下實體鍵盤的按鍵：</p>
                            <div style="margin-top: 20px; font-size: 2rem; font-weight: bold; color: var(--primary-color);" id="key-display">等待按鍵...</div>
                            <div style="margin-top: 10px; font-size: 1rem; color: #888;" id="code-display"></div>
                        </div>
                    `;
                    this.listener = (e) => {
                        e.preventDefault(); // 避免按空白鍵網頁捲動
                        document.getElementById('key-display').innerText = `[ ${e.key} ]`;
                        document.getElementById('code-display').innerText = `Key Code: ${e.code}`;
                    };
                    window.addEventListener('keydown', this.listener);
                },
                cleanup: function() {
                    window.removeEventListener('keydown', this.listener);
                }
            }
        ];

        // ================= 應用程式核心邏輯 =================
        const app = {
            results: {}, // 儲存測試結果
            mode: 'home', // 'home', 'single', 'full'
            currentTestIndex: 0,
            activeModule: null,

            init() {
                // 初始化結果物件
                testModules.forEach(m => this.results[m.id] = null);
                this.renderHomeGrid();
                document.getElementById('report-os').innerText = navigator.userAgent;
            },

            renderHomeGrid() {
                const grid = document.getElementById('home-grid');
                grid.innerHTML = '';
                testModules.forEach((m, idx) => {
                    const status = this.results[m.id];
                    let statusHtml = '';
                    if (status === 'Pass') statusHtml = '<div class="status badge-pass">✅ 已通過</div>';
                    else if (status === 'Fail') statusHtml = '<div class="status badge-fail">❌ 失敗</div>';
                    else if (status === 'Skip') statusHtml = '<div class="status badge-skip">⏭️ 跳過</div>';
                    else statusHtml = '<div class="status" style="background:#eee;">尚未測試</div>';

                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.innerHTML = `<span class="icon">${m.icon}</span><span class="title">${m.title}</span>${statusHtml}`;
                    item.onclick = () => this.startSingleTest(idx);
                    grid.appendChild(item);
                });
            },

            switchView(viewId) {
                document.getElementById('view-home').classList.add('hidden');
                document.getElementById('view-test').classList.add('hidden');
                document.getElementById('view-report').classList.add('hidden');
                document.getElementById(viewId).classList.remove('hidden');
            },

            goHome() {
                if (this.activeModule && this.activeModule.cleanup) {
                    this.activeModule.cleanup();
                    this.activeModule = null;
                }
                this.renderHomeGrid();
                this.switchView('view-home');
            },

            // 啟動單一測試
            startSingleTest(index) {
                this.mode = 'single';
                this.currentTestIndex = index;
                this.loadTest(index);
            },

            // 啟動引導完整測試
            startFullTest() {
                this.mode = 'full';
                this.currentTestIndex = 0;
                // 重置結果
                testModules.forEach(m => this.results[m.id] = null); 
                this.loadTest(0);
            },

            // 載入特定測試模組到 UI
            loadTest(index) {
                this.switchView('view-test');
                const module = testModules[index];
                this.activeModule = module;
                
                document.getElementById('current-test-title').innerText = `${module.icon} ${module.title}`;
                document.getElementById('current-test-desc').innerText = module.desc;
                
                // 更新進度條
                const progressFill = document.getElementById('test-progress-fill');
                const progressContainer = document.getElementById('test-progress-bar');
                if (this.mode === 'full') {
                    progressContainer.style.display = 'block';
                    progressFill.style.width = `${((index + 1) / testModules.length) * 100}%`;
                } else {
                    progressContainer.style.display = 'none';
                }

                // 渲染測試內容
                const container = document.getElementById('test-area');
                container.innerHTML = '';
                module.render(container);
            },

            // 記錄使用者判斷並前進
            recordResult(status) {
                const module = testModules[this.currentTestIndex];
                this.results[module.id] = status;
                
                // 清理當前測試 (例如關閉相機)
                if (module.cleanup) module.cleanup();

                if (this.mode === 'single') {
                    this.goHome(); // 單項測試完回首頁
                } else if (this.mode === 'full') {
                    this.currentTestIndex++;
                    if (this.currentTestIndex < testModules.length) {
                        this.loadTest(this.currentTestIndex); // 下一步
                    } else {
                        this.showReport(); // 全部完成看報告
                    }
                }
            },

            // 顯示報告畫面
            showReport() {
                this.switchView('view-report');
                document.getElementById('report-time').innerText = `檢測時間：${new Date().toLocaleString()}`;
                
                const list = document.getElementById('report-list');
                list.innerHTML = '';
                
                testModules.forEach(m => {
                    const res = this.results[m.id];
                    let badge = '';
                    if (res === 'Pass') badge = '<span class="status-badge badge-pass">✅ Pass</span>';
                    else if (res === 'Fail') badge = '<span class="status-badge badge-fail">❌ Fail</span>';
                    else if (res === 'Skip') badge = '<span class="status-badge badge-skip">⏭️ Skip/Not Supported</span>';
                    else badge = '<span class="status-badge badge-skip">❔ 未測試</span>';

                    list.innerHTML += `
                        <div class="report-item">
                            <span>${m.icon} <strong>${m.title}</strong></span>
                            ${badge}
                        </div>
                    `;
                });
            },

            // 呼叫 html2pdf 匯出 PDF
            downloadPDF() {
                const element = document.getElementById('report-content');
                const opt = {
                    margin:       10,
                    filename:     `裝置檢測報告_${new Date().getTime()}.pdf`,
                    image:        { type: 'jpeg', quality: 0.98 },
                    html2canvas:  { scale: 2 },
                    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                // 顯示 Loading 狀態
                const btn = event.currentTarget;
                const originalText = btn.innerText;
                btn.innerText = '⏳ 產生中...';
                btn.disabled = true;

                html2pdf().set(opt).from(element).save().then(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                });
            }
        };

        // 啟動 App
        window.onload = () => app.init();

    </script>
</body>
</html>
