<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma OS | 頂級調色盤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    },
                    transitionTimingFunction: {
                        'spring': 'cubic-bezier(0.175, 0.885, 0.32, 1.275)',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #09090b; /* Zinc 950 */
            /* Dynamic Palette Colors */
            --p1: #18181b; --p2: #27272a; --p3: #52525b; --p4: #a1a1aa; --p5: #f4f4f5;
        }
        
        body {
            background-color: var(--bg-base);
            color: #fafafa;
            overflow-x: hidden;
        }

        /* Dynamic Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, var(--p2) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, var(--p4) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, var(--p3) 0%, transparent 50%);
            opacity: 0.15;
            filter: blur(80px);
            transition: all 1.5s ease-in-out;
            pointer-events: none;
        }

        /* Linear/Vercel style Glass Panels */
        .surface {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 24px -1px rgba(0, 0, 0, 0.5);
        }
        
        .surface-hover:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(39, 39, 42, 0.6);
        }

        /* Color Strips */
        .color-strip { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .color-strip:hover { transform: scaleY(1.15) scaleX(1.02); z-index: 10; border-radius: 6px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.5); }
        
        /* Dynamic elements */
        .dyn-bg { background-color: var(--p1); transition: background-color 0.5s ease; }
        .dyn-surface { background-color: var(--p2); transition: background-color 0.5s ease; }
        .dyn-border { border-color: var(--p3); transition: border-color 0.5s ease; }
        .dyn-text-muted { color: var(--p4); transition: color 0.5s ease; }
        .dyn-text-primary { color: var(--p5); transition: color 0.5s ease; }
        .dyn-accent { background-color: var(--p5); color: var(--p1); transition: all 0.5s ease; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-white/20">

    <div class="ambient-bg"></div>

    <div class="max-w-[1440px] mx-auto px-4 md:px-8 py-6 h-screen flex flex-col relative z-10">
        
        <!-- Top Navigation -->
        <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8 mt-2">

                    <i class="ph-fill ph-aperture text-xl text-white"></i>
                </div>

        </header>

        <!-- Main Workspace -->
        <div class="flex-1 grid grid-cols-1 lg:grid-cols-12 gap-6 min-h-0 pb-6">
            
            <!-- Left: Palette List (Scrollable) -->

                    <input type="text" id="search" placeholder="搜尋色彩靈感..."

            <!-- Right: Bento Grid Preview Studio -->

                    <div>

                    </div>

                    <!-- WCAG Contrast Checker -->
                    <div class="flex items-center gap-4 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                        <div class="flex flex-col items-center justify-center">
                            <span class="text-[10px] text-zinc-500 font-semibold mb-1 uppercase tracking-wider">Contrast</span>
                            <div class="flex items-end gap-1">
                                <span id="wcag-score" class="text-2xl font-mono font-bold text-white leading-none">0.0</span>
                                <span class="text-xs text-zinc-500 mb-0.5">:1</span>
                            </div>
                        </div>
                        <div class="h-10 w-px bg-zinc-800"></div>
                        <div class="flex flex-col gap-1">
                            <div id="wcag-aaa" class="text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-zinc-800 text-zinc-500">

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 h-full mt-4">
                        
                        <!-- UI Component Card -->

                            <div>

                                <div class="flex items-baseline gap-2 mb-6">

                                <div class="flex items-end gap-2 h-24 w-full px-4 relative z-10">
                                    <div class="flex-1 dyn-bg rounded-t-sm h-[30%] border-t border-l dyn-border transition-all duration-700 group-hover/graph:h-[40%]"></div>
                                    <div class="flex-1 dyn-bg rounded-t-sm h-[50%] border-t border-l dyn-border transition-all duration-700 delay-75 group-hover/graph:h-[65%]"></div>
                                    <div class="flex-1 dyn-bg rounded-t-sm h-[40%] border-t border-l dyn-border transition-all duration-700 delay-100 group-hover/graph:h-[45%]"></div>
                                    <div class="flex-1 dyn-accent rounded-t-sm h-[80%] opacity-90 transition-all duration-700 delay-150 group-hover/graph:h-[95%] shadow-[0_0_15px_rgba(255,255,255,0.2)]"></div>
                                    <div class="flex-1 dyn-bg rounded-t-sm h-[60%] border-t border-l dyn-border transition-all duration-700 delay-200 group-hover/graph:h-[70%]"></div>

                            <!-- Colors Hex Display -->

                                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover/tip:opacity-100 transition-opacity rounded-lg flex items-center justify-center"><i class="ph-bold ph-copy text-white"></i></div>
                                </div>
                                <div class="flex-1 rounded-lg color-patch relative group/tip cursor-pointer" onclick="copyHex(2)">
                                    <div class="absolute inset-0 bg-black/20 opacity-0 group-hover/tip:opacity-100 transition-opacity rounded-lg flex items-center justify-center"><i class="ph-bold ph-copy text-white"></i></div>

    <!-- Toast Notification -->

        </div>
        <div class="flex flex-col">
            <span id="toast-title" class="font-bold text-sm leading-tight text-zinc-100">Action</span>
            <span id="toast-msg" class="text-xs text-zinc-400 font-mono mt-0.5">Detail</span>

    <script>
        // 重新架構的資料庫，嚴格遵循從「最深背景」到「最亮強調色」的層級
        // p1: 背景, p2: 卡片表面, p3: 邊框/次要元素, p4: 次要文字, p5: 主文字/強烈按鈕
        const database = [
            // --- 動漫基因 (Anime) ---
            { id: 'a1', name: "葬送的芙莉蓮", category: "anime", colors: ["#141924", "#232C3E", "#4A628A", "#C5BAAF", "#F9F6E6"], desc: "深邃的夜空藍背景，點綴著懷舊的金黃，展現時光流逝的魔法感。" },
            { id: 'a2', name: "膽大黨 (Dandadan)", category: "anime", colors: ["#0A0A0A", "#1A1A1A", "#8A2BE2", "#00F5FF", "#FF007A"], desc: "極致的純黑深淵中，爆發出霓虹紫與賽博粉的超現實狂歡。" },
            { id: 'a3', name: "福音戰士 初號機", category: "anime", colors: ["#120B1A", "#1E1E1E", "#7030A0", "#FF6600", "#7FFF00"], desc: "壓抑的機械黑灰，配上極具侵略性的螢光綠與警示橘。" },
            { id: 'a4', name: "鬼滅之刃 炭治郎", category: "anime", colors: ["#0F1110", "#1A1C1B", "#8B4513", "#00B08B", "#F5F5DC"], desc: "沉穩的羽織暗色調，生機盎然的市松紋綠與溫暖的稻草白。" },
            { id: 'a5', name: "鏈鋸人", category: "anime", colors: ["#0D0D0D", "#1C1C1C", "#2F4F4F", "#FF4500", "#F0E68C"], desc: "粗糙的工業暗色，伴隨象徵殺戮的血橙與電鋸火花黃。" },
            { id: 'a6', name: "一拳超人", category: "anime", colors: ["#171717", "#262626", "#D32F2F", "#FFD700", "#FFFFFF"], desc: "英雄協會的絕對暗沉，襯托著無敵的披風白與拳套紅。" },

            // --- 專業商務 (Pro) ---
            { id: 'p1', name: "Vercel / Next.js", category: "pro", colors: ["#000000", "#111111", "#333333", "#888888", "#FFFFFF"], desc: "當代前端開發的絕對極簡，極致的黑白灰階對比。" },
            { id: 'p2', name: "Stripe Blur", category: "pro", colors: ["#0B0F19", "#111827", "#3730A3", "#818CF8", "#C7D2FE"], desc: "Fintech 領域的標竿，深邃的信賴藍搭配流暢的靛紫漸層。" },
            { id: 'p3', name: "Linear App", category: "pro", colors: ["#0E0F11", "#17181B", "#2B2D31", "#8A8F98", "#E0E2E5"], desc: "矽谷設計師最愛的頂級專案管理工具配色，極冷冽的鋼鐵灰。" },
            { id: 'p4', name: "醫療科技 (MedTech)", category: "pro", colors: ["#041A24", "#0A2D3D", "#086F72", "#18B5B1", "#E6F9F9"], desc: "深孔雀藍作為基底，螢光青湖綠帶出科技與醫療的精確感。" },
            { id: 'p5', name: "奢華精品 (Luxury)", category: "pro", colors: ["#0A0A0A", "#141414", "#52442A", "#A68654", "#EADDCA"], desc: "深不見底的曜石黑，勾勒出香檳金的高貴輪廓。" },
            { id: 'p6', name: "永續能源 (Clean Energy)", category: "pro", colors: ["#08170C", "#0F2615", "#1B4A26", "#3CA852", "#A2F0B2"], desc: "現代綠能企業愛用，從深邃森林到發光的新葉綠。" },

            // --- 情境氛圍 (Life) ---
            { id: 'l1', name: "Cyberpunk 2077", category: "life", colors: ["#05050C", "#0D0A26", "#120458", "#00FFCC", "#FCEE0A"], desc: "反烏托邦的夜之城，高反差的電路板青與警告黃。" },
            { id: 'l2', name: "午夜 lo-fi", category: "life", colors: ["#1A1726", "#272336", "#453F59", "#8C7D9E", "#D4C5E3"], desc: "適合寫 code 或讀書的深夜，低飽和度的安靜紫羅蘭色。" },
            { id: 'l3', name: "暗黑抹茶 (Dark Matcha)", category: "life", colors: ["#161A14", "#252B23", "#434E3F", "#7C8E75", "#CCD6C9"], desc: "帶著禪意的深色系，寧靜、克制且極具質感。" },
            { id: 'l4', name: "夕陽航線 (Synthwave)", category: "life", colors: ["#140224", "#29044A", "#830F6F", "#F2356B", "#F9A55B"], desc: "80 年代復古未來主義，紫紅色的網格與落日餘暉。" }
        ];

        let activePalette = null;

        // --- WCAG Contrast Algorithm ---
        function getLuminance(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let a = [r, g, b].map(v => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4));
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function calculateContrast(hex1, hex2) {
            let l1 = getLuminance(hex1);
            let l2 = getLuminance(hex2);
            let ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
            return ratio.toFixed(2);
        }

        function updateWCAG(bgHex, textHex) {
            const ratio = calculateContrast(bgHex, textHex);
            document.getElementById('wcag-score').innerText = ratio;
            
            const aaaBadge = document.getElementById('wcag-aaa');
            const aaBadge = document.getElementById('wcag-aa');
            
            // Reset classes
            aaaBadge.className = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-zinc-800 text-zinc-500";
            aaBadge.className = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-zinc-800 text-zinc-500";
            aaaBadge.innerHTML = '<i class="ph-bold ph-x"></i> AAA (7.0+)';
            aaBadge.innerHTML = '<i class="ph-bold ph-x"></i> AA (4.5+)';

            if (ratio >= 7.0) {
                aaaBadge.className = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-green-500/20 text-green-400 border border-green-500/30";
                aaaBadge.innerHTML = '<i class="ph-fill ph-check-circle"></i> AAA Pass';
            }
            if (ratio >= 4.5) {
                aaBadge.className = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-green-500/20 text-green-400 border border-green-500/30";
                aaBadge.innerHTML = '<i class="ph-fill ph-check-circle"></i> AA Pass';
            } else {
                aaBadge.className = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-red-500/20 text-red-400 border border-red-500/30";
                aaBadge.innerHTML = '<i class="ph-bold ph-warning-circle"></i> Fail';
            }
        }

        // --- Core Rendering ---
        function renderList(data) {
            const container = document.getElementById('palette-list');
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <i class="ph-duotone ph-ghost text-4xl text-zinc-600 mb-2"></i>
                        <p class="text-zinc-500 text-sm">無相符色彩</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map((p) => `
                <div class="surface-hover rounded-2xl p-4 cursor-pointer transition-all border border-transparent group ${activePalette?.id === p.id ? 'bg-zinc-800/80 border-zinc-600 shadow-md' : ''}" 
                     onclick="activatePalette('${p.id}')">
                    <div class="flex justify-between items-center mb-3">
                        <h4 class="font-bold text-sm text-zinc-200 group-hover:text-white transition-colors">${p.name}</h4>
                        <i class="ph-bold ph-arrow-right text-zinc-600 opacity-0 group-hover:opacity-100 transition-all transform -translate-x-2 group-hover:translate-x-0"></i>
                    </div>
                    <div class="flex h-8 rounded-lg overflow-hidden border border-zinc-800">
                        ${p.colors.map(c => `<div class="flex-1 color-strip" style="background-color: ${c}"></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function activatePalette(id) {
            const p = database.find(x => x.id === id);
            activePalette = p;
            
            // Re-render list to show active state
            const currentCat = document.querySelector('.active-nav').innerText.includes('動漫') ? 'anime' : 
                               (document.querySelector('.active-nav').innerText.includes('專業') ? 'pro' : 'life');
            
            if(document.getElementById('search').value !== '') {
                handleSearch(document.getElementById('search').value);
            } else {
                renderList(database.filter(x => x.category === currentCat));
            }

            // Update Text Info
            document.getElementById('active-title').innerText = p.name;
            document.getElementById('active-category').innerText = p.category;
            document.getElementById('active-desc').innerText = p.desc;

            // Apply CSS Variables to Root
            const root = document.documentElement;
            root.style.setProperty('--p1', p.colors[0]);
            root.style.setProperty('--p2', p.colors[1]);
            root.style.setProperty('--p3', p.colors[2]);
            root.style.setProperty('--p4', p.colors[3]);
            root.style.setProperty('--p5', p.colors[4]);

            // Update Color Patches in UI
            const patches = document.querySelectorAll('.color-patch');
            p.colors.forEach((color, i) => {
                patches[i].style.backgroundColor = color;
            });

            // Calculate WCAG (Background vs Primary Text)
            updateWCAG(p.colors[1], p.colors[4]); // p2 (Card Surface) vs p5 (Primary Text)
        }

        // --- Interaction Logic ---
        function filterPalettes(cat) {
            // Update Navigation Pills
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.className = "nav-btn px-6 py-2 rounded-full text-sm font-medium text-zinc-400 hover:text-white transition-all hover:bg-white/5";
            });
            event.currentTarget.className = "nav-btn px-6 py-2 rounded-full text-sm font-medium transition-all text-white bg-white/10 shadow-sm border border-white/5 active-nav";
            
            // Clear search
            document.getElementById('search').value = '';
            
            // Render
            const filtered = database.filter(p => p.category === cat);
            renderList(filtered);
            if(filtered.length > 0) activatePalette(filtered[0].id);
        }

        function handleSearch(query) {
            const q = query.toLowerCase();
            const filtered = database.filter(p => 
                p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)
            );
            renderList(filtered);
        }

        function copyHex(index) {
            if(!activePalette) return;
            const hex = activePalette.colors[index];
            navigator.clipboard.writeText(hex).then(() => {
                showToast('已複製色碼', hex);
            });
        }

        function exportTailwind() {
            if(!activePalette) return;
            const config = `// Tailwind CSS Config
module.exports = {
  theme: {
    extend: {
      colors: {
        '${activePalette.id}': {
          900: '${activePalette.colors[0]}', // Base BG
          800: '${activePalette.colors[1]}', // Surface
          600: '${activePalette.colors[2]}', // Border/Accent
          400: '${activePalette.colors[3]}', // Muted Text
          100: '${activePalette.colors[4]}', // Primary Text/Btn
        }
      }
    }
  }
}`;
            navigator.clipboard.writeText(config).then(() => {
                showToast('匯出成功', '已複製 Tailwind Config 至剪貼簿');
            });
        }

        let toastTimer;
        function showToast(title, msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            if(toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // --- Initialization ---
        window.onload = () => {
            // Load initial category (Anime)
            const initialData = database.filter(p => p.category === 'anime');
            renderList(initialData);
            activatePalette(initialData[0].id); // Trigger first load
        };
    </script>
</body>
</html>
