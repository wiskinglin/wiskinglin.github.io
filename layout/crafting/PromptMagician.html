<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Architect | AI 提示詞建構器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; font-weight: 600; }
        .tab-inactive { color: #6b7280; hover:text-gray-900; }
        .input-group { transition: all 0.3s ease; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 text-white p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">Prompt Architect</h1>
                    <p class="text-xs text-gray-500">專業級 AI 提示詞結構化工具</p>
                </div>
            </div>
            <a href="#" class="text-sm text-gray-500 hover:text-blue-600 transition">v1.0.0</a>
        </div>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <div class="space-y-6">
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-2 flex justify-between">
                <button onclick="switchTab('costar')" id="tab-costar" class="flex-1 py-2 text-sm text-center transition rounded-lg hover:bg-gray-50 tab-active">
                    CO-STAR (最全面)
                </button>
                <button onclick="switchTab('crispe')" id="tab-crispe" class="flex-1 py-2 text-sm text-center transition rounded-lg hover:bg-gray-50 tab-inactive">
                    CRISPE (角色化)
                </button>
                <button onclick="switchTab('rtf')" id="tab-rtf" class="flex-1 py-2 text-sm text-center transition rounded-lg hover:bg-gray-50 tab-inactive">
                    RTF (極簡)
                </button>
            </div>

            <div id="framework-desc" class="bg-blue-50 text-blue-800 text-sm p-4 rounded-lg border border-blue-100">
                </div>

            <form id="prompt-form" class="space-y-4 fade-in">
                </form>

            <div class="flex justify-end pt-4">
                <button onclick="clearForm()" class="text-sm text-gray-500 hover:text-red-500 px-4 py-2 mr-2">清空重置</button>
            </div>
        </div>

        <div class="relative flex flex-col h-[calc(100vh-200px)] lg:h-auto sticky top-24">
            <div class="absolute top-0 right-0 p-4 flex gap-2">
                <span id="copy-feedback" class="text-green-400 text-xs font-mono opacity-0 transition">Copied!</span>
                <button onclick="copyToClipboard()" class="bg-white/10 hover:bg-white/20 text-white border border-white/20 px-3 py-1 rounded text-xs backdrop-blur-sm transition flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    複製 Prompt
                </button>
            </div>
            <div class="bg-slate-900 rounded-xl shadow-2xl flex-grow overflow-hidden flex flex-col border border-slate-700">
                <div class="bg-slate-800 px-4 py-2 border-b border-slate-700 flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-red-500"></div>
                    <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <div class="w-3 h-3 rounded-full bg-green-500"></div>
                    <span class="ml-2 text-xs text-slate-400 font-mono">output.txt</span>
                </div>
                <textarea id="final-output" readonly class="w-full h-full bg-slate-900 text-gray-300 p-6 font-mono text-sm leading-relaxed focus:outline-none resize-none selection:bg-blue-500 selection:text-white" placeholder="您的結構化 Prompt 將會即時顯示在這裡..."></textarea>
            </div>
        </div>

    </main>

    <script>
        // --- Configuration & Data ---
        const frameworks = {
            costar: {
                name: "CO-STAR",
                desc: "CO-STAR 架構適合處理複雜任務，將背景、目標與格式拆分得非常細緻，能有效減少 AI 幻覺。",
                fields: [
                    { id: 'context', label: 'Context (背景)', placeholder: '提供任務的背景資訊。例如：我是一位經營 IG 的健身教練...' },
                    { id: 'objective', label: 'Objective (目標)', placeholder: '定義你想要 AI 做什麼。例如：幫我撰寫一篇關於斷食的貼文...' },
                    { id: 'style', label: 'Style (風格)', placeholder: '寫作風格。例如：幽默的、專業的、像是賈伯斯一樣...' },
                    { id: 'tone', label: 'Tone (語氣)', placeholder: '情感基調。例如：熱情的、權威的、同理心的...' },
                    { id: 'audience', label: 'Audience (受眾)', placeholder: '這內容是給誰看的？例如：忙碌的上班族、想要減肥的新手...' },
                    { id: 'response', label: 'Response (格式)', placeholder: '輸出格式。例如：Markdown 表格、JSON、條列式清單...' }
                ]
            },
            crispe: {
                name: "CRISPE",
                desc: "CRISPE 架構特別強調「角色扮演」與「能力」，適合需要特定專家觀點的任務。",
                fields: [
                    { id: 'capacity', label: 'Capacity (能力)', placeholder: '你希望 AI 扮演什麼樣的角色？例如：你是一位擁有 10 年經驗的 Python 全端工程師...' },
                    { id: 'role', label: 'Role (角色)', placeholder: '具體的角色定位。例如：資深代碼審查員...' },
                    { id: 'insight', label: 'Insight (洞察)', placeholder: '背景資訊與細節。例如：這段代碼是為了處理高併發的電商訂單...' },
                    { id: 'statement', label: 'Statement (陳述)', placeholder: '你需要 AI 執行的具體任務。例如：請優化這段代碼的效能...' },
                    { id: 'personality', label: 'Personality (個性)', placeholder: '回應的風格。例如：嚴格但有建設性、鼓勵性的...' },
                    { id: 'experiment', label: 'Experiment (實驗)', placeholder: '要求 AI 提供多種範例。例如：請提供三種不同的優化方案並比較...' }
                ]
            },
            rtf: {
                name: "RTF",
                desc: "RTF 是最簡潔的架構，適合快速生成明確的單一任務，強調「角色、任務、格式」。",
                fields: [
                    { id: 'role', label: 'Role (角色)', placeholder: 'AI 的角色。例如：資深文案寫手...' },
                    { id: 'task', label: 'Task (任務)', placeholder: '具體要做什麼。例如：寫 5 個吸睛的標題...' },
                    { id: 'format', label: 'Format (格式)', placeholder: '輸出的樣子。例如：帶有 Emoji 的清單...' }
                ]
            }
        };

        let currentFramework = 'costar';

        // --- Core Logic ---

        function init() {
            renderForm('costar');
            updateOutput();
        }

        function switchTab(frameworkKey) {
            currentFramework = frameworkKey;
            
            // UI Styling for Tabs
            ['costar', 'crispe', 'rtf'].forEach(key => {
                const btn = document.getElementById(`tab-${key}`);
                if (key === frameworkKey) {
                    btn.classList.add('tab-active');
                    btn.classList.remove('tab-inactive', 'hover:bg-gray-50');
                    btn.classList.add('bg-blue-50/50');
                } else {
                    btn.classList.remove('tab-active', 'bg-blue-50/50');
                    btn.classList.add('tab-inactive', 'hover:bg-gray-50');
                }
            });

            renderForm(frameworkKey);
            updateOutput(); // Clear or re-generate based on new empty inputs
        }

        function renderForm(key) {
            const config = frameworks[key];
            const formContainer = document.getElementById('prompt-form');
            const descContainer = document.getElementById('framework-desc');

            // Update Description
            descContainer.innerHTML = `<strong>${config.name}:</strong> ${config.desc}`;

            // Build Fields
            let html = '';
            config.fields.forEach(field => {
                html += `
                <div class="input-group">
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wide mb-1" for="${field.id}">
                        ${field.label}
                    </label>
                    <textarea 
                        id="${field.id}" 
                        rows="${key === 'rtf' ? 2 : 3}" 
                        class="w-full p-3 bg-white border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition shadow-sm placeholder-gray-400"
                        placeholder="${field.placeholder}"
                        oninput="updateOutput()"
                    ></textarea>
                </div>
                `;
            });
            formContainer.innerHTML = html;
        }

        function getVal(id) {
            const el = document.getElementById(id);
            return el ? el.value.trim() : '';
        }

        function updateOutput() {
            let output = '';
            const c = currentFramework;

            if (c === 'costar') {
                const context = getVal('context');
                const objective = getVal('objective');
                const style = getVal('style');
                const tone = getVal('tone');
                const audience = getVal('audience');
                const response = getVal('response');

                if(!context && !objective) { output = ""; } 
                else {
                    output = `
# CONTEXT
${context || '[等待輸入背景...]'}

# OBJECTIVE
${objective || '[等待輸入目標...]'}

# STYLE
${style || 'Default / Professional'}

# TONE
${tone || 'Helpful'}

# AUDIENCE
${audience || 'General Audience'}

# RESPONSE FORMAT
${response || 'Text'}
`.trim();
                }
            } else if (c === 'crispe') {
                const capacity = getVal('capacity');
                const role = getVal('role');
                const insight = getVal('insight');
                const statement = getVal('statement');
                const personality = getVal('personality');
                const experiment = getVal('experiment');

                if(!statement) { output = ""; }
                else {
                    output = `
Act as ${capacity ? capacity : 'an expert'} with the role of ${role || 'consultant'}.

Here is the insight/context:
${insight || 'N/A'}

Your task is:
${statement || '[等待輸入任務...]'}

Please maintain a personality that is:
${personality || 'Professional'}

Experiment request:
${experiment || 'Provide the best possible answer.'}
`.trim();
                }
            } else if (c === 'rtf') {
                const role = getVal('role');
                const task = getVal('task');
                const format = getVal('format');

                if(!task) { output = ""; }
                else {
                    output = `
Act as a ${role || 'Helpful Assistant'}.
Perform the following task: ${task || '[等待輸入任務...]'}.
Output the result as ${format || 'text'}.
`.trim();
                }
            }

            const outputEl = document.getElementById('final-output');
            outputEl.value = output;
        }

        function clearForm() {
            const form = document.getElementById('prompt-form');
            form.reset();
            updateOutput();
        }

        function copyToClipboard() {
            const copyText = document.getElementById("final-output");
            if (!copyText.value) return;

            copyText.select();
            copyText.setSelectionRange(0, 99999); 
            navigator.clipboard.writeText(copyText.value).then(() => {
                const feedback = document.getElementById('copy-feedback');
                feedback.style.opacity = '1';
                setTimeout(() => {
                    feedback.style.opacity = '0';
                }, 2000);
            });
        }

        // Initialize
        init();

    </script>
</body>
</html>
