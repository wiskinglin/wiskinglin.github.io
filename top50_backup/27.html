<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#27 80s Synthwave / Neon Excess — 80年代霓虹電子風 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mr+Dafoe&family=Montserrat:ital,wght@0,900;1,900&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --hot-pink: #ff00ea;
  --cyan: #00ffff;
  --yellow: #ffea00;
  --bg-deep: #050014;
}
body{
  font-family:'Montserrat','Noto Sans TC',sans-serif;
  background-color:var(--bg-deep);color:#fff;
  overflow-x:hidden;
  padding-bottom:120px;
}

/* VHS Overlay Effects */
.vhs-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:9000;
  background:linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
  background-size:100% 4px, 6px 100%;
}
.glitch-bar{
  position:fixed;width:100%;height:30px;background:rgba(255,255,255,0.05);
  top:20%;pointer-events:none;z-index:9001;
  animation:vhsGlitch 10s infinite linear;
}
@keyframes vhsGlitch{
  0%{transform:translateY(-100vh)}100%{transform:translateY(100vh)}
}

/* 3D Synthwave Grid Floor */
.horizon-container{
  position:absolute;top:0;left:0;width:100vw;height:100vh;
  overflow:hidden;z-index:-2;
}
.horizon-sun{
  position:absolute;bottom:0;left:50%;transform:translate(-50%, 50%);
  width:600px;height:600px;border-radius:50%;
  background:linear-gradient(to bottom, #ffea00 0%, #ff00ea 100%);
  box-shadow:0 0 100px var(--hot-pink);
  z-index:-1;
}
/* Cut horizontal lines through sun */
.sun-lines{
  position:absolute;bottom:0;left:50%;transform:translate(-50%, 50%);
  width:650px;height:650px;
  background:repeating-linear-gradient(to bottom, transparent, transparent 15px, var(--bg-deep) 15px, var(--bg-deep) 25px);
  z-index:0;
}

.grid-plane{
  position:absolute;bottom:0;left:0;width:100%;height:50vh;
  perspective:600px;
  background:var(--bg-deep); /* block the bottom half of the sun */
  z-index:1;
}
.grid{
  position:absolute;width:300vw;height:300vh;
  left:-100vw;top:-100vh;
  /* Glowing grid */
  background-image: 
    linear-gradient(var(--cyan) 2px, transparent 2px),
    linear-gradient(90deg, var(--cyan) 2px, transparent 2px);
  background-size:100px 100px;
  transform:rotateX(75deg) translateZ(0);
  transform-origin:top center;
  /* Animate the grid moving towards user */
  animation:moveGrid 2s linear infinite;
  box-shadow:inset 0 100px 200px var(--bg-deep); /* fade out at horizon */
}
@keyframes moveGrid{
  0%{background-position:0 0}
  100%{background-position:0 100px}
}

/* Main Content Layer */
.content{
  position:relative;z-index:10;
  display:flex;flex-direction:column;align-items:center;
  padding-top:15vh;
}

.80s-header{text-align:center;margin-bottom:80px;}

.title-chrome{
  font-size:clamp(3rem,8vw,6rem);font-weight:900;text-transform:uppercase;
  font-style:italic;line-height:0.9;
  /* Retro chrome effect */
  background:linear-gradient(to bottom, #ffffff 0%, #56c2e6 45%, #050014 50%, #150030 55%, #df3eed 100%);
  -webkit-background-clip:text;color:transparent;
  -webkit-text-stroke:2px #fff;
  filter:drop-shadow(0 0 20px var(--cyan));
}
.title-brush{
  font-family:'Mr Dafoe', cursive;font-size:clamp(3rem,6vw,5rem);
  color:var(--yellow);text-shadow:0 0 20px var(--hot-pink), 0 0 40px var(--hot-pink);
  transform:rotate(-10deg) translateY(-40px) translateX(60px);
}

/* Info Glass Box */
.style-info{
  max-width:1000px;background:rgba(5,0,20,0.8);
  border:2px solid var(--cyan);border-radius:12px;
  padding:40px;backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,255,255,0.2), inset 0 0 20px rgba(255,0,234,0.1);
}
.cat{
  display:inline-block;padding:6px 16px;background:var(--hot-pink);color:#fff;
  font-size:.8rem;font-weight:900;text-transform:uppercase;letter-spacing:2px;
  margin-bottom:24px;border:2px solid var(--yellow);
}
.info-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:40px;text-align:left;
}
.info-col{
  padding:20px;border-left:4px solid var(--hot-pink);
  background:linear-gradient(90deg, rgba(255,0,234,0.1), transparent);
}
.info-col.full{grid-column:1/-1;border-color:var(--yellow);background:linear-gradient(90deg, rgba(255,234,0,0.1), transparent);}
.info-col h4{font-size:.9rem;color:var(--cyan);text-transform:uppercase;margin-bottom:12px;letter-spacing:2px}
.info-col p{font-size:1rem;color:#ccc;line-height:1.8}

/* Action Button */
.btn-neon{
  margin-top:60px;background:transparent;border:2px solid var(--hot-pink);
  color:var(--hot-pink);font-size:1.5rem;font-weight:900;text-transform:uppercase;
  padding:16px 40px;font-family:'Montserrat',sans-serif;font-style:italic;
  cursor:pointer;box-shadow:0 0 20px var(--hot-pink), inset 0 0 20px var(--hot-pink);
  transition:all 0.3s;
}
.btn-neon:hover{
  background:var(--hot-pink);color:#fff;
  box-shadow:0 0 40px var(--cyan), inset 0 0 20px var(--cyan);
  border-color:var(--cyan);
}

@media(max-width:900px){
  .info-grid{grid-template-columns:1fr}
  .title-brush{transform:rotate(-5deg) translateY(-20px) translateX(0)}
}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(0,0,0,0.8);border-top:2px solid var(--hot-pink);
  display:flex;justify-content:center;align-items:center;gap:30px;
  padding:16px 24px;z-index:9002;
}
.bottom-nav a{text-decoration:none;color:var(--cyan);font-weight:900;font-size:1.1rem;transition:color 0.2s;text-transform:uppercase}
.bottom-nav a:hover{color:var(--yellow);text-shadow:0 0 10px var(--yellow)}
</style>
</head>
<body>

<div class="vhs-overlay"></div>
<div class="glitch-bar"></div>

<div class="horizon-container">
  <div class="horizon-sun"></div>
  <div class="sun-lines"></div>
  <div class="grid-plane"><div class="grid"></div></div>
</div>

<div class="content">
  
  <div class="80s-header">
    <div class="title-chrome">SYNTHWAVE</div>
    <div class="title-brush">Neon Excess</div>
  </div>

  <div class="style-info">
    <div class="cat">🎵 復古、懷舊與文化符號轉譯</div>
    <div class="info-grid">
      <div class="info-col full">
        <h4>📖 風格定義與視覺特徵</h4>
        <p>受到 80 年代流行 Synthwave 與邁阿密 Vice 之視覺風格影響。運用絕對深色的宇宙背景、霓虹色彩網格地平線、Chrome 漸層金屬大字與發光的筆刷字體（Brush Script）、VHS 錄影帶磨損痕跡，傳遞極度享樂、復古未來與純粹電子音樂的狂歡氛圍。</p>
      </div>
      <div class="info-col">
        <h4>🏢 適用產業與場景</h4>
        <p>電子音樂廠牌、獨立遊戲娛樂平台、夜生活俱樂部品牌</p>
      </div>
      <div class="info-col">
        <h4>🌍 主要流行地區</h4>
        <p>美國、歐洲與全球次流行文化圈</p>
      </div>
    </div>
  </div>

  <button class="btn-neon">INSERT COIN</button>
</div>
