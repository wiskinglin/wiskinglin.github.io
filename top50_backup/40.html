<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#40 Micro-Gamification — 極微遊戲化體驗 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-color: #f3f4f6;
  --surface: #ffffff;
  --text-main: #1f2937;
  --primary: #3b82f6;
  --success: #22c55e;
  --warning: #f59e0b;
  --border: #e5e7eb;
}
body{
  /* Friendly, rounded font typical of gamified apps */
  font-family:'Nunito','Noto Sans TC',sans-serif;
  background-color:var(--bg-color);color:var(--text-main);
  line-height:1.6;padding-bottom:120px;
}

/* Header Config */
.layout{max-width:900px;margin:60px auto;padding:0 24px;}
.style-info{text-align:center;margin-bottom:60px;}
.cat{
  display:inline-block;padding:6px 16px;border-radius:20px;
  background:rgba(59,130,246,0.1);color:var(--primary);
  font-size:.7rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;
}
.style-info h1{font-weight:900;font-size:2.8rem;letter-spacing:-1px;margin-bottom:8px;color:#111827}
.sub{color:#4b5563;font-size:1.1rem;margin-bottom:24px;font-weight:700}
.desc{color:#6b7280;max-width:700px;margin:0 auto;line-height:1.8;font-size:1rem;}

/* App Container - Habit Tracker */
.app-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:24px;padding:40px;box-shadow:0 20px 40px rgba(0,0,0,0.05);
  max-width:500px;margin:0 auto;position:relative;
}

/* Header & Flame Streak */
.app-header{
  display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;
}
.app-title{font-size:1.5rem;font-weight:900;}
.streak-box{
  display:flex;align-items:center;gap:8px;background:#fff7ed;
  border:2px solid #fed7aa;padding:8px 16px;border-radius:24px;
  color:var(--warning);font-weight:900;font-size:1.1rem;
  transition:all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.streak-box.fire{
  background:var(--warning);color:#fff;border-color:var(--warning);
  transform:scale(1.1);box-shadow:0 0 20px rgba(245,158,11,0.4);
}
.flame-icon{font-size:1.4rem;}

/* Progress Bar */
.progress-container{
  margin-bottom:32px;
}
.progress-label{display:flex;justify-content:space-between;font-weight:700;margin-bottom:12px;color:#4b5563;}
.progress-track{
  width:100%;height:16px;background:var(--bg-color);
  border-radius:8px;position:relative;overflow:hidden;
}
.progress-fill{
  width:0%;height:100%;background:linear-gradient(90deg, #3b82f6, #06b6d4);
  border-radius:8px;transition:width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
/* Celebration state for progress bar */
.progress-fill.full{
  background:linear-gradient(90deg, #22c55e, #10b981);
}

/* Task Checkboxes */
.task-list{display:flex;flex-direction:column;gap:16px;}
.task-item{
  display:flex;align-items:center;gap:16px;padding:20px;
  border:2px solid var(--border);border-radius:16px;
  cursor:pointer;transition:all 0.2s;
  user-select:none;
}
.task-item:hover{border-color:#bfdbfe;background:#f0f9ff}
.task-item.checked{
  border-color:var(--success);background:#f0fdf4;
}
.task-item.checked .task-text{
  text-decoration:line-through;color:#9ca3af;
}

/* Custom Checkbox */
.check-circle{
  width:32px;height:32px;border:3px solid var(--border);
  border-radius:50%;display:flex;justify-content:center;align-items:center;
  color:transparent;font-weight:900;transition:all 0.2s;
}
.task-item.checked .check-circle{
  background:var(--success);border-color:var(--success);color:#fff;
  transform:scale(1.1);
}
.task-text{font-size:1.1rem;font-weight:700;transition:color 0.2s;}
.task-icon{font-size:1.5rem;}

/* Confetti System */
.confetti{
  position:absolute;width:10px;height:10px;background:#f00;
  opacity:0;pointer-events:none;z-index:100;
}

@media(max-width:600px){.app-card{padding:24px;}}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);
  border-top:1px solid var(--border);
  display:flex;justify-content:center;align-items:center;gap:30px;
  padding:16px 24px;z-index:9000;
}
.bottom-nav a{text-decoration:none;color:#6b7280;font-size:.85rem;font-weight:700;text-transform:uppercase;transition:color 0.2s}
.bottom-nav a:hover{color:var(--primary)}
</style>
</head>
<body>

<main class="layout">
  <header class="style-info">
    <div class="cat">🤖 AI 生成、動態與微互動體驗</div>
    <h1>#40 Micro-Gamification</h1>
    <p class="sub">極微遊戲化體驗</p>
    <p class="desc">不需打造複雜的遊戲點數或排行榜系統。僅在使用者達成某個簡單的日常目標（如填寫資料、完成三項學習任務）時，即時給予動態微章、進度條燃燒特效，以此激發多巴胺分泌，提升 SaaS 軟體與工具 App 的黏著度與趣味性。</p>
  </header>

  <div class="app-card" id="cardArea">
    
    <div class="app-header">
      <div class="app-title">Daily Goals</div>
      <div class="streak-box" id="streak">
        <span class="flame-icon">🔥</span> <span id="streakNum">12</span>
      </div>
    </div>

    <div class="progress-container">
      <div class="progress-label"><span>Progress</span><span id="pbLabel">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="pbFill"></div></div>
    </div>

    <div class="task-list">
      <div class="task-item" data-val="1">
        <div class="check-circle">✓</div>
        <span class="task-icon">📚</span>
        <div class="task-text">Read 1 Chapter</div>
      </div>
      <div class="task-item" data-val="2">
        <div class="check-circle">✓</div>
        <span class="task-icon">🥤</span>
        <div class="task-text">Drink Water</div>
      </div>
      <div class="task-item" data-val="3">
        <div class="check-circle">✓</div>
        <span class="task-icon">🧘</span>
        <div class="task-text">5m Meditation</div>
      </div>
    </div>
    
  </div>
</main>

<nav class="bottom-nav">
  <a href="39.html">← PREV</a>
  <a href="index.html">HOME</a>
  <a href="41.html">NEXT →</a>
</nav>

<script>
// Micro-gamification Logic
const tasks = document.querySelectorAll('.task-item');
const pbFill = document.getElementById('pbFill');
const pbLabel = document.getElementById('pbLabel');
const streak = document.getElementById('streak');
const streakNum = document.getElementById('streakNum');
const cardArea = document.getElementById('cardArea');
let completed = 0;
const total = 3;

tasks.forEach(task => {
  task.addEventListener('click', (e) => {
    if(task.classList.contains('checked')) return; // assume one way
    
    task.classList.add('checked');
    completed++;
    
    // Update Progress UI
    const pct = Math.round((completed/total)*100);
    pbFill.style.width = `${pct}%`;
    pbLabel.innerText = `${pct}%`;
    
    // Check if fully completed
    if (completed === total) {
      setTimeout(() => triggerCelebration(), 400); // Wait for transition
    }
  });
});

function triggerCelebration() {
  pbFill.classList.add('full'); // turn green
  
  // Streak flame logic
  streak.classList.add('fire');
  streakNum.innerText = parseInt(streakNum.innerText) + 1;
  
  // Confetti POP physics simulation
  const colors = ['#22c55e', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6'];
  for(let i=0; i<30; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    // start at center top of card
    p.style.top = '100px';
    p.style.left = '50%';
    cardArea.appendChild(p);
    
    const angle = Math.random() * Math.PI * 2;
    const velocity = 50 + Math.random() * 100;
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity - 100; // anti-gravity
    const rot = Math.random() * 360;
    
    p.animate([
      { transform: 'translate(-50%, 0) rotate(0deg)', opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), ${ty}px) rotate(${rot}deg)`, opacity: 0 }
    ], {
      duration: 1000 + Math.random()*500,
      easing: 'cubic-bezier(.25,.8,.25,1)'
    });
    
    setTimeout(() => p.remove(), 1500);
  }
}
</script>
</body>
</html>
