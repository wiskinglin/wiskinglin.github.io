    <script>
        // 電子書內容資料
        const bookData = [
            {
                id: 0,
                title: "第三章：你了解你的身體嗎？",
                content: `
                    <h2>第三章：你了解你的身體嗎？</h2>
                    <blockquote>
                        「克己復禮為仁。一日克己復禮，天下歸仁。」<br><br>
                        「沒錢、沒開，沒女孩 你笑，別煩惱、要開心！擔心、皺眉，大家看了難過，所以別煩惱，要開心；別煩惱，現在就開心！」—— 巴比·麥菲林 (Bobby McFerrin)
                    </blockquote>
                    <p>巴比·麥菲林那首歌在一九八○年代末唱遍世界各地，不但為他贏得葛萊美的年度最佳歌曲、最佳唱片和最佳男歌手獎，甚至還有這首歌的T恤呢。要是我們深入研究的話，會發現這首《別煩惱，要開心》(Don't Worry, Be Happy) 的歌詞反映出身體表現（例如皺眉）與對應情緒（例如煩惱）的直接關係。我們也都認為，煩惱就會皺眉，開心就會笑。</p>
                    <p>不過真的只是這麼簡單嗎？</p>
                    <p>早在一八七二年就有一位跟達爾文不相上下的大師級思想家認為，不只是情緒會影響身體狀態，身體狀態也能影響情緒。達爾文在《人與動物的情感表達》(The Expression of Emotions in Man and Animals) 中寫道：「狂暴態度會讓憤怒更為強烈。」 但達爾文說這不是他自己觀察到的，而是歸功於法國的大腦解剖學家格拉提奧萊 (Louis Pierre Gratiolet) 的研究，他寫說：「即使是不經意的動作和姿勢，都會產生相關情感。」 所以不只是「別煩惱，要開心」，這些大師的主張是：「煩惱什麼？你先笑就會覺得開心！」</p>
                    <p>十九世紀觀察到的身體與情緒關聯，到了二十世紀運用實驗而獲得證實。羅徹斯特大學研究生詹姆斯·萊爾德 (James Laird) 把一些根本沒作用的電極點在受測者的眉毛、嘴角和下巴部位，宣稱是要測量不同條件下的臉部肌肉活動。</p>
                    <p>受測者的臉上黏著那些假裝置，做出萊爾德要求的各種臉部表情，從微笑、輕顰淺笑到眉頭深鎖，然後再讓他們看幾部卡通影片，要求他們以一分到九分來為卡通影片好不好笑打分數。結果跟一百年前達爾文的觀察一致，那些皺眉的受測者對卡通打的分數，明顯低於那些假裝在笑的人。</p>
                    <p>史特拉克 (Strack)、馬丁 (Martin) 和史戴普 (Stepper) 廣為人知的實驗更簡單，他們讓受測者在不知道表情被測量的情況下微笑或皺眉。研究人員對受測者說，他們是參與一項「心理性肌肉運動協調」的研究，幫助殘障人士利用針筆來書寫或使用電話。受測者被要求用牙齒咬住一根針筆（這是強迫微笑）或用雙唇含住（這是嘟嘴皺眉）。結果也跟萊爾德研究幾乎一樣，微笑組的卡通評分平均為五點一分，而皺眉組只有四點三分。</p>
                    <p>在這些開創性研究之後，身體動作心靈的互動關聯被應用在許多方面，包括降低種族歧視和提升創造力。雖然後來重複這些早期實驗的結果不盡理想，但是對於身體和心靈的雙向影響而非單向，很少人對此有所爭議。人體生理方面對於投資決策的影響，尚未被研究學界充分認知，因此這對深思熟慮的投資人來說正是獨特的優勢來源。</p>
                    
                    <h3>為什麼我們投資會吃癟？</h3>
                    <p>關於生理方面與投資的關係，我們再繼續觀察一個不得不接受的事實：我們生來並非是為了追求快樂，或做出很好的投資選擇，而是為了求生存和繁衍後代。你叫這些時時刻刻只想到活下去的人，變成什麼長期投資人，就好比要你拿把榔頭為牆壁刷油漆一樣，也不是不行啦，但絕對不漂亮。</p>
                    <p>求生本能的結果之一，就是厭惡虧損，這是發生壞事時的不對稱恐懼。虧損厭惡由兩顆小小的杏仁核 (amygdala) 驅動，這是大腦掌管情緒的部位。從演化的角度來看，虧損厭惡極有意義，許多科學家也認為這就是智人得以超越其他物種，邁向食物鏈頂端的原因。正如麥德摩 (R. McDermott)、佛勒 (J.H. Fowler) 和史米諾夫 (O. Smirnov) 二〇〇八年的研究指出：等到食物吃光才反應就來不及，這種厭惡的傾向讓我們遠古的祖先懂得未雨綢繆，會預先儲存糧食，提早探索新地點來覓食。雖然厭惡虧損的人在投資界被嘲笑為不夠理性，但是不厭惡虧損的遺傳特性恐怕也沒機會流傳下來，也沒機會看到冷靜派能夠占上風的一天。</p>
                    <p>事實上，規避虧損對人類的確非常重要，所以生理上已演化成這些神經特徵是由大腦的特定部位來處理。當我們預期會有財務收益時，毫無意外的是大腦腹側紋狀體的伏隔核變得活躍，因為這個部位跟正面刺激有關，但預期虧損的思考是在前額葉進行，前額葉是身體疼痛、焦慮、針對負面刺激起反應的大腦部位，也就是說，光是思考財務虧損，跟身體實際上受到傷害的感覺很可能是一樣的。</p>
                    <p>因此我們大腦面對虧損的反應會深刻地影響行為，也就毫不奇怪。史丹佛大學的布萊恩·克努森指出，在碰上虧損之前，投資人都會以理性而自利的方式來交易。克努森在實驗中讓受測者從三種投資選擇其中一種：低風險債券和兩種風險與報酬都不確定的股票。債券很簡單，每次都有保證報酬一美元，而股票的變化就大得多，其中一支股票是有較大機率可賺十美元，較小機率會賠十美元；另一支股票則剛好相反，賠錢機會大於賺錢。</p>
                    <p>克努森觀察受測者進行投資任務時的大腦活動，注意到投資人一開始大都會進行理性交易，而決策時大腦的理性中心也最活躍。但這是在他們遭遇意料之外的虧損之前。一旦經驗過虧損以後，大腦的疼痛中心隨即被喚醒，之後的決定往往就比較不理性。虧損讓投資人趨於保守，引發他們對於穩定債券的非理性偏好，這對整場遊戲的報酬帶來破壞性影響。這真是非常奇怪的峰迴路轉，讓人類具備優勢的特質，竟然正是我們在投資領域吃癟的主要原因之一。</p>

                    <h3>財務成功的祕訣：先去尿尿</h3>
                    <p>透過對身體和心靈相互關係的全新理解，行為投資人必須了解生理狀態實際上是怎麼影響投資決策。由於大家一直不太理解這個概念，甚至是普遍地忽視，那麼最先注意到這點的人就可以藉此獲得優勢。要了解生理方面如何影響財務選擇，你必須先掌握身體的主要作用是維持生理平衡。</p>
                    <p>之前我們說過，你的身體有兩個主要作用：求生和繁殖，而要做到這兩件事，就要維持生理平衡。我們身體的恆定溫度是華氏九十八點六度（即攝氏三十七度），如果體溫過低，身體會自動把血液從四肢輸送回軀幹。要是體溫太高，就會排汗以進行冷卻。</p>
                    <p>在這個過程中身體為了爭取協助，一旦偏離平衡即會讓人感到不舒服。所以你會想要加件衣服，或者是開冷氣（或者以我的情況來說，會停止運動）。正如卡麥勒 (C. Camerer)、羅文斯坦 (G. Loewenstein) 和普雷列克 (D. Prelec) 的研究指出：「快樂並非人類行為的目標；更實際而言，應該說快樂是生理平衡的訊號，是一種帶來訊息的訊號。一般來說，當生理偏離平衡狀況，趨於兩極時，我們在決策上都會變得更極端。」</p>
                    <p>尋常那種平安無事的溫和而正面的感覺，被認為可以幫助我們保持認知靈活、發揮創造力來解決問題，對一切都能產生正面影響，而悲傷則會消耗精神能量；若是處於生理平衡範圍內的樂觀振奮，則會帶來一種自由自在的感覺。但正如我們之前所了解到的，重要的財務決策並不是那種讓人感到普通快樂的小事：事實證明，金錢對我們太重要了，所以要做出財務決策時，生理刺激馬上變得強烈，導致我們迅速脫離平衡狀態，轉而趨向驚慌落跑。生理刺激的過度反應會降低工作記憶和認知能力，就像是感到很冷時，血液會從手腳末端流走一樣，我們一碰上金錢問題，認知處理能力也會流走。</p>
                    <p>生理失衡的身體改變我們的偏好，不一定會以我們認可的方式。我們都希望自己根據理性、道德和歷經時間考驗的原則來做出決策，但研究顯示，它其實跟我們的進食比較有關係。美國聯邦法官傑若姆·法蘭克 (Jerome Frank) 曾諷刺說：「正義只是法官的早餐。」 根據班古里安大學 (Ben Gurion University) 的夏伊·丹吉格 (Shai Danziger) 研究，沒想到還真的有點道理。丹吉格的研究是針對以色列監獄在十個月內舉行的一千一百十二次假釋委員會聽證結果進行分析。</p>
                    <p>研究發現，法官們剛吃完早餐時，有六十五%的囚犯會獲得假釋。但之後假釋率就開始下降，而在午餐前降到最低；吃完午餐以後，某些法理學上的奇蹟又出現啦！法官們開始心慈手軟寬宏大量，但假釋率會再次逐漸降低，直到……你說對了，吃完下午茶點心以後才會再上升。</p>
                    <p>丹吉格的研究結果實在是讓人震驚又沮喪，這些假釋判決跟整個社會的人命和福祉都大有關係，應該是運用法學專業冷靜地做出判斷，而不是受到渴望士力架巧克力棒的影響。雖然目前對於投資決策還沒有類似的研究，但餓肚子這種小事會對決策結果產生重大影響，好像也不是沒道理。華倫·巴菲特每天消耗八百卡路里的可口可樂，說不定就是他的成功祕訣呢！</p>
                    <p>另一項研究顯示，飢餓的人不但渴望食物、渴望金錢，而且更貪婪。相關研究指出，斷食的人比吃飽的人更願意接受風險較高的金錢賭注。達娜·史密斯 (Dana Smith) 的研究報告說，這種趨勢並非人類所獨有：「這個發現也獲得動物文獻的支持，吃飽的動物會比較厭惡風險，而飢餓時就會去冒險。這大概就是演化選擇的特徵，在飢餓狀態下促使探索和冒險，才有可能找到新的食物來源。」</p>
                    <p>如此看來，生理上某些部分的失調，會以可預測的方式來影響看似無關的財務決策。如果身體的飢餓可以概括為財務需求，內臟調節說不定也可以。荷蘭的研究人員用一種很不尋常的方式進行這項調查。</p>
                    <p>梅爾珍·圖克 (Mirjam Tuk) 帶領的研究人員把受測者分成兩組：第一組都喝了七百毫升的水，第二組只喝五十毫升，然後要求受測者進行一項任務，在即刻獲得小額獎勵和等待長時間以獲得更大獎勵之間做出選擇。令人震驚的是（至少對我來說！），那些喝很多水、說尿意很急的人，比那些喝水不多，尿意不急的人更常選擇等待以獲得更多獎勵。圖克及其團隊提出的解釋雖然令人驚訝，卻也跟前述的飢餓溢出效應不謀而合，研究報告說這叫作「抑制的溢出效應」，受測者不去上廁所的身體抑制，連帶也讓他們更有耐性等待更大的財務回報。各位現在可以暫時放下這本書，財務成功的祕訣也是需要憋尿的。</p>
                    <p>決策時碰到的生理障礙根本沒人曉得，最危險的是它們都偷偷地來。各位要是問以色列法官怎麼做判決，他一定會說自己是根據一大堆卷宗資料，而不是他的胃。我們都以為自己擁有自由意志，會對自己的行為負起個人責任，不認為身體因素會決定我們的行為，但其實這些影響對任何投資人來說都是不利的。不過我們也必須問一下，要是我們知道自己的行為會受到影響，那麼我們是否能夠控制或駕馭自己身體對於風險和不確定因素的反應呢？我們是否能夠透過練習，讓生理更常維持平衡呢？</p>
                    <p>經濟學家羅聞全 (Andrew Lo) 曾找來各種年資的交易員，檢查他們的自主神經系統 (ANS) 反應，包括呼吸、皮膚溫度、臉部表情和血容量。正如我們所預料的那樣，羅聞全發現，經驗豐富的交易員對市場波動的ANS反應，會比剛剛入市的菜鳥少得多。經驗豐富的交易員可以更好地維持生理平衡，這對認知會有更多好處，但還是會顯示出一定的生理反應，金錢就是讓人很有感嘛！</p>
                    <p>我們剛才看到的那些飢餓的以色列法官，平均擁有二十二年的專業資歷，而那段期間他們的判決占以色列所有假釋判決的四成。這些人雖然都是經驗豐富的專業人士，但他們的客觀性還是會因為飢餓與否受到影響。我每次看到極限運動員表演危險動作，比如說騎摩托車後空翻，我都會想不知道要摔斷多少骨頭才能達到這種專業程度。市場變化帶來的極端生理反應，擁有足夠經驗的投資人是能夠緩和它的影響，但永遠無法完全擺脫。不過在那個過程中，要付出多大代價？</p>

                    <h3>壓力影響投資決策</h3>
                    <p>我要是請各位以「壓力」做自由聯想，各位會想到哪些呢？你可能會想到某些精神上的痛苦：工作上的疑慮、為自己愛的人感到擔心，或是財務上的不安。口語上最常見的定義是：「對某事無法感知到控制」，這似乎也是在精神上。然而我們強調壓力是某種精神狀態，其實是忽略它對身體產生的真實影響，也忽略了一些實際上能夠管理的方式。</p>
                    <p>現在這個時代，日常生活可說是處處都能感受到壓力，然而不過就是一百年前，大家還覺得「心理壓力」這個概念很奇怪呢。我們現在說的「壓力」(stress) 是一九三○年代內分泌學家漢斯·塞利 (Hans Selye) 創造出來的，當時他是用老鼠做實驗，偶然地使用這個名詞。</p>
                    <p>塞利在實驗中給小老鼠注射荷爾蒙，但他認為在這個過程中被關在籠子裡、被綁住、被注射、被翻來覆去的折騰，對小老鼠的影響可能比針筒裡的荷爾蒙還大。所以塞利就從工程學借用這個術語，來描述這種會在老鼠身上產生痛苦徵狀的精神狀態；但是這個想法在當時遭到學界的強烈質疑。但是那個在塞利年代可能令人覺得好笑的概念，現在可是要命的嚴重：壓力真的會讓人很有感。</p>
                    <p>壓力跟肥胖、高血壓、勃起功能障礙、不孕、失眠和心血管疾病都有關係。據估計有二十五%的求診都跟壓力相關，最終是轉診給心理學家而不是外科醫生。當考慮到壓力時，身心之間的關係是再明顯不過了，而且也沒有任何其他因素會像金錢那樣刺激出強烈的壓力反應。</p>
                    <p>投資人想要管理壓力以改善投資成果，必須先了解這是非常確實的生理現象。過去曾經當過交易員的神經科學專家，對於投資壓力專精研究的約翰·柯慈 (John Coates) 在《紐約時報》指出：「大多數人都以為壓力主要是心理現象，是因為發生一些令人討厭的事情而感到不安的狀態。但是你如果想要了解壓力，就必須先打消這種看法，壓力反應主要都是在身體上，都是身體在為即將採取的行動做準備。」</p>
                    <p>心臟狂跳，瞳孔放大，體內充滿皮質醇和腎上腺素，這一切都是為你採取行動而做準備——就是現在！但要是可怕的刺激物其實絕不可能出現在面前，或者是會連續五百天才結束（空頭市場的平均長度），那麼我們身體這樣的反應既不符合真實情況的需求，甚至是確確實實地有礙健康。</p>
                    <p>在短時間內的適當劑量下，壓力可以救我們一命。壓力和投資績效的關係，即下圖所示的「倒U字」模型。</p>
                    <p>根據倒U字模型顯示，壓力太小的話，你永遠只會軟在沙發上起不來，但要是壓力太大，你可能會喘不過氣。在適度的狀況下，由壓力感產生的皮質醇會是神奇靈藥，可以提升我們的生理反應，強化記憶，促進學習，增強感官刺激，提升活動力。但是要是壓力持續太久，例如像大多數空頭市場那麼久，那麼效果就剛好相反：我們的行為靈活度會降低，免疫系統受損，注意力減弱、出現憂鬱症狀，無助感會取代自我效能感。</p>
                    <p>針對過去其他研究的啟示，約翰·柯慈開始直接進行探查：壓力荷荷蒙與冒險之間的關係。柯慈的第一項研究是在市場波動期間建立皮質醇分泌的基線效應。這個前所未有的研究發現，交易員的皮質醇水準在短短八天內就大增六十八%！在後續研究中，他複製了皮質醇水準對交易員的藥理影響。然後衡量他們進行賭博任務的風險偏好。這個發表在《美國國家科學院院刊》(Proceedings of the National Academy of Sciences) 的研究報告指出，因為皮質醇水準升高，受測者對風險的偏好降低了四十四%。</p>
                    <p>「風險承受」過去都被認定為是一種精神概念，但柯慈的研究結果改變傳統看法，描繪出身體與精神之間更為生動的相互作用。正如他在《風險生物學》(The Biology of Risk) 中所言：「經濟學和金融模型大都認為風險偏好是穩定的特徵，就像你的身高一樣，但是我們的研究發現，這種假設只是誤導。人類的風險偏好天生就是不斷變化，這是我們應對壓力和挑戰不可或缺的一部分。」</p>

                    <h3>對虧損的恐懼永遠不會消失</h3>
                    <p>從一九○○年到二○一三年，美國股市總共經歷一百二十三次「修正」（十%或更高），平均起來每年超過一次！至於跌幅更大的空頭市場，發生頻率是要少一點，平均每三年半發生一次。</p>
                    <p>像那種十%到二十%跌幅的下挫，媒體說得好像世界末日一樣，其實只是像春天會開花一樣的定期把戲，而且也不曾改變長期持有讓人賺大錢的趨勢。在這一百多年的時間裡頭，年度投資績效既可期待兩位數的報酬率，也曾出現兩位數的虧損，可真是讓人難以置信。要在這等莫大痛苦之中尋求巨大報酬，投資人必須特別注意自己對於虧損的恐懼，我們不完美的生物特性讓這個任務變得非常困難。雖然我們不希望自己會這樣，但我們的身體似乎特別擅長緊緊抓住恐懼不放，然後在最不恰當的時候失控。</p>
                    <p>另一個可稱典範的實驗也證實了這點。神經科學家勒杜 (J. LeDoux) 在一九九六年透過電擊及聲音刺激，讓老鼠制約恐懼。到最後老鼠只要聽到聲音就開始害怕，想必巴甫洛夫對這個結果也會很滿意吧。等到老鼠完全受到恐懼制約以後，研究人員又開始只提供聲音刺激，但不伴隨電擊，來消除老鼠的恐懼，恐懼果然逐漸減弱，到最後老鼠聽到聲音也不再有恐懼反應。我們可能以為，恐懼完全消失了吧，但事實卻是更加離奇。</p>
                    <p>研究人員接著切斷老鼠大腦皮層與杏仁核之間的神經連接（這些人肯定是非常討厭老鼠才辦得到），然後再播放那個聲音，這時候老鼠又嚇壞了。所以，恐懼根本沒有消失！更確切地說，恐懼只是被大腦皮層壓制，但還是隱藏在杏仁核裡頭，在痛苦的刺激下重新出現。勒杜的研究顯示，我們的身體一向熱中於保存，也真的會抓住糟糕的經驗不放，在類似壞消息重新出現時，又把它們帶回表層。</p>

                    <h3>管理壓力的四個步驟</h3>
                    <p>蜜雪兒·麥唐納 (Michele McDonald) 開發的「RAIN」模式雖然很簡單，卻是處理緊急壓力很有用的方法。各位下次要是感受到壓力，不妨試試：</p>
                    <ul>
                        <li><strong>一、辨識 (Recognize)：</strong>謹慎觀察，明辨自己身心兩方面發生什麼狀況。例如：「我覺得自己心臟狂跳，腦子轉個不停。」</li>
                        <li><strong>二、接受 (Accept)：</strong>承認和接受上述的觀察。你不必喜愛這些狀況，但一味排斥只會更嚴重。</li>
                        <li><strong>三、探查 (Investigate)：</strong>檢查自己當下的想法，問自己正在想什麼。</li>
                        <li><strong>四、超脫 (Non-Identification)：</strong>你現在已經辨識、接受並且探查自己的壓力，知道自己不是完全只有情緒而已。你感受到這些情緒，但不必被它們左右、制約。</li>
                    </ul>

                    <ul>
                        <li><strong>本章重要觀念：</strong></li>
                        <li>身體狀況會影響情緒，正如情緒會影響身體狀況。</li>
                        <li>虧損厭惡幫助我們祖先活下來，卻讓我們無法成為成功的投資人。</li>
                        <li>身體渴求平衡，但想到錢就會干擾生理平衡。</li>
                        <li>壓力既是生理現象，也是精神現象。</li>
                        <li>承擔財務風險會導致真正的生理痛苦。</li>
                        <li>恐懼不會消失，身體會儲存恐懼以備不時之需。</li>
                        <li>股市的壞消息，比你過生日還頻繁。</li>
                    </ul>
                `

                title: "第四章：活著，就一定會「膨風」",
                content: `
                    <h2>第四章：活著，就一定會「膨風」</h2>

                    </blockquote>
                    <p>我小時候很喜歡看吉卜林 (Rudyard Kipling) 的《原來如此故事集》(Just So Stories)，這些故事原本是他對女兒說的床邊故事，她想知道很多事物為何「原來如此」（這是她常常掛在嘴上的話）。書中的每個故事都對生物演化奇思幻想一番，描述各種動物最特別的特徵是怎麼來的。</p>
                    <p>在《鯨魚的喉嚨怎麼來的》那一篇，我們看到鯨魚因為吞掉一名水手，他為了防止別人跟他一樣再遭遇不幸，所以在鯨魚的喉嚨綁了一排木柵，結果鯨魚現在只能吃浮游生物。從《駱駝的駝峰怎麼來的》裡頭，我們才曉得駱駝的駝峰是因為牠偷懶，才被一個駝背精靈下詛咒，要做更多苦工才能休息。每個故事裡頭的動物都會碰上一些艱難狀況，但最後卻獲得一種演化適應上的獨特特徵，跟這些故事一樣，這些「原來如此」的動物都非常獨特。</p>
                    <p>認為自然世界是在幫助我們，當然是比較舒心，但遺憾的是，在財務決策方面並非如此。各位從前面幾章也已經知道，我們的身體和大腦雖然能以超高效率完成許多事情，但投資剛好不是其中之一。事實上要是有什麼半人半神、邪惡精靈或者意圖報復的水手想要設計出最爛、最糟糕的投資人，就是設計成現在這樣。要是說到投資的話，我們可是並非天生如此！</p>

                    <h3>糟糕設計 → 糟糕決策 → 糟糕結果</h3>
                    <p>各位如果接受這個事實，然後翻開風險管理的教科書，大概會讀到說投資風險主要分成兩種：系統性和非系統性。系統性風險也稱為「市場風險」，這純粹是來自大盤的波動，並不是什麼特定產業因素造成投資人虧損。非系統性風險也稱為「業務風險」，是指個別證券因為產業因素而下跌的可能。但各位的教科書大概會完全忽略第三種風險：行為風險，其實這個才是最重要的風險。</p>
                    <p>要先把行為風險全部找出來，才談得上成功管理這些風險，不然，一個看不見的怪物，我們怎麼可能打敗它呢？ 我們找到的行為風險，大都來自投資人不當行為的研究。丹尼爾·康納曼在《橡皮擦計畫》(The Undoing Project) 裡頭說道：「我們要怎麼理解記憶呢？不是去研究記憶，而是要研究遺忘。」 理查·塞勒 (Richard Thaler) 在行為經濟學的原創神作《不當行為》(Misbehaving) 中談到，當時認為設定紀律應該是既簡單又有效。但他對有效市場的種種假設非常懷疑，所以召集研究團隊一起動腦，找出現實生活中跟理論上的「經濟人」(永遠追求效用最佳化，理性做出財務決策的虛構人物) 各種不同之處。塞勒只是利用一個簡單的思考實驗，就找出許多異常行為，而且從此衍生出許多研究計畫，擴大探索、深入理解我們這些凡夫俗子如何進行財務決策。</p>
                    <p>雖然發現和記錄這些異常行為是重要的第一步，但接下來缺乏更具組織的研究和觀點，對投資人也很欠缺實用性。現在儘管已經找到許多我們不完美的例證，可惜實務上後續的處理卻很少，正如研究所指出，沒有具體解決辦法的壞消息，事實上只會讓問題更加嚴重！</p>
                    <p>受到簡單又精確的塞勒研究所啟發，我也開始動腦找尋各種可能妨礙財務決策的異常行為，總共找到超過一百十七種偏誤和認知錯誤，這些都是認真的投資人做出最佳決策的阻礙！ 為了讓這份清單對投資人更有用，我在各種錯誤模式中找到一些共同的心理基礎，據此進行分類，我一開始並沒想過這會顯示什麼訊息，但最後出現了以下四種表現一致的行為風險：</p>

                    <h3>人人都愛舒適圈</h3>

                    <p>人的本性就是會想要去證實現有信念，而不會去懷疑它。我們都以為「我應該是對的」，而不是「我可能錯了嗎？」 替先入為主的信念找尋配合資訊的傾向，是我們維護自我的重要部分。而心理學研究就把這個狀況稱為「確認偏誤」，這個問題雖是到了晚近才有科學研究和正名，但其實在歷史上早就有人注意到這一點。古希臘史學家修昔底德 (Thucydides) 就曾寫道：「對於自己想要的，粗心大意地抱持希望，對自己不喜歡做的就用理智加以排斥，這正是人類的惡習。」</p>

            tocList.innerHTML = bookData.map((chapter, index) => `
                <li>
                    <button onclick="loadChapter(${index}); toggleSidebar();" class="w-full text-left px-3 py-2 rounded hover:bg-black/5 dark:hover:bg-white/10 transition-colors ${currentChapterIndex === index ? 'font-bold opacity-100' : 'opacity-70'}">
                        ${chapter.title}
                    </button>
                </li>
            `).join('');
        }

        // 載入指定章節
        function loadChapter(index) {
            if (index < 0 || index >= bookData.length) return;
            
            currentChapterIndex = index;
            const contentDiv = document.getElementById('reader-content');
            
            // 加入淡出淡入動畫效果
            contentDiv.style.opacity = 0;
            
            setTimeout(() => {
                contentDiv.innerHTML = bookData[currentChapterIndex].content;
                contentDiv.style.opacity = 1;
                window.scrollTo({ top: 0, behavior: 'smooth' });
                updateControls();
                renderSidebar(); // 更新目錄的高亮顯示
            }, 300);
        }

        // 更新底部導覽列與按鈕狀態
        function updateControls() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const indicator = document.getElementById('chapter-indicator');

            prevBtn.style.visibility = currentChapterIndex > 0 ? 'visible' : 'hidden';
            nextBtn.style.visibility = currentChapterIndex < bookData.length - 1 ? 'visible' : 'hidden';
            
            indicator.textContent = `${currentChapterIndex + 1} / ${bookData.length}`;
        }

        // 上一章
        function prevChapter() {
            if (currentChapterIndex > 0) loadChapter(currentChapterIndex - 1);
        }

        // 下一章
        function nextChapter() {
            if (currentChapterIndex < bookData.length - 1) loadChapter(currentChapterIndex + 1);
        }

        // 字體大小調整
        function changeFontSize(delta) {
            fontSize = Math.max(14, Math.min(32, fontSize + delta));
            document.getElementById('reader-content').style.fontSize = `${fontSize}px`;
        }

        // 主題切換
        function setTheme(themeName) {
            const body = document.getElementById('bodyElement');
            body.className = `font-sans min-h-screen flex flex-col ${themeName}`;
        }

        // 側邊欄開關
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            const isClosed = sidebar.classList.contains('-translate-x-full');
            
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                setTimeout(() => overlay.style.opacity = '1', 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        // Google 翻譯初始化腳本
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'zh-TW',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
                autoDisplay: false
            }, 'google_translate_element');
        }

        // 執行初始化
        init();
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
