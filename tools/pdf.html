<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy-First PDF | 超安全 PDF 編輯器</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- FontAwesome & Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Core Libraries -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#2563eb', surface: '#ffffff' },
                    cursor: {
                        'crosshair': 'crosshair',
                        'text': 'text',
                        'default': 'default'
                    }
                }
            }
        }
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        body {
            background-color: #f8fafc;
            -webkit-font-smoothing: antialiased;
        }

        .pdf-page-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .ghost-class {
            opacity: 0.5;
            background: #e2e8f0;
            border: 2px dashed #94a3b8;
        }

        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #2563eb;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Modal Styles */
        .canvas-container {
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            margin: auto;
        }

        canvas {
            display: block;
        }

        .tool-btn.active {
            background-color: #dbeafe;
            color: #1e40af;
            border-color: #bfdbfe;
        }
    </style>
</head>

<body class="h-screen flex flex-col text-slate-800">

    <!-- Header -->
    <header
        class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-40 shadow-sm">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="font-black text-xl tracking-tighter text-slate-800 hover:text-blue-600 transition-colors mr-3">KLIO.</a>
            <div
                class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center text-white text-xl shadow-lg shadow-blue-200">
                <i class="fa-solid fa-layer-group"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">超安全 PDF 編輯器</h1>
                <p class="text-xs text-slate-500 font-medium">安全、本地優先的結構編輯器</p>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div id="file-info" class="hidden text-sm text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">
                <i class="fa-regular fa-file-pdf mr-2"></i><span id="filename-display">已載入檔案</span>
            </div>
            <button onclick="document.getElementById('file-upload').click()"
                class="px-4 py-2 text-sm font-medium text-slate-700 hover:text-blue-600 transition-colors">
                <i class="fa-solid fa-plus mr-2"></i>新增/合併檔案
            </button>
            <button id="export-btn" onclick="exportPdf()" disabled
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg text-sm font-semibold shadow-md shadow-blue-200 transition-all transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center gap-2">
                <span id="export-text">導出 PDF</span>
                <i class="fa-solid fa-download"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-hidden relative flex flex-col items-center justify-center bg-slate-50">

        <!-- Upload Zone -->
        <div id="upload-zone"
            class="text-center p-12 border-2 border-dashed border-slate-300 rounded-2xl bg-white hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer group max-w-lg w-full mx-4 shadow-sm"
            onclick="document.getElementById('file-upload').click()"
            ondragover="event.preventDefault(); this.classList.add('border-blue-500', 'bg-blue-50');"
            ondragleave="this.classList.remove('border-blue-500', 'bg-blue-50');" ondrop="handleDrop(event)">
            <input type="file" id="file-upload" class="hidden" accept="application/pdf"
                onchange="handleFileSelect(event)" multiple>
            <div
                class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300">
                <i class="fa-solid fa-cloud-arrow-up text-3xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-slate-800 mb-2">點擊或拖曳上傳 PDF</h3>
            <p class="text-slate-500 text-sm mb-6">支援多檔案合併、簽名、標記與頁面重組 (100% 本地運算)</p>
        </div>

        <!-- Loader -->
        <div id="loader" class="hidden flex flex-col items-center">
            <div class="loading-spinner mb-4"></div>
            <p class="text-slate-600 font-medium animate-pulse">正在解析文檔頁面...</p>
        </div>

        <!-- Editor Workspace -->
        <div id="editor-workspace" class="hidden w-full h-full flex flex-col">
            <div
                class="bg-blue-50 border-b border-blue-100 px-6 py-2 text-xs text-blue-800 flex justify-between items-center">
                <span><i class="fa-solid fa-circle-info mr-2"></i>拖曳排序，點擊 <i class="fa-solid fa-pen-to-square mx-1"></i>
                    進行簽名或標記。可隨時點擊右上角繼續加入新檔案。</span>
                <span id="page-count-badge" class="font-bold bg-blue-200 px-2 py-0.5 rounded text-blue-900">0 頁</span>
            </div>
            <div id="pages-grid"
                class="flex-1 overflow-y-auto p-8 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 content-start">
            </div>
        </div>
    </main>

    <!-- Annotation Modal -->
    <div id="annotation-modal" class="hidden fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm flex flex-col">
        <!-- Toolbar -->
        <div class="bg-white border-b border-slate-200 px-4 py-3 flex items-center justify-between shadow-md">
            <div class="flex items-center gap-4">
                <span class="text-slate-500 text-sm font-semibold mr-2"><i
                        class="fa-solid fa-pen-nib mr-2"></i>編輯模式</span>

                <!-- Tools -->
                <div class="flex bg-slate-100 p-1 rounded-lg gap-1">
                    <button onclick="setTool('pen')" id="btn-pen"
                        class="tool-btn active px-3 py-1.5 rounded text-sm font-medium text-slate-600 hover:bg-white border border-transparent transition-all"
                        title="簽名筆 (Freehand)">
                        <i class="fa-solid fa-signature"></i> 簽名
                    </button>
                    <button onclick="setTool('rect')" id="btn-rect"
                        class="tool-btn px-3 py-1.5 rounded text-sm font-medium text-slate-600 hover:bg-white border border-transparent transition-all"
                        title="框選工具 (Rectangle)">
                        <i class="fa-regular fa-square"></i> 框選
                    </button>
                    <button onclick="setTool('text')" id="btn-text"
                        class="tool-btn px-3 py-1.5 rounded text-sm font-medium text-slate-600 hover:bg-white border border-transparent transition-all"
                        title="文字工具 (Text)">
                        <i class="fa-solid fa-font"></i> 文字
                    </button>
                </div>

                <!-- Colors -->
                <div class="flex items-center gap-2 border-l pl-4 border-slate-200">
                    <button onclick="setColor('#ef4444')"
                        class="w-6 h-6 rounded-full bg-red-500 border-2 border-white shadow-sm hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-slate-300"></button>
                    <button onclick="setColor('#2563eb')"
                        class="w-6 h-6 rounded-full bg-blue-600 border-2 border-white shadow-sm hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-slate-300"></button>
                    <button onclick="setColor('#000000')"
                        class="w-6 h-6 rounded-full bg-black border-2 border-white shadow-sm hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-slate-300"></button>
                    <!-- 新增淺灰色 -->
                    <button onclick="setColor('#94a3b8')"
                        class="w-6 h-6 rounded-full bg-slate-400 border-2 border-white shadow-sm hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-slate-300" title="淺灰色"></button>
                    <!-- 新增白色 -->
                    <button onclick="setColor('#ffffff')"
                        class="w-6 h-6 rounded-full bg-white border-2 border-slate-200 shadow-sm hover:scale-110 transition-transform ring-2 ring-transparent focus:ring-slate-300" title="白色"></button>
                </div>

                <button onclick="clearAnnotations()" class="text-xs text-red-500 hover:text-red-700 font-medium ml-2">
                    <i class="fa-solid fa-eraser mr-1"></i>清除
                </button>
            </div>

            <div class="flex gap-3">
                <button onclick="closeModal(false)"
                    class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium transition-colors">取消</button>
                <button onclick="closeModal(true)"
                    class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-md transition-colors">
                    <i class="fa-solid fa-check mr-2"></i>保存編輯
                </button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="flex-1 overflow-auto p-8 bg-slate-800 flex items-center justify-center cursor-crosshair">
            <div id="modal-canvas-wrapper" class="canvas-container bg-white">
                <!-- Layers: Bottom is PDF image, Top is Drawing -->
                <canvas id="bg-canvas" class="absolute top-0 left-0"></canvas>
                <canvas id="draw-canvas" class="absolute top-0 left-0"></canvas>
            </div>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // --- Core State ---
        let sourcePdfs = {}; // 儲存多個檔案的 ArrayBuffer: { fileId: ArrayBuffer }
        let pagesState = []; // { id, fileId, originalIndex, rotation, annotationData }
        let isSortableInitialized = false;

        // --- UI Elements ---
        const uploadZone = document.getElementById('upload-zone');
        const editorWorkspace = document.getElementById('editor-workspace');
        const loader = document.getElementById('loader');
        const grid = document.getElementById('pages-grid');
        const exportBtn = document.getElementById('export-btn');
        const fileInfo = document.getElementById('file-info');
        const filenameDisplay = document.getElementById('filename-display');
        const pageCountBadge = document.getElementById('page-count-badge');

        // --- Modal State ---
        const modal = document.getElementById('annotation-modal');
        const bgCanvas = document.getElementById('bg-canvas');
        const drawCanvas = document.getElementById('draw-canvas');
        const canvasWrapper = document.getElementById('modal-canvas-wrapper');
        let currentCtx = null;
        let currentTool = 'pen';
        let currentColor = '#ef4444'; // Default Red
        let isDrawing = false;
        let startX, startY;
        let activePageId = null;
        let tempSnapshot = null; // Used for shape drawing preview

        // --- Init & File Handling ---

        async function handleDrop(e) {
            e.preventDefault();
            uploadZone.classList.remove('border-blue-500', 'bg-blue-50');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length > 0) {
                await processMultipleFiles(files);
            } else {
                alert('請上傳 PDF 檔案');
            }
        }

        async function handleFileSelect(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                await processMultipleFiles(files);
            }
            e.target.value = ''; // 清除 input 狀態以便重複選取相同檔案
        }

        async function processMultipleFiles(files) {
            uploadZone.classList.add('hidden');
            loader.classList.remove('hidden');
            editorWorkspace.classList.remove('hidden');
            fileInfo.classList.remove('hidden');

            for (const file of files) {
                await processFile(file);
            }

            loader.classList.add('hidden');
            exportBtn.disabled = false;
            updatePageCount();
            updatePageNumbers();
            
            const totalFiles = Object.keys(sourcePdfs).length;
            filenameDisplay.textContent = totalFiles > 1 ? `已合併 ${totalFiles} 個檔案` : files[0].name;

            if (!isSortableInitialized) {
                initSortable();
                isSortableInitialized = true;
            }
        }

        async function processFile(file) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const fileId = `file-${Date.now()}-${Math.random().toString(36).substring(2, 9)}`;
                sourcePdfs[fileId] = arrayBuffer.slice(0);

                const loadingTask = pdfjsLib.getDocument(arrayBuffer.slice(0));
                const pdf = await loadingTask.promise;
                const numPages = pdf.numPages;

                for (let i = 1; i <= numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.4 });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const imgUrl = canvas.toDataURL();
                    const pageId = `page-${Date.now()}-${fileId}-${i}`;

                    pagesState.push({
                        id: pageId,
                        fileId: fileId,
                        originalIndex: i - 1,
                        rotation: 0,
                        annotationData: null
                    });

                    createPageCard(imgUrl, pagesState.length, pageId);
                }
            } catch (err) {
                console.error(err);
                alert(`解析 PDF 失敗 (${file.name}): ` + err.message);
            }
        }

        function createPageCard(imgUrl, displayIndex, pageId) {
            const card = document.createElement('div');
            card.className = 'pdf-page-card bg-white rounded-xl shadow-sm border border-slate-200 p-3 flex flex-col gap-3 relative group';
            card.setAttribute('data-id', pageId);

            card.innerHTML = `
                <div class="relative bg-slate-100 rounded-lg overflow-hidden aspect-[1/1.4] flex items-center justify-center border border-slate-100">
                    <img src="${imgUrl}" class="object-contain w-full h-full transition-transform duration-300" id="img-${pageId}">
                    
                    <!-- Overlay Mask -->
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/5 transition-colors duration-200 pointer-events-none"></div>
                    
                    <!-- Page Number -->
                    <div class="page-number-badge absolute top-2 left-2 bg-black/60 text-white text-[10px] font-bold px-2 py-0.5 rounded backdrop-blur-sm z-10">
                        P${displayIndex}
                    </div>

                    <!-- Edit Button (Center) -->
                    <button onclick="openModal('${pageId}')" class="absolute inset-0 m-auto w-12 h-12 bg-white/90 rounded-full shadow-lg opacity-0 group-hover:opacity-100 transition-all scale-90 group-hover:scale-100 flex items-center justify-center text-blue-600 hover:text-blue-700 z-20" title="編輯/簽名/標記">
                        <i class="fa-solid fa-pen-to-square text-xl"></i>
                    </button>
                    
                    <!-- Annotation Badge -->
                    <div id="badge-${pageId}" class="hidden absolute bottom-2 right-2 bg-green-500 text-white w-5 h-5 rounded-full text-[10px] flex items-center justify-center shadow-sm z-10">
                        <i class="fa-solid fa-pen-nib"></i>
                    </div>
                </div>

                <!-- Action Bar -->
                <div class="flex justify-between items-center px-1">
                    <button onclick="rotatePage('${pageId}')" class="text-slate-400 hover:text-blue-600 hover:bg-blue-50 p-1.5 rounded-full transition-colors">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                    <button onclick="deletePage('${pageId}')" class="text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-full transition-colors">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        }

        // --- Modal & Annotation Logic ---

        async function openModal(pageId) {
            activePageId = pageId;
            const pageState = pagesState.find(p => p.id === pageId);
            if (!pageState) return;

            // Show Modal
            modal.classList.remove('hidden');

            // Init PDF.js to render HIGH RES page for editing from the correct source file
            const loadingTask = pdfjsLib.getDocument(sourcePdfs[pageState.fileId].slice(0));
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(pageState.originalIndex + 1);

            // Use scale 1.5 for better drawing resolution
            const viewport = page.getViewport({ scale: 1.5 });

            // Setup Background Canvas (PDF Content)
            bgCanvas.width = viewport.width;
            bgCanvas.height = viewport.height;
            canvasWrapper.style.width = `${viewport.width}px`;
            canvasWrapper.style.height = `${viewport.height}px`;

            await page.render({ canvasContext: bgCanvas.getContext('2d'), viewport: viewport }).promise;

            // Setup Drawing Canvas (Top Layer)
            drawCanvas.width = viewport.width;
            drawCanvas.height = viewport.height;
            currentCtx = drawCanvas.getContext('2d');

            // Restore previous annotations if any
            if (pageState.annotationData) {
                const img = new Image();
                img.onload = () => currentCtx.drawImage(img, 0, 0);
                img.src = pageState.annotationData;
            } else {
                currentCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            }

            // Default Tool
            setTool('pen');
        }

        function closeModal(save) {
            if (save && activePageId) {
                const pageState = pagesState.find(p => p.id === activePageId);
                pageState.annotationData = drawCanvas.toDataURL('image/png');

                // Show badge
                const badge = document.getElementById(`badge-${activePageId}`);
                if (badge) badge.classList.remove('hidden');
            }
            modal.classList.add('hidden');
            activePageId = null;
        }

        // --- Drawing Tools ---

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${tool}`).classList.add('active');

            if (tool === 'text') {
                canvasWrapper.style.cursor = 'text';
            } else {
                canvasWrapper.style.cursor = 'crosshair';
            }
        }

        function setColor(hex) {
            currentColor = hex;
        }

        function clearAnnotations() {
            if (confirm('確定要清除所有筆跡嗎？')) {
                currentCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            }
        }

        // Canvas Events
        drawCanvas.addEventListener('mousedown', startDraw);
        drawCanvas.addEventListener('mousemove', draw);
        drawCanvas.addEventListener('mouseup', endDraw);
        drawCanvas.addEventListener('mouseout', endDraw);
        // Touch support
        drawCanvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousedown', {
                clientX: touch.clientX, clientY: touch.clientY
            });
            drawCanvas.dispatchEvent(mouseEvent);
        }, { passive: false });
        drawCanvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const mouseEvent = new MouseEvent('mousemove', {
                clientX: touch.clientX, clientY: touch.clientY
            });
            drawCanvas.dispatchEvent(mouseEvent);
        }, { passive: false });
        drawCanvas.addEventListener('touchend', (e) => {
            const mouseEvent = new MouseEvent('mouseup', {});
            drawCanvas.dispatchEvent(mouseEvent);
        });

        function getPos(e) {
            const rect = drawCanvas.getBoundingClientRect();
            return {
                x: (e.clientX - rect.left) * (drawCanvas.width / rect.width),
                y: (e.clientY - rect.top) * (drawCanvas.height / rect.height)
            };
        }

        function startDraw(e) {
            isDrawing = true;
            const pos = getPos(e);
            startX = pos.x;
            startY = pos.y;

            if (currentTool === 'text') {
                handleTextTool(pos.x, pos.y);
                isDrawing = false; // Text is instant
                return;
            }

            if (currentTool === 'rect') {
                tempSnapshot = currentCtx.getImageData(0, 0, drawCanvas.width, drawCanvas.height);
            } else {
                currentCtx.beginPath();
                currentCtx.moveTo(startX, startY);
            }
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);

            if (currentTool === 'pen') {
                currentCtx.lineWidth = 3;
                currentCtx.lineCap = 'round';
                currentCtx.strokeStyle = currentColor;
                currentCtx.lineTo(pos.x, pos.y);
                currentCtx.stroke();
            } else if (currentTool === 'rect') {
                currentCtx.putImageData(tempSnapshot, 0, 0);

                const width = pos.x - startX;
                const height = pos.y - startY;

                currentCtx.lineWidth = 3;
                currentCtx.strokeStyle = currentColor;
                currentCtx.fillStyle = hexToRgba(currentColor, 0.1); 

                currentCtx.beginPath();
                currentCtx.rect(startX, startY, width, height);
                currentCtx.fill();
                currentCtx.stroke();
            }
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            currentCtx.closePath();
        }

        function handleTextTool(x, y) {
            const text = prompt('請輸入文字內容:', '');
            if (text) {
                currentCtx.font = "bold 24px 'Inter', sans-serif";
                currentCtx.fillStyle = currentColor;
                currentCtx.textBaseline = 'top';
                currentCtx.fillText(text, x, y);
            }
        }

        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- Sortable & General ---

        function initSortable() {
            new Sortable(grid, {
                animation: 150,
                ghostClass: 'ghost-class',
                onEnd: function (evt) {
                    const movedItem = pagesState.splice(evt.oldIndex, 1)[0];
                    pagesState.splice(evt.newIndex, 0, movedItem);
                    updatePageNumbers();
                }
            });
        }

        function rotatePage(pageId) {
            const pageState = pagesState.find(p => p.id === pageId);
            if (pageState) {
                pageState.rotation = (pageState.rotation + 90) % 360;
                document.getElementById(`img-${pageId}`).style.transform = `rotate(${pageState.rotation}deg)`;
            }
        }

        function deletePage(pageId) {
            document.querySelector(`div[data-id="${pageId}"]`).remove();
            pagesState = pagesState.filter(p => p.id !== pageId);
            updatePageCount();
            updatePageNumbers();
            if (pagesState.length === 0) {
                resetUI();
            }
        }

        function updatePageCount() {
            pageCountBadge.textContent = `${pagesState.length} 頁`;
        }

        function updatePageNumbers() {
            const cards = document.querySelectorAll('.pdf-page-card');
            cards.forEach((card, index) => {
                const badge = card.querySelector('.page-number-badge');
                if (badge) badge.textContent = `P${index + 1}`;
            });
        }

        function resetUI() {
            uploadZone.classList.remove('hidden');
            editorWorkspace.classList.add('hidden');
            loader.classList.add('hidden');
            fileInfo.classList.add('hidden');
            exportBtn.disabled = true;
            pagesState = [];
            sourcePdfs = {};
            grid.innerHTML = '';
            filenameDisplay.textContent = '已載入檔案';
        }

        // --- Export Logic ---

        async function exportPdf() {
            if (pagesState.length === 0) return;
            const btnText = document.getElementById('export-text');
            const originalText = btnText.innerText;
            btnText.innerText = "生成中...";
            exportBtn.disabled = true;

            try {
                const { PDFDocument, degrees } = PDFLib;
                const newDoc = await PDFDocument.create();
                const loadedSrcDocs = {}; // 快取已載入的原始 PDFDocument

                for (let i = 0; i < pagesState.length; i++) {
                    const pageState = pagesState[i];

                    // 若尚未載入該原始檔案，則進行載入
                    if (!loadedSrcDocs[pageState.fileId]) {
                        loadedSrcDocs[pageState.fileId] = await PDFDocument.load(sourcePdfs[pageState.fileId]);
                    }
                    
                    const srcDoc = loadedSrcDocs[pageState.fileId];
                    
                    // 從對應的原始檔案中拷貝指定頁面
                    const [copiedPage] = await newDoc.copyPages(srcDoc, [pageState.originalIndex]);

                    // 1. 處理旋轉
                    const currentRotationObj = copiedPage.getRotation();
                    const existingRotation = (currentRotationObj && currentRotationObj.angle) ? currentRotationObj.angle : 0;
                    copiedPage.setRotation(degrees(existingRotation + pageState.rotation));

                    // 2. 處理畫筆標記嵌入
                    if (pageState.annotationData) {
                        const pngImage = await newDoc.embedPng(pageState.annotationData);
                        copiedPage.drawImage(pngImage, {
                            x: 0,
                            y: 0,
                            width: copiedPage.getWidth(),
                            height: copiedPage.getHeight(),
                        });
                    }

                    newDoc.addPage(copiedPage);
                }

                const pdfBytes = await newDoc.save();
                downloadBlob(pdfBytes, `merged_document.pdf`);

            } catch (err) {
                console.error(err);
                alert("導出失敗: " + err.message);
            } finally {
                btnText.innerText = originalText;
                exportBtn.disabled = false;
            }
        }

        function downloadBlob(data, fileName) {
            const blob = new Blob([data], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
        }

    </script>
</body>
