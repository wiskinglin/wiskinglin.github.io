<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea 50 - 創新工具實驗室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #fb7185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* 檔案狀態標籤 */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-ready { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .status-empty { background: #64748b; }

        /* 全屏檢視器 */
        #viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: var(--bg);
            display: none;
            flex-direction: column;
        }

        .viewer-nav {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            flex-grow: 1;
            border: none;
            background: white;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .card-num {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: 900;
            opacity: 0.1;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body class="grid-bg min-h-screen">

            </p>
        </header>

        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <!-- Iframe Viewer Overlay -->
    <div id="viewer">

            <div class="flex items-center gap-4">

            </div>
            <div class="flex items-center gap-3">
                <button onclick="navigate(-1)" class="nav-btn">← 上一個</button>
                <button onclick="navigate(1)" class="nav-btn">下一個 →</button>
                <button onclick="openExternal()" class="nav-btn bg-primary/20 text-indigo-400">新視窗開啟 ↗</button>
            </div>
        </div>
        <iframe id="viewer-frame" src=""></iframe>
    </div>

            37: { title: "Sakura Chat P2P", desc: "🌸 零伺服器、端對端加密的私密聊天工具，支援 QR Code 快速連線。" },
            38: { title: "AI Markdown 編輯器", desc: "邊緣端 AI 驅動的 Markdown 編輯器，整合本地模型與即時預覽。" },

        // 生成卡片

            const isReady = i <= existingCount;
            const info = getInfo(i);
            const card = document.createElement('div');
            card.className = `glass p-6 rounded-2xl cursor-pointer relative flex flex-col h-full ${!isReady ? 'opacity-50 grayscale' : ''}`;

                </div>
