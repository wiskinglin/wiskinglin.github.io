<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetPal | 數位療癒寵物箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pet-container {
            perspective: 1000px;
        }

        .pet-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            transition: all 0.5s ease;
        }

        .bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        .progress-bar {
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-emoji {
            position: absolute;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="p-4">

    <div class="pet-container w-full max-w-md">
        <div class="pet-card p-8">
            <!-- 頂部資訊 -->
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 id="petName" class="text-2xl font-bold text-gray-800">阿吉 (Corgi)</h1>
                    <p id="petStatusText" class="text-sm text-gray-500">現在感覺很開心！</p>
                </div>
                <div class="flex space-x-2">
                    <button onclick="switchPet('corgi')"
                        class="p-2 rounded-full bg-orange-100 hover:bg-orange-200 transition">🐶</button>
                    <button onclick="switchPet('cat')"
                        class="p-2 rounded-full bg-blue-100 hover:bg-blue-200 transition">🐱</button>
                </div>
            </div>

            <!-- 寵物主體 -->
            <div
                class="relative h-64 flex items-center justify-center mb-8 bg-gradient-to-b from-transparent to-gray-50 rounded-xl">
                <div id="petVisual" class="bounce text-8xl transition-all duration-300 transform">
                    <!-- SVG 會動態插入這裡 -->
                </div>
                <div id="emojiContainer"></div>
            </div>

            <!-- 數值面板 -->
            <div class="space-y-4 mb-8">
                <div>
                    <div class="flex justify-between text-xs mb-1 font-bold text-gray-600">
                        <span>飽食度</span>
                        <span id="hungerVal">80%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="hungerBar" class="progress-bar bg-green-400 h-2 rounded-full" style="width: 80%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1 font-bold text-gray-600">
                        <span>心情值</span>
                        <span id="happinessVal">90%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="happinessBar" class="progress-bar bg-pink-400 h-2 rounded-full" style="width: 90%">
                        </div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1 font-bold text-gray-600">
                        <span>體力</span>
                        <span id="energyVal">70%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="energyBar" class="progress-bar bg-yellow-400 h-2 rounded-full" style="width: 70%">
                        </div>
                    </div>
                </div>
            </div>

            <!-- 互動按鈕 -->
            <div class="grid grid-cols-3 gap-4">
                <button onclick="interact('feed')"
                    class="flex flex-col items-center p-3 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md hover:bg-orange-50 transition active:scale-95">
                    <span class="text-2xl mb-1">🍖</span>
                    <span class="text-xs font-bold text-gray-700">餵食</span>
                </button>
                <button onclick="interact('play')"
                    class="flex flex-col items-center p-3 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md hover:bg-blue-50 transition active:scale-95">
                    <span class="text-2xl mb-1">🎾</span>
                    <span class="text-xs font-bold text-gray-700">玩耍</span>
                </button>
                <button onclick="interact('sleep')"
                    class="flex flex-col items-center p-3 rounded-2xl bg-white border border-gray-100 shadow-sm hover:shadow-md hover:bg-purple-50 transition active:scale-95">
                    <span class="text-2xl mb-1">💤</span>
                    <span class="text-xs font-bold text-gray-700">休息</span>
                </button>
            </div>
        </div>

        <!-- 提示訊息 -->
        <p class="text-center mt-6 text-gray-500 text-xs">
            提示：定期餵食與玩耍能讓牠保持健康。點擊寵物也可以撫摸喔！
        </p>
    </div>

    <script>
        const pets = {
            corgi: {
                name: '阿吉 (Corgi)',
                icon: '🐶',
                color: 'text-orange-500',
                moods: {
                    happy: '🐶',
                    hungry: '🐕',
                    sleepy: '😴',
                    eating: '😋'
                }
            },
            cat: {
                name: '小藍 (Russian Blue)',
                icon: '🐱',
                color: 'text-blue-500',
                moods: {
                    happy: '🐱',
                    hungry: '😿',
                    sleepy: '💤',
                    eating: '😸'
                }
            }
        };

        let currentPetType = 'corgi';
        let stats = {
            hunger: 80,
            happiness: 90,
            energy: 70
        };

        const petVisual = document.getElementById('petVisual');
        const petName = document.getElementById('petName');
        const petStatusText = document.getElementById('petStatusText');
        const emojiContainer = document.getElementById('emojiContainer');

        function updateUI() {
            // 更新進度條
            document.getElementById('hungerBar').style.width = stats.hunger + '%';
            document.getElementById('hungerVal').innerText = stats.hunger + '%';
            document.getElementById('happinessBar').style.width = stats.happiness + '%';
            document.getElementById('happinessVal').innerText = stats.happiness + '%';
            document.getElementById('energyBar').style.width = stats.energy + '%';
            document.getElementById('energyVal').innerText = stats.energy + '%';

            // 更新顏色
            document.getElementById('hungerBar').className = `progress-bar h-2 rounded-full ${stats.hunger < 30 ? 'bg-red-400' : 'bg-green-400'}`;

            // 更新視覺狀態
            const pet = pets[currentPetType];
            if (stats.hunger < 30) {
                petVisual.innerText = pet.moods.hungry;
                petStatusText.innerText = '主人...我肚子好餓...';
            } else if (stats.energy < 20) {
                petVisual.innerText = pet.moods.sleepy;
                petStatusText.innerText = '想睡覺了...晚安...';
            } else {
                petVisual.innerText = pet.moods.happy;
                petStatusText.innerText = '現在感覺很棒！';
            }
        }

        function switchPet(type) {
            currentPetType = type;
            petName.innerText = pets[type].name;
            createFloatingEmoji('✨');
            updateUI();
        }

        function interact(type) {
            const pet = pets[currentPetType];

            if (type === 'feed') {
                if (stats.hunger >= 100) return;
                stats.hunger = Math.min(100, stats.hunger + 20);
                stats.happiness = Math.min(100, stats.happiness + 5);
                createFloatingEmoji('🍗');
                petVisual.innerText = pet.moods.eating;
                setTimeout(() => updateUI(), 1000);
            } else if (type === 'play') {
                if (stats.energy < 15) {
                    petStatusText.innerText = '太累了，動不了...';
                    return;
                }
                stats.happiness = Math.min(100, stats.happiness + 25);
                stats.energy = Math.max(0, stats.energy - 20);
                stats.hunger = Math.max(0, stats.hunger - 10);
                createFloatingEmoji('❤️');
            } else if (type === 'sleep') {
                stats.energy = Math.min(100, stats.energy + 40);
                stats.hunger = Math.max(0, stats.hunger - 15);
                createFloatingEmoji('💤');
                petVisual.innerText = pet.moods.sleepy;
                setTimeout(() => updateUI(), 2000);
            }
            updateUI();
        }

        function createFloatingEmoji(emoji) {
            const span = document.createElement('span');
            span.innerText = emoji;
            span.className = 'floating-emoji text-4xl';
            span.style.left = (Math.random() * 60 + 20) + '%';
            emojiContainer.appendChild(span);
            setTimeout(() => span.remove(), 1000);
        }

        // 點擊撫摸功能
        petVisual.addEventListener('click', () => {
            stats.happiness = Math.min(100, stats.happiness + 5);
            createFloatingEmoji('💕');
            petVisual.classList.remove('bounce');
            void petVisual.offsetWidth; // 觸發重繪
            petVisual.classList.add('bounce');
            updateUI();
        });

        // 數值隨時間衰減
        setInterval(() => {
            stats.hunger = Math.max(0, stats.hunger - 2);
            stats.energy = Math.max(0, stats.energy - 1);
            if (stats.hunger < 20) stats.happiness = Math.max(0, stats.happiness - 3);
            updateUI();
        }, 5000);

        // 初始化
        window.onload = () => {
            switchPet('corgi');
        };
    </script>

<!-- Help Info Button Module -->
<div id="help-module">
    <button id="help-info-btn" style="position:fixed; top:1rem; right:1rem; z-index:9999;" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
    </button>
    <div id="help-info-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border:1px solid #334155; border-radius:1rem; max-width:32rem; width:100%; margin:1rem; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); position:relative; font-family:sans-serif;">
            <button id="close-help-btn" style="position:absolute; top:1rem; right:1rem; color:#94a3b8; background:none; border:none; cursor:pointer; font-size:1.5rem;">&times;</button>
            <h2 style="font-size:1.25rem; font-weight:bold; color:white; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                ℹ️ 應用程式功能說明
            </h2>
            <div style="color:#cbd5e1; font-size:0.875rem; line-height:1.5; display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <h3 style="color:#4ade80; font-weight:600; margin-bottom:0.25rem;">✅ 已實作功能</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#e2e8f0;">
                        <li>現代化 RWD 使用者介面設計</li>\n<li>前端互動邏輯與動畫效果</li>\n<li>本地瀏覽器端資料處理</li>
                    </ul>
                </div>
                <div>
                    <h3 style="color:#fbbf24; font-weight:600; margin-bottom:0.25rem;">🚧 尚未實作 (純前端/Mock)</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#94a3b8;">
                        <li>後端 API 真實數據介接</li>\n<li>雲端資料庫持久化儲存</li>\n<li>涉及 AI 運算的部分為模擬效果</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('help-info-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'flex';
    });
    document.getElementById('close-help-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'none';
    });
    document.getElementById('help-info-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('help-info-modal')) {
            document.getElementById('help-info-modal').style.display = 'none';
        }
    });
</script>
\n</body>

</html>
