<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Task Squad - 皮克敏工作小隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Varela+Round&display=swap');

        :root {
            --pikmin-red: #ff5e5e;
            --pikmin-yellow: #f9d423;
            --pikmin-blue: #4facfe;
            --pikmin-green: #a8e063;
        }

        body {
            font-family: 'Varela Round', sans-serif;
            background: linear-gradient(180deg, #d4fc79 0%, #96e6a1 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pikmin-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin: 2px;
            position: relative;
        }

        .pikmin-dot::after {
            content: '🌱';
            position: absolute;
            top: -12px;
            left: -2px;
            font-size: 10px;
        }

        .carrying-animation {
            animation: bounce 0.5s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .progress-leaf {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-leaf-inner {
            height: 100%;
            background: var(--pikmin-green);
            transition: width 0.5s ease;
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-bold text-green-800 mb-2">Pikmin Task Squad</h1>
            <p class="text-green-700">派遣你的皮克敏，搬走所有的工作壓力！</p>
        </header>

        <div class="task-card rounded-3xl p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="taskInput" type="text" placeholder="輸入你想處理的任務（例如：寫報告）"
                    class="flex-1 px-4 py-3 rounded-full border-2 border-green-200 focus:outline-none focus:border-green-500 text-lg">
                <button onclick="addTask()"
                    class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform hover:scale-105 transition">
                    呼喚皮克敏！
                </button>
            </div>
        </div>

        <div id="taskList" class="space-y-4">
        </div>
    </div>

    <script>
        const colors = ['var(--pikmin-red)', 'var(--pikmin-yellow)', 'var(--pikmin-blue)'];
        const items = ['🍎', '🍇', '🔋', '📱', '🔔', '🏺'];

        function addTask() {
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            const pikminCount = Math.floor(Math.random() * 5) + 3;
            const randomItem = items[Math.floor(Math.random() * items.length)];
            const taskId = Date.now();

            const taskHtml = `
                <div id="task-${taskId}" class="task-card rounded-2xl p-5 animate__animated animate__fadeInUp">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-xl font-bold text-gray-800">${text}</h3>
                            <div class="mt-2" id="pikmin-container-${taskId}">
                                ${generatePikminDots(pikminCount)}
                                <span class="text-sm text-gray-500 ml-2">${pikminCount} 隻皮克敏正在待命</span>
                            </div>
                        </div>
                        <span class="text-4xl">${randomItem}</span>
                    </div>
                    
                    <div id="status-${taskId}" class="mt-4">
                        <button onclick="startCarry(${taskId}, ${pikminCount})" 
                            class="w-full bg-blue-500 hover:bg-blue-600 text-white py-2 rounded-xl font-bold transition">
                            開始搬運 (10秒專注)
                        </button>
                    </div>
                    
                    <div class="progress-leaf mt-4 hidden" id="progress-container-${taskId}">
                        <div id="bar-${taskId}" class="progress-leaf-inner" style="width: 0%"></div>
                    </div>
                </div>
            `;

            document.getElementById('taskList').insertAdjacentHTML('afterbegin', taskHtml);
            input.value = '';
        }

        function generatePikminDots(count) {
            let html = '';
            for (let i = 0; i < count; i++) {
                const color = colors[Math.floor(Math.random() * colors.length)];
                html += `<span class="pikmin-dot" style="background-color: ${color}"></span>`;
            }
            return html;
        }

        function startCarry(id, count) {
            const btn = document.querySelector(`#status-${id} button`);
            const container = document.getElementById(`progress-container-${id}`);
            const bar = document.getElementById(`bar-${id}`);
            const card = document.getElementById(`task-${id}`);

            btn.disabled = true;
            btn.innerHTML = "搬運中... 嘿咻！嘿咻！";
            btn.classList.replace('bg-blue-500', 'bg-gray-400');
            container.classList.remove('hidden');
            card.classList.add('carrying-animation');

            let progress = 0;
            const interval = setInterval(() => {
                progress += 1;
                bar.style.width = `${progress}%`;

                if (progress >= 100) {
                    clearInterval(interval);
                    completeTask(id);
                }
            }, 100); // 10秒完成 (100 * 100ms)
        }

        function completeTask(id) {
            const card = document.getElementById(`task-${id}`);
            card.classList.remove('carrying-animation');
            card.classList.add('animate__animated', 'animate__fadeOutRight');

            setTimeout(() => {
                card.innerHTML = `
                    <div class="flex items-center justify-center py-4">
                        <span class="text-2xl font-bold text-green-600">✨ 任務已送達基地！</span>
                    </div>
                `;
                setTimeout(() => {
                    card.remove();
                    if (document.getElementById('taskList').children.length === 0) {
                        alert("太棒了！所有寶物都搬完了，休息一下吧！");
                    }
                }, 1500);
            }, 500);
        }
    </script>

<!-- Help Info Button Module -->
<div id="help-module">
    <button id="help-info-btn" style="position:fixed; top:1rem; right:1rem; z-index:9999;" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
    </button>
    <div id="help-info-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border:1px solid #334155; border-radius:1rem; max-width:32rem; width:100%; margin:1rem; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); position:relative; font-family:sans-serif;">
            <button id="close-help-btn" style="position:absolute; top:1rem; right:1rem; color:#94a3b8; background:none; border:none; cursor:pointer; font-size:1.5rem;">&times;</button>
            <h2 style="font-size:1.25rem; font-weight:bold; color:white; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                ℹ️ 應用程式功能說明
            </h2>
            <div style="color:#cbd5e1; font-size:0.875rem; line-height:1.5; display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <h3 style="color:#4ade80; font-weight:600; margin-bottom:0.25rem;">✅ 已實作功能</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#e2e8f0;">
                        <li>現代化 RWD 使用者介面設計</li>\n<li>前端互動邏輯與動畫效果</li>\n<li>本地瀏覽器端資料處理</li>
                    </ul>
                </div>
                <div>
                    <h3 style="color:#fbbf24; font-weight:600; margin-bottom:0.25rem;">🚧 尚未實作 (純前端/Mock)</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#94a3b8;">
                        <li>後端 API 真實數據介接</li>\n<li>雲端資料庫持久化儲存</li>\n<li>涉及 AI 運算的部分為模擬效果</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('help-info-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'flex';
    });
    document.getElementById('close-help-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'none';
    });
    document.getElementById('help-info-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('help-info-modal')) {
            document.getElementById('help-info-modal').style.display = 'none';
        }
    });
</script>
\n</body>

</html>
