<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PersonaChat - 專屬虛擬人陪伴</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            overflow: hidden;
        }

        /* 隱藏滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            /* IE and Edge */
            scrollbar-width: none;
            /* Firefox */
        }

        .glass {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px;
            width: 6px;
            background: #cbd5e1;
            border-radius: 50%;
            display: inline-block;
            margin: 0 1px;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% {
                opacity: 0.2;
                transform: scale(0.8);
            }

            20% {
                opacity: 1;
                transform: scale(1.2);
            }

            100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
        }

        .message-enter {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-4 md:p-6">

    <div
        class="glass w-full max-w-5xl h-full max-h-[850px] rounded-3xl shadow-2xl flex flex-col md:flex-row overflow-hidden border border-white">

        <div class="w-full md:w-1/3 border-b md:border-b-0 md:border-r border-gray-200 bg-white/50 flex flex-col">
            <div class="p-5 border-b border-gray-200">
                <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-robot text-indigo-500"></i> PersonaChat
                </h1>
                <p class="text-xs text-gray-500 mt-1">本地端 LLM 虛擬角色介面</p>
            </div>

            <div class="flex-1 overflow-y-auto no-scrollbar p-3 space-y-2" id="persona-list">
            </div>
        </div>

        <div class="w-full md:w-2/3 flex flex-col h-full bg-white/70 relative">
            <div
                class="h-16 border-b border-gray-200 flex items-center px-6 bg-white/80 backdrop-blur-sm z-10 shadow-sm">
                <img id="header-avatar" src="" alt="Avatar"
                    class="w-10 h-10 rounded-full object-cover border-2 border-indigo-100">
                <div class="ml-3">
                    <h2 id="header-name" class="font-bold text-gray-800 leading-tight">選擇角色</h2>
                    <p id="header-role" class="text-xs text-gray-500">...</p>
                </div>
            </div>

            <div id="chat-messages" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col no-scrollbar">
                <div class="flex justify-center mt-10">
                    <div class="bg-gray-100 text-gray-500 text-sm px-4 py-2 rounded-full">
                        請從左側選擇一位虛擬角色開始對話
                    </div>
                </div>
            </div>

            <div class="p-4 bg-white/80 border-t border-gray-200 backdrop-blur-sm">
                <form id="chat-form" class="relative flex items-center">
                    <input type="text" id="user-input" disabled placeholder="請先選擇角色..."
                        class="w-full bg-gray-100 border-transparent focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 rounded-full py-3 pl-5 pr-14 outline-none transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed text-gray-700">
                    <button type="submit" id="send-btn" disabled
                        class="absolute right-2 top-1/2 transform -translate-y-1/2 bg-indigo-500 text-white w-9 h-9 rounded-full hover:bg-indigo-600 transition-colors flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                        <i class="fa-solid fa-paper-plane text-sm -ml-0.5"></i>
                    </button>
                </form>
                <div class="text-center mt-2">
                    <span class="text-[10px] text-gray-400">目前為模擬模式，可隨時對接 Local LLM (如 Ollama)。</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 角色數據庫 (Persona Database)
        const personas = [
            {
                id: 'student_m',
                name: '小宇',
                gender: '男性',
                role: '熱血大學生',
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Felix&backgroundColor=b6e3f4',
                bgColor: 'bg-blue-50',
                borderColor: 'border-blue-200',
                greeting: '哈囉！我是小宇，剛下課！你今天過得好嗎？有什麼想聊的或是遇到什麼麻煩，都可以跟我說喔！😎',
                systemPrompt: '你是一個20歲的大學生男性，說話充滿活力、熱情，喜歡用顏文字和網路用語。你會像朋友一樣鼓勵用戶。',
                replyStyle: (text) => `哈哈，懂你意思！關於「${text}」，我覺得放輕鬆就好啦～ 大學生活就是這樣，不然我們去打球發洩一下？🔥`
            },
            {
                id: 'office_f',
                name: '雅婷',
                gender: '女性',
                role: '資深專案經理',
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Sophia&backgroundColor=ffdfbf',
                bgColor: 'bg-orange-50',
                borderColor: 'border-orange-200',
                greeting: '你好，我是雅婷。剛結束一個會議，正好有空。工作上遇到挑戰了嗎？還是想聊聊職涯規劃？',
                systemPrompt: '你是一位30歲的女性專案經理，說話專業、成熟、有條理。你會提供務實的建議，並且語氣溫和但堅定。',
                replyStyle: (text) => `我理解你的情況。針對「${text}」，從專案管理的角度來看，我建議我們先釐清問題的核心。你需要我幫你列出幾個行動方案嗎？📊`
            },
            {
                id: 'designer_m',
                name: 'Leo',
                gender: '男性',
                role: '自由接案設計師',
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Jack&backgroundColor=c0aede',
                bgColor: 'bg-purple-50',
                borderColor: 'border-purple-200',
                greeting: 'Hey! 我是 Leo。正在泡咖啡找靈感☕。想聊點設計、藝術，還是單純放鬆一下？',
                systemPrompt: '你是一位注重美感與生活品質的男性自由設計師，說話慵懶、隨性、富有創意。',
                replyStyle: (text) => `聽起來很有趣啊... 對於「${text}」，我覺得可以換個角度看。就像設計一樣，留白也是一種美。你覺得呢？✨`
            },
            {
                id: 'student_f',
                name: '小櫻',
                gender: '女性',
                role: '圖書資訊系學生',
                avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Mia&backgroundColor=ffd5dc',
                bgColor: 'bg-pink-50',
                borderColor: 'border-pink-200',
                greeting: '你好...(推眼鏡)。我是小櫻，正在圖書館整理資料。如果你有不懂的問題，我們可以一起查資料喔📚',
                systemPrompt: '你是一位內向、細心、喜歡讀書的女大學生，說話溫柔、有點害羞。',
                replyStyle: (text) => `那個... 關於「${text}」，我之前好像在一本書上看過相關的資料。如果需要的話，我可以幫你整理出來喔...(小聲) 📖`
            }
        ];

        let currentPersona = null;
        let isTyping = false;

        // DOM 元素
        const personaListEl = document.getElementById('persona-list');
        const chatMessagesEl = document.getElementById('chat-messages');
        const headerAvatar = document.getElementById('header-avatar');
        const headerName = document.getElementById('header-name');
        const headerRole = document.getElementById('header-role');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatForm = document.getElementById('chat-form');

        // 2. 初始化角色列表
        function renderPersonas() {
            personas.forEach(p => {
                const card = document.createElement('div');
                card.className = `p-3 rounded-xl cursor-pointer transition-all duration-200 border border-transparent hover:bg-white hover:shadow-md flex items-center gap-3`;
                card.onclick = () => selectPersona(p.id, card);
                card.innerHTML = `
                    <div class="relative">
                        <img src="${p.avatar}" alt="${p.name}" class="w-12 h-12 rounded-full object-cover bg-gray-100 border border-gray-200">
                        <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-400 border-2 border-white rounded-full"></span>
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <h3 class="font-bold text-gray-800 text-sm truncate">${p.name}</h3>
                        <p class="text-xs text-gray-500 truncate">${p.role} · ${p.gender}</p>
                    </div>
                `;
                personaListEl.appendChild(card);
            });
        }

        // 3. 選擇角色邏輯
        function selectPersona(id, cardElement) {
            currentPersona = personas.find(p => p.id === id);

            // 更新 UI 狀態
            document.querySelectorAll('#persona-list > div').forEach(el => {
                el.classList.remove('bg-white', 'shadow-md', currentPersona.borderColor);
            });
            cardElement.classList.add('bg-white', 'shadow-md', currentPersona.borderColor);

            // 更新頭部
            headerAvatar.src = currentPersona.avatar;
            headerName.textContent = currentPersona.name;
            headerRole.textContent = `${currentPersona.role} (${currentPersona.gender})`;

            // 開啟輸入
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.placeholder = `傳送訊息給 ${currentPersona.name}...`;

            // 清空聊天並顯示打招呼
            chatMessagesEl.innerHTML = '';
            addMessage(currentPersona.greeting, 'ai', false);
        }

        // 4. 訊息渲染
        function addMessage(text, sender, isHTML = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} message-enter`;

            const bubble = document.createElement('div');
            if (sender === 'user') {
                bubble.className = `max-w-[75%] px-5 py-3 rounded-2xl rounded-tr-sm bg-indigo-500 text-white shadow-sm`;
                bubble.textContent = text;
            } else {
                bubble.className = `max-w-[75%] px-5 py-3 rounded-2xl rounded-tl-sm ${currentPersona.bgColor} text-gray-800 shadow-sm border ${currentPersona.borderColor} flex flex-col gap-1`;
                if (isHTML) {
                    bubble.innerHTML = text;
                } else {
                    bubble.textContent = text;
                }
            }

            wrapper.appendChild(bubble);
            chatMessagesEl.appendChild(wrapper);
            scrollToBottom();
        }

        function addTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = `flex justify-start message-enter`;
            wrapper.innerHTML = `
                <div class="px-5 py-4 rounded-2xl rounded-tl-sm ${currentPersona.bgColor} border ${currentPersona.borderColor} shadow-sm typing-indicator flex items-center">
                    <span></span><span></span><span></span>
                </div>
            `;
            chatMessagesEl.appendChild(wrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatMessagesEl.scrollTo({
                top: chatMessagesEl.scrollHeight,
                behavior: 'smooth'
            });
        }

        // 5. 處理發送與模擬 LLM 回覆
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text || !currentPersona || isTyping) return;

            // 用戶訊息
            addMessage(text, 'user');
            userInput.value = '';
            isTyping = true;

            // 模擬 LLM 思考時間
            addTypingIndicator();

            /* * 【Local LLM 銜接點提示】
             * 若要整合 Ollama，請將下方的 setTimeout 替換為 fetch 請求：
             * * const response = await fetch('http://localhost:11434/api/chat', {
             * method: 'POST',
             * headers: { 'Content-Type': 'application/json' },
             * body: JSON.stringify({
             * model: 'llama3',
             * messages: [
             * { role: 'system', content: currentPersona.systemPrompt },
             * { role: 'user', content: text }
             * ],
             * stream: false
             * })
             * });
             * const data = await response.json();
             * const replyText = data.message.content;
             */

            setTimeout(() => {
                removeTypingIndicator();
                // 這裡使用預設的角色風格模擬回覆 (Mock Response)
                let replyText = currentPersona.replyStyle(text);

                // 增加一點隨機性對話
                if (text.includes('你好') || text.includes('哈囉')) {
                    replyText = `嗨！很高興聽到你的聲音。想聊點什麼？`;
                }

                addMessage(replyText, 'ai');
                isTyping = false;
            }, 1500 + Math.random() * 1000); // 1.5 ~ 2.5 秒的模擬延遲
        });

        // 初始化
        renderPersonas();

    </script>
<!-- Help Info Button Module -->
<div id="help-module">
    <button id="help-info-btn" style="position:fixed; top:1rem; right:1rem; z-index:9999;" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
    </button>
    <div id="help-info-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border:1px solid #334155; border-radius:1rem; max-width:32rem; width:100%; margin:1rem; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); position:relative; font-family:sans-serif;">
            <button id="close-help-btn" style="position:absolute; top:1rem; right:1rem; color:#94a3b8; background:none; border:none; cursor:pointer; font-size:1.5rem;">&times;</button>
            <h2 style="font-size:1.25rem; font-weight:bold; color:white; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                ℹ️ 應用程式功能說明
            </h2>
            <div style="color:#cbd5e1; font-size:0.875rem; line-height:1.5; display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <h3 style="color:#4ade80; font-weight:600; margin-bottom:0.25rem;">✅ 已實作功能</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#e2e8f0;">
                        <li>虛擬多角色選擇介面與資料庫</li>
                        <li>根據選擇角色切換聊天室主題顏色與頭像</li>
                        <li>前端對話視窗渲染與「正在輸入」動畫特效</li>
                        <li>基於預設規則的角色風格回覆模擬</li>
                    </ul>
                </div>
                <div>
                    <h3 style="color:#fbbf24; font-weight:600; margin-bottom:0.25rem;">🚧 尚未實作 (純前端/Mock)</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#94a3b8;">
                        <li>真實串接 Ollama / Local LLM (代碼內已留有 API Fetch 註解)</li>
                        <li>聊天紀錄持久化儲存</li>
                        <li>建立新角色功能</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('help-info-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'flex';
    });
    document.getElementById('close-help-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'none';
    });
    document.getElementById('help-info-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('help-info-modal')) {
            document.getElementById('help-info-modal').style.display = 'none';
        }
    });
</script>
</body>
</html>
