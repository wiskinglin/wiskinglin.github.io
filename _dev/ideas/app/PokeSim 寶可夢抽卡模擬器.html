<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeSim - 究極抽卡模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: radial-gradient(circle at center, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .card-container {
            perspective: 1000px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .card-back {
            background: linear-gradient(45deg, #2c3e50, #000);
            border: 4px solid #f1c40f;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front {
            transform: rotateY(180deg);
            background: white;
            border: 4px solid #fff;
            overflow: hidden;
        }

        /* 稀有度光效 */
        .rarity-ur {
            box-shadow: 0 0 25px #ff00ff, 0 0 45px #ff00ff inset;
            border: 4px solid #ff00ff;
        }

        .rarity-hr {
            box-shadow: 0 0 25px #ffd700, 0 0 45px #ffd700 inset;
            border: 4px solid #ffd700;
        }

        .holo-effect {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(125deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.4) 45%, rgba(255, 255, 255, 0) 50%);
            background-size: 200% 200%;
            animation: holo 3s infinite;
            pointer-events: none;
        }

        @keyframes holo {
            0% {
                background-position: -200% -200%;
            }

            100% {
                background-position: 200% 200%;
            }
        }

        .shake {
            animation: shake 0.5s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
</head>

<body class="p-4 md:p-8 flex flex-col items-center">

    <header class="text-center mb-10">
        <h1 class="text-5xl font-black text-white italic tracking-tighter drop-shadow-lg">POKÉ<span
                class="text-yellow-400">SIM</span></h1>
        <p class="text-blue-100 mt-2 font-medium">究極集換式卡牌抽卡模擬器</p>
    </header>

    <div class="bg-white/10 backdrop-blur-md rounded-3xl p-6 w-full max-w-4xl shadow-2xl border border-white/20">
        <div class="flex justify-between items-center mb-8">
            <div class="text-white">
                <span class="block text-xs opacity-70 uppercase tracking-widest">Inventory</span>
                <span class="text-2xl font-bold">已收集: <span id="collection-count">0</span> 張</span>
            </div>
            <button onclick="drawPack()" id="draw-btn"
                class="bg-yellow-400 hover:bg-yellow-300 text-blue-900 font-black py-4 px-10 rounded-full text-xl transform hover:scale-105 transition active:scale-95 shadow-[0_0_20px_rgba(252,211,77,0.5)]">
                開啟卡包 (5張)
            </button>
        </div>

        <div id="card-display" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-6 min-h-[350px]">
            <div
                class="col-span-full flex flex-col items-center justify-center text-white/40 border-2 border-dashed border-white/20 rounded-2xl">
                <p class="text-lg">點擊按鈕開始開包</p>
            </div>
        </div>
    </div>

    <div class="mt-12 w-full max-w-4xl">
        <h3 class="text-white font-bold mb-4 flex items-center">
            <span class="bg-red-500 w-3 h-3 rounded-full mr-2"></span> 稀有度紀錄
        </h3>
        <div class="grid grid-cols-4 gap-4 text-center">
            <div class="bg-white/5 p-4 rounded-xl text-white">
                <div class="text-xs opacity-50 uppercase">Common</div>
                <div id="stat-c" class="text-xl font-bold">0</div>
            </div>
            <div class="bg-white/5 p-4 rounded-xl text-blue-400">
                <div class="text-xs opacity-50 uppercase">Rare</div>
                <div id="stat-r" class="text-xl font-bold">0</div>
            </div>
            <div class="bg-white/5 p-4 rounded-xl text-purple-400">
                <div class="text-xs opacity-50 uppercase">Ultra Rare</div>
                <div id="stat-ur" class="text-xl font-bold">0</div>
            </div>
            <div class="bg-white/5 p-4 rounded-xl text-yellow-400">
                <div class="text-xs opacity-50 uppercase">Hyper Rare</div>
                <div id="stat-hr" class="text-xl font-bold">0</div>
            </div>
        </div>
    </div>

    <script>
        const cardPool = [
            { name: "皮卡丘", type: "⚡", rarity: "C", color: "bg-yellow-100" },
            { name: "小火龍", type: "🔥", rarity: "C", color: "bg-red-100" },
            { name: "傑尼龜", type: "💧", rarity: "C", color: "bg-blue-100" },
            { name: "妙蛙種子", type: "🌿", rarity: "C", color: "bg-green-100" },
            { name: "伊布", type: "⚪", rarity: "C", color: "bg-gray-100" },
            { name: "噴火龍", type: "🔥", rarity: "R", color: "bg-red-200" },
            { name: "水箭龜", type: "💧", rarity: "R", color: "bg-blue-200" },
            { name: "妙蛙花", type: "🌿", rarity: "R", color: "bg-green-200" },
            { name: "超夢 EX", type: "🔮", rarity: "UR", color: "bg-purple-200" },
            { name: "路卡利歐 V", type: "👊", rarity: "UR", color: "bg-orange-200" },
            { name: "黃金皮卡丘", type: "✨", rarity: "HR", color: "bg-yellow-400" },
            { name: "阿爾宙斯 VSTAR", type: "💫", rarity: "HR", color: "bg-indigo-100" }
        ];

        let stats = { C: 0, R: 0, UR: 0, HR: 0 };
        let totalCollected = 0;

        function getRandomCard() {
            const rand = Math.random() * 100;
            let rarity = "C";
            if (rand < 1) rarity = "HR";       // 1%
            else if (rand < 6) rarity = "UR";  // 5%
            else if (rand < 25) rarity = "R";  // 19%
            else rarity = "C";                 // 75%

            const filteredPool = cardPool.filter(c => c.rarity === rarity);
            return filteredPool[Math.floor(Math.random() * filteredPool.length)];
        }

        function drawPack() {
            const display = document.getElementById('card-display');
            const btn = document.getElementById('draw-btn');

            // 介面重置與震動
            display.innerHTML = '';
            btn.disabled = true;
            btn.innerText = '正在感應卡包...';

            for (let i = 0; i < 5; i++) {
                const cardData = getRandomCard();
                const cardEl = createCardElement(cardData, i);
                display.appendChild(cardEl);

                // 更新數據
                stats[cardData.rarity]++;
                totalCollected++;
            }

            // 更新 UI 數據顯示
            setTimeout(() => {
                document.getElementById('collection-count').innerText = totalCollected;
                document.getElementById('stat-c').innerText = stats.C;
                document.getElementById('stat-r').innerText = stats.R;
                document.getElementById('stat-ur').innerText = stats.UR;
                document.getElementById('stat-hr').innerText = stats.HR;
                btn.disabled = false;
                btn.innerText = '開啟卡包 (5張)';
            }, 500);
        }

        function createCardElement(data, index) {
            const container = document.createElement('div');
            container.className = 'card-container h-64 shake';
            container.style.animationDelay = `${index * 0.1}s`;

            let rarityClass = '';
            if (data.rarity === 'UR') rarityClass = 'rarity-ur';
            if (data.rarity === 'HR') rarityClass = 'rarity-hr';

            container.innerHTML = `
                <div class="card-inner" onclick="this.classList.toggle('is-flipped')">
                    <div class="card-back">
                        <div class="w-16 h-16 rounded-full border-4 border-yellow-500 flex items-center justify-center">
                            <span class="text-white font-bold text-2xl">?</span>
                        </div>
                    </div>
                    <div class="card-front ${data.color} ${rarityClass} flex flex-col items-center justify-center p-4 relative">
                        ${(data.rarity === 'UR' || data.rarity === 'HR') ? '<div class="holo-effect"></div>' : ''}
                        <div class="text-4xl mb-2">${data.type}</div>
                        <div class="font-black text-xl text-gray-800 text-center">${data.name}</div>
                        <div class="absolute bottom-2 right-2 bg-black/10 px-2 py-1 rounded text-[10px] font-bold">
                            ${data.rarity}
                        </div>
                    </div>
                </div>
            `;
            return container;
        }
    </script>

<!-- Help Info Button Module -->
<div id="help-module">
    <button id="help-info-btn" style="position:fixed; top:1rem; right:1rem; z-index:9999;" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
    </button>
    <div id="help-info-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border:1px solid #334155; border-radius:1rem; max-width:32rem; width:100%; margin:1rem; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); position:relative; font-family:sans-serif;">
            <button id="close-help-btn" style="position:absolute; top:1rem; right:1rem; color:#94a3b8; background:none; border:none; cursor:pointer; font-size:1.5rem;">&times;</button>
            <h2 style="font-size:1.25rem; font-weight:bold; color:white; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                ℹ️ 應用程式功能說明
            </h2>
            <div style="color:#cbd5e1; font-size:0.875rem; line-height:1.5; display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <h3 style="color:#4ade80; font-weight:600; margin-bottom:0.25rem;">✅ 已實作功能</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#e2e8f0;">
                        <li>現代化 RWD 使用者介面設計</li>\n<li>前端互動邏輯與動畫效果</li>\n<li>本地瀏覽器端資料處理</li>
                    </ul>
                </div>
                <div>
                    <h3 style="color:#fbbf24; font-weight:600; margin-bottom:0.25rem;">🚧 尚未實作 (純前端/Mock)</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#94a3b8;">
                        <li>後端 API 真實數據介接</li>\n<li>雲端資料庫持久化儲存</li>\n<li>涉及 AI 運算的部分為模擬效果</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('help-info-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'flex';
    });
    document.getElementById('close-help-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'none';
    });
    document.getElementById('help-info-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('help-info-modal')) {
            document.getElementById('help-info-modal').style.display = 'none';
        }
    });
</script>
\n</body>

</html>
