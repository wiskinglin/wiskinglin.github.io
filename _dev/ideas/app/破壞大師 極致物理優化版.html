<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>破壞大師：極致物理優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            width: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-around;
            z-index: 50;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        .label {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 24px;
            font-weight: 800;
            color: #f59e0b;
            display: block;
        }

        #game-container {
            cursor: crosshair;
        }

        /* 震動動畫 */
        .shake {
            animation: shake 0.2s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }
    </style>
</head>

<body class="flex items-center justify-center h-screen">

    <div id="ui-layer">
        <div class="stat-card">
            <span class="label">Total Score</span>
            <span id="score" class="value">0</span>
        </div>
        <div class="stat-card">
            <span class="label">Projectiles</span>
            <span id="shots" class="value">0</span>
        </div>
    </div>

    <div id="game-container"></div>

    <script>
        const { Engine, Render, Runner, Composites, Constraint, MouseConstraint, Mouse, Composite, Bodies, Events, Vector } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        const width = 1000;
        const height = 600;

        const render = Render.create({
            element: document.getElementById('game-container'),
            engine: engine,
            options: {
                width: width, height: height,
                wireframes: false,
                background: 'linear-gradient(180deg, #1e293b 0%, #0f172a 100%)'
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);

        // --- 物理環境佈置 ---
        const ground = Bodies.rectangle(width / 2, height + 25, width * 2, 60, { isStatic: true, render: { fillStyle: '#334155' } });
        const platform = Bodies.rectangle(750, 450, 300, 20, { isStatic: true, render: { fillStyle: '#475569' } });
        Composite.add(world, [ground, platform]);

        // --- 結構生成器 (更複雜的目標) ---
        function createStructure() {
            const stack = Composites.stack(650, 100, 4, 8, 2, 2, (x, y) => {
                return Bodies.rectangle(x, y, 35, 35, {
                    friction: 0.5,
                    restitution: 0.2,
                    render: {
                        fillStyle: x % 70 === 0 ? '#fbbf24' : '#f59e0b',
                        strokeStyle: '#78350f', lineWidth: 1
                    }
                });
            });
            Composite.add(world, stack);
            return stack;
        }
        let currentStructure = createStructure();

        // --- 彈弓邏輯 ---
        const anchor = { x: 200, y: 400 };
        let bird, elastic;
        let shotCount = 0;
        let totalScore = 0;

        function spawnBird() {
            bird = Bodies.circle(anchor.x, anchor.y, 18, {
                density: 0.015, // 超高密度提高破壞力
                restitution: 0.5,
                render: { fillStyle: '#ef4444' }
            });

            elastic = Constraint.create({
                pointA: anchor,
                bodyB: bird,
                stiffness: 0.1,
                damping: 0.05,
                render: { strokeStyle: '#f87171', lineWidth: 3 }
            });

            Composite.add(world, [bird, elastic]);
        }
        spawnBird();

        // --- 互動控制 ---
        const mouse = Mouse.create(render.canvas);
        const msc = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(world, msc);

        // --- 預測軌跡繪製 ---
        Events.on(render, 'afterRender', () => {
            if (msc.draggedBody === bird) {
                const ctx = render.context;
                ctx.beginPath();
                ctx.setLineDash([5, 5]);
                const pos = bird.position;
                const dist = Vector.sub(anchor, pos);
                const force = Vector.mult(dist, 0.12); // 模擬發射力度

                let tempPos = { x: pos.x, y: pos.y };
                let tempVel = { x: force.x * 15, y: force.y * 15 }; // 粗略模擬

                ctx.moveTo(pos.x, pos.y);
                for (let i = 0; i < 30; i++) {
                    tempVel.y += 0.5; // 重力模擬
                    tempPos.x += tempVel.x;
                    tempPos.y += tempVel.y;
                    ctx.lineTo(tempPos.x, tempPos.y);
                }
                ctx.strokeStyle = "rgba(255, 255, 255, 0.3)";
                ctx.stroke();
                ctx.setLineDash([]);
            }
        });

        // --- 發射偵測 ---
        Events.on(engine, 'afterUpdate', () => {
            if (bird && elastic.bodyB && msc.mouse.button === -1) {
                if (bird.position.x > anchor.x + 20) {
                    elastic.bodyB = null;
                    shotCount++;
                    document.getElementById('shots').innerText = shotCount;
                    setTimeout(spawnBird, 3000);
                }
            }

            // 計分邏輯：偵測積木移動速度或位移
            currentStructure.bodies.forEach(b => {
                if (b.speed > 2) {
                    totalScore += Math.floor(b.speed);
                    document.getElementById('score').innerText = totalScore;
                }
                // 掉出平台大加分
                if (b.position.y > 550) {
                    totalScore += 50;
                    Composite.remove(world, b);
                }
            });
        });

        // 碰撞特效 (畫面震動)
        Events.on(engine, 'collisionStart', (event) => {
            const pairs = event.pairs;
            if (pairs.some(p => p.bodyA === bird || p.bodyB === bird)) {
                document.body.classList.add('shake');
                setTimeout(() => document.body.classList.remove('shake'), 200);
            }
        });

    </script>
</body>

</html>
