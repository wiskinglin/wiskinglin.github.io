<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebOS 檔案總管 - Hank HTML</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 隱藏捲軸但保留捲動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .file-item:hover {
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-blue-50 to-indigo-100 h-screen w-screen overflow-hidden flex items-center justify-center p-4 md:p-8 font-sans">

    <div class="glass-panel w-full max-w-6xl h-full flex flex-col md:flex-row rounded-2xl shadow-2xl overflow-hidden">

        <div class="w-full md:w-64 bg-gray-50/50 border-b md:border-b-0 md:border-r border-gray-200 flex flex-col p-4">
            <div class="flex items-center gap-3 mb-8 px-2">
                <div class="w-8 h-8 rounded-lg bg-blue-500 flex items-center justify-center text-white shadow-lg">
                    <i class="fa-solid fa-cloud"></i>
                </div>
                <h1 class="text-xl font-bold text-gray-800 tracking-wide">HankDrive</h1>
            </div>

            <nav class="flex-1 space-y-1">
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg bg-blue-100 text-blue-700 font-medium transition">
                    <i class="fa-solid fa-house w-5"></i> 首頁
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-200/50 hover:text-gray-900 transition">
                    <i class="fa-regular fa-clock w-5"></i> 最近使用
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-200/50 hover:text-gray-900 transition">
                    <i class="fa-regular fa-star w-5"></i> 已加星號
                </a>
                <a href="#"
                    class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-200/50 hover:text-gray-900 transition">
                    <i class="fa-regular fa-trash-can w-5"></i> 垃圾桶
                </a>
            </nav>

            <div class="mt-auto pt-6 border-t border-gray-200">
                <div class="px-2">
                    <p class="text-xs font-semibold text-gray-500 mb-2 uppercase tracking-wider">儲存空間</p>
                    <div class="w-full bg-gray-200 rounded-full h-2 mb-1">
                        <div class="bg-blue-500 h-2 rounded-full" style="width: 45%"></div>
                    </div>
                    <p class="text-xs text-gray-500">已使用 45 GB / 100 GB</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col h-full bg-white/50">
            <header
                class="h-16 border-b border-gray-200 flex items-center justify-between px-6 bg-white/30 sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <button id="btn-back" class="text-gray-400 hover:text-gray-800 transition disabled:opacity-30"
                        disabled>
                        <i class="fa-solid fa-arrow-left text-lg"></i>
                    </button>
                    <div id="breadcrumbs" class="flex items-center gap-2 text-sm font-medium text-gray-600">
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="relative hidden sm:block">
                        <i
                            class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                        <input type="text" placeholder="搜尋檔案..."
                            class="pl-9 pr-4 py-1.5 bg-gray-100 border-none rounded-full text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition w-48">
                    </div>
                    <button
                        class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 text-white flex items-center justify-center shadow">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
            </header>

            <div
                class="grid grid-cols-12 gap-4 px-6 py-3 border-b border-gray-100 text-xs font-semibold text-gray-400 uppercase tracking-wider">
                <div class="col-span-6 sm:col-span-5 text-left">名稱</div>
                <div class="hidden sm:block col-span-3 text-left">修改日期</div>
                <div class="hidden sm:block col-span-2 text-left">大小</div>
                <div class="col-span-6 sm:col-span-2 text-right">操作</div>
            </div>

            <div id="file-grid" class="flex-1 overflow-y-auto no-scrollbar p-2">
            </div>
        </div>
    </div>

    <script>
        // 1. 虛擬檔案系統 (VFS) 數據結構
        const fileSystem = {
            id: 'root',
            name: '我的雲端硬碟',
            type: 'folder',
            children: [
                {
                    id: 'f1', name: '專案文件', type: 'folder', date: '2026-04-10', size: '--',
                    children: [
                        { id: 'f1-1', name: 'Q1_Financial_Report.xlsx', type: 'excel', date: '2026-04-12', size: '2.4 MB' },
                        { id: 'f1-2', name: 'UI_Design_Draft.fig', type: 'design', date: '2026-04-15', size: '15.6 MB' }
                    ]
                },
                {
                    id: 'f2', name: '行銷素材', type: 'folder', date: '2026-04-05', size: '--',
                    children: [
                        { id: 'f2-1', name: 'Banner_v1.png', type: 'image', date: '2026-04-06', size: '4.1 MB' },
                        { id: 'f2-2', name: 'Logo_Final.svg', type: 'image', date: '2026-04-08', size: '800 KB' }
                    ]
                },
                { id: 'f3', name: '2026_員工手冊.pdf', type: 'pdf', date: '2026-03-20', size: '5.2 MB' },
                { id: 'f4', name: '會議記錄_0418.docx', type: 'word', date: '2026-04-18', size: '1.1 MB' },
                { id: 'f5', name: '個人備忘錄.txt', type: 'text', date: '2026-04-19', size: '12 KB' }
            ]
        };

        // 2. 狀態管理
        let currentPath = [fileSystem]; // 追蹤目錄路徑

        // 取得圖標設定
        function getIconConfig(type) {
            const configs = {
                folder: { icon: 'fa-solid fa-folder', color: 'text-blue-400' },
                pdf: { icon: 'fa-solid fa-file-pdf', color: 'text-red-500' },
                excel: { icon: 'fa-solid fa-file-excel', color: 'text-green-600' },
                word: { icon: 'fa-solid fa-file-word', color: 'text-blue-600' },
                image: { icon: 'fa-solid fa-image', color: 'text-purple-500' },
                design: { icon: 'fa-brands fa-figma', color: 'text-pink-500' },
                text: { icon: 'fa-solid fa-file-lines', color: 'text-gray-500' },
                default: { icon: 'fa-solid fa-file', color: 'text-gray-400' }
            };
            return configs[type] || configs.default;
        }

        // 3. 渲染視圖
        function renderView() {
            const currentFolder = currentPath[currentPath.length - 1];
            renderBreadcrumbs();
            renderFiles(currentFolder.children);

            // 更新返回按鈕狀態
            const backBtn = document.getElementById('btn-back');
            if (currentPath.length > 1) {
                backBtn.removeAttribute('disabled');
                backBtn.onclick = navigateBack;
            } else {
                backBtn.setAttribute('disabled', 'true');
                backBtn.onclick = null;
            }
        }

        // 渲染麵包屑
        function renderBreadcrumbs() {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = '';

            currentPath.forEach((folder, index) => {
                const isLast = index === currentPath.length - 1;

                const crumb = document.createElement('span');
                crumb.className = `cursor-pointer hover:text-blue-600 transition ${isLast ? 'text-gray-900 font-bold' : ''}`;
                crumb.textContent = folder.name;
                crumb.onclick = () => navigateToPathIndex(index);

                container.appendChild(crumb);

                if (!isLast) {
                    const separator = document.createElement('i');
                    separator.className = 'fa-solid fa-chevron-right text-[10px] text-gray-400 mx-1';
                    container.appendChild(separator);
                }
            });
        }

        // 渲染檔案清單
        function renderFiles(items) {
            const container = document.getElementById('file-grid');
            container.innerHTML = '';

            if (!items || items.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-48 text-gray-400">
                        <i class="fa-regular fa-folder-open text-4xl mb-3"></i>
                        <p>資料夾是空的</p>
                    </div>`;
                return;
            }

            // 排序：資料夾排在前面
            const sortedItems = [...items].sort((a, b) => {
                if (a.type === 'folder' && b.type !== 'folder') return -1;
                if (a.type !== 'folder' && b.type === 'folder') return 1;
                return a.name.localeCompare(b.name);
            });

            sortedItems.forEach(item => {
                const iconConfig = getIconConfig(item.type);
                const isFolder = item.type === 'folder';

                const row = document.createElement('div');
                row.className = 'file-item grid grid-cols-12 gap-4 items-center px-4 py-3 mx-2 my-1 rounded-xl cursor-pointer transition select-none';

                // 點擊事件：若是資料夾則進入
                row.onclick = () => {
                    if (isFolder) {
                        currentPath.push(item);
                        renderView();
                    } else {
                        // 模擬檔案預覽
                        alert(`正在預覽檔案: ${item.name}`);
                    }
                };

                row.innerHTML = `
                    <div class="col-span-6 sm:col-span-5 flex items-center gap-3 overflow-hidden">
                        <i class="${iconConfig.icon} ${iconConfig.color} text-xl w-6 text-center"></i>
                        <span class="text-sm font-medium text-gray-700 truncate">${item.name}</span>
                    </div>
                    <div class="hidden sm:block col-span-3 text-sm text-gray-500">${item.date || '---'}</div>
                    <div class="hidden sm:block col-span-2 text-sm text-gray-500">${item.size || '--'}</div>
                    <div class="col-span-6 sm:col-span-2 text-right flex justify-end gap-2">
                        <button class="w-8 h-8 rounded-full hover:bg-gray-200 text-gray-400 hover:text-gray-700 transition" title="下載/開啟" onclick="event.stopPropagation(); alert('操作: ${item.name}')">
                            <i class="fa-solid fa-ellipsis-vertical"></i>
                        </button>
                    </div>
                `;
                container.appendChild(row);
            });
        }

        // 4. 導航邏輯
        function navigateBack() {
            if (currentPath.length > 1) {
                currentPath.pop();
                renderView();
            }
        }

        function navigateToPathIndex(index) {
            if (index < currentPath.length - 1) {
                currentPath = currentPath.slice(0, index + 1);
                renderView();
            }
        }

        // 初始化啟動
        document.addEventListener('DOMContentLoaded', renderView);
    </script>
<!-- Help Info Button Module -->
<div id="help-module">
    <button id="help-info-btn" style="position:fixed; top:1rem; right:1rem; z-index:9999;" class="bg-indigo-600/80 hover:bg-indigo-500 backdrop-blur-md border border-white/20 text-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,0,1-16-16V128a8,8,0,0,1,0-16,16,16,0,0,1,16,16v40A8,8,0,0,1,144,176ZM112,84a12,12,0,1,1,12,12A12,12,0,0,1,112,84Z"></path></svg>
    </button>
    <div id="help-info-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:10000; align-items:center; justify-content:center;">
        <div style="background:#1e293b; border:1px solid #334155; border-radius:1rem; max-width:32rem; width:100%; margin:1rem; padding:1.5rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); position:relative; font-family:sans-serif;">
            <button id="close-help-btn" style="position:absolute; top:1rem; right:1rem; color:#94a3b8; background:none; border:none; cursor:pointer; font-size:1.5rem;">&times;</button>
            <h2 style="font-size:1.25rem; font-weight:bold; color:white; margin-bottom:1rem; display:flex; align-items:center; gap:0.5rem;">
                ℹ️ 應用程式功能說明
            </h2>
            <div style="color:#cbd5e1; font-size:0.875rem; line-height:1.5; display:flex; flex-direction:column; gap:1rem;">
                <div>
                    <h3 style="color:#4ade80; font-weight:600; margin-bottom:0.25rem;">✅ 已實作功能</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#e2e8f0;">
                        <li>層級式虛擬檔案系統與麵包屑導航</li>
                        <li>各類檔案的圖示渲染與清單排版</li>
                        <li>基礎檔案屬性展示 (大小、日期)</li>
                        <li>進入資料夾與返回上一層功能</li>
                    </ul>
                </div>
                <div>
                    <h3 style="color:#fbbf24; font-weight:600; margin-bottom:0.25rem;">🚧 尚未實作 (純前端/Mock)</h3>
                    <ul style="list-style-type:disc; padding-left:1.25rem; color:#94a3b8;">
                        <li>與伺服器同步真實檔案 (上傳/下載)</li>
                        <li>檔案內容預覽功能</li>
                        <li>檔案搜尋與排序邏輯</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
    document.getElementById('help-info-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'flex';
    });
    document.getElementById('close-help-btn').addEventListener('click', () => {
        document.getElementById('help-info-modal').style.display = 'none';
    });
    document.getElementById('help-info-modal').addEventListener('click', (e) => {
        if (e.target === document.getElementById('help-info-modal')) {
            document.getElementById('help-info-modal').style.display = 'none';
        }
    });
</script>
</body>
</html>
