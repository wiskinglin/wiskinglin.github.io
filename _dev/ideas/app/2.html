<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Concept Interactive Assembly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap');

        :root {
            --bg-color: #050608;
            --accent-cyan: #00f0ff;
            --panel-bg: #0f1115;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #11141a 0%, var(--bg-color) 80%);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .hud-header {
            position: absolute;
            top: 40px;
            left: 50px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .hud-title { font-size: 14px; font-weight: 700; color: var(--accent-cyan); }
        .hud-subtitle { font-size: 10px; color: #555; margin-top: 5px; }

        .stage {
            position: relative;
            width: 1000px;
            height: 600px;
        }

        svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        .part {
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform-origin: center;
        }

        /* Controls */
        .control-panel {
            position: absolute;
            bottom: 50px;
            width: 600px;
            background: rgba(15, 17, 21, 0.8);
            border: 1px solid #1f232b;
            padding: 20px 30px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .slider-label {
            font-size: 12px;
            color: #888;
            min-width: 80px;
        }

        input[type=range] {
            flex-grow: 1;
            appearance: none;
            height: 2px;
            background: #333;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 24px;
            height: 12px;
            background: var(--accent-cyan);
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }
    </style>
</head>
<body>

    <div class="hud-header">
        <div class="hud-title">Aero-GT Concept View</div>
        <div class="hud-subtitle">Interactive Component Matrix // v3.2</div>
    </div>

    <div class="stage">
        <svg viewBox="0 0 1000 600">
            <defs>
                <linearGradient id="paintGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#3a3d45" />
                    <stop offset="50%" stop-color="#1f2126" />
                    <stop offset="100%" stop-color="#0a0a0c" />
                </linearGradient>

                <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="rgba(0, 240, 255, 0.4)" />
                    <stop offset="50%" stop-color="rgba(0, 100, 150, 0.1)" />
                    <stop offset="100%" stop-color="rgba(0, 20, 30, 0.6)" />
                </linearGradient>

                <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="8" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>

                <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="130%">
                    <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000" flood-opacity="0.8"/>
                </filter>

                <g id="wheel-master">
                    <circle cx="0" cy="0" r="55" fill="#080808" stroke="#111" stroke-width="4" filter="url(#dropShadow)" />
                    <path d="M 25 -25 Q 40 0 25 25 L 35 15 Q 45 0 35 -15 Z" fill="#00f0ff" opacity="0.8" />
                    <circle cx="0" cy="0" r="35" fill="#151515" stroke="#2a2a2a" stroke-width="2" />
                    <line x1="0" y1="-35" x2="0" y2="35" stroke="#333" stroke-width="6" />
                    <line x1="-35" y1="0" x2="35" y2="0" stroke="#333" stroke-width="6" />
                    <line x1="-25" y1="-25" x2="25" y2="25" stroke="#333" stroke-width="6" />
                    <line x1="-25" y1="25" x2="25" y2="-25" stroke="#333" stroke-width="6" />
                    <circle cx="0" cy="0" r="10" fill="#00f0ff" filter="url(#neonGlow)" opacity="0.5"/>
                </g>
            </defs>

            <ellipse id="groundLight" cx="500" cy="520" rx="400" ry="20" fill="url(#glassGrad)" opacity="0.3" filter="url(#neonGlow)"/>

            <g id="chassis" class="part" transform-origin="500 480">
                <path d="M 220 480 L 780 480 L 790 460 L 210 460 Z" fill="#111" filter="url(#dropShadow)"/>
                <rect x="350" y="465" width="300" height="10" fill="#00f0ff" opacity="0.2" filter="url(#neonGlow)"/>
            </g>

            <g id="wheel-front" class="part" transform="translate(300, 480)">
                <use href="#wheel-master" />
            </g>
            <g id="wheel-rear" class="part" transform="translate(740, 480)">
                <use href="#wheel-master" />
            </g>

            <g id="body" class="part" transform-origin="500 400">
                <path d="M 120 450 
                         C 120 400, 200 360, 350 360 
                         L 450 360
                         C 550 250, 750 250, 880 330 
                         C 920 360, 930 430, 920 450 
                         Z" 
                      fill="url(#paintGrad)" filter="url(#dropShadow)"/>
                
                <path d="M 130 420 Q 200 400 300 400" stroke="#00f0ff" stroke-width="3" fill="none" filter="url(#neonGlow)" />
                
                <path d="M 850 380 Q 890 390 910 410" stroke="#ff003c" stroke-width="4" fill="none" filter="url(#neonGlow)" />
            </g>

            <g id="glass" class="part" transform-origin="600 300">
                <path d="M 380 355 L 530 260 C 650 260, 750 280, 820 335 L 750 355 Z" 
                      fill="url(#glassGrad)" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.5" filter="url(#dropShadow)"/>
                <path d="M 400 345 L 530 265 L 580 265" stroke="#fff" stroke-width="1" fill="none" opacity="0.3"/>
            </g>

            <g id="door" class="part" transform-origin="550 380">
                <path d="M 450 440 L 730 440 L 760 345 L 500 345 Z" fill="url(#paintGrad)" stroke="#111" stroke-width="2" filter="url(#dropShadow)"/>
                <rect x="680" y="360" width="30" height="6" rx="3" fill="#111" />
                <rect x="680" y="364" width="30" height="2" fill="#00f0ff" opacity="0.6"/>
            </g>
        </svg>
    </div>

    <div class="control-panel">
        <div class="slider-label">ASSEMBLED</div>
        <input type="range" id="explodeSlider" min="0" max="100" value="0">
        <div class="slider-label" style="text-align: right; color: var(--accent-cyan);">EXPLODED</div>
    </div>

    <script>
        const slider = document.getElementById('explodeSlider');
        const groundLight = document.getElementById('groundLight');
        
        // Advanced Configuration Matrix
        // x, y = pixel translation based on slider
        // s = scale modifier (creates depth)
        // o = opacity drop (makes outer parts ghosted to see inside)
        const explodeConfig = {
            'body':        { x: -20,  y: -100, s: 1.05, o: 0.9 },
            'glass':       { x: 30,   y: -220, s: 1.15, o: 0.7 },
            'door':        { x: 180,  y: -40,  s: 1.25, o: 0.8 },
            'wheel-front': { x: -120, y: 80,   s: 0.85, o: 1.0 },
            'wheel-rear':  { x: 120,  y: 80,   s: 0.85, o: 1.0 },
            'chassis':     { x: 0,    y: 30,   s: 0.95, o: 1.0 }
        };

        // Cache DOM elements to prevent querying on every frame
        const elements = {};
        for (const id in explodeConfig) {
            elements[id] = document.getElementById(id);
        }

        // Base transform for wheels to keep them in place before translation
        const baseWheelFront = "translate(300px, 480px)";
        const baseWheelRear = "translate(740px, 480px)";

        slider.addEventListener('input', (e) => {
            const progress = e.target.value / 100; // Normalized 0.0 to 1.0
            
            for (const id in explodeConfig) {
                const config = explodeConfig[id];
                const el = elements[id];
                
                // Calculate current interpolated values
                const currentX = config.x * progress;
                const currentY = config.y * progress;
                const currentScale = 1 + ((config.s - 1) * progress);
                const currentOpacity = 1 - ((1 - config.o) * progress);

                // Build transform string
                let transformStr = `translate(${currentX}px, ${currentY}px) scale(${currentScale})`;
                
                // Hack to preserve absolute wheel positions while scaling/moving
                if (id === 'wheel-front') transformStr = `${baseWheelFront} ` + transformStr;
                if (id === 'wheel-rear') transformStr = `${baseWheelRear} ` + transformStr;

                // Apply styles
                el.style.transform = transformStr;
                el.style.opacity = currentOpacity;
            }

            // Dim the ground light as parts lift off
            groundLight.style.opacity = 0.3 - (progress * 0.2);
            groundLight.style.transform = `scale(${1 + (progress * 0.5)})`;
            groundLight.style.transformOrigin = 'center';
        });
    </script>
</body>
</html>
