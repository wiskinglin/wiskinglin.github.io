<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Glide: Shader Optimized</title>
    <style>
        :root {
            --primary: #00f3ff;
            --danger: #ff007f;
            --power: #00ff66;
            --bg: #030308;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            user-select: none;
            transition: filter 0.1s;
        }

        body.damage {
            filter: contrast(160%) hue-rotate(300deg) saturate(400%);
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(3, 3, 12, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 243, 255, 0.3);
            border-radius: 20px;
            padding: 45px;
            text-align: center;
            color: white;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 243, 255, 0.15);
            pointer-events: auto;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 3.5rem;
            color: var(--primary);
            text-transform: uppercase;
            text-shadow: 0 0 25px var(--primary);
            font-weight: 900;
        }

        p {
            color: #b3b3cc;
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        button {
            background: linear-gradient(45deg, var(--danger), #660033);
            border: 2px solid transparent;
            border-radius: 30px;
            padding: 15px 50px;
            color: white;
            font-size: 1.3rem;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
            box-shadow: 0 0 20px var(--danger);
        }

        button:hover {
            transform: scale(1.05);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary);
        }

        button:active {
            transform: scale(0.95);
        }

        #hud {
            position: absolute;
            top: 25px;
            left: 30px;
            right: 30px;
            z-index: 5;
            display: flex;
            justify-content: space-between;
            color: white;
            font-size: 1.5rem;
            font-weight: 900;
            font-family: monospace;
            display: none;
            text-shadow: 0 0 10px var(--primary);
        }

        .hud-right {
            text-align: right;
        }

        #shields {
            color: var(--power);
            letter-spacing: 5px;
            text-shadow: 0 0 15px var(--power);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="hud">
        <div>SCORE: <span id="score" style="color:var(--primary); font-size: 2.2rem;">0</span></div>
        <div class="hud-right">
            SHIELDS: <span id="shields">███</span><br>
            <span style="font-size: 1.1rem; color: #ccc;">WEAPON LV: <span id="weapon-level"
                    style="color: var(--power)">1</span></span>
        </div>
    </div>

    <div id="ui-layer">
        <div class="glass-panel" id="start-screen">
            <h1>Neon Glide</h1>
            <p>GPU 加速模式已啟動。<br>滑動控制，自動開火。收集綠色晶體升級。</p>
            <button id="start-btn">System Engage</button>
        </div>
        <div class="glass-panel hidden" id="game-over-screen">
            <h1 style="color: var(--danger); text-shadow: 0 0 25px var(--danger);">Signal Lost</h1>
            <p>最終同步率: <br><span id="final-score" style="font-size: 3.5rem; color: white;">0</span></p>
            <button id="restart-btn">Reboot</button>
        </div>
    </div>

    <div id="game-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 核心架構 ---
        let scene, camera, renderer, clock;
        let ship, shipBox = new THREE.Box3();
        let gameActive = false, score = 0, health = 3, weaponLevel = 1;

        let isInvulnerable = false, invulnTimer = 0, gameSpeed = 50;
        let pointerX = 0, pointerY = 0, targetX = 0, targetY = 0;
        let timeSinceLastFire = 0, timeSinceLastSpawn = 0;
        let lastScore = -1, lastHealth = -1, lastWeapon = -1;

        const pools = { enemies: [], lasers: [], powerups: [], particles: [] };

        // 統一材質
        const matEnemy = new THREE.MeshPhongMaterial({ color: 0xff007f, emissive: 0x880022, shininess: 80 });
        const matLaser = new THREE.MeshBasicMaterial({ color: 0x00f3ff });
        const matPowerup = new THREE.MeshPhongMaterial({ color: 0x00ff66, emissive: 0x00ff66, wireframe: true, wireframeLinewidth: 2 });
        const matParticle = new THREE.MeshBasicMaterial({ color: 0xffffff });

        const uiScore = document.getElementById('score');
        const uiShields = document.getElementById('shields');
        const uiWeapon = document.getElementById('weapon-level');

        // --- GPU Shader 材質 (取代耗效能的 CPU GridHelper) ---
        const shaderUniforms = {
            time: { value: 0 },
            speed: { value: 50.0 }
        };

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float time;
            uniform float speed;
            varying vec2 vUv;
            void main() {
                // 放大並根據時間與速度滾動 UV 座標
                vec2 uv = vUv * vec2(80.0, 160.0); 
                uv.y -= time * speed * 0.1;
                
                // 數學計算繪製網格邊緣
                vec2 grid = abs(fract(uv - 0.5) - 0.5) / fwidth(uv);
                float line = min(grid.x, grid.y);
                float color = 1.0 - min(line, 1.0);
                
                // 距離漸隱 (Fog effect)
                float fade = 1.0 - vUv.y;
                
                // 霓虹粉藍色
                vec3 neon = mix(vec3(1.0, 0.0, 0.5), vec3(0.0, 0.95, 1.0), vUv.x);
                gl_FragColor = vec4(neon * color * fade * 1.5, color * fade * 0.8);
            }
        `;

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030308, 0.015);
            clock = new THREE.Clock();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, 5, 15);
            camera.lookAt(0, 0, -20);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('game-container').appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            scene.add(new THREE.DirectionalLight(0xff007f, 1.5).position.set(10, 20, 10));
            scene.add(new THREE.PointLight(0x00f3ff, 2.5, 50).position.set(-10, 2, -5));

            // GPU 渲染的無限地板
            const floorGeo = new THREE.PlaneGeometry(400, 400);
            const floorMat = new THREE.ShaderMaterial({
                uniforms: shaderUniforms,
                vertexShader: vertexShader,
                fragmentShader: fragmentShader,
                transparent: true,
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -2;
            scene.add(floor);

            const shipGeo = new THREE.TetrahedronGeometry(1.2);
            shipGeo.computeBoundingBox();
            ship = new THREE.Mesh(shipGeo, new THREE.MeshPhongMaterial({ color: 0x00f3ff, emissive: 0x00f3ff, wireframe: true, wireframeLinewidth: 2 }));
            ship.scale.set(1, 0.4, 2);
            ship.rotation.x = Math.PI / 4;
            scene.add(ship);

            // 預分配物件池
            buildPool(new THREE.BoxGeometry(1, 1, 1), matEnemy, 40, pools.enemies);
            buildPool(new THREE.CylinderGeometry(0.15, 0.15, 3, 8).rotateX(Math.PI / 2), matLaser, 40, pools.lasers);
            buildPool(new THREE.OctahedronGeometry(1.2), matPowerup, 5, pools.powerups);
            buildPool(new THREE.BoxGeometry(0.4, 0.4, 0.4), matParticle, 100, pools.particles);

            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('pointermove', onPointerMove, { passive: false });
            document.addEventListener('pointerleave', () => { pointerX = 0; pointerY = 0; });

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

            animate();
        }

        function buildPool(geo, mat, count, arr) {
            geo.computeBoundingBox();
            for (let i = 0; i < count; i++) {
                let m = new THREE.Mesh(geo, mat);
                m.visible = false;
                m.userData = { active: false, box: new THREE.Box3(), velX: 0, velY: 0, velZ: 0, life: 0 };
                scene.add(m); arr.push(m);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerMove(e) {
            if (e.pointerType === 'touch') e.preventDefault();
            pointerX = (e.clientX / window.innerWidth) * 2 - 1;
            pointerY = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over-screen').classList.add('hidden');
            document.getElementById('hud').style.display = 'flex';

            score = 0; health = 3; weaponLevel = 1; gameSpeed = 50;
            ship.position.set(0, 0, 0);
            ship.material.color.setHex(0x00f3ff); ship.material.emissive.setHex(0x00f3ff);
            ship.visible = true;

            isInvulnerable = false; invulnTimer = 0;
            document.body.classList.remove('damage');

            lastScore = lastHealth = lastWeapon = -1;
            updateHUD();

            Object.values(pools).forEach(pool => pool.forEach(obj => { obj.visible = false; obj.userData.active = false; }));
            clock.getDelta();
            gameActive = true;
        }

        function takeDamage() {
            if (isInvulnerable || !gameActive) return;
            health--;

            if (health <= 0) {
                gameActive = false;
                updateHUD();
                document.getElementById('hud').style.display = 'none';
                document.getElementById('final-score').innerText = Math.floor(score);
                document.getElementById('game-over-screen').classList.remove('hidden');
                ship.visible = false;
                spawnParticles(ship.position, 60, 0xff0000);
            } else {
                isInvulnerable = true;
                invulnTimer = 1.5;
                weaponLevel = Math.max(1, weaponLevel - 1);
                document.body.classList.add('damage');
            }
        }

        function updateHUD() {
            let currentScore = Math.floor(score);
            if (currentScore !== lastScore) { uiScore.innerText = currentScore; lastScore = currentScore; }
            if (health !== lastHealth) {
                uiShields.innerText = '███'.substring(0, Math.max(0, health));
                uiShields.style.color = health === 1 ? '#ff0000' : 'var(--power)';
                lastHealth = health;
            }
            if (weaponLevel !== lastWeapon) { uiWeapon.innerText = weaponLevel; lastWeapon = weaponLevel; }
        }

        function spawnEntity(pool, setupLogic) {
            let entity = pool.find(e => !e.userData.active);
            if (entity) { setupLogic(entity); entity.visible = true; entity.userData.active = true; }
        }

        function fireLaser(offsetX, dirX) {
            spawnEntity(pools.lasers, l => {
                l.position.copy(ship.position);
                l.position.x += offsetX; l.position.z -= 1.5;
                l.userData.velX = dirX; l.userData.velZ = -150; // 更快的彈速
            });
        }

        function spawnParticles(pos, count, colorHex) {
            let spawned = 0;
            for (let i = 0; i < pools.particles.length && spawned < count; i++) {
                let p = pools.particles[i];
                if (!p.userData.active) {
                    p.material.color.setHex(colorHex); p.position.copy(pos);
                    p.userData.velX = (Math.random() - 0.5) * 30; p.userData.velY = (Math.random() - 0.5) * 30; p.userData.velZ = (Math.random() - 0.5) * 30;
                    p.userData.life = 1.0; p.visible = true; p.userData.active = true;
                    spawned++;
                }
            }
        }

        function updateBoundingBox(mesh, padding = 0) {
            mesh.updateMatrixWorld(true);
            mesh.userData.box.copy(mesh.geometry.boundingBox).applyMatrix4(mesh.matrixWorld);
            if (padding !== 0) mesh.userData.box.expandByScalar(padding);
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.05);

            // 更新 Shader Uniforms (GPU 地板滾動)
            shaderUniforms.time.value += dt;
            shaderUniforms.speed.value = gameSpeed;

            // 插值移動
            targetX = pointerX * 22; targetY = pointerY * 8 + 1;
            ship.position.x += (targetX - ship.position.x) * (12 * dt);
            ship.position.y += (targetY - ship.position.y) * (12 * dt);
            ship.rotation.z = (ship.position.x - targetX) * 0.12;
            ship.rotation.x = (ship.position.y - targetY) * 0.08 + (Math.PI / 4);

            if (gameActive) {
                score += 15 * dt; updateHUD();
                if (gameSpeed < 150) gameSpeed += 3 * dt; // 加速曲線提升

                if (isInvulnerable) {
                    invulnTimer -= dt;
                    ship.visible = Math.floor(invulnTimer * 15) % 2 === 0;
                    if (invulnTimer <= 0) {
                        isInvulnerable = false; ship.visible = true; document.body.classList.remove('damage');
                    }
                }

                timeSinceLastFire += dt;
                if (timeSinceLastFire > 0.12) {
                    if (weaponLevel === 1) { fireLaser(0, 0); }
                    else if (weaponLevel === 2) { fireLaser(-1.2, 0); fireLaser(1.2, 0); }
                    else { fireLaser(0, 0); fireLaser(-1.5, -20); fireLaser(1.5, 20); }
                    timeSinceLastFire = 0;
                }

                timeSinceLastSpawn += dt;
                if (timeSinceLastSpawn > (1.2 / (gameSpeed / 50))) {
                    timeSinceLastSpawn = 0;
                    spawnEntity(pools.enemies, e => {
                        let w = Math.random() * 5 + 2, h = Math.random() * 16 + 5, d = Math.random() * 5 + 2;
                        e.scale.set(w, h, d);
                        e.position.set((Math.random() - 0.5) * 55, h / 2 - 2, -220);
                    });
                    if (Math.random() < (weaponLevel < 3 ? 0.25 : 0.05)) {
                        spawnEntity(pools.powerups, e => e.position.set((Math.random() - 0.5) * 45, 2, -220));
                    }
                }

                updateBoundingBox(ship, -0.4);

                pools.lasers.forEach(l => {
                    if (l.userData.active) {
                        l.position.x += l.userData.velX * dt; l.position.z += l.userData.velZ * dt;
                        updateBoundingBox(l);
                        if (l.position.z < -250) { l.visible = false; l.userData.active = false; }
                    }
                });

                pools.enemies.forEach(e => {
                    if (e.userData.active) {
                        e.position.z += gameSpeed * dt; updateBoundingBox(e);
                        if (ship.visible && shipBox.intersectsBox(e.userData.box)) {
                            takeDamage(); e.visible = false; e.userData.active = false;
                        }
                        pools.lasers.forEach(l => {
                            if (l.userData.active && e.userData.box.intersectsBox(l.userData.box)) {
                                spawnParticles(e.position, 12, 0xff007f); score += 80;
                                e.visible = false; e.userData.active = false; l.visible = false; l.userData.active = false;
                            }
                        });
                        if (e.position.z > 20) { e.visible = false; e.userData.active = false; }
                    }
                });

                pools.powerups.forEach(p => {
                    if (p.userData.active) {
                        p.position.z += gameSpeed * dt; p.rotation.y += 3 * dt; p.rotation.x += 3 * dt;
                        updateBoundingBox(p, 0.6);
                        if (ship.visible && shipBox.intersectsBox(p.userData.box)) {
                            if (weaponLevel < 3) weaponLevel++; else score += 1500;
                            spawnParticles(p.position, 25, 0x00ff66); p.visible = false; p.userData.active = false;
                        } else if (p.position.z > 20) { p.visible = false; p.userData.active = false; }
                    }
                });

                pools.particles.forEach(p => {
                    if (p.userData.active) {
                        p.position.x += p.userData.velX * dt; p.position.y += p.userData.velY * dt; p.position.z += p.userData.velZ * dt;
                        p.userData.life -= 2.5 * dt; p.scale.setScalar(Math.max(0, p.userData.life));
                        if (p.userData.life <= 0) { p.visible = false; p.userData.active = false; }
                    }
                });
            } else {
                ship.position.x = Math.sin(Date.now() * 0.002) * 4;
                ship.position.y = Math.cos(Date.now() * 0.0015) * 2 + 2;
                ship.rotation.y += 0.8 * dt;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>

</html>
