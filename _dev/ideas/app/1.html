<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACPC 視覺化營地手帳</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #E2F3E5;
            /* 森友會淺綠色 */
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
        }

        .game-card {
            background: #FFFFFF;
            border: 4px solid #F0EDE1;
            border-bottom-width: 8px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .game-card:active {
            transform: translateY(4px);
            border-bottom-width: 4px;
        }

        .task-done {
            background-color: #D1FAE5 !important;
            border-color: #A7F3D0 !important;
            opacity: 0.8;
        }

        .leaf-ticket-shimmer {
            background: linear-gradient(90deg, #78C8A0, #A7F3D0, #78C8A0);
            background-size: 200% auto;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        .rarity-5 {
            background: linear-gradient(135deg, #FFF9C4 0%, #FFF176 100%);
            box-shadow: 0 0 15px rgba(255, 235, 59, 0.5);
            border-color: #FDD835 !important;
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        #inventory-grid::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

    <div
        class="w-full max-w-md bg-[#FFFBF0] rounded-[3rem] shadow-2xl border-8 border-[#78C8A0] overflow-hidden flex flex-col h-[850px] max-h-[90vh]">

        <div class="p-6 pb-2">
            <div class="flex justify-between items-center mb-4">
                <div class="bg-white/80 px-4 py-2 rounded-2xl border-2 border-[#78C8A0] shadow-sm flex items-center">
                    <i class="fas fa-ticket-alt text-[#78C8A0] mr-2 transform -rotate-45"></i>
                    <span id="tickets" class="font-black text-xl text-gray-700">0</span>
                </div>
                <div class="bg-white/80 px-4 py-2 rounded-2xl border-2 border-orange-300 shadow-sm flex items-center cursor-pointer hover:bg-orange-50"
                    onclick="resetGame()">
                    <i class="fas fa-sync-alt text-orange-400"></i>
                </div>
            </div>

            <div class="leaf-ticket-shimmer rounded-2xl p-4 text-white text-center shadow-lg relative overflow-hidden">
                <div id="progress-val" class="font-black text-2xl drop-shadow-sm">CAMPING 0%</div>
                <div class="text-xs font-bold opacity-80 uppercase tracking-widest">今日進度</div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto p-6 space-y-8 custom-scrollbar">

            <section>
                <h2 class="text-[#58B08B] font-black text-lg mb-4 flex items-center">
                    <i class="fas fa-map-marked-alt mr-2"></i> 營地任務區
                </h2>
                <div class="grid grid-cols-2 gap-4" id="task-grid">
                </div>
            </section>

            <section class="bg-orange-100 rounded-[2rem] p-5 border-4 border-dashed border-orange-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-orange-700 font-black text-lg italic">COOKIES SHOP</h2>
                    <span class="bg-orange-400 text-white px-3 py-1 rounded-full text-xs font-bold">50 券 / 抽</span>
                </div>

                <div class="flex flex-col items-center py-4">
                    <div id="cookie-box"
                        class="text-7xl mb-6 cursor-pointer transition-transform hover:scale-110 active:scale-95"
                        onclick="tryGacha()">
                        <i class="fas fa-cookie-bite text-orange-400 drop-shadow-lg floating"></i>
                    </div>
                    <button onclick="tryGacha()"
                        class="bg-[#78C8A0] text-white font-black py-3 px-10 rounded-full shadow-lg hover:brightness-105 active:translate-y-1 transition-all">
                        購入幸運餅乾
                    </button>
                </div>
            </section>

            <section>
                <h2 class="text-blue-500 font-black text-lg mb-4 flex items-center">
                    <i class="fas fa-home mr-2"></i> 家具收藏展示
                </h2>
                <div class="grid grid-cols-3 gap-3" id="inventory-grid">
                </div>
            </section>
        </div>

        <div id="overlay"
            class="fixed inset-0 bg-black/80 z-50 hidden flex-col items-center justify-center p-10 text-center">
            <div id="reveal-light" class="w-64 h-64 rounded-full bg-white/20 blur-3xl absolute animate-pulse"></div>
            <div id="reveal-card"
                class="bg-white p-8 rounded-[2rem] border-8 border-yellow-400 relative z-10 scale-0 transition-transform duration-500">
                <div id="reveal-stars" class="text-yellow-400 text-2xl mb-2"></div>
                <i id="reveal-icon" class="fas fa-box text-7xl text-gray-700 mb-6"></i>
                <h3 id="reveal-name" class="font-black text-2xl text-gray-800 mb-6">???</h3>
                <button onclick="closeOverlay()"
                    class="bg-[#78C8A0] text-white font-black py-3 px-8 rounded-full shadow-lg">好耶！</button>
            </div>
        </div>

    </div>

    <script>
        const tasks = [
            { id: 1, title: '採集水果', icon: 'fa-apple-alt', color: 'bg-red-100 text-red-500' },
            { id: 2, title: '幫助動物', icon: 'fa-paw', color: 'bg-blue-100 text-blue-500' },
            { id: 3, title: '挖礦石', icon: 'fa-gem', color: 'bg-purple-100 text-purple-500' },
            { id: 4, title: '市場買賣', icon: 'fa-store', color: 'bg-orange-100 text-orange-500' }
        ];

        const furniture = [
            { name: '特製噴泉', icon: 'fa-fountain', stars: 5 },
            { name: '旋轉木馬', icon: 'fa-horse', stars: 5 },
            { name: '古典鋼琴', icon: 'fa-keyboard', stars: 4 },
            { name: '舒適沙發', icon: 'fa-couch', stars: 3 },
            { name: '多肉植物', icon: 'fa-seedling', stars: 3 },
            { name: '露營火堆', icon: 'fa-fire', stars: 3 }
        ];

        let state = {
            tickets: parseInt(localStorage.getItem('acpc_tickets')) || 0,
            completed: JSON.parse(localStorage.getItem('acpc_done')) || [],
            inventory: JSON.parse(localStorage.getItem('acpc_items')) || []
        };

        function init() {
            renderTasks();
            renderInventory();
            updateUI();
        }

        function updateUI() {
            document.getElementById('tickets').innerText = state.tickets;
            const progress = (state.completed.length / tasks.length) * 100;
            document.getElementById('progress-val').innerText = `CAMPING ${Math.round(progress)}%`;
            localStorage.setItem('acpc_tickets', state.tickets);
            localStorage.setItem('acpc_done', JSON.stringify(state.completed));
            localStorage.setItem('acpc_items', JSON.stringify(state.inventory));
        }

        function renderTasks() {
            const grid = document.getElementById('task-grid');
            grid.innerHTML = tasks.map(t => {
                const isDone = state.completed.includes(t.id);
                return `
                    <div onclick="toggleTask(${t.id})" class="game-card p-4 rounded-3xl flex flex-col items-center justify-center cursor-pointer ${isDone ? 'task-done' : ''}">
                        <div class="w-12 h-12 ${t.color} rounded-2xl flex items-center justify-center mb-3 text-2xl shadow-inner">
                            <i class="fas ${t.icon}"></i>
                        </div>
                        <span class="font-black text-gray-700 text-sm">${t.title}</span>
                        <div class="mt-2 text-[10px] font-bold text-[#78C8A0]">+15 TICKETS</div>
                    </div>
                `;
            }).join('');
        }

        function toggleTask(id) {
            if (state.completed.includes(id)) {
                state.completed = state.completed.filter(i => i !== id);
                state.tickets = Math.max(0, state.tickets - 15);
            } else {
                state.completed.push(id);
                state.tickets += 15;
            }
            renderTasks();
            updateUI();
        }

        function renderInventory() {
            const grid = document.getElementById('inventory-grid');
            grid.innerHTML = state.inventory.map(item => `
                <div class="game-card p-2 rounded-2xl flex flex-col items-center justify-center ${item.stars === 5 ? 'rarity-5' : 'bg-white'}">
                    <i class="fas ${item.icon} text-2xl mb-1 text-gray-700"></i>
                    <div class="text-yellow-500 text-[8px]">${'★'.repeat(item.stars)}</div>
                </div>
            `).join('');
            if (state.inventory.length === 0) grid.innerHTML = '<div class="col-span-3 text-center text-gray-400 text-xs font-bold py-4">目前還沒有家具...</div>';
        }

        function tryGacha() {
            if (state.tickets < 50) {
                alert('葉子券不足喔！去解任務吧～');
                return;
            }
            state.tickets -= 50;
            updateUI();

            // Start Animation
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            overlay.classList.add('flex');

            setTimeout(() => {
                const rand = Math.random();
                let item;
                if (rand > 0.9) item = furniture.filter(f => f.stars === 5)[Math.floor(Math.random() * 2)];
                else if (rand > 0.6) item = furniture.filter(f => f.stars === 4)[0];
                else item = furniture.filter(f => f.stars === 3)[Math.floor(Math.random() * 3)];

                state.inventory.push(item);

                const card = document.getElementById('reveal-card');
                document.getElementById('reveal-stars').innerText = '★'.repeat(item.stars);
                document.getElementById('reveal-icon').className = `fas ${item.icon} text-7xl mb-6 ${item.stars === 5 ? 'text-yellow-600' : 'text-gray-700'}`;
                document.getElementById('reveal-name').innerText = item.name;
                card.style.transform = 'scale(1)';
            }, 500);
        }

        function closeOverlay() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('reveal-card').style.transform = 'scale(0)';
            renderInventory();
            updateUI();
        }

        function resetGame() {
            if (confirm('確定要重置所有數據嗎？')) {
                localStorage.clear();
                location.reload();
            }
        }

        init();
    </script>
</body>

</html>
