<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDraft Pro - 沉浸式定稿編輯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            transition: background-color 0.5s ease;
        }

        /* 隱藏原生外框與滾動條，設定為自適應高度所需 */
        textarea {
            outline: none !important;
            box-shadow: none !important;
            resize: none;
            overflow: hidden;
            /* 隱藏內部滾動，交由 JS 控制高度 */
        }

        /* 專注模式 UI 隱藏動畫 */
        .fade-transition {
            transition: opacity 0.5s ease, transform 0.5s ease, filter 0.5s ease;
        }

        .focus-active .ui-header {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-20px);
        }

        .focus-active .status-bar {
            opacity: 0;
            pointer-events: none;
            transform: translate(-50%, 30px);
            filter: blur(4px);
        }

        /* 自訂反白顏色，提升閱讀體驗 */
        ::selection {
            background-color: #E5E7EB;
            color: #111827;
        }
    </style>
</head>

<body class="bg-[#F9F9F7] text-gray-800 min-h-screen flex flex-col relative selection:bg-gray-300">

    <header
        class="ui-header fade-transition p-6 flex justify-between items-center max-w-5xl w-full mx-auto fixed top-0 left-1/2 transform -translate-x-1/2 z-10 bg-[#F9F9F7]/90 backdrop-blur-sm transition-colors duration-500"
        id="header-bg">
        <div class="flex items-center gap-3">
            <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z">
                </path>
            </svg>
            <h1 class="text-xl font-bold tracking-widest text-gray-800 font-sans">ZenDraft <span
                    class="text-xs font-normal text-gray-400 bg-gray-100 px-2 py-0.5 rounded-full ml-1">PRO</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <span id="saveStatus"
                class="font-sans text-xs text-gray-400 opacity-0 transition-opacity duration-300">已自動儲存</span>
            <button id="focusToggle"
                class="font-sans px-5 py-2 bg-white border border-gray-200 hover:border-gray-400 rounded-full text-sm font-medium text-gray-600 transition-all shadow-sm hover:shadow">
                進入專注模式
            </button>
        </div>
    </header>

    <main class="flex-grow flex justify-center items-start pt-32 pb-40 px-6 w-full max-w-4xl mx-auto z-0">
        <textarea id="editor"
            class="w-full bg-transparent text-xl md:text-2xl leading-[2] text-gray-800 placeholder-gray-300 min-h-[50vh]"
            placeholder="在這裡開始您的 Final Draft... (支援自動存檔，按 Esc 退出專注模式)"></textarea>
    </main>

    <footer
        class="status-bar fade-transition fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-white/80 backdrop-blur-md border border-gray-100 shadow-[0_10px_40px_rgb(0,0,0,0.08)] rounded-full px-8 py-3.5 flex gap-8 text-sm text-gray-500 font-sans z-10">
        <div class="flex flex-col items-center justify-center min-w-[3rem]">
            <span id="wordCount" class="font-bold text-lg text-gray-800 leading-tight">0</span>
            <span class="text-[10px] tracking-wider uppercase font-semibold mt-0.5">字數</span>
        </div>
        <div class="w-px h-8 bg-gray-200"></div>
        <div class="flex flex-col items-center justify-center min-w-[3rem]">
            <span id="charCount" class="font-bold text-lg text-gray-800 leading-tight">0</span>
            <span class="text-[10px] tracking-wider uppercase font-semibold mt-0.5">字元</span>
        </div>
        <div class="w-px h-8 bg-gray-200"></div>
        <div class="flex flex-col items-center justify-center min-w-[5rem]">
            <span id="readTime" class="font-bold text-lg text-gray-800 leading-tight">0</span>
            <span class="text-[10px] tracking-wider uppercase font-semibold mt-0.5">閱讀時間 (分)</span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const editor = document.getElementById('editor');
            const wordCountEl = document.getElementById('wordCount');
            const charCountEl = document.getElementById('charCount');
            const readTimeEl = document.getElementById('readTime');
            const focusToggle = document.getElementById('focusToggle');
            const saveStatus = document.getElementById('saveStatus');
            const headerBg = document.getElementById('header-bg');
            const body = document.body;

            let saveTimeout;

            // 1. 自動擴展高度邏輯 (Auto-resize Canvas)
            const autoResize = () => {
                editor.style.height = 'auto'; // 先重置高度
                editor.style.height = editor.scrollHeight + 'px'; // 根據內容設定新高度
            };

            // 2. 數據統計邏輯
            const updateStats = () => {
                const text = editor.value;

                // 計算字元數 (去除首尾空白)
                charCountEl.textContent = text.trim().length;

                // 計算中文字數
                const cjkMatches = text.match(/[\u4e00-\u9fa5]/g) || [];
                const cjkCount = cjkMatches.length;

                // 計算英文單字數 (去除中文與特殊標點後，以空白分割)
                const textWithoutCjk = text.replace(/[\u4e00-\u9fa5\W_]+/g, ' ');
                const englishWords = textWithoutCjk.trim().split(/\s+/).filter(word => word.length > 0);
                const englishWordCount = englishWords.length;

                const totalWords = cjkCount + englishWordCount;
                wordCountEl.textContent = totalWords;

                // 計算閱讀時間 (中文約300字/分，英文約200字/分)
                const timeInMinutes = Math.ceil((cjkCount / 300) + (englishWordCount / 200));
                readTimeEl.textContent = totalWords === 0 ? 0 : timeInMinutes;
            };

            // 3. 本地端自動存檔邏輯 (Auto-save to localStorage)
            const triggerAutoSave = () => {
                localStorage.setItem('zenDraft_content', editor.value);

                // 顯示「已自動儲存」提示
                saveStatus.style.opacity = '1';
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    saveStatus.style.opacity = '0';
                }, 2000);
            };

            // 4. 專注模式切換邏輯
            const toggleFocusMode = () => {
                body.classList.toggle('focus-active');
                if (body.classList.contains('focus-active')) {
                    body.classList.replace('bg-[#F9F9F7]', 'bg-white');
                    headerBg.classList.replace('bg-[#F9F9F7]/90', 'bg-white/90');
                    focusToggle.textContent = '退出專注模式';
                } else {
                    body.classList.replace('bg-white', 'bg-[#F9F9F7]');
                    headerBg.classList.replace('bg-white/90', 'bg-[#F9F9F7]/90');
                    focusToggle.textContent = '進入專注模式';
                }
            };

            // 綁定事件監聽器
            editor.addEventListener('input', () => {
                autoResize();
                updateStats();
                triggerAutoSave();
            });

            focusToggle.addEventListener('click', toggleFocusMode);

            // 快捷鍵：ESC 退出專注模式
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && body.classList.contains('focus-active')) {
                    toggleFocusMode();
                }
            });

            // 視窗大小改變時重新計算高度
            window.addEventListener('resize', autoResize);

            // 初始化：載入本地進度
            const savedContent = localStorage.getItem('zenDraft_content');
            if (savedContent) {
                editor.value = savedContent;
            }

            // 初始執行一次高度與數據計算
            autoResize();
            updateStats();

            // 自動聚焦
            editor.focus();
        });
    </script>
</body>

</html>
