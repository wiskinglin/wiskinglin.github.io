<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design First — POC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600&family=Noto+Sans+TC:wght@300;400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ===== Themes ===== */
        :root {
            --bg: #fafafa; --card-bg: #fff; --text: #0a0a0a; --muted: #999;
            --accent: #f59e0b; --glow: rgba(245,158,11,0.1);
            --line: rgba(0,0,0,0.05);
        }
        .theme-alt {
            --bg: #f4ecd8; --card-bg: rgba(237,228,207,0.6); --text: #1a1a1a; --muted: #5b4636;
            --accent: #2c2c2c; --glow: rgba(44,44,44,0.05);
            --line: rgba(91,70,54,0.12);
        }
        .theme-contrast {
            --bg: #000; --card-bg: rgba(15,15,15,0.5); --text: #fff; --muted: #666;
            --accent: #6366f1; --glow: rgba(99,102,241,0.15);
            --line: rgba(255,255,255,0.06);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg); color: var(--text);
            transition: background 0.5s, color 0.5s;
            overflow-x: hidden;
            cursor: default;
        }

        /* ===== Cursor-following ambient glow (subtle, not spotlight) ===== */
        .cursor-glow {
            position: fixed; pointer-events: none; z-index: 0;
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, var(--glow), transparent 70%);
            transform: translate(-50%, -50%);
            transition: opacity 0.3s;
            will-change: left, top;
        }
        @media (hover: none) { .cursor-glow { display: none; } }

        /* ===== Nav ===== */
        .nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            height: 52px; display: flex; align-items: center;
            justify-content: space-between; padding: 0 24px;
            background: color-mix(in srgb, var(--bg) 75%, transparent);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--line);
        }
        .klio-logo {
            font-family: 'Inter', sans-serif; font-size: 1.2rem; font-weight: 900;
            color: #0f172a !important; text-decoration: none; letter-spacing: -0.05em;
            padding: 4px 14px; border-radius: 8px; background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s; display: inline-block;
        }
        .klio-logo:hover {
            transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .theme-sw { display: flex; gap: 5px; }
        .theme-sw button {
            width: 26px; height: 26px; border-radius: 50%; border: 2px solid transparent;
            cursor: pointer; font-size: 10px; transition: transform 0.2s, border-color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-sw button:hover { transform: scale(1.15); }
        .theme-sw button.on { border-color: var(--accent); }
        .b1 { background: #fafafa; color: #f59e0b; border-color: #ddd; }
        .b2 { background: #f4ecd8; color: #5b4636; }
        .b3 { background: #1a1a2e; color: #a5b4fc; }

        /* ===== Hero — Gallery entrance, lots of negative space ===== */
        .hero {
            padding: 100px clamp(24px, 5vw, 80px) 48px;
            max-width: 1100px; margin: 0 auto;
            opacity: 0; animation: fadeSlide 0.8s 0.3s forwards;
        }
        @keyframes fadeSlide { to { opacity: 1; } }
        .hero h1 {
            font-family: 'Space Grotesk';
            font-size: clamp(52px, 10vw, 96px);
            font-weight: 700; letter-spacing: -0.04em; line-height: 1.05;
        }
        .hero h1 em { font-style: normal; color: var(--accent); }
        .hero p {
            font-size: clamp(16px, 2vw, 20px); font-weight: 200;
            color: var(--muted); margin-top: 20px; max-width: 480px;
            line-height: 1.7; letter-spacing: 0.01em;
        }

        /* ===== Gallery Layout — 2-column staggered (Pinterest-like) ===== */
        .gallery-section {
            max-width: 1100px; margin: 0 auto; padding: 0 clamp(24px,5vw,80px) 80px;
        }

        .section-head {
            display: flex; align-items: baseline; gap: 20px;
            padding: 20px 0; margin-bottom: 32px;
            border-bottom: 1px solid var(--line);
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.5s, transform 0.5s;
        }
        .section-head.vis { opacity: 1; transform: none; }
        .section-num {
            font-family: 'Space Grotesk'; font-size: clamp(64px,8vw,100px);
            font-weight: 700; line-height: 1; opacity: 0.06; user-select: none;
        }
        .section-head h2 {
            font-family: 'Space Grotesk'; font-size: clamp(20px,3vw,28px);
            font-weight: 300; letter-spacing: -0.01em;
        }

        /* 2 column offset grid */
        .gallery-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
            align-items: start;
        }
        .gallery-grid .card:nth-child(even) { margin-top: 48px; }
        @media (max-width: 640px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .gallery-grid .card:nth-child(even) { margin-top: 0; }
        }

        /* ===== Card — Gallery exhibit style ===== */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid transparent;
            border-radius: 20px;
            padding: 40px 32px 32px;
            position: relative;
            transition: border-color 0.4s, box-shadow 0.4s, transform 0.4s, background 0.4s;
            /* Scroll animation — soft float up */
            opacity: 0; transform: translateY(30px);
        }
        .card.vis { opacity: 1; transform: none; }
        .card:hover {
            border-color: color-mix(in srgb, var(--accent) 30%, transparent);
            box-shadow: 0 24px 48px rgba(0,0,0,0.15), 0 0 0 1px color-mix(in srgb, var(--accent) 10%, transparent);
            transform: translateY(-4px);
        }

        .card h3 {
            font-family: 'Space Grotesk'; font-size: 22px; font-weight: 500;
            margin-bottom: 12px; letter-spacing: -0.015em; line-height: 1.3;
        }
        .card p {
            font-size: 15px; font-weight: 300; color: var(--muted);
            line-height: 1.8; margin-bottom: 24px;
        }
        .card-link {
            font-family: 'Space Grotesk'; font-size: 12px; font-weight: 500;
            color: var(--accent); text-decoration: none; text-transform: uppercase;
            letter-spacing: 0.08em; display: inline-flex; align-items: center; gap: 6px;
            opacity: 0.7; transition: opacity 0.2s;
        }
        .card-link:hover { opacity: 1; }
        .card-link i { font-size: 10px; }

        /* ===== Footer ===== */
        .footer {
            max-width: 1100px; margin: 0 auto;
            padding: 40px clamp(24px,5vw,80px);
            border-top: 1px solid var(--line); text-align: center;
        }
        .footer p { font-family: 'Space Grotesk'; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.25); border-radius: 3px; }
    </style>
</head>
<body>
    <div class="cursor-glow" id="glow"></div>

    <nav class="nav">
        <a href="../index.html" class="klio-logo">KLIO.</a>
        <div class="theme-sw">
            <button class="b1 on" onclick="setTheme('default')" title="極致白"><i class="fas fa-sun"></i></button>
            <button class="b2" onclick="setTheme('alt')" title="瑞士印刷"><i class="fas fa-book-open"></i></button>
            <button class="b3" onclick="setTheme('contrast')" title="暗室藝廊"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <!-- Gallery Hero — lots of negative space, giant type -->
    <header class="hero">
        <h1>Design<br><em>First.</em></h1>
        <p>精心挑選的全球頂尖數位設計工作室與傳奇創意開發者。網頁工藝與使用者體驗的最高標竿。</p>
    </header>

    <main id="feed"></main>
    <footer class="footer"><p>Keep Creating · Stay Inspired</p></footer>

    <script>
        const data = [
            {
                category: "全球知名數位廣告與產品工作室",
                items: [
                    { name: "Lusion", desc: "數位工藝與實驗性視覺的頂尖工作室，將互動、程式與藝術完美結合。屢獲國際數位設計大獎。", url: "https://lusion.co" },
                    { name: "Resn", desc: "創意數位設計的常勝軍，風格大膽創新，屢獲 FWA 與 Awwwards 殊榮。來自紐西蘭的創意先鋒。", url: "https://resn.co.nz" },
                    { name: "Active Theory", desc: "擅長沈浸式體驗與 VR/AR 結合的數位開發先驅，推動 WebGL 的邊界。", url: "https://activetheory.net" },
                    { name: "Locomotive", desc: "品牌與代碼完美揉合，動效說故事的專家，來自蒙特婁的頂尖團隊。", url: "https://locomotive.ca" },
                    { name: "Garden Eight", desc: "結合日系精緻感與趣味性的網頁設計天花板，細節處理令人驚嘆。", url: "https://garden-eight.com" },
                    { name: "Work & Co", desc: "專注於數位產品開發，極簡與功能性的代名詞。設計驅動的工程文化。", url: "https://work.co" }
                ]
            },
            {
                category: "傳奇設計師與創意開發者",
                items: [
                    { name: "Bruno Simon", desc: "3D 網頁互動傳奇，開創「開車逛作品集」先河，Three.js 社群的標竿人物。", url: "https://bruno-simon.com" },
                    { name: "Rauno Freiberg", desc: "極致細節與微互動，Vercel 設計靈魂，每一個 pixel 都經過深思熟慮。", url: "https://rauno.me" },
                    { name: "Paco Coursey", desc: "定義現代工程師美學的標竿，極簡且極速，程式碼即是設計本身。", url: "https://paco.me" },
                    { name: "Josh W Comeau", desc: "教科書等級的互動教學，動效細節極豐，讓前端開發變得賞心悅目。", url: "https://joshwcomeau.com" }
                ]
            }
        ];

        // Cursor-following glow (PC only, very subtle)
        const glow = document.getElementById('glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        function render() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            data.forEach((section, sIdx) => {
                const sec = document.createElement('section');
                sec.className = 'gallery-section';

                const head = document.createElement('div');
                head.className = 'section-head obs';
                head.innerHTML = `<span class="section-num">${String(sIdx + 1).padStart(2, '0')}</span><h2>${section.category}</h2>`;
                sec.appendChild(head);

                const grid = document.createElement('div');
                grid.className = 'gallery-grid';

                section.items.forEach((item, i) => {
                    const card = document.createElement('div');
                    card.className = 'card obs';
                    card.style.transitionDelay = `${i * 0.1}s`;
                    card.innerHTML = `
                        <h3>${item.name}</h3>
                        <p>${item.desc}</p>
                        <a href="${item.url}" target="_blank" rel="noopener" class="card-link">
                            Visit Website <i class="fas fa-arrow-up-right-from-square"></i>
                        </a>
                    `;
                    grid.appendChild(card);
                });

                sec.appendChild(grid);
                feed.appendChild(sec);
            });

            initObs();
        }

        function initObs() {
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
            }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });
            document.querySelectorAll('.obs').forEach(el => io.observe(el));
        }

        function setTheme(t) {
            document.body.classList.remove('theme-alt','theme-contrast');
            if (t !== 'default') document.body.classList.add('theme-' + t);
            document.querySelectorAll('.theme-sw button').forEach(b => b.classList.remove('on'));
            document.querySelector('.b' + (t === 'default' ? '1' : t === 'alt' ? '2' : '3')).classList.add('on');
            localStorage.setItem('df-theme', t);
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTheme(localStorage.getItem('df-theme') || 'default');
            render();
        });
    </script>
</body>
</html>
