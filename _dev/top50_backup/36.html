<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#36 Micro-interactions — 極致微互動 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-color: #f7f9fc;
  --surface: #ffffff;
  --text: #1e293b;
  --primary: #4f46e5;
  --success: #10b981;
  --error: #ef4444;
  --border: #e2e8f0;
}
body{
  font-family:'Inter','Noto Sans TC',sans-serif;
  background-color:var(--bg-color);color:var(--text);
  line-height:1.6;padding-bottom:120px;
}

.layout{max-width:1000px;margin:60px auto;padding:0 24px;}

header{margin-bottom:60px;text-align:center;}
.cat{
  display:inline-block;padding:4px 12px;border-radius:20px;
  background:rgba(79,70,229,0.1);color:var(--primary);
  font-size:.7rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;
}
h1{font-weight:700;font-size:2.5rem;letter-spacing:-1px;margin-bottom:8px}
.sub{color:#64748b;font-size:1.1rem;margin-bottom:16px;}
.info-desc{max-width:600px;margin:0 auto;color:#475569;font-size:0.95rem}

.demo-grid{
  display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:32px;
}

/* Base Card */
.demo-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:16px;padding:32px;box-shadow:0 10px 25px rgba(0,0,0,0.02);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:250px;position:relative;
}
.demo-title{position:absolute;top:16px;left:20px;font-size:0.8rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:1px}

/* 1. Floating Label Input */
.input-wrapper{
  position:relative;width:100%;max-width:250px;
}
.input-field{
  width:100%;height:56px;border:2px solid var(--border);
  border-radius:10px;padding:16px 16px 0;
  font-size:1rem;color:var(--text);outline:none;
  background:transparent;transition:border-color 0.3s;
}
.input-field:focus{border-color:var(--primary);}
.input-label{
  position:absolute;left:16px;top:18px;color:#94a3b8;
  font-size:1rem;transition:0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events:none;transform-origin:left top;
}
.input-field:focus ~ .input-label,
.input-field:not(:placeholder-shown) ~ .input-label {
  transform:translateY(-10px) scale(0.75);
  color:var(--primary);font-weight:600;
}
/* Error shake */
.input-wrapper.error .input-field{border-color:var(--error)}
.input-wrapper.error .input-label{color:var(--error)}
.input-wrapper.error{animation:shake 0.4s;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}

/* 2. Submit -> Loading -> Success Button */
.submit-btn{
  width:180px;height:50px;background:var(--primary);color:#fff;
  border:none;border-radius:25px;font-size:1rem;font-weight:600;
  cursor:pointer;position:relative;overflow:hidden;
  transition:all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
  display:flex;justify-content:center;align-items:center;
}
.submit-btn span{transition:opacity 0.2s;position:relative;z-index:2;}
.submit-btn .spinner{
  position:absolute;width:24px;height:24px;
  border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;
  border-radius:50%;opacity:0;animation:spin 1s linear infinite;z-index:1;
}
.submit-btn .check{
  position:absolute;opacity:0;font-size:1.5rem;z-index:3;
}
/* Loading State */
.submit-btn.loading{width:50px;color:transparent;pointer-events:none;}
.submit-btn.loading span{opacity:0;}
.submit-btn.loading .spinner{opacity:1;}
/* Success State */
.submit-btn.success{background:var(--success);width:180px;}
.submit-btn.success span{opacity:0;display:none}
.submit-btn.success .spinner{display:none}
.submit-btn.success .check{opacity:1;transition:opacity 0.3s 0.2s;}

@keyframes spin{to{transform:rotate(360deg)}}

/* 3. Like Button Particle Burst */
.like-wrapper{position:relative}
.btn-like{
  width:64px;height:64px;border-radius:50%;background:#fff;
  border:2px solid var(--border);color:#cbd5e1;font-size:2rem;
  display:flex;justify-content:center;align-items:center;cursor:pointer;
  transition:transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.3s, border-color 0.3s;
}
.btn-like.liked{color:#f43f5e;border-color:#f43f5e;}
.btn-like:active{transform:scale(0.8)}

/* particles */
.particle{
  position:absolute;width:6px;height:6px;border-radius:50%;
  pointer-events:none;opacity:0;z-index:-1;
}

.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);
  border-top:1px solid var(--border);
  display:flex;justify-content:center;align-items:center;gap:30px;
  padding:16px 24px;z-index:9000;
}
.bottom-nav a{text-decoration:none;color:#64748b;font-weight:600;font-size:.85rem;text-transform:uppercase}
.bottom-nav a:hover{color:var(--primary)}
</style>
</head>
<body>

<main class="layout">
  <header>
    <div class="cat">🤖 AI 生成、動態與微互動</div>
    <h1>#36 Micro-interactions</h1>
    <p class="sub">極致微互動與狀態過渡</p>
    <p class="info-desc">每一個操作（如點擊、滑動、輸入）都有經過精密計算的物理回饋。不再只是生硬的頁面跳轉，而是透過無縫的動畫暗示狀態變更，大幅提升產品的質感（Premium feel）與使用者信心。</p>
  </header>

  <div class="demo-grid">
    
    <!-- Demo 1: Floating Label & Error Shake -->
    <div class="demo-card">
      <div class="demo-title">Floating Label</div>
      <div class="input-wrapper" id="inpWrap">
        <!-- placeholder-shown CSS hack requires an empty string placeholder -->
        <input type="email" class="input-field" id="emailInp" placeholder=" ">
        <label class="input-label">Email Address</label>
      </div>
      <div style="margin-top:20px;font-size:0.75rem;color:#94a3b8">Type invalid email (e.g. 'test') and press Enter</div>
    </div>

    <!-- Demo 2: Button State Morph -->
    <div class="demo-card">
      <div class="demo-title">State Button</div>
      <button class="submit-btn" id="sBtn">
        <span>Send Payment</span>
        <div class="spinner"></div>
        <div class="check">✓</div>
      </button>
      <div style="margin-top:20px;font-size:0.75rem;color:#94a3b8">Click to simulate API interaction</div>
    </div>

    <!-- Demo 3: Particle Like Burst -->
    <div class="demo-card">
      <div class="demo-title">Like Particle Burst</div>
      <div class="like-wrapper" id="likeWrap">
        <button class="btn-like" id="likeBtn">♥</button>
      </div>
    </div>

  </div>
</main>

<nav class="bottom-nav">
  <a href="35.html">← PREV</a>
  <a href="index.html">HOME</a>
  <a href="37.html">NEXT →</a>
</nav>

<script>
// 1. Invalid shake logic
const inp = document.getElementById('emailInp');
const wrap = document.getElementById('inpWrap');
inp.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    if (!inp.value.includes('@')) {
      wrap.classList.remove('error');
      void wrap.offsetWidth; // trigger reflow
      wrap.classList.add('error');
    } else {
      wrap.classList.remove('error');
      alert("Valid!");
    }
  }
});

// 2. Button state logic
const sBtn = document.getElementById('sBtn');
sBtn.addEventListener('click', () => {
  if(sBtn.classList.contains('loading') || sBtn.classList.contains('success')) return;
  sBtn.classList.add('loading');
  
  // Simulate network request
  setTimeout(() => {
    sBtn.classList.remove('loading');
    sBtn.classList.add('success');
    
    // Reset after 3 seconds
    setTimeout(() => {
      sBtn.classList.remove('success');
    }, 3000);
  }, 2000);
});

// 3. Like particle logic
const likeBtn = document.getElementById('likeBtn');
const likeWrap = document.getElementById('likeWrap');
const colors = ['#f43f5e', '#fbbf24', '#34d399', '#3b82f6'];

likeBtn.addEventListener('click', () => {
  if(likeBtn.classList.contains('liked')) {
    likeBtn.classList.remove('liked');
    return; // don't burst on unlike
  }
  
  likeBtn.classList.add('liked');
  
  // Generate 8 particles
  for(let i=0; i<8; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    // start at center
    p.style.top = '29px';
    p.style.left = '29px';
    likeWrap.appendChild(p);
    
    const angle = (Math.PI*2 / 8) * i;
    const velocity = 30 + Math.random() * 20;
    const tx = Math.cos(angle) * velocity;
    const ty = Math.sin(angle) * velocity;
    
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
    ], {
      duration: 600, easing: 'cubic-bezier(0, .9, .57, 1)'
    });
    
    setTimeout(() => p.remove(), 600);
  }
});
</script>
</body>
</html>
