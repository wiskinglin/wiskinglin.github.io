<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#38 Zero-UI & Ambient Computing — 零介面與環境計算 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --aura-color: #22d3ee; /* default calm cyan */
  --bg-color: #f8fafc;
}
body{
  font-family:'Inter','Noto Sans TC',sans-serif;
  background-color:var(--bg-color);color:#1e293b;
  height:100vh;overflow:hidden;
  display:flex;justify-content:center;align-items:center;
  transition:background-color 2s ease;
}

/* Ambient Aura Background */
.ambient-halo{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:800px;height:800px;
  background:radial-gradient(circle, var(--aura-color) 0%, transparent 60%);
  opacity:0.1;pointer-events:none;z-index:0;
  animation:breathe 8s ease-in-out infinite alternate;
  transition:background 2s ease;
}
@keyframes breathe{0%{transform:translate(-50%,-50%) scale(0.9)}100%{transform:translate(-50%,-50%) scale(1.1);opacity:0.2}}

/* Minimal Status Text */
.status-container{
  z-index:10;text-align:center;
}
.status-msg{
  font-size:clamp(1.5rem,3vw,2.5rem);font-weight:300;letter-spacing:-0.5px;
  opacity:0;transform:translateY(10px);
  animation:fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  animation-delay:1s;color:#0f172a;margin-bottom:12px;
}
.status-sub{
  font-size:1rem;color:#64748b;font-weight:400;
  opacity:0;animation:fadeUp 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  animation-delay:1.5s;
}

@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

/* Invisible Style Info trigger (hover top left corner) */
.info-trigger{
  position:absolute;top:0;left:0;width:100px;height:100px;z-index:100;cursor:help;
}
.style-info{
  position:absolute;top:40px;left:40px;width:350px;
  opacity:0;transform:translateX(-20px);transition:all 0.5s;
  pointer-events:none;z-index:90;
}
.info-trigger:hover + .style-info{opacity:1;transform:translateX(0);pointer-events:auto}
.cat{
  display:inline-block;padding:4px 12px;border:1px solid #475569;border-radius:20px;
  font-size:0.7rem;text-transform:uppercase;margin-bottom:12px;font-weight:600;color:#334155;
}
.style-info h1{font-size:1.4rem;font-weight:600;margin-bottom:8px}
.style-info p{font-size:0.9rem;color:#475569;line-height:1.6;margin-bottom:16px}

/* Simulation Controls hidden at bottom */
.simulation-bar{
  position:absolute;bottom:0;left:0;width:100%;padding:40px;
  display:flex;justify-content:center;gap:20px;opacity:0.3;transition:opacity 0.3s;
}
.simulation-bar:hover{opacity:1}
.sim-btn{
  background:transparent;border:1px solid #cbd5e1;color:#475569;
  padding:8px 16px;border-radius:20px;font-size:0.8rem;cursor:pointer;
  transition:all 0.2s;
}
.sim-btn:hover{background:#e2e8f0;color:#0f172a}

.bottom-nav{
  position:fixed;bottom:10px;right:24px;
  display:flex;justify-content:center;align-items:center;gap:30px;
  z-index:9000;
}
.bottom-nav a{text-decoration:none;color:#94a3b8;font-size:.8rem;letter-spacing:1px;text-transform:uppercase}
.bottom-nav a:hover{color:#38bdf8}
</style>
</head>
<body>

<div class="ambient-halo" id="halo"></div>

<div class="info-trigger" title="Hover here to reveal Info"></div>
<header class="style-info">
  <div class="cat">🤖 AI 生成、微互動</div>
  <h1>#38 Zero-UI</h1>
  <p style="font-weight:600;margin-bottom:12px;">零介面與環境計算 (Ambient Computing)</p>
  <p>「最好的介面就是沒有介面」。</p>
  <p>系統在背景默默運作，大量依賴感測器自動化所有流程。使用者不再需要繁瑣地觸控按鈕設定參數，視覺介面降級為單純的「溫和確認」，僅透過簡潔的文字提示與舒適的環境光（Aura）告知系統已經為你妥善安排。</p>
  <p style="font-size:0.8rem;color:#94a3b8">Hover bottom to simulate IoT states.</p>
</header>

<main class="status-container">
  <div class="status-msg" id="primaryMsg">The environment is optimized.</div>
  <div class="status-sub" id="subMsg">Air quality: 98% · Temperature: 22°C</div>
</main>

<div class="simulation-bar">
  <!-- Sensor triggers -->
  <button class="sim-btn" onclick="triggerState('sleep')">Sensor: Sleep Detected</button>
  <button class="sim-btn" onclick="triggerState('away')">Sensor: User Left Home</button>
  <button class="sim-btn" onclick="triggerState('return')">Sensor: User Returned</button>
</div>

<nav class="bottom-nav">
  <a href="37.html">Prev</a>
  <a href="index.html">Index</a>
  <a href="39.html">Next</a>
</nav>

<script>
// Ambient interaction logic
const halo = document.getElementById('halo');
const msg = document.getElementById('primaryMsg');
const sub = document.getElementById('subMsg');
const root = document.documentElement;

function animateTextChange(m1, m2) {
  // fade out
  msg.style.opacity = '0';
  sub.style.opacity = '0';
  msg.style.transform = 'translateY(-10px)';
  
  setTimeout(() => {
    msg.innerText = m1;
    sub.innerText = m2;
    msg.style.transition = 'opacity 1.5s, transform 1.5s';
    msg.style.opacity = '1';
    sub.style.opacity = '1';
    msg.style.transform = 'translateY(0)';
  }, 1000); // 1s calm delay
}

function triggerState(state) {
  if(state === 'sleep'){
    document.body.style.backgroundColor = '#020617';
    msg.style.color = '#f8fafc';
    sub.style.color = '#64748b';
    root.style.setProperty('--aura-color', '#312e81'); // deep indigo
    animateTextChange('Lights dimmed. Security secured.', 'Sleep well.');
  } 
  else if (state === 'away') {
    document.body.style.backgroundColor = '#f1f5f9';
    msg.style.color = '#0f172a';
    sub.style.color = '#94a3b8';
    root.style.setProperty('--aura-color', '#cbd5e1'); // neutral, off
    animateTextChange('Energy saver mode activated.', 'All systems monitored remotely.');
  }
  else if (state === 'return') {
    document.body.style.backgroundColor = '#f8fafc';
    msg.style.color = '#0f172a';
    sub.style.color = '#64748b';
    root.style.setProperty('--aura-color', '#22d3ee'); // bright cyan
    animateTextChange('Welcome back.', 'Restoring your preferred climate.');
  }
}
</script>
</body>
</html>
