<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#39 Dynamic & Biometric Theming — 生理與動態主題 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  /* Default State: Resting (Calm Blue) */
  --theme-c1: #3b82f6;
  --theme-c2: #8b5cf6;
  --bg-color: #0f172a;
  --bpm-speed: 4s;
  --ring-scale: 1.2;
}
body{
  font-family:'Outfit','Noto Sans TC',sans-serif;
  background-color:var(--bg-color);color:#fff;
  overflow:hidden;
  transition:background-color 2s ease;
}

/* Biometric Fluid Background */
.fluid-bg{
  position:fixed;inset:0;z-index:-1;
  background:radial-gradient(circle at 50% 50%, var(--theme-c1) 0%, var(--bg-color) 70%);
  opacity:0.6;
  transition:background 2.5s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Breathing Ring (Linked to BPM) */
.breathing-ring{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:400px;height:400px;border-radius:50%;
  border:2px solid rgba(255,255,255,0.1);
  box-shadow:0 0 40px var(--theme-c2), inset 0 0 60px var(--theme-c1);
  animation: breathePulse var(--bpm-speed) ease-in-out infinite alternate;
  transition:box-shadow 2.5s, animation-duration 2.5s;
}
@keyframes breathePulse{
  0%{transform:translate(-50%,-50%) scale(1);opacity:0.5}
  100%{transform:translate(-50%,-50%) scale(var(--ring-scale));opacity:1;border-color:rgba(255,255,255,0.4)}
}

/* Central UI */
.central-ui{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;z-index:10;
}
.bpm-val{
  font-size:clamp(4rem, 10vw, 8rem);font-weight:700;line-height:1;margin-bottom:8px;
  /* Sync pulse with ring */
  animation: heartBeat var(--bpm-speed) ease-in-out infinite alternate;
  color:#fff;
}
.bpm-label{font-size:1.2rem;color:#cbd5e1;text-transform:uppercase;letter-spacing:2px;font-weight:300}

@keyframes heartBeat{
  0%{transform:scale(0.95)}100%{transform:scale(1.05)}
}

/* Style info overlay */
.style-info{
  position:absolute;top:40px;left:40px;width:350px;
  background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);
  padding:24px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);
}
.cat{
  display:inline-block;padding:4px 12px;border:1px solid rgba(255,255,255,0.3);border-radius:20px;
  font-size:0.75rem;text-transform:uppercase;margin-bottom:12px;font-weight:700;
}
h1{font-size:1.4rem;font-weight:700;margin-bottom:8px;}
p.desc{font-size:0.9rem;color:#cbd5e1;line-height:1.6}

/* Simulator controls */
.controls{
  position:absolute;bottom:100px;left:50%;transform:translateX(-50%);
  display:flex;gap:16px;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);
  padding:12px;border-radius:40px;border:1px solid rgba(255,255,255,0.1);
  z-index:100;
}
.btn-state{
  background:transparent;border:none;color:#94a3b8;font-size:0.9rem;font-weight:600;
  padding:12px 24px;border-radius:24px;cursor:pointer;transition:all 0.3s;
}
.btn-state.active{background:#fff;color:#0f172a;}
.btn-state:hover:not(.active){color:#fff}

@media(max-width:768px){
  .style-info{position:relative;top:0;left:0;width:100%;border-radius:0;border:none;background:transparent;padding:24px;}
  .controls{width:90%;overflow-x:auto;}
  .breathing-ring{width:300px;height:300px;}
}

.bottom-nav{
  position:absolute;bottom:20px;left:0;right:0;
  display:flex;justify-content:center;align-items:center;gap:30px;
  z-index:9000;
}
.bottom-nav a{text-decoration:none;color:#94a3b8;font-size:.85rem;text-transform:uppercase;transition:color 0.2s;font-weight:700;}
.bottom-nav a:hover{color:#fff}
</style>
</head>
<body>

<div class="fluid-bg"></div>
<div class="breathing-ring"></div>

<header class="style-info">
  <div class="cat">🤖 AI 生成、生理動態互動</div>
  <h1>#39 Dynamic Theming</h1>
  <p class="desc" style="margin-bottom:16px;color:#fff;font-weight:500;">生理與動態主題切換</p>
  <p class="desc">打破過去只有明/暗兩色的傳統死板模式（Dark/Light Mode）。現代健康應用程式的介面配色、環境光漸層與呼吸動畫速度，會根據使用者的穿戴裝置傳回來的即時心率（BPM）等生理數據，或是環境氣候自動無縫生成，提供強烈的「個人身心共鳴感」。</p>
</header>

<main class="central-ui">
  <div class="bpm-val" id="bpmVal">62</div>
  <div class="bpm-label" id="bpmLabel">Resting</div>
</main>

<div class="controls" id="btnGroup">
  <button class="btn-state active" data-state="rest" data-bpm="62">Calm (62 BPM)</button>
  <button class="btn-state" data-state="focus" data-bpm="95">Focus (95 BPM)</button>
  <button class="btn-state" data-state="active" data-bpm="145">Active (145 BPM)</button>
</div>

<nav class="bottom-nav">
  <a href="38.html">← PREV</a>
  <a href="index.html">INDEX</a>
  <a href="40.html">NEXT →</a>
</nav>

<script>
// Dynamic Biometric Sync Logic
const root = document.documentElement;
const bpmVal = document.getElementById('bpmVal');
const bpmLabel = document.getElementById('bpmLabel');
const btns = document.querySelectorAll('.btn-state');

// State configuration
const states = {
  rest: {
    c1: '#3b82f6', // blue
    c2: '#8b5cf6', // purple
    speed: '4s',   // slow, deep breaths
    scale: '1.2',
    label: 'Slow & Deep',
    bg: '#0f172a'
  },
  focus: {
    c1: '#f59e0b', // amber
    c2: '#ec4899', // pink
    speed: '2s',   // steady medium pace
    scale: '1.4',
    label: 'Engaged',
    bg: '#1e1b4b'
  },
  active: {
    c1: '#ef4444', // red
    c2: '#f97316', // orange
    speed: '0.6s', // fast heart rate
    scale: '1.1',  // shallow, fast pants
    label: 'Intense Workout',
    bg: '#450a0a'
  }
};

let currentBPM = 62;
let targetBPM = 62;

// Smooth number counter loop
function updateBpmNumber() {
  if (currentBPM !== targetBPM) {
    if (currentBPM < targetBPM) currentBPM++;
    else currentBPM--;
    bpmVal.innerText = currentBPM;
  }
  requestAnimationFrame(updateBpmNumber);
}
updateBpmNumber(); // start loop

btns.forEach(btn => {
  btn.addEventListener('click', (e) => {
    // UI toggle
    btns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // Get state context
    const stateKey = btn.getAttribute('data-state');
    targetBPM = parseInt(btn.getAttribute('data-bpm'));
    const config = states[stateKey];
    
    // Apply dynamic biometrics to CSS Variables
    root.style.setProperty('--theme-c1', config.c1);
    root.style.setProperty('--theme-c2', config.c2);
    root.style.setProperty('--bpm-speed', config.speed);
    root.style.setProperty('--ring-scale', config.scale);
    root.style.setProperty('--bg-color', config.bg);
    
    bpmLabel.innerText = config.label;
  });
});
</script>
</body>
</html>
