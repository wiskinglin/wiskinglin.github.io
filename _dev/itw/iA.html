<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iA Writer Clone (Focus & Typography)</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    <!-- CodeMirror Core -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Light Theme */
            --bg-color: #f6f7f9;
            --text-color: #1a1a1a;
            --dimmer-text: #a0a0a0;
            --accent-color: #007aff; /* iA Writer blue cursor */
            --ui-bg: rgba(255, 255, 255, 0.9);
            --ui-border: rgba(0, 0, 0, 0.08);
            --ui-text: #777;
            --ui-text-hover: #111;
            --selection-bg: #cce4ff;
            --font-family: 'IBM Plex Mono', Courier, monospace;
            --max-width: 740px;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-color: #121212;
            --text-color: #e4e4e4;
            --dimmer-text: #666666;
            --accent-color: #1a94ff; 
            --ui-bg: rgba(20, 20, 20, 0.9);
            --ui-border: rgba(255, 255, 255, 0.1);
            --ui-text: #999;
            --ui-text-hover: #fff;
            --selection-bg: #2a415a;
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.5s ease, color 0.5s ease;
            overflow-x: hidden;
            font-family: var(--font-family);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #editor-container {
            width: 100%;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 10vh 20px 20vh 20px;
            height: auto;
            min-height: 100%;
        }

        /* ===== CodeMirror Overrides for Minimalist Look ===== */
        .CodeMirror {
            height: auto; 
            min-height: 100%;
            background: transparent;
            font-family: var(--font-family);
            font-size: 21px;
            line-height: 1.8;
            color: var(--text-color);
            letter-spacing: -0.01em;
        }

        .CodeMirror-scroll {
            overflow-x: auto;
            overflow-y: hidden; /* Hide internal scrollbars */
        }

        /* Caret (Cursor) Styling */
        .CodeMirror-cursor {
            border-left: 2px solid var(--accent-color) !important;
            width: 0;
        }

        /* Hide Default Gutters & Scrollbars */
        .CodeMirror-gutters, .CodeMirror-vscrollbar, .CodeMirror-hscrollbar {
            display: none !important;
        }

        /* Formatted Markdown Classes */
        .cm-header { font-weight: 600; color: var(--text-color); }
        .cm-header-1 { font-size: 1.5em; line-height: 1.4; margin-top: 1em; }
        .cm-header-2 { font-size: 1.3em; line-height: 1.5; margin-top: 1em; }
        .cm-header-3 { font-size: 1.1em; line-height: 1.6; margin-top: 1em; }
        .cm-strong { font-weight: 600; }
        .cm-em { font-style: italic; }
        .cm-link, .cm-url { color: var(--text-color); text-decoration: underline; text-decoration-color: var(--dimmer-text); }
        .cm-quote { color: var(--dimmer-text); font-style: italic; border-left: 2px solid var(--dimmer-text); padding-left: 15px; margin-left: -17px; }
        .cm-comment { color: var(--dimmer-text); }
        .cm-formatting { color: var(--dimmer-text); opacity: 0.6; } /* Faded markdown symbols like # or ** */

        /* Selection */
        .CodeMirror-selected { background: var(--selection-bg) !important; }

        /* Focus Mode Magic */
        body.focus-mode .CodeMirror-line {
            color: var(--dimmer-text);
            opacity: 0.3;
            transition: color 0.4s ease, opacity 0.4s ease;
        }
        body.focus-mode .CodeMirror-activeline .CodeMirror-line {
            color: var(--text-color);
            opacity: 1;
        }

        /* Placeholder */
        .CodeMirror-empty.CodeMirror-focused { opacity: 1; }
        .CodeMirror-empty { color: var(--dimmer-text) !important; opacity: 0.5; }

        /* ===== UI Control Bar ===== */
        .footer-hover-area {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 99;
        }

        .header-controls {
            position: absolute;
            bottom: -80px; /* Hidden by default */
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--ui-border);
            transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .footer-hover-area:hover .header-controls {
            bottom: 0; /* Slide in on hover */
        }

        .stats {
            font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--ui-text);
            display: flex;
            gap: 12px;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .dot { 
            font-size: 10px; 
            opacity: 0.4; 
        }

        .actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            color: var(--ui-text);
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s, transform 0.2s;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }

        .icon-btn:hover {
            color: var(--ui-text-hover);
            transform: scale(1.1);
        }

        .icon-btn.active {
            color: var(--accent-color);
        }

        /* Minimal Scrollbar for the window */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--ui-border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--dimmer-text);
        }
        
        /* Persistent Word Count (Optional top right fade) */
        .persistent-stats {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 12px;
            color: var(--dimmer-text);
            font-family: -apple-system, sans-serif;
            opacity: 0.3;
            transition: opacity 0.5s;
            pointer-events: none;
            z-index: 10;
        }
        body:not(:hover) .persistent-stats {
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="persistent-stats" id="top-words">0 words</div>

    <!-- Main Editor Area -->
    <div id="editor-container">
        <textarea id="editor"></textarea>
    </div>

    <!-- Slide-in Footer Controls -->
    <div class="footer-hover-area">
        <div class="header-controls">
            <div class="stats">
                <span id="word-count">0 words</span>
                <span class="dot">●</span>
                <span id="char-count">0 chars</span>
                <span class="dot">●</span>
                <span id="read-time">0 min read</span>
            </div>
            <div class="actions">
                <button id="btn-focus" title="Toggle Focus Mode" class="icon-btn"><i class="fa-solid fa-crosshairs"></i></button>
                <button id="btn-dark" title="Toggle Dark Mode" class="icon-btn"><i class="fa-solid fa-moon"></i></button>
                <button id="btn-fullscreen" title="Toggle Fullscreen" class="icon-btn"><i class="fa-solid fa-expand"></i></button>
            </div>
        </div>
    </div>

    <!-- CodeMirror Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/markdown/markdown.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/selection/active-line.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/display/placeholder.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const editorEl = document.getElementById('editor');
            const wordCountEl = document.getElementById('word-count');
            const charCountEl = document.getElementById('char-count');
            const readTimeEl = document.getElementById('read-time');
            const topWordsEl = document.getElementById('top-words');
            
            const btnFocus = document.getElementById('btn-focus');
            const btnDark = document.getElementById('btn-dark');
            const btnFullscreen = document.getElementById('btn-fullscreen');
            
            // Default placeholder content
            const defaultText = `# The Art of Focus\n\nWriting is about connecting the dots, formulating ideas, and finding the right words to express your thoughts. \n\nIn a world full of distractions, finding a quiet place to think and write is a challenge. *A simple, clean interface* helps to keep your mind focused on the text.\n\nTry the **Focus Mode** below to dim out everything except the current paragraph you are working on. Activate **Dark Mode** for a comfortable typing experience at night.\n\nYour thoughts will be autosaved to your browser. Use Markdown syntax to format your headers, _italics_, and **bold text**.`;

            // Initialize CodeMirror Editor
            const cm = CodeMirror.fromTextArea(editorEl, {
                mode: {
                    name: 'markdown',
                    highlightFormatting: true
                },
                lineWrapping: true,
                styleActiveLine: true,
                placeholder: "Start typing...",
                viewportMargin: Infinity // Allows editor to grow dynamically
            });

            // Load from LocalStorage or use default
            const savedContent = localStorage.getItem('ia_clone_content');
            if (savedContent !== null) {
                cm.setValue(savedContent);
            } else {
                cm.setValue(defaultText);
            }

            // Stats Updating Logic
            const updateStats = () => {
                const text = cm.getValue();
                
                // Character Count
                const chars = text.length;
                
                // Word Count (Regex matching words)
                const wordMatches = text.trim().match(/\b[\w\u00C0-\u017F'-]+\b/g);
                const words = wordMatches ? wordMatches.length : 0;
                
                // Read Time (Avg 200 words per min)
                const readTime = Math.ceil((words > 0 ? words : 1) / 200);
                
                const wordText = `${words} word${words !== 1 ? 's' : ''}`;
                
                wordCountEl.textContent = wordText;
                topWordsEl.textContent = wordText;
                charCountEl.textContent = `${chars} char${chars !== 1 ? 's' : ''}`;
                readTimeEl.textContent = `${readTime} min read`;
            };

            // Auto-save & Live Stats with Debounce
            let saveTimeout;
            cm.on('change', () => {
                updateStats();
                clearTimeout(saveTimeout);
                saveTimeout = setTimeout(() => {
                    localStorage.setItem('ia_clone_content', cm.getValue());
                }, 1000);
            });

            // Initialize stats
            updateStats();

            // Toggle Focus Mode Action
            let isFocusMode = localStorage.getItem('ia_clone_focus') === 'true';
            
            const applyFocusMode = (active) => {
                document.body.classList.toggle('focus-mode', active);
                btnFocus.classList.toggle('active', active);
            };

            applyFocusMode(isFocusMode);

            btnFocus.addEventListener('click', () => {
                isFocusMode = !isFocusMode;
                applyFocusMode(isFocusMode);
                localStorage.setItem('ia_clone_focus', isFocusMode);
                cm.focus();
            });

            // Toggle Dark Mode Action
            let isDarkMode = localStorage.getItem('ia_clone_dark') === 'true';
            
            const applyDarkMode = (dark) => {
                if (dark) {
                    document.body.setAttribute('data-theme', 'dark');
                    btnDark.classList.add('active');
                    btnDark.innerHTML = '<i class="fa-solid fa-sun"></i>';
                } else {
                    document.body.removeAttribute('data-theme');
                    btnDark.classList.remove('active');
                    btnDark.innerHTML = '<i class="fa-solid fa-moon"></i>';
                }
            };

            // Apply system preference if no localStorage value is set
            if (localStorage.getItem('ia_clone_dark') === null) {
                isDarkMode = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
            applyDarkMode(isDarkMode);

            btnDark.addEventListener('click', () => {
                isDarkMode = !isDarkMode;
                applyDarkMode(isDarkMode);
                localStorage.setItem('ia_clone_dark', isDarkMode);
                cm.focus();
            });

            // Fullscreen Toggle Action
            btnFullscreen.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => {
                        console.warn(`Fullscreen error: ${err.message}`);
                    });
                    btnFullscreen.classList.add('active');
                    btnFullscreen.innerHTML = '<i class="fa-solid fa-compress"></i>';
                } else {
                    document.exitFullscreen();
                    btnFullscreen.classList.remove('active');
                    btnFullscreen.innerHTML = '<i class="fa-solid fa-expand"></i>';
                }
                cm.focus();
            });

            // Handle Fullscreen Exit via ESC key
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement) {
                    btnFullscreen.classList.remove('active');
                    btnFullscreen.innerHTML = '<i class="fa-solid fa-expand"></i>';
                }
            });

            // Put cursor at the end initially
            cm.focus();
            cm.setCursor(cm.lineCount(), 0);
        });
    </script>
</body>
</html>
