<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SonicFocus | 專注與放鬆音樂策展總匯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-5px);
            border-color: rgba(147, 197, 253, 0.5);
        }

        .category-pill {
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-pill.active {
            background-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        .tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            background: rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }
    </style>
</head>

<body class="p-6 md:p-12">

    <div class="max-w-6xl mx-auto">
        <header class="mb-12 text-center">
            <h1
                class="text-4xl md:text-5xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                SonicFocus
            </h1>
            <p class="text-slate-400 max-w-2xl mx-auto">
                基於認知科學的音樂策展系統。請選擇您的當下狀態，我們將為您匹配最佳的作業與放鬆頻譜。
            </p>
        </header>

        <div class="mb-10 space-y-6">
            <div class="flex flex-wrap justify-center gap-3" id="main-filters">
                <button onclick="filterMusic('All')"
                    class="category-pill active px-6 py-2 rounded-full border border-slate-700 text-sm">全部風格</button>
                <button onclick="filterMusic('Hip-Hop')"
                    class="category-pill px-6 py-2 rounded-full border border-slate-700 text-sm">節拍嘻哈</button>
                <button onclick="filterMusic('Electronic')"
                    class="category-pill px-6 py-2 rounded-full border border-slate-700 text-sm">電子氛圍</button>
                <button onclick="filterMusic('Retro')"
                    class="category-pill px-6 py-2 rounded-full border border-slate-700 text-sm">復古流行</button>
                <button onclick="filterMusic('Instrumental')"
                    class="category-pill px-6 py-2 rounded-full border border-slate-700 text-sm">純粹樂器</button>
                <button onclick="filterMusic('Special')"
                    class="category-pill px-6 py-2 rounded-full border border-slate-700 text-sm">特殊實驗</button>
            </div>

            <div class="flex flex-wrap justify-center gap-4 text-xs text-slate-400">
                <span>⚡ 能量度：<input type="range" id="energyRange" min="1" max="5" value="3" class="accent-blue-500"
                        oninput="recommendBySlider()"></span>
                <span>🧠 專注要求：<input type="range" id="focusRange" min="1" max="5" value="3" class="accent-emerald-500"
                        oninput="recommendBySlider()"></span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="music-grid">
        </div>
    </div>

    <script>
        const musicData = [
            { name: "Lo-Fi Hip Hop", cat: "Hip-Hop", energy: 2, focus: 4, desc: "溫暖、模糊的背景音，帶有黑膠碎裂聲。", scene: "日常讀書、睡前放鬆" },
            { name: "Japan Chill", cat: "Hip-Hop", energy: 2, focus: 3, desc: "禪意十足的日系樂器結合嘻哈節拍。", scene: "散步、冥想" },
            { name: "Chillhop", cat: "Hip-Hop", energy: 3, focus: 5, desc: "精緻清亮的節奏，適合長時間專注。", scene: "邏輯思考、撰寫文件" },
            { name: "Ambient", cat: "Electronic", energy: 1, focus: 5, desc: "如薄霧般的空間感，無明顯節奏。", scene: "極度專注、深度閱讀" },
            { name: "Chillwave", cat: "Electronic", energy: 3, focus: 2, desc: "夢幻、飄渺的 80 年代合成器濾鏡感。", scene: "創意發想、午後放鬆" },
            { name: "City Pop", cat: "Retro", energy: 4, focus: 2, desc: "華麗、時髦的都會感，充滿都會律動。", scene: "夜晚文書工作、下班放鬆" },
            { name: "Future Funk", cat: "Retro", energy: 5, focus: 1, desc: "高能量的 Disco 節奏，提神效果極佳。", scene: "衝刺進度、打掃房間" },
            { name: "Coffee Shop Piano", cat: "Instrumental", energy: 2, focus: 5, desc: "純鋼琴演奏，模仿午後咖啡廳氛圍。", scene: "高度閱讀、邏輯運算" },
            { name: "Post-Rock", cat: "Special", energy: 3, focus: 4, desc: "器樂堆疊的巨大音牆，適合進入心流。", scene: "忘我創作、沉浸式工作" },
            { name: "Math Rock", cat: "Special", energy: 4, focus: 5, desc: "精確如機械的複雜拍號，保持大腦敏銳。", scene: "程式開發、精密推演" },
            { name: "Bossa Nova", cat: "Instrumental", energy: 3, focus: 3, desc: "慵懶的巴西輕爵士，緩解焦慮。", scene: "居家辦公、放鬆對話" },
            { name: "Dark Academia", cat: "Special", energy: 2, focus: 4, desc: "沉穩憂鬱的古典弦樂，濃厚的書卷氣。", scene: "圖書館自習、深夜研究" }
        ];

        function renderCards(data) {
            const grid = document.getElementById('music-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card p-6 rounded-2xl flex flex-col justify-between';
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="tag">${item.cat}</span>
                            <div class="flex gap-1">
                                ${'★'.repeat(item.energy)}${'☆'.repeat(5 - item.energy)}
                            </div>
                        </div>
                        <h3 class="text-xl font-bold mb-2 text-blue-300">${item.name}</h3>
                        <p class="text-slate-400 text-sm mb-4">${item.desc}</p>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-800">
                        <p class="text-xs text-emerald-400 font-medium">📍 最佳場景：</p>
                        <p class="text-xs text-slate-300">${item.scene}</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterMusic(category) {
            // Update UI
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(category) || (category === 'All' && btn.innerText === '全部風格')) {
                    btn.classList.add('active');
                }
            });

            if (category === 'All') {
                renderCards(musicData);
            } else {
                const filtered = musicData.filter(m => m.cat === category);
                renderCards(filtered);
            }
        }

        function recommendBySlider() {
            const energy = parseInt(document.getElementById('energyRange').value);
            const focus = parseInt(document.getElementById('focusRange').value);

            const recommended = musicData.filter(m =>
                Math.abs(m.energy - energy) <= 1 && Math.abs(m.focus - focus) <= 1
            );

            renderCards(recommended.length > 0 ? recommended : musicData.slice(0, 3));
        }

        // Init
        renderCards(musicData);
    </script>
</body>

</html>
