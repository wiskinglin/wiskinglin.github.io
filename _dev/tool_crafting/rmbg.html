<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地端 AI 秒速去背神器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0c0e14;
            --bg-secondary: #151823;
            --bg-card: rgba(22, 27, 45, 0.7);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(99, 130, 255, 0.4);
            --text-primary: #e8eaf0;
            --text-secondary: #8b90a0;
            --accent: #6382ff;
            --accent-glow: rgba(99, 130, 255, 0.25);
            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.1);
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.1);
            --danger: #f87171;
            --danger-bg: rgba(248, 113, 113, 0.1);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(99, 130, 255, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.05) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 860px;
        }

        /* Header */
        .header {
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e8eaf0 0%, #a0a8c0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.6;
        }

        .badge-row {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            color: var(--text-secondary);
        }

        .badge.gpu {
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--success);
        }

        .badge.privacy {
            border-color: rgba(99, 130, 255, 0.3);
            color: var(--accent);
        }

        /* Status Box */
        .status-box {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border-subtle);
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            transition: var(--transition);
        }

        .status-box.loading {
            border-color: rgba(99, 130, 255, 0.25);
            color: var(--accent);
        }

        .status-box.success {
            border-color: rgba(52, 211, 153, 0.25);
            color: var(--success);
        }

        .status-box.warning {
            border-color: rgba(251, 191, 36, 0.25);
            color: var(--warning);
        }

        .status-box.error {
            border-color: rgba(248, 113, 113, 0.25);
            color: var(--danger);
        }

        /* Spinner */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            flex-shrink: 0;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Progress bar */
        .progress-track {
            width: 100%;
            height: 3px;
            background: var(--border-subtle);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
            display: none;
        }

        .progress-track.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #8b5cf6);
            border-radius: 4px;
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-fill.indeterminate {
            width: 30%;
            animation: indeterminate 1.5s ease-in-out infinite;
        }

        @keyframes indeterminate {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        /* Upload Area */
        .upload-area {
            border: 1.5px dashed rgba(255, 255, 255, 0.1);
            padding: 48px 24px;
            text-align: center;
            border-radius: var(--radius);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 24px;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .upload-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--accent-glow), transparent 60%);
            opacity: 0;
            transition: opacity var(--transition);
        }

        .upload-area:hover,
        .upload-area.drag-over {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .upload-area:hover::before,
        .upload-area.drag-over::before {
            opacity: 1;
        }

        .upload-icon {
            position: relative;
            z-index: 1;
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
            filter: grayscale(0.3);
        }

        .upload-area .main-text {
            position: relative;
            z-index: 1;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .upload-area .sub-text {
            position: relative;
            z-index: 1;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .upload-area .sub-text kbd {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-family: inherit;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        /* Action Buttons */
        .action-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: none;
            padding: 12px 28px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            color: #fff;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-primary:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
            backdrop-filter: blur(12px);
        }

        .btn-secondary:hover:not(:disabled) {
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Preview Container */
        .preview-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 4px;
        }

        .image-box {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .image-box-header {
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-subtle);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .image-box-body {
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 180px;
        }

        .image-box-body .placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
            text-align: center;
        }

        /* Checkerboard background for transparency preview */
        .checkerboard {
            background-image:
                linear-gradient(45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%),
                linear-gradient(-45deg, rgba(255, 255, 255, 0.03) 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, rgba(255, 255, 255, 0.03) 75%),
                linear-gradient(-45deg, transparent 75%, rgba(255, 255, 255, 0.03) 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0;
        }

        .image-box-body img,
        .image-box-body canvas {
            max-width: 100%;
            max-height: 400px;
            border-radius: 6px;
            display: block;
        }

        /* Processing overlay */
        .processing-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(12, 14, 20, 0.8);
            backdrop-filter: blur(4px);
            z-index: 10;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-radius: var(--radius);
            color: var(--accent);
            font-size: 13px;
            font-weight: 500;
        }

        .processing-overlay.active {
            display: flex;
        }

        .processing-overlay .spinner {
            width: 32px;
            height: 32px;
            border-width: 3px;
        }

        /* Footer */
        .footer {
            margin-top: 24px;
            text-align: center;
            font-size: 12px;
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* RWD */
        @media (max-width: 640px) {
            body {
                padding: 20px 12px;
            }

            .header h1 {
                font-size: 22px;
            }

            .preview-container {
                grid-template-columns: 1fr;
            }

            .upload-area {
                padding: 32px 16px;
            }

            .action-row {
                flex-direction: column;
                align-items: stretch;
            }

            .btn {
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🖼️ 本地端 AI 秒速去背神器</h1>
            <p>基於 RMBG-1.4 模型，所有運算皆在您的瀏覽器內完成，確保最高隱私且不消耗任何伺服器資源。</p>
            <div class="badge-row">
                <span class="badge gpu" id="device-badge">⏳ 載入中...</span>
                <span class="badge privacy">🔒 完全離線處理</span>
                <span class="badge">📦 ~170MB 模型</span>
            </div>
        </div>

        <!-- Status -->
        <div id="status" class="status-box loading">
            <div class="spinner"></div>
            <span id="status-text">模型載入中，首次載入約需下載 170MB，之後將自動快取...</span>
        </div>
        <div class="progress-track" id="progress-track">
            <div class="progress-fill indeterminate" id="progress-fill"></div>
        </div>

        <!-- Upload Area -->
        <div class="upload-area" id="upload-box">
            <span class="upload-icon">📁</span>
            <p class="main-text">點擊、拖曳圖片或直接貼上</p>
            <p class="sub-text">支援 JPG / PNG / WEBP｜也可以 <kbd>Ctrl</kbd>+<kbd>V</kbd> 貼上螢幕截圖</p>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
        </div>

        <!-- Action Buttons -->
        <div class="action-row">
            <button id="process-btn" class="btn btn-primary" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                開始 AI 去背
            </button>
            <button id="download-btn" class="btn btn-secondary" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                下載去背結果
            </button>
        </div>

        <!-- Preview -->
        <div class="preview-container">
            <div class="image-box">
                <div class="image-box-header">📷 原始圖片</div>
                <div class="image-box-body checkerboard" id="original-box">
                    <p class="placeholder" id="original-placeholder">尚未上傳圖片</p>
                    <img id="original-img" style="display: none;" alt="原始圖片">
                </div>
            </div>
            <div class="image-box" style="position: relative;">
                <div class="image-box-header">✨ 去背結果</div>
                <div class="image-box-body checkerboard" id="result-box">
                    <p class="placeholder" id="result-placeholder">等待處理</p>
                    <canvas id="result-canvas" style="display: none;"></canvas>
                </div>
                <!-- Processing Overlay -->
                <div class="processing-overlay" id="processing-overlay">
                    <div class="spinner"></div>
                    <span>AI 正在萃取主體...</span>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Powered by Transformers.js &amp; RMBG-1.4 · 所有資料不離開您的裝置</p>
        </div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

        env.allowLocalModels = false;

        // ── State ──
        let segmenter = null;
        let currentImageURL = null;   // Blob URL (需手動 revoke)
        let currentFile = null;       // 保留 File 物件供 pipeline 使用
        let hasResult = false;

        // ── DOM References ──
        const statusEl = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const progressTrack = document.getElementById('progress-track');
        const progressFill = document.getElementById('progress-fill');
        const deviceBadge = document.getElementById('device-badge');
        const fileInput = document.getElementById('file-input');
        const uploadBox = document.getElementById('upload-box');
        const processBtn = document.getElementById('process-btn');
        const downloadBtn = document.getElementById('download-btn');
        const originalImg = document.getElementById('original-img');
        const originalPlaceholder = document.getElementById('original-placeholder');
        const resultCanvas = document.getElementById('result-canvas');
        const resultPlaceholder = document.getElementById('result-placeholder');
        const processingOverlay = document.getElementById('processing-overlay');
        const ctx = resultCanvas.getContext('2d');

        // ── Helpers ──
        function setStatus(type, text) {
            statusEl.className = `status-box ${type}`;
            // 移除舊的 spinner（如果有的話只在 loading 時顯示）
            const existingSpinner = statusEl.querySelector('.spinner');
            if (type === 'loading' && !existingSpinner) {
                const spinner = document.createElement('div');
                spinner.className = 'spinner';
                statusEl.insertBefore(spinner, statusText);
            } else if (type !== 'loading' && existingSpinner) {
                existingSpinner.remove();
            }
            statusText.textContent = text;
        }

        // ── 1. 載入模型 (WASM，搭配下載進度與完整錯誤處理) ──
        async function loadModel() {
            progressTrack.classList.add('active');
            progressFill.classList.remove('indeterminate');
            progressFill.style.width = '0%';
            deviceBadge.textContent = '🔧 CPU (WASM)';

            // 進度回呼：顯示模型下載百分比
            function progressCallback(progress) {
                if (progress.status === 'download' || progress.status === 'progress') {
                    const pct = Math.round(progress.progress || 0);
                    progressFill.style.width = `${pct}%`;
                    setStatus('loading', `模型下載中… ${pct}% (${progress.file || ''})`);
                } else if (progress.status === 'init' || progress.status === 'ready') {
                    progressFill.style.width = '100%';
                    setStatus('loading', '模型初始化中…');
                }
            }

            try {
                segmenter = await pipeline('image-segmentation', 'Xenova/rmbg-1.4', {
                    progress_callback: progressCallback,
                });
                setStatus('success', '模型載入完成！請上傳圖片進行去背。');
                deviceBadge.textContent = '✅ WASM 就緒';
            } catch (error) {
                console.error('模型載入失敗:', error);
                setStatus('error', `模型載入失敗：${error.message || '請使用最新版 Chrome 或 Edge。'}`);
                deviceBadge.textContent = '❌ 載入失敗';
                deviceBadge.classList.remove('gpu');
                return;
            } finally {
                progressTrack.classList.remove('active');
            }

            // 模型已就緒，若此時已有圖片則啟用按鈕
            if (currentImageURL) processBtn.disabled = false;
        }

        // ── 2. 處理圖片來源 (統一入口) ──
        function handleImageFile(file) {
            if (!file || !file.type.startsWith('image/')) return;

            // 釋放舊的 Blob URL
            if (currentImageURL) {
                URL.revokeObjectURL(currentImageURL);
            }

            currentFile = file;
            currentImageURL = URL.createObjectURL(file);
            originalImg.src = currentImageURL;
            originalImg.style.display = 'block';
            originalPlaceholder.style.display = 'none';

            // 重置去背結果
            resultCanvas.style.display = 'none';
            resultPlaceholder.style.display = 'block';
            resultPlaceholder.textContent = '等待處理';
            downloadBtn.disabled = true;
            hasResult = false;

            if (segmenter) processBtn.disabled = false;
        }

        // ── 2a. Click 上傳 ──
        uploadBox.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            handleImageFile(e.target.files[0]);
        });

        // ── 2b. Drag & Drop ──
        uploadBox.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadBox.classList.add('drag-over');
        });

        uploadBox.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
        });

        uploadBox.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            handleImageFile(file);
        });

        // ── 2c. Clipboard Paste (Ctrl+V) ──
        document.addEventListener('paste', (e) => {
            const items = e.clipboardData?.items;
            if (!items) return;

            for (const item of items) {
                if (item.type.startsWith('image/')) {
                    const file = item.getAsFile();
                    handleImageFile(file);
                    return;
                }
            }
        });

        // ── 3. 執行 AI 去背 ──
        processBtn.addEventListener('click', async () => {
            if (!currentImageURL || !segmenter) return;

            processBtn.disabled = true;
            downloadBtn.disabled = true;
            setStatus('loading', 'AI 正在萃取主體，請稍候...');
            processingOverlay.classList.add('active');

            try {
                // 執行推論，取得遮罩 (Mask)
                const result = await segmenter(currentImageURL);

                // 準備原始圖片以繪製到 Canvas
                const img = new Image();
                img.src = currentImageURL;
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = reject;
                });

                resultCanvas.width = img.width;
                resultCanvas.height = img.height;
                resultCanvas.style.display = 'block';
                resultPlaceholder.style.display = 'none';

                // 畫上原圖
                ctx.drawImage(img, 0, 0);

                // 取得去背遮罩
                const maskData = await result[0].mask.toCanvas();

                // 將遮罩套用到原圖上 (compositing)
                ctx.globalCompositeOperation = 'destination-in';
                ctx.drawImage(maskData, 0, 0);
                ctx.globalCompositeOperation = 'source-over';

                hasResult = true;
                downloadBtn.disabled = false;
                setStatus('success', '去背完成！可點擊「下載去背結果」按鈕儲存圖片。');
            } catch (error) {
                console.error('去背處理失敗:', error);
                setStatus('error', '處理失敗，請查看開發者控制台取得詳細錯誤資訊。');
            } finally {
                processBtn.disabled = false;
                processingOverlay.classList.remove('active');
            }
        });

        // ── 4. 下載去背結果 ──
        downloadBtn.addEventListener('click', () => {
            if (!hasResult) return;

            resultCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;

                // 使用原始檔名 (去掉副檔名) + '_rmbg.png'
                const originalName = currentFile?.name?.replace(/\.[^.]+$/, '') || 'image';
                a.download = `${originalName}_rmbg.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                // 延遲釋放以確保下載完成
                setTimeout(() => URL.revokeObjectURL(url), 1000);
            }, 'image/png');
        });

        // ── 5. 啟動時自動載入模型 ──
        loadModel();
    </script>

</body>

</html>
