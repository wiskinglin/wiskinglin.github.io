<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式閱讀器 | Smart Library</title>
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=IBM+Plex+Mono:wght@400;600&family=Inter:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style id="theme-variable-host">
        /* Default Base Theme (Light/Elegant) */
        :root {
            --reader-bg: #fcfcf9;
            --reader-text: #2d3436;
            --reader-accent: #6c5ce7;
            --reader-font-heading: 'Inter', sans-serif;
            --reader-font-body: 'Noto Serif TC', serif;
            --reader-max-width: 800px;
            --reader-line-height: 1.8;
            --reader-letter-spacing: 0.02em;
            --reader-font-size: 1.15rem;
            --sidebar-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        /* [Theme: Fantasy Parchment] */
        [data-theme="fantasy-parchment"] {
            --reader-bg: #f4ecd8;
            --reader-text: #3e2723;
            --reader-accent: #8d6e63;
            --reader-font-body: 'Crimson Pro', serif;
            --reader-font-heading: 'Noto Serif TC', serif;
            background-image: url('https://www.transparenttextures.com/patterns/parchment.png');
        }

        /* [Theme: Sci-Fi Terminal] */
        [data-theme="sci-fi-terminal"] {
            --reader-bg: #000000;
            --reader-text: #00ff41;
            --reader-accent: #00ff41;
            --reader-font-body: 'IBM Plex Mono', monospace;
            --reader-font-heading: 'IBM Plex Mono', monospace;
            --reader-letter-spacing: 0.05em;
        }

        /* [Theme: Dark Mode] */
        [data-mode="dark"] {
            --reader-bg: #121212;
            --reader-text: #e0e0e0;
            --sidebar-bg: #1e1e1e;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body {
            background-color: var(--reader-bg);
            color: var(--reader-text);
            font-family: var(--reader-font-body);
            display: flex;
            min-height: 100vh;
        }

        /* --- Sidebar / TOC --- */
        .reader-sidebar {
            width: 320px;
            height: 100vh;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            z-index: 100;
        }

        .book-label {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--reader-accent);
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .book-title-sidebar {
            font-family: var(--reader-font-heading);
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 2rem;
        }

        .toc-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .toc-item {
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }

        .toc-item:hover {
            background: rgba(0,0,0,0.05);
        }

        .toc-item.active {
            color: var(--reader-accent);
            font-weight: 700;
            border-left-color: var(--reader-accent);
            background: rgba(108, 92, 231, 0.05);
        }

        /* --- Main Content --- */
        .reader-main {
            flex: 1;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .reader-canvas {
            max-width: var(--reader-max-width);
            width: 100%;
        }

        #content-area {
            font-size: var(--reader-font-size);
            line-height: var(--reader-line-height);
            letter-spacing: var(--reader-letter-spacing);
        }

        /* Markdown Styling */
        #content-area h1 { font-family: var(--reader-font-heading); font-size: 2.5rem; margin-bottom: 2rem; border-bottom: 2px solid var(--reader-accent); padding-bottom: 1rem; }
        #content-area h2 { font-family: var(--reader-font-heading); font-size: 1.8rem; margin-top: 3rem; margin-bottom: 1rem; }
        #content-area p { margin-bottom: 1.5rem; }
        #content-area strong { color: var(--reader-accent); }
        #content-area blockquote { border-left: 4px solid var(--reader-accent); padding-left: 1.5rem; font-style: italic; color: var(--reader-text); opacity: 0.8; margin: 2rem 0; }

        /* --- UI Controls --- */
        .reader-controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--sidebar-bg);
            padding: 1rem;
            border-radius: 100px;
            display: flex;
            gap: 1rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid var(--border-color);
            z-index: 200;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.5rem;
            border-radius: 50%;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--reader-text);
        }

        .control-btn:hover {
            background: rgba(0,0,0,0.1);
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .reader-sidebar { display: none; }
            .reader-main { padding: 2rem 1rem; }
        }
    </style>
</head>
<body data-theme="fantasy-parchment" data-mode="light">
    
    <aside class="reader-sidebar">
        <div class="book-label">正在閱讀</div>
        <div class="book-title-sidebar" id="book-title">書名載入中...</div>
        
        <div class="book-label">目錄</div>
        <ul class="toc-list" id="toc-list">
            <!-- Dynamically Rendered -->
        </ul>
    </aside>

    <main class="reader-main">
        <article class="reader-canvas">
            <div id="content-area">
                <!-- Content injected via script -->
                讀取中...
            </div>
        </article>
    </main>

    <div class="reader-controls">
        <button class="control-btn" title="切換字體" onclick="toggleFontSize()">A+</button>
        <button class="control-btn" title="深色模式" onclick="toggleDarkMode()">🌓</button>
        <button class="control-btn" title="回書城" onclick="window.location.href='index.html'">🏠</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('book') || 'book-001';
        let currentChapter = 'ch1';

        async function initReader() {
            try {
                const response = await fetch(`../_data/books/${bookId}/metadata.json`);
                const metadata = await response.json();
                
                document.getElementById('book-title').innerText = metadata.title;
                document.title = `${metadata.title} | Smart Library Reader`;
                
                // Set Theme from metadata
                if (metadata.visualStyle && metadata.visualStyle.theme) {
                    document.body.setAttribute('data-theme', metadata.visualStyle.theme);
                }

                // Render TOC
                const tocList = document.getElementById('toc-list');
                tocList.innerHTML = metadata.chapters.map(ch => `
                    <li class="toc-item ${ch.id === currentChapter ? 'active' : ''}" onclick="loadChapter('${ch.id}')">
                        ${ch.title}
                    </li>
                `).join('');

                loadChapter(currentChapter);
            } catch (err) {
                console.error("Reader Init Failed:", err);
                document.getElementById('content-area').innerHTML = "<h1>抱歉</h1><p>無法載入書籍資訊。</p>";
            }
        }

        async function loadChapter(chId) {
            currentChapter = chId;
            
            // Update active TOC item
            document.querySelectorAll('.toc-item').forEach(item => {
                item.classList.remove('active');
                if(item.innerText.includes(chId)) item.classList.add('active'); // Simplistic check
            });

            try {
                const response = await fetch(`../_data/books/${bookId}/${chId}.md`);
                const mdContent = await response.text();
                
                // Clean YAML frontmatter from text if needed, or use a sophisticated parser
                const cleanContent = mdContent.replace(/---[\s\S]*?---/, '');
                
                document.getElementById('content-area').innerHTML = marked.parse(cleanContent);
                window.scrollTo(0, 0);

                // Save progress
                localStorage.setItem(`library-progress-${bookId}`, chId);
                
            } catch (err) {
                document.getElementById('content-area').innerHTML = "<h1>章節載入失敗</h1><p>請確認檔案是否存在於 _data/books 內。</p>";
            }
        }

        function toggleDarkMode() {
            const mode = document.body.getAttribute('data-mode') === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-mode', mode);
        }

        function toggleFontSize() {
            const currentSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--reader-font-size'));
            const nextSize = currentSize >= 1.5 ? 1 : currentSize + 0.1;
            document.documentElement.style.setProperty('--reader-font-size', `${nextSize}rem`);
        }

        // Auto-load last progress
        const savedProgress = localStorage.getItem(`library-progress-${bookId}`);
        if(savedProgress) currentChapter = savedProgress;

        initReader();
    </script>
</body>
</html>
