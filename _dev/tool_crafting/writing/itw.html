<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>.taiwan Web Office 編輯器</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        #editor { width: 50%; padding: 20px; font-family: monospace; font-size: 14px; background: #2d2d2d; color: #ccc; border: none; outline: none; resize: none; }
        #preview { width: 50%; padding: 40px; overflow-y: auto; background: #f9f9f9; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<textarea id="editor" onkeyup="renderTaiwanFile()">
---JSON---
{ "type": "document", "title": "測試文件" }
---MD---
# 歡迎使用 .taiwan Office
這是一段**文書處理**的測試。
---CSV---
產品,價格,庫存
蘋果,30,100
香蕉,15,200
---HTML---
<style> h1 { color: #d32f2f; } </style>
</textarea>

<div id="preview"></div>

<script>
    function renderTaiwanFile() {
        const rawText = document.getElementById('editor').value;
        const previewContent = document.getElementById('preview');
        
        // 1. 基礎解析邏輯
        const sections = {};
        const pattern = /---(JSON|MD|CSV|HTML)---\n([\s\S]*?)(?=\n---|$)/g;
        let match;
        while ((match = pattern.exec(rawText)) !== null) {
            sections[match[1]] = match[2].trim();
        }

        let finalHTML = "";

        // 2. 注入 HTML/CSS 樣式 (PPT 佈景主題或自定義樣式)
        if (sections['HTML']) {
            finalHTML += sections['HTML'];
        }

        // 3. 渲染 Markdown (Word 模式)
        if (sections['MD']) {
            finalHTML += marked.parse(sections['MD']);
        }

        // 4. 渲染 CSV 成表格 (Excel 模式)
        if (sections['CSV']) {
            const lines = sections['CSV'].split('\n');
            let tableHTML = "<table>";
            lines.forEach((line, index) => {
                const cells = line.split(',');
                tableHTML += "<tr>";
                cells.forEach(cell => {
                    tableHTML += index === 0 ? `<th>${cell}</th>` : `<td>${cell}</td>`;
                });
                tableHTML += "</tr>";
            });
            tableHTML += "</table>";
            finalHTML += tableHTML;
        }

        // 5. 更新右側畫面
        previewContent.innerHTML = finalHTML;
    }

    // 初始化渲染
    renderTaiwanFile();
</script>

</body>
</html>
