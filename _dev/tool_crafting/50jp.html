<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mina-No-Kana | 互動式五十音學習助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc;
        }
        .kana-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            perspective: 1000px;
        }
        .kana-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .active-tab {
            border-bottom: 3px solid #4f46e5;
            color: #4f46e5;
        }
        /* 隱藏滾動條但保持功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 font-sans pb-20 selection:bg-indigo-200">

    <div id="app" class="max-w-3xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="text-center mb-10 pt-4">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-sm mb-4 border-2 border-indigo-100">
                <span class="text-3xl">🌸</span>
            </div>
            <h1 class="text-4xl font-bold text-slate-800 mb-3 tracking-tight">大家的五十音 <span class="text-indigo-600">Pro</span></h1>
            <p class="text-slate-500 font-medium">點擊卡片聽發音，展開你的日語之旅</p>
        </header>

        <!-- Controls (Sticky for easy access) -->
        <div class="sticky top-4 z-10 bg-white/80 backdrop-blur-md rounded-2xl shadow-sm border border-slate-200 p-4 mb-8 flex flex-wrap items-center justify-between gap-4">
            <div class="flex gap-2 bg-slate-100 p-1 rounded-xl">
                <button onclick="setMode('hira')" id="btn-hira" class="px-6 py-2.5 rounded-lg font-bold transition-all bg-white text-indigo-600 shadow-sm border-b-2 border-slate-200">平假名</button>
                <button onclick="setMode('kata')" id="btn-kata" class="px-6 py-2.5 rounded-lg font-bold transition-all text-slate-500 hover:text-slate-700">片假名</button>
            </div>
            <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-end">
                <div class="text-sm font-bold bg-indigo-50 text-indigo-600 px-4 py-2 rounded-lg">
                    解鎖進度: <span id="score-display">0</span>/46
                </div>
                <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 text-white px-6 py-2.5 rounded-xl font-bold transition-all shadow-[0_4px_0_0_rgba(67,56,202,1)] active:shadow-[0_0px_0_0_rgba(67,56,202,1)] active:translate-y-[4px]">
                    🎮 開始測驗
                </button>
            </div>
        </div>

        <!-- Grid Headers -->
        <div class="grid grid-cols-5 gap-3 md:gap-4 mb-3 text-center text-slate-400 font-bold text-sm">
            <div>a (あ段)</div>
            <div>i (い段)</div>
            <div>u (う段)</div>
            <div>e (え段)</div>
            <div>o (お段)</div>
        </div>

        <!-- Main Content (Grid) -->
        <div id="grid-container" class="grid grid-cols-5 gap-3 md:gap-4">
            <!-- JavaScript will populate this -->
        </div>

        <!-- Quiz Modal -->
        <div id="quiz-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4 opacity-0 transition-opacity duration-300">
            <div class="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl transform scale-95 transition-transform duration-300" id="quiz-box">
                
                <!-- Quiz Progress -->
                <div id="quiz-header" class="mb-6">
                    <div class="flex justify-between text-sm font-bold text-slate-400 mb-2">
                        <span>測驗進度</span>
                        <span id="quiz-progress-text">1/10</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
                        <div id="quiz-progress-bar" class="bg-indigo-500 h-3 rounded-full transition-all duration-300 w-[10%]"></div>
                    </div>
                </div>

                <!-- Quiz Content -->
                <div id="quiz-content" class="text-center">
                    <h2 class="text-lg font-bold text-slate-500 mb-4">這個假名的發音是？</h2>
                    <div class="flex justify-center mb-8">
                        <div id="quiz-char" class="text-7xl font-bold text-slate-800 bg-slate-50 w-32 h-32 flex items-center justify-center rounded-3xl border-2 border-slate-100 shadow-inner">あ</div>
                    </div>
                    <div id="quiz-options" class="grid grid-cols-2 gap-3">
                        <!-- Options generated by JS -->
                    </div>
                </div>

                <!-- Quiz Result (Hidden initially) -->
                <div id="quiz-result" class="text-center hidden py-8">
                    <div class="text-6xl mb-4">🏆</div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-2">測驗完成！</h2>
                    <p class="text-slate-500 mb-6">你的得分: <span id="final-score" class="text-indigo-600 font-bold text-xl">8</span> / 10</p>
                    <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold mb-3 shadow-[0_4px_0_0_rgba(67,56,202,1)] active:shadow-none active:translate-y-[4px]">再玩一次</button>
                    <button onclick="closeQuiz()" class="w-full bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200">回到首頁</button>
                </div>

                <!-- Quiz Close Button -->
                <button id="btn-close-quiz" onclick="closeQuiz()" class="absolute -top-12 right-0 text-white/80 hover:text-white font-bold tracking-wider">✕ 退出測驗</button>
            </div>
        </div>
    </div>

    <script>
        const kanaData = [
            { hira: 'あ', kata: 'ア', romaji: 'a' }, { hira: 'い', kata: 'イ', romaji: 'i' }, { hira: 'う', kata: 'ウ', romaji: 'u' }, { hira: 'え', kata: 'エ', romaji: 'e' }, { hira: 'お', kata: 'オ', romaji: 'o' },
            { hira: 'か', kata: 'カ', romaji: 'ka' }, { hira: 'き', kata: 'キ', romaji: 'ki' }, { hira: 'く', kata: 'ク', romaji: 'ku' }, { hira: 'け', kata: 'ケ', romaji: 'ke' }, { hira: 'こ', kata: 'コ', romaji: 'ko' },
            { hira: 'さ', kata: 'サ', romaji: 'sa' }, { hira: 'し', kata: 'シ', romaji: 'shi' }, { hira: 'す', kata: 'ス', romaji: 'su' }, { hira: 'せ', kata: 'セ', romaji: 'se' }, { hira: 'そ', kata: 'ソ', romaji: 'so' },
            { hira: 'た', kata: 'タ', romaji: 'ta' }, { hira: 'ち', kata: 'チ', romaji: 'chi' }, { hira: 'つ', kata: 'ツ', romaji: 'tsu' }, { hira: 'て', kata: 'テ', romaji: 'te' }, { hira: 'と', kata: 'ト', romaji: 'to' },
            { hira: 'な', kata: 'ナ', romaji: 'na' }, { hira: 'に', kata: 'ニ', romaji: 'ni' }, { hira: 'ぬ', kata: 'ヌ', romaji: 'nu' }, { hira: 'ね', kata: 'ネ', romaji: 'ne' }, { hira: 'の', kata: 'ノ', romaji: 'no' },
            { hira: 'は', kata: 'ハ', romaji: 'ha' }, { hira: 'ひ', kata: 'ヒ', romaji: 'hi' }, { hira: 'ふ', kata: 'フ', romaji: 'fu' }, { hira: 'へ', kata: 'ヘ', romaji: 'he' }, { hira: 'ほ', kata: 'ホ', romaji: 'ho' },
            { hira: 'ま', kata: 'マ', romaji: 'ma' }, { hira: 'み', kata: 'ミ', romaji: 'mi' }, { hira: 'む', kata: 'ム', romaji: 'mu' }, { hira: 'め', kata: 'メ', romaji: 'me' }, { hira: 'も', kata: 'モ', romaji: 'mo' },
            { hira: 'や', kata: 'ヤ', romaji: 'ya' }, { hira: '', kata: '', romaji: '' }, { hira: 'ゆ', kata: 'ユ', romaji: 'yu' }, { hira: '', kata: '', romaji: '' }, { hira: 'よ', kata: 'ヨ', romaji: 'yo' },
            { hira: 'ら', kata: 'ラ', romaji: 'ra' }, { hira: 'り', kata: 'リ', romaji: 'ri' }, { hira: 'る', kata: 'ル', romaji: 'ru' }, { hira: 'れ', kata: 'レ', romaji: 're' }, { hira: 'ろ', kata: 'ロ', romaji: 'ro' },
            { hira: 'わ', kata: 'ワ', romaji: 'wa' }, { hira: '', kata: '', romaji: '' }, { hira: '', kata: '', romaji: '' }, { hira: '', kata: '', romaji: '' }, { hira: 'を', kata: 'ヲ', romaji: 'wo' },
            { hira: 'ん', kata: 'ン', romaji: 'n' }, { hira: '', kata: '', romaji: '' }, { hira: '', kata: '', romaji: '' }, { hira: '', kata: '', romaji: '' }, { hira: '', kata: '', romaji: '' }
        ];

        let currentMode = 'hira';
        const learnedChars = new Set();
        let synth = window.speechSynthesis; // Web Speech API

        // --- Core UI & Audio ---
        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            kanaData.forEach((item) => {
                if (item.romaji === '') {
                    container.innerHTML += `<div class="p-2 md:p-4 rounded-2xl bg-slate-50/50 border border-slate-100 border-dashed"></div>`;
                    return;
                }

                const card = document.createElement('button');
                card.className = 'kana-card bg-white rounded-2xl p-4 md:p-5 text-center cursor-pointer relative border-2 border-slate-200 shadow-[0_4px_0_0_rgba(226,232,240,1)] hover:mt-[2px] hover:shadow-[0_2px_0_0_rgba(226,232,240,1)] active:mt-[4px] active:shadow-none transition-all outline-none flex flex-col items-center justify-center min-h-[90px]';
                
                card.onclick = () => {
                    playAudio(item[currentMode]);
                    revealHint(card, item.romaji);
                };
                
                card.innerHTML = `
                    <div class="text-3xl md:text-4xl font-bold text-slate-800 mb-1">${item[currentMode]}</div>
                    <div class="romaji-hint text-sm font-bold text-indigo-500 opacity-0 transition-opacity bg-indigo-50 px-2 rounded-md">${item.romaji}</div>
                `;
                container.appendChild(card);
            });
        }

        function playAudio(text) {
            // Cancel previous speech to avoid overlapping
            synth.cancel();
            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'ja-JP';
            utterThis.rate = 0.9; // Slightly slower for clear learning
            synth.speak(utterThis);
        }

        function revealHint(card, romaji) {
            const hint = card.querySelector('.romaji-hint');
            hint.classList.remove('opacity-0');
            card.classList.add('border-indigo-200');
            
            if (!learnedChars.has(romaji)) {
                learnedChars.add(romaji);
                document.getElementById('score-display').innerText = learnedChars.size;
            }
        }

        function setMode(mode) {
            currentMode = mode;
            const activeClass = 'px-6 py-2.5 rounded-lg font-bold transition-all bg-white text-indigo-600 shadow-sm border-b-2 border-slate-200';
            const inactiveClass = 'px-6 py-2.5 rounded-lg font-bold transition-all text-slate-500 hover:text-slate-700 bg-transparent border-b-2 border-transparent';
            
            document.getElementById('btn-hira').className = mode === 'hira' ? activeClass : inactiveClass;
            document.getElementById('btn-kata').className = mode === 'kata' ? activeClass : inactiveClass;
            renderGrid();
        }

        // --- Gamified Quiz Logic ---
        let quizState = {
            questions: [],
            currentIndex: 0,
            score: 0,
            total: 10
        };

        function startQuiz() {
            const modal = document.getElementById('quiz-modal');
            const box = document.getElementById('quiz-box');
            
            // Reset UI
            document.getElementById('quiz-header').classList.remove('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('quiz-result').classList.add('hidden');
            document.getElementById('btn-close-quiz').classList.remove('hidden');

            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                box.classList.remove('scale-95');
            }, 10);

            // Generate Questions
            const validData = kanaData.filter(d => d.romaji !== '');
            quizState.questions = [];
            quizState.score = 0;
            quizState.currentIndex = 0;
            quizState.total = 10;

            for(let i=0; i < quizState.total; i++) {
                quizState.questions.push(validData[Math.floor(Math.random() * validData.length)]);
            }

            renderQuestion();
        }

        function renderQuestion() {
            const q = quizState.questions[quizState.currentIndex];
            
            // Update Progress
            document.getElementById('quiz-progress-text').innerText = `${quizState.currentIndex + 1}/${quizState.total}`;
            document.getElementById('quiz-progress-bar').style.width = `${((quizState.currentIndex) / quizState.total) * 100}%`;
            
            // Render Char
            const charDiv = document.getElementById('quiz-char');
            charDiv.innerText = q[currentMode];
            
            // Play audio automatically on question show (optional, great for learning)
            playAudio(q[currentMode]);

            // Generate Options
            const validData = kanaData.filter(d => d.romaji !== '');
            let options = [q.romaji];
            while (options.length < 4) {
                let randomRomaji = validData[Math.floor(Math.random() * validData.length)].romaji;
                if (!options.includes(randomRomaji)) options.push(randomRomaji);
            }
            options.sort(() => Math.random() - 0.5);

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';
            
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'py-4 rounded-2xl border-2 border-slate-200 bg-white font-bold text-xl text-slate-700 shadow-[0_4px_0_0_rgba(226,232,240,1)] active:shadow-none active:translate-y-[4px] transition-all hover:bg-slate-50';
                btn.innerText = opt;
                btn.onclick = () => handleAnswer(opt, q.romaji, btn, optionsContainer);
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selected, correct, btn, container) {
            // Disable all buttons immediately
            Array.from(container.children).forEach(b => {
                b.disabled = true;
                b.classList.remove('active:shadow-none', 'active:translate-y-[4px]', 'hover:bg-slate-50');
                b.classList.add('cursor-not-allowed');
            });

            if (selected === correct) {
                quizState.score++;
                btn.className = 'py-4 rounded-2xl border-2 border-emerald-500 bg-emerald-100 font-bold text-xl text-emerald-700 shadow-[0_4px_0_0_rgba(16,185,129,1)] translate-y-[2px] transition-all';
                playAudio('正解'); // Optional text or just use browser beep if available
            } else {
                btn.className = 'py-4 rounded-2xl border-2 border-rose-500 bg-rose-100 font-bold text-xl text-rose-700 shadow-[0_4px_0_0_rgba(244,63,94,1)] translate-y-[2px] transition-all animate-pulse';
                // Highlight correct answer
                Array.from(container.children).forEach(b => {
                    if(b.innerText === correct) {
                         b.className = 'py-4 rounded-2xl border-2 border-emerald-500 bg-emerald-50 font-bold text-xl text-emerald-700 transition-all';
                    }
                });
            }

            setTimeout(() => {
                quizState.currentIndex++;
                if (quizState.currentIndex < quizState.total) {
                    renderQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function showResult() {
            document.getElementById('quiz-progress-bar').style.width = '100%';
            setTimeout(() => {
                document.getElementById('quiz-header').classList.add('hidden');
                document.getElementById('quiz-content').classList.add('hidden');
                document.getElementById('btn-close-quiz').classList.add('hidden');
                document.getElementById('quiz-result').classList.remove('hidden');
                document.getElementById('final-score').innerText = quizState.score;
            }, 300);
        }

        function closeQuiz() {
            const modal = document.getElementById('quiz-modal');
            const box = document.getElementById('quiz-box');
            
            modal.classList.add('opacity-0');
            box.classList.add('scale-95');
            
            setTimeout(() => {
                modal.style.display = 'none';
            }, 300);
        }

        // Initialize
        window.onload = () => {
            renderGrid();
        };

    </script>
</body>
</html>
