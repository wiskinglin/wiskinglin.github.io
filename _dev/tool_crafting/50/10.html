<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hank K-Line Pro - 互動式 K 線分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        canvas { cursor: crosshair; }
        .chart-container { position: relative; width: 100%; height: 500px; }
        .tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid #475569;
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
            z-index: 10;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">K-Line Analysis Pro</h1>
                <p class="text-slate-400">適應性產品架構師 - 模擬行情分析系統</p>
            </div>
            <div class="flex space-x-2">
                <button onclick="generateNewData()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2 rounded-lg transition text-sm font-semibold">
                    隨機模擬行情
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div class="text-slate-400 text-xs mb-1">當前價格</div>
                <div id="curr-price" class="text-2xl font-semibold text-emerald-400">--</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div class="text-slate-400 text-xs mb-1">漲跌幅</div>
                <div id="price-change" class="text-2xl font-semibold">--</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div class="text-slate-400 text-xs mb-1">最高 (20D)</div>
                <div id="high-price" class="text-2xl font-semibold">--</div>
            </div>
            <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                <div class="text-slate-400 text-xs mb-1">最低 (20D)</div>
                <div id="low-price" class="text-2xl font-semibold">--</div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 p-4 shadow-2xl overflow-hidden chart-container">
            <div id="chart-tooltip" class="tooltip text-white"></div>
            <canvas id="klineCanvas"></canvas>
        </div>

        <div class="mt-6 text-slate-500 text-sm flex items-center">
            <span class="flex items-center mr-4"><span class="w-3 h-3 bg-red-500 rounded-full mr-1"></span> 賣出壓力</span>
            <span class="flex items-center mr-4"><span class="w-3 h-3 bg-emerald-500 rounded-full mr-1"></span> 買盤力道</span>
            <span class="flex items-center"><span class="w-3 h-3 bg-indigo-500 rounded-full mr-1"></span> MA(5) 趨勢</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('klineCanvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('chart-tooltip');
        
        let data = [];
        const padding = 40;
        const candleWidth = 12;
        const gap = 6;

        // 初始化模擬數據
        function generateData(count = 50) {
            let base = 100;
            const newData = [];
            for (let i = 0; i < count; i++) {
                let open = base;
                let close = base + (Math.random() - 0.5) * 10;
                let high = Math.max(open, close) + Math.random() * 5;
                let low = Math.min(open, close) - Math.random() * 5;
                newData.push({ open, close, high, low, time: `T-${count-i}` });
                base = close;
            }
            return newData;
        }

        function updateStats() {
            const last = data[data.length - 1];
            const prev = data[data.length - 2];
            const change = (((last.close - prev.close) / prev.close) * 100).toFixed(2);
            
            document.getElementById('curr-price').innerText = `$${last.close.toFixed(2)}`;
            const changeEl = document.getElementById('price-change');
            changeEl.innerText = `${change}%`;
            changeEl.className = `text-2xl font-semibold ${change >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            
            const highs = data.map(d => d.high);
            const lows = data.map(d => d.low);
            document.getElementById('high-price').innerText = `$${Math.max(...highs).toFixed(2)}`;
            document.getElementById('low-price').innerText = `$${Math.min(...lows).toFixed(2)}`;
        }

        function draw() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;

            const maxPrice = Math.max(...data.map(d => d.high)) * 1.02;
            const minPrice = Math.min(...data.map(d => d.low)) * 0.98;
            const range = maxPrice - minPrice;

            function getY(price) {
                return canvas.height - padding - ((price - minPrice) / range) * (canvas.height - 2 * padding);
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製格線
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 0.5;
            for(let i = 0; i < 5; i++) {
                let y = padding + i * (canvas.height - 2 * padding) / 4;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(canvas.width - padding, y);
                ctx.stroke();
            }

            // 繪製 K 線
            data.forEach((d, i) => {
                const x = padding + i * (candleWidth + gap);
                const isBull = d.close >= d.open;
                const color = isBull ? '#10b981' : '#f43f5e';

                // 影線
                ctx.strokeStyle = color;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(x + candleWidth / 2, getY(d.high));
                ctx.lineTo(x + candleWidth / 2, getY(d.low));
                ctx.stroke();

                // 實體
                ctx.fillStyle = color;
                const bodyY = getY(Math.max(d.open, d.close));
                const bodyH = Math.max(Math.abs(getY(d.open) - getY(d.close)), 1);
                ctx.fillRect(x, bodyY, candleWidth, bodyH);
            });

            // 繪製 MA(5) 趨勢線
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 2;
            ctx.beginPath();
            for(let i = 4; i < data.length; i++) {
                const avg = (data.slice(i-4, i+1).reduce((s, c) => s + c.close, 0)) / 5;
                const x = padding + i * (candleWidth + gap) + candleWidth / 2;
                if(i === 4) ctx.moveTo(x, getY(avg));
                else ctx.lineTo(x, getY(avg));
            }
            ctx.stroke();
        }

        // 互動效果
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const index = Math.floor((mouseX - padding) / (candleWidth + gap));

            if (index >= 0 && index < data.length) {
                const d = data[index];
                tooltip.style.display = 'block';
                tooltip.style.left = `${e.clientX - rect.left + 15}px`;
                tooltip.style.top = `${e.clientY - rect.top + 15}px`;
                tooltip.innerHTML = `
                    <div class="font-bold border-b border-slate-600 mb-1 pb-1">${d.time}</div>
                    開盤: ${d.open.toFixed(2)}<br/>
                    收盤: ${d.close.toFixed(2)}<br/>
                    最高: ${d.high.toFixed(2)}<br/>
                    最低: ${d.low.toFixed(2)}
                `;
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
        });

        function generateNewData() {
            data = generateData(Math.floor(canvas.width / (candleWidth + gap)) - 5);
            updateStats();
            draw();
        }

        window.addEventListener('resize', draw);
        
        // 初次啟動
        setTimeout(() => {
            generateNewData();
        }, 100);

    </script>
</body>
</html>
