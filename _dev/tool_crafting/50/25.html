<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTuber Hub - Interactive Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #ff6bad;
            --secondary: #6bc3ff;
            --dark: #1a1a2e;
        }

        body {
            background-color: #00ff00;
            /* 綠幕背景，方便 OBS 去背 */
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .vtuber-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            padding: 40px;
        }

        /* 虛擬角色占位符動畫 */
        .avatar-area {
            position: relative;
            width: 450px;
            height: 600px;
            background: linear-gradient(180deg, rgba(255, 107, 173, 0.2) 0%, rgba(107, 195, 255, 0.2) 100%);
            border-radius: 50% 50% 0 0;
            border-bottom: none;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
            border: 4px solid white;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(1deg);
            }
        }

        .avatar-label {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3rem;
            color: white;
            text-shadow: 0 0 15px var(--primary);
        }

        /* 對話框樣式 */
        .speech-bubble {
            position: absolute;
            bottom: 650px;
            left: 50px;
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            max-width: 300px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .speech-bubble.active {
            opacity: 1;
            transform: scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 40px;
            border-width: 15px 15px 0;
            border-style: solid;
            border-color: white transparent;
        }

        /* 控制面板 (僅直播主看見，OBS 擷取時可裁切掉) */
        .control-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(26, 26, 46, 0.9);
            padding: 20px;
            border-radius: 15px;
            color: white;
            width: 280px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            font-weight: bold;
            transition: all 0.2s;
            text-align: center;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.8;
        }

        /* 直播資訊疊層 */
        .overlay-info {
            position: absolute;
            top: 40px;
            left: 40px;
            color: white;
        }

        .live-tag {
            background: #ff4b2b;
            padding: 5px 15px;
            border-radius: 5px;
            font-weight: 900;
            letter-spacing: 1px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="vtuber-container">

        <div class="overlay-info">
            <div id="statusTag" class="live-tag">LIVE</div>
            <h1 class="text-4xl font-black mt-4 drop-shadow-lg">新人 VTuber 配信中！</h1>
            <div class="mt-2 flex space-x-4">
                <span class="bg-black/40 px-3 py-1 rounded-full text-sm">👁️ <span id="viewCount">1,204</span></span>
                <span class="bg-black/40 px-3 py-1 rounded-full text-sm">💖 <span id="likeCount">852</span></span>
            </div>
        </div>

        <div class="relative">
            <div id="bubble" class="speech-bubble">
                <p id="bubbleText" class="text-gray-800 font-bold">各位早安安！今天也要元氣滿滿喔！</p>
            </div>

            <div class="avatar-area">
                <span class="avatar-label">VTUBER</span>
            </div>
        </div>

        <div class="w-80 h-96 bg-black/20 rounded-xl p-4 flex flex-col justify-end overflow-hidden">
            <div id="chatBox" class="space-y-2">
                <div class="text-sm"><span class="text-pink-400 font-bold">Kuro:</span> 草草草草草</div>
                <div class="text-sm"><span class="text-blue-400 font-bold">User123:</span> 晚安安！</div>
                <div class="text-sm"><span class="text-yellow-400 font-bold">Moderator:</span> 請遵守聊天室守則喔~</div>
            </div>
        </div>
    </div>

    <div class="control-panel" id="adminPanel">
        <div class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Director Console</div>

        <div class="mb-4">
            <label class="text-xs text-gray-400">當前狀態</label>
            <div class="flex space-x-2 mt-1">
                <button onclick="setStatus('LIVE', '#ff4b2b')"
                    class="bg-red-600 text-[10px] px-2 py-1 rounded">LIVE</button>
                <button onclick="setStatus('BRB', '#ffa500')"
                    class="bg-orange-500 text-[10px] px-2 py-1 rounded">BRB</button>
                <button onclick="setStatus('END', '#555')"
                    class="bg-gray-600 text-[10px] px-2 py-1 rounded">OFFLINE</button>
            </div>
        </div>

        <div class="mb-4">
            <label class="text-xs text-gray-400">觸發對話</label>
            <input id="customMsg" type="text" placeholder="輸入對話內容..."
                class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-sm mt-1 mb-2">
            <button onclick="speak()" class="btn btn-primary">發送對話框</button>
        </div>

        <div class="text-[10px] text-gray-500 mt-4 italic">
            * 提示：在 OBS 中使用「色度鍵 (Chroma Key)」過濾掉背景綠色即可。
        </div>

        <button onclick="document.getElementById('adminPanel').style.opacity='0.1'"
            class="mt-4 text-xs text-gray-400 hover:text-white w-full text-center">隱藏控制台 (滑鼠移入恢復)</button>
    </div>

    <script>
        // 1. 初始化控制台互動
        const adminPanel = document.getElementById('adminPanel');
        adminPanel.addEventListener('mouseenter', () => adminPanel.style.opacity = '1');

        // 2. 對話系統
        function speak() {
            const msg = document.getElementById('customMsg').value || "大家喜歡今天的直播嗎？";
            const bubble = document.getElementById('bubble');
            const bubbleText = document.getElementById('bubbleText');

            bubbleText.innerText = msg;
            bubble.classList.add('active');

            setTimeout(() => {
                bubble.classList.remove('active');
            }, 4000);
        }

        // 3. 狀態切換系統
        function setStatus(text, color) {
            const tag = document.getElementById('statusTag');
            tag.innerText = text;
            tag.style.backgroundColor = color;
        }

        // 4. 模擬數據更新
        setInterval(() => {
            const views = document.getElementById('viewCount');
            const current = parseInt(views.innerText.replace(',', ''));
            views.innerText = (current + Math.floor(Math.random() * 5)).toLocaleString();
        }, 3000);

        // 5. 模擬聊天室隨機訊息
        const names = ["Sakura", "Tako_Kun", "NekoLover", "Z-Bot", "PixelMaster"];
        const texts = ["太可愛了！", "WWS", "剛剛發生什麼事了？", "求背景音樂歌單", "抖內來了！"];

        setInterval(() => {
            const chatBox = document.getElementById('chatBox');
            const newMsg = document.createElement('div');
            newMsg.className = "text-sm animate-fade-in";
            newMsg.innerHTML = `<span class="text-green-400 font-bold">${names[Math.floor(Math.random() * names.length)]}:</span> ${texts[Math.floor(Math.random() * texts.length)]}`;
            chatBox.appendChild(newMsg);
            if (chatBox.children.length > 8) chatBox.removeChild(chatBox.children[0]);
        }, 5000);
    </script>
</body>

</html>
