<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pikmin Squad Tasker - 皮克敏任務小隊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        body {
            background: linear-gradient(180deg, #a7d08c 0%, #7db35b 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .pikmin-font {
            font-family: 'ZCOOL KuaiLe', cursive;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid #5a8d36;
            border-radius: 20px;
            box-shadow: 0 10px 0 #3e6125;
        }

        .pikmin {
            width: 40px;
            height: 40px;
            display: inline-block;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .pikmin:hover {
            transform: scale(1.2) translateY(-5px);
        }

        .red-pikmin {
            color: #ff4d4d;
        }

        .yellow-pikmin {
            color: #ffd93d;
        }

        .blue-pikmin {
            color: #4d94ff;
        }

        .task-progress {
            height: 12px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
            border: 2px solid #5a8d36;
        }

        .progress-fill {
            height: 100%;
            background: #86efac;
            width: 0%;
            transition: width 0.3s ease;
        }

        @keyframes throw {
            0% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-50px) rotate(180deg);
            }

            100% {
                transform: translateY(0) rotate(360deg);
            }
        }

        .throwing {
            animation: throw 0.5s ease;
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-5xl pikmin-font text-white drop-shadow-lg mb-2">Pikmin Squad Tasker</h1>
            <p class="text-green-900 font-bold">召喚你的皮克敏，解決今日的挑戰！</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <div class="game-card p-6 col-span-1">
                <h2 class="text-xl font-bold mb-4 text-green-800 border-b-2 border-green-200 pb-2">隊伍狀態</h2>
                <div class="space-y-4">
                    <div class="flex items-center justify-between bg-red-100 p-3 rounded-lg border-2 border-red-300">
                        <span class="text-red-600 font-bold">🔴 紅色 (攻擊力)</span>
                        <span id="red-count" class="text-2xl font-black">10</span>
                    </div>
                    <div
                        class="flex items-center justify-between bg-yellow-100 p-3 rounded-lg border-2 border-yellow-300">
                        <span class="text-yellow-600 font-bold">🟡 黃色 (高機動)</span>
                        <span id="yellow-count" class="text-2xl font-black">10</span>
                    </div>
                    <div class="flex items-center justify-between bg-blue-100 p-3 rounded-lg border-2 border-blue-300">
                        <span class="text-blue-600 font-bold">🔵 藍色 (抗壓性)</span>
                        <span id="blue-count" class="text-2xl font-black">10</span>
                    </div>
                </div>
                <p class="mt-6 text-sm text-gray-600 italic">點擊右側任務，投擲皮克敏進行搬運！</p>
            </div>

            <div class="game-card p-6 col-span-1 md:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-green-800">當前任務地區</h2>
                    <button onclick="addTask()"
                        class="bg-green-600 text-white px-4 py-1 rounded-full hover:bg-green-700 transition">探索新任務
                        +</button>
                </div>

                <div id="task-container" class="space-y-4">
                </div>
            </div>
        </div>
    </div>

    <script>
        let squad = { red: 10, yellow: 10, blue: 10 };
        const tasks = [
            { id: 1, name: "撰寫週報專案", weight: 20, current: 0, color: 'red' },
            { id: 2, name: "整理電子郵件", weight: 10, current: 0, color: 'yellow' }
        ];

        function updateUI() {
            document.getElementById('red-count').innerText = squad.red;
            document.getElementById('yellow-count').innerText = squad.yellow;
            document.getElementById('blue-count').innerText = squad.blue;
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('task-container');
            container.innerHTML = '';

            tasks.forEach(task => {
                const isDone = task.current >= task.weight;
                container.innerHTML += `
                    <div class="p-4 rounded-xl border-2 ${isDone ? 'bg-gray-100 border-gray-300' : 'bg-white border-green-200 shadow-sm'} transition-all">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-bold ${isDone ? 'text-gray-400 line-through' : 'text-gray-800'}">${task.name}</h3>
                                <p class="text-xs text-gray-500">所需搬運力: ${task.weight} units</p>
                            </div>
                            ${!isDone ? `<button onclick="throwPikmin(${task.id})" class="bg-blue-500 text-white text-xs px-3 py-1 rounded-full active:scale-95 transition">投擲！</button>` : '✅ 已運回基地'}
                        </div>
                        <div class="task-progress">
                            <div class="progress-fill" style="width: ${(task.current / task.weight) * 100}%"></div>
                        </div>
                    </div>
                `;
            });
        }

        function throwPikmin(taskId) {
            const task = tasks.find(t => t.id === taskId);
            // 隨機選一個還有數量的皮克敏
            const colors = ['red', 'yellow', 'blue'];
            const availableColors = colors.filter(c => squad[c] > 0);

            if (availableColors.length === 0) {
                alert("小隊皮克敏不足！請等待搬運完成或重新配置。");
                return;
            }

            const chosenColor = availableColors[Math.floor(Math.random() * availableColors.length)];

            // 邏輯處理
            squad[chosenColor]--;
            task.current++;

            updateUI();

            // 模擬皮克敏搬運一段時間後回來
            setTimeout(() => {
                squad[chosenColor]++;
                updateUI();
            }, 3000);
        }

        function addTask() {
            const name = prompt("請輸入任務目標（水果或零件名稱）：");
            if (name) {
                const weight = Math.floor(Math.random() * 20) + 5;
                tasks.push({ id: Date.now(), name, weight, current: 0 });
                updateUI();
            }
        }

        // Initial Render
        updateUI();
    </script>
</body>

</html>
