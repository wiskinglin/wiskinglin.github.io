<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoMind - 意圖導向通訊模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: #f0f2f5;
            transition: background 0.5s ease;
        }

        .chat-bubble {
            max-width: 80%;
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 8px;
            position: relative;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .sentiment-positive { background: #e8f5e9; border: 1px solid #c8e6c9; color: #2e7d32; }
        .sentiment-urgent { background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
        .sentiment-neutral { background: #ffffff; border: 1px solid #e0e0e0; color: #424242; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md h-[800px] flex flex-col glass-morphism rounded-[3rem] shadow-2xl overflow-hidden relative border-8 border-gray-900">
        <div class="px-8 pt-10 pb-4 flex justify-between items-center bg-white/50">
            <div>
                <h1 class="text-2xl font-bold text-gray-800 tracking-tight">EchoMind</h1>
                <p class="text-xs text-green-500 font-semibold uppercase tracking-widest">Async Mode Active</p>
            </div>
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 shadow-lg shadow-indigo-200"></div>
        </div>

        <div id="chatDisplay" class="flex-1 overflow-y-auto p-6 space-y-4">
            <div class="chat-bubble sentiment-neutral self-start shadow-sm">
                👋 你好！我是 EchoMind。試著傳送一則訊息，我會根據你的內容與標籤自動調整溝通語境。
            </div>
        </div>

        <div class="p-6 bg-white/80 border-t border-gray-100">
            <div class="flex gap-2 mb-4 overflow-x-auto pb-2">
                <button onclick="setIntent('idea', '💡 提案')" class="intent-btn px-4 py-1.5 bg-gray-100 rounded-full text-xs font-medium whitespace-nowrap hover:bg-indigo-100 transition">💡 提案</button>
                <button onclick="setIntent('urgent', '🚨 緊急')" class="intent-btn px-4 py-1.5 bg-gray-100 rounded-full text-xs font-medium whitespace-nowrap hover:bg-red-100 transition">🚨 緊急</button>
                <button onclick="setIntent('social', '☕ 閒聊')" class="intent-btn px-4 py-1.5 bg-gray-100 rounded-full text-xs font-medium whitespace-nowrap hover:bg-yellow-100 transition">☕ 閒聊</button>
                <button onclick="setIntent('task', '✅ 任務')" class="intent-btn px-4 py-1.5 bg-gray-100 rounded-full text-xs font-medium whitespace-nowrap hover:bg-green-100 transition">✅ 任務</button>
            </div>

            <div class="flex items-end gap-2 bg-gray-50 p-2 rounded-2xl border border-gray-200">
                <textarea id="userInput" rows="1" placeholder="輸入訊息..." class="w-full bg-transparent border-none focus:ring-0 text-sm resize-none py-2 px-2" oninput="analyzeSentiment(this.value)"></textarea>
                <button onclick="sendMessage()" class="bg-gray-900 text-white p-3 rounded-xl hover:scale-105 active:scale-95 transition shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                    </svg>
                </button>
            </div>
            <p id="sentimentHint" class="text-[10px] mt-2 text-gray-400 italic">系統正在分析溝通語氣...</p>
        </div>
    </div>

    <script>
        let currentIntent = { id: 'neutral', label: '💬 訊息' };

        function setIntent(id, label) {
            currentIntent = { id, label };
            // 更新 UI 反饋
            document.querySelectorAll('.intent-btn').forEach(btn => {
                btn.classList.replace('bg-indigo-600', 'bg-gray-100');
                btn.classList.replace('text-white', 'text-gray-600');
                if(btn.innerText === label) {
                    btn.classList.remove('bg-gray-100');
                    btn.classList.add('bg-indigo-600', 'text-white');
                }
            });
        }

        function analyzeSentiment(text) {
            const hint = document.getElementById('sentimentHint');
            if (text.length === 0) {
                document.body.style.background = '#f0f2f5';
                hint.innerText = "系統正在分析溝通語氣...";
                return;
            }

            const urgentKeywords = ['快', '急', '現在', '立刻', 'deadline', '救命'];
            const positiveKeywords = ['謝謝', '棒', '好', '讚', '感恩', '哈'];

            if (urgentKeywords.some(k => text.includes(k))) {
                document.body.style.background = '#fff5f5';
                hint.innerText = "偵測到緊急情緒：建議標註為 🚨 緊急";
            } else if (positiveKeywords.some(k => text.includes(k))) {
                document.body.style.background = '#f0fff4';
                hint.innerText = "偵測到正面情緒：溝通氛圍良好";
            } else {
                document.body.style.background = '#f0f7ff';
                hint.innerText = "偵測到中性語氣：清晰且專業";
            }
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const chatDisplay = document.getElementById('chatDisplay');
            
            if (input.value.trim() === '') return;

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            let sentimentClass = 'sentiment-neutral';
            if (currentIntent.id === 'urgent') sentimentClass = 'sentiment-urgent';
            if (currentIntent.id === 'idea' || currentIntent.id === 'task') sentimentClass = 'sentiment-positive';

            const messageHtml = `
                <div class="flex flex-col items-end space-y-1">
                    <div class="text-[10px] text-gray-400 mr-2">${currentIntent.label}</div>
                    <div class="chat-bubble ${sentimentClass} shadow-md text-sm">
                        ${input.value.replace(/\n/g, '<br>')}
                    </div>
                    <div class="text-[9px] text-gray-400 mr-2">${time} · 已發送</div>
                </div>
            `;

            chatDisplay.insertAdjacentHTML('beforeend', messageHtml);
            
            // 自動滾動到底部
            chatDisplay.scrollTop = chatDisplay.scrollHeight;

            // 清空輸入
            input.value = '';
            input.style.height = 'auto';
            analyzeSentiment('');
            
            // 模擬自動回覆 (展示非同步特點)
            setTimeout(() => {
                const autoReply = `
                    <div class="chat-bubble sentiment-neutral self-start shadow-sm text-sm border-dashed">
                        系統提示：您的「${currentIntent.label}」訊息已排入對方的專注時段。對方將在下次空檔時閱讀。
                    </div>
                `;
                chatDisplay.insertAdjacentHTML('beforeend', autoReply);
                chatDisplay.scrollTop = chatDisplay.scrollHeight;
            }, 1000);
        }

        // 監聽 Enter 鍵
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
