<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha Arch | 轉蛋架構師模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 unpkg 作為備用 CDN 並確保腳本正確加載 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .gacha-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .rarity-ssr {
            background: linear-gradient(135deg, #fde047 0%, #fbbf24 100%);
            color: #451a03;
            box-shadow: 0 0 20px rgba(251, 191, 36, 0.5);
        }

        .rarity-sr {
            background: linear-gradient(135deg, #c084fc 0%, #a855f7 100%);
            color: #fdf4ff;
        }

        .rarity-r {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            color: #eff6ff;
        }

        @keyframes shine {
            0% {
                left: -100%;
            }

            100% {
                left: 100%;
            }
        }

        .ssr-animate::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-25deg);
            animation: shine 1.5s infinite;
        }

        .scroll-custom::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-custom::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .scroll-custom::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 10px;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <!-- Header Section -->
    <header class="w-full max-w-4xl mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-500">
                GACHA ARCH
            </h1>
            <p class="text-slate-400 text-sm">資深手遊商業化架構模擬工具 v1.0.1</p>
        </div>
        <div class="text-right">
            <div id="currency-display"
                class="bg-slate-800 px-4 py-2 rounded-full flex items-center gap-2 border border-slate-700">
                <span class="text-yellow-400 font-bold">💎 聖晶石:</span>
                <span id="gem-count" class="font-mono text-xl">0</span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 lg:grid-cols-3 gap-6">

        <!-- Stats Dashboard -->
        <section class="lg:col-span-1 space-y-4">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3"></i> 數據分析儀
                </h2>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">總抽取數:</span>
                        <span id="total-pulls" class="font-mono">0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">SSR 數量:</span>
                        <span id="ssr-count" class="font-mono text-yellow-400">0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">SSR 機率:</span>
                        <span id="ssr-rate" class="font-mono text-yellow-400">0%</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-400">當前保底計數:</span>
                        <span id="pity-counter" class="font-mono text-purple-400">0 / 80</span>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-700">
                        <p class="text-xs text-slate-500 mb-2">機制說明：</p>
                        <p class="text-xs text-slate-400">基礎 SSR 率 0.6%。70 抽後進入「軟保底」，機率每抽遞增 6%，直到 80 抽必中。</p>
                    </div>
                </div>
            </div>

            <button onclick="resetStats()"
                class="w-full py-3 bg-slate-700 hover:bg-red-900/40 text-slate-300 rounded-xl transition-colors flex items-center justify-center gap-2 text-sm border border-slate-600">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> 重置所有數據
            </button>
        </section>

        <!-- Action & Result Display -->
        <section class="lg:col-span-2 flex flex-col gap-6">

            <!-- Banner Preview -->
            <div
                class="relative rounded-2xl overflow-hidden aspect-[21/9] bg-slate-900 border-2 border-blue-500/30 group">
                <img src="https://images.unsplash.com/photo-1614728263952-84ea256f9679?auto=format&fit=crop&q=80&w=1200"
                    alt="Banner"
                    class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700">
                <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
                <div class="absolute bottom-4 left-6">
                    <span class="bg-blue-600 text-xs font-bold px-2 py-1 rounded mb-2 inline-block">期間限定卡池</span>
                    <h3 class="text-2xl font-black italic tracking-wider text-white">星雲核心：始源之戰</h3>
                </div>
            </div>

            <!-- Buttons -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="performPull(1)"
                    class="group relative overflow-hidden py-4 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-xl transition-all">
                    <div class="relative z-10 flex flex-col items-center">
                        <span class="text-sm font-bold">召喚 1 次</span>
                        <span class="text-xs text-slate-400 flex items-center gap-1 mt-1">
                            <span class="text-yellow-400">💎</span> 160
                        </span>
                    </div>
                </button>
                <button onclick="performPull(10)"
                    class="group relative overflow-hidden py-4 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 rounded-xl transition-all shadow-lg shadow-blue-900/20">
                    <div class="relative z-10 flex flex-col items-center">
                        <span class="text-sm font-bold">召喚 10 次</span>
                        <span class="text-xs text-blue-100 flex items-center gap-1 mt-1 font-medium">
                            <span>💎</span> 1600
                        </span>
                    </div>
                    <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                </button>
            </div>

            <!-- Result Grid -->
            <div id="result-grid" class="grid grid-cols-5 gap-2 min-h-[120px]">
                <!-- Cards will be injected here -->
            </div>

            <!-- History Log -->
            <div class="bg-slate-800/50 rounded-2xl border border-slate-700 p-4">
                <h3 class="text-sm font-bold text-slate-400 mb-3 flex items-center gap-2">
                    <i data-lucide="history" class="w-4 h-4"></i> 最近獲取 (SSR/SR)
                </h3>
                <div id="history-list" class="flex flex-wrap gap-2 max-h-[150px] overflow-y-auto scroll-custom p-2">
                    <!-- History items will be injected here -->
                </div>
            </div>
        </section>
    </main>

    <!-- Notification Overlay (Custom Toast) -->
    <div id="toast-container"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 pointer-events-none flex flex-col items-center gap-2">
    </div>

    <script>
        // --- Game Config ---
        const CONFIG = {
            BASE_SSR_RATE: 0.006, // 0.6%
            BASE_SR_RATE: 0.051,  // 5.1%
            PITY_START: 70,       // 軟保底開始抽數
            MAX_PITY: 80,         // 硬保底必中
            GEM_PER_PULL: 160
        };

        // --- State Management ---
        let state = {
            gemsUsed: 0,
            totalPulls: 0,
            ssrCount: 0,
            pityCounter: 0,
            history: []
        };

        // --- Logic Functions ---
        function getRarity() {
            state.totalPulls++;
            state.pityCounter++;
            state.gemsUsed += CONFIG.GEM_PER_PULL;

            let currentSSRRate = CONFIG.BASE_SSR_RATE;

            // 軟保底邏輯：70抽後機率大幅提升
            if (state.pityCounter > CONFIG.PITY_START) {
                const increase = (state.pityCounter - CONFIG.PITY_START) * 0.06;
                currentSSRRate += increase;
            }

            // 隨機判定
            const roll = Math.random();

            if (roll < currentSSRRate || state.pityCounter >= CONFIG.MAX_PITY) {
                state.ssrCount++;
                state.pityCounter = 0; // 重置保底
                return { id: 'SSR', name: '超稀有 SSR', class: 'rarity-ssr ssr-animate' };
            } else if (roll < (currentSSRRate + CONFIG.BASE_SR_RATE)) {
                return { id: 'SR', name: '稀有 SR', class: 'rarity-sr' };
            } else {
                return { id: 'R', name: '普通 R', class: 'rarity-r' };
            }
        }

        function performPull(count) {
            const grid = document.getElementById('result-grid');
            grid.innerHTML = '';

            const results = [];
            for (let i = 0; i < count; i++) {
                const res = getRarity();
                results.push(res);

                const card = document.createElement('div');
                card.className = `gacha-card h-24 rounded-lg flex items-center justify-center text-[10px] font-black text-center p-1 border-2 border-white/10 ${res.class} animate-in fade-in zoom-in duration-300`;
                card.style.animationDelay = `${i * 0.05}s`;
                card.innerHTML = res.name;
                grid.appendChild(card);

                if (res.id !== 'R') {
                    addToHistory(res);
                }
            }

            updateUI();

            if (results.some(r => r.id === 'SSR')) {
                showToast("🎉 恭喜！您獲得了超稀有角色！", "success");
            }
        }

        function addToHistory(res) {
            const historyList = document.getElementById('history-list');
            const item = document.createElement('div');
            item.className = `px-3 py-1 rounded-full text-xs font-bold border ${res.class}`;
            item.innerHTML = `${res.id} #${state.totalPulls}`;
            historyList.prepend(item);

            state.history.push(res);
            if (state.history.length > 50) state.history.shift();
        }

        function updateUI() {
            document.getElementById('gem-count').innerText = state.gemsUsed.toLocaleString();
            document.getElementById('total-pulls').innerText = state.totalPulls;
            document.getElementById('ssr-count').innerText = state.ssrCount;
            document.getElementById('pity-counter').innerText = `${state.pityCounter} / ${CONFIG.MAX_PITY}`;

            const rate = state.totalPulls > 0 ? ((state.ssrCount / state.totalPulls) * 100).toFixed(2) : 0;
            document.getElementById('ssr-rate').innerText = rate + '%';
        }

        function resetStats() {
            state = { gemsUsed: 0, totalPulls: 0, ssrCount: 0, pityCounter: 0, history: [] };
            document.getElementById('result-grid').innerHTML = '';
            document.getElementById('history-list').innerHTML = '';
            updateUI();
            showToast("數據已完全重置", "info");
        }

        function showToast(msg, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `px-6 py-3 rounded-2xl shadow-2xl border border-white/20 animate-bounce duration-1000 bg-slate-800 text-white font-bold text-sm mb-2`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // --- 安全的圖標初始化 ---
        function initIcons() {
            try {
                if (window.lucide) {
                    window.lucide.createIcons();
                } else if (typeof lucide !== 'undefined') {
                    lucide.createIcons();
                }
            } catch (e) {
                console.warn("Lucide 圖標初始化失敗:", e);
            }
        }

        // --- Initialization ---
        window.addEventListener('load', () => {
            initIcons();
            updateUI();
        });
    </script>
</body>

</html>
