<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idea 50 - 創新工具實驗室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --accent: #f43f5e;
            --bg: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            overflow-x: hidden;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }

        .gradient-text {
            background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #fb7185 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* 檔案狀態標籤 */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-ready { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .status-empty { background: #64748b; }

        /* 全屏檢視器 */
        #viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            background: var(--bg);
            display: none;
            flex-direction: column;
        }

        .viewer-nav {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(15, 23, 42, 0.9);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        iframe {
            flex-grow: 1;
            border: none;
            background: white;
        }

        .nav-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }

        .card-num {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: 900;
            opacity: 0.1;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body class="grid-bg min-h-screen">

    <div class="max-w-7xl mx-auto px-6 py-12">
        <header class="text-center mb-16 relative">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2 w-64 h-64 bg-primary/20 blur-[100px] rounded-full -z-10"></div>
            <h1 class="header-font text-5xl md:text-7xl font-bold mb-4 tracking-tighter">
                IDEA <span class="gradient-text">50</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-2xl mx-auto font-light">
                50 個創新工具原型設計實驗室。點擊卡片即可進入沉浸式瀏覽模式，探索每一項設計創意。
            </p>
        </header>

        <div id="grid-container" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <!-- Cards generated by JS -->
        </div>
    </div>

    <!-- Iframe Viewer Overlay -->
    <div id="viewer">
        <div class="viewer-nav">
            <div class="flex items-center gap-4">
                <button onclick="closeViewer()" class="nav-btn bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white">✕ 關閉</button>
                <span id="viewer-title" class="header-font font-bold text-lg ml-4">Idea #1</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="navigate(-1)" class="nav-btn">← 上一個</button>
                <button onclick="navigate(1)" class="nav-btn">下一個 →</button>
                <button onclick="openExternal()" class="nav-btn bg-primary/20 text-indigo-400">新視窗開啟 ↗</button>
            </div>
        </div>
        <iframe id="viewer-frame" src=""></iframe>
    </div>

    <script>
        const totalItems = 50;
        const existingCount = 39; 
        const container = document.getElementById('grid-container');

        // 簡介數據庫 (從檔案標題推導)
        const metaData = {
            1: { title: "專業證件照製作", desc: "快速生成符合規範的 2 吋與 1 吋證件照排版工具。" },
            2: { title: "EchoMind 通訊模擬", desc: "意圖導向的通訊介面模擬，具備語境分析與情緒偵測功能。" },
            3: { title: "VibeShare 社交原型", desc: "現代化社交介面設計，探索流暢的卡片互動與視覺美學。" },
            4: { title: "Neon Velocity 競速", desc: "極速霓虹風格的遊戲介面實驗，應用高飽和度色彩與動態效果。" },
            5: { title: "ViralFlow 策略預測", desc: "社群內容爆紅趨勢預測工具，視覺化內容傳遞路徑。" },
            6: { title: "大人味除臭劑展示", desc: "情境導向的電商產品落地頁設計，強調故事感與視覺氛圍。" },
            7: { title: "AuraStyle 美學探索", desc: "氛圍美學調色盤與佈局生成器，協助創作者定義設計基調。" },
            8: { title: "TyreMaster 輪胎專家", desc: "專業輪胎規格計算與安全標準查詢工具，工程化設計實踐。" },
            9: { title: "XR Vision Lab 模擬", desc: "空間計算介面模擬，探索混合實境中的互動原則。" },
            10: { title: "Hank K-Line Pro", desc: "互動式 K 線圖表分析工具，針對交易者優化的視覺化介面。" },
            11: { title: "QuantPulse 回測沙盒", desc: "量化交易策略測試環境，提供數據視覺化與績效指標評估。" },
            12: { title: "財富養成鏡", desc: "複利效應與財富增長視覺化工具，將枯燥的數據具象化。" },
            13: { title: "FIRE 退休導航員", desc: "財務自由規劃系統，協助使用者計算退休路徑與資產配置。" },
            14: { title: "Nexus 組織管理", desc: "敏捷開發團隊協作中心，動態卡片驅動的專案進度追蹤。" },
            15: { title: "優勢策略分析器", desc: "基於賽局理論的決策支持系統，分析競爭環境中的最優解。" },
            16: { title: "AuraCanvas 生產力", desc: "視覺化卡片筆記與協作系統，打破傳統線性筆記的限制。" },
            17: { title: "PulseHardware 診斷", desc: "專業硬體健康度監測與性能評估介面，極客風格設計。" },
            18: { title: "Gacha Arch 轉蛋模擬", desc: "遊戲抽卡機率架構模擬器，分析商業模式與機率分佈。" },
            19: { title: "賽局決策工具 v2", desc: "賽局理論分析系統的進階版本，強化數據模型與互動反饋。" },
            20: { title: "皮克敏工作小隊", desc: "趣味性的任務管理工具，將繁瑣任務轉化為小隊冒險。" },
            21: { title: "任務小隊進階版", desc: "皮克敏概念的任務調度系統，支援多工處理與狀態追蹤。" },
            22: { title: "工作小隊展示頁", desc: "專注於任務卡片視覺呈現的 Pikmin 風格展示實驗。" },
            23: { title: "ProGolf 數據分析", desc: "高爾夫球擊球數據視覺化儀表板，提供擊球軌跡與參數預測。" },
            24: { title: "職人壽司圖鑑", desc: "江戶前壽司文化與美學展示，結合精美視覺與百科式內容。" },
            25: { title: "VTuber Hub", desc: "互動式實況覆蓋層設計，強化觀眾參與感與直播氛圍。" },
            26: { title: "ZenFan 虛擬電扇", desc: "極簡主義風格的互動裝置，提供視覺與聽覺的療癒體驗。" },
            27: { title: "ZenBonsai 專注盆栽", desc: "數位化的番茄鐘工具，伴隨著專注時間成長的虛擬盆栽。" },
            28: { title: "ZenAquarium 水族館", desc: "數位寫意水族館，透過互動餵食與景觀調整釋放壓力。" },
            29: { title: "FingerScale 壓力計", desc: "觸控壓力感測實驗，將點擊力道轉化為視覺動態反饋。" },
            30: { title: "電流急急棒 Pro", desc: "經典遊戲的現代化實作，考驗操控精度與反應速度。" },
            31: { title: "PetPal 寵物箱", desc: "AI 驅動的桌面小寵物，提供互動對話與情感支撐。" },
            32: { title: "PokeSim 抽卡模擬", desc: "神奇寶貝風格的抽卡體驗，實作完整的機率分佈與特效展示。" },
            33: { title: "SHIELD 英雄評估", desc: "趣味性的特工適配度測試，應用多維度雷達圖呈現能力。" },
            34: { title: "本地瀑布流相簿", desc: "支援資料夾選取的 Pinterest 風格相簿，具備分類標籤與瀑布流佈局。" },
            35: { title: "內容深度優化模組", desc: "實作執行摘要、風險對策與成本效益分析等提升導向深度的設計策略。" },
            36: { title: "UX 互動功能展示", desc: "整合自動儲存、拖拉排序與多語系切換等增進報告易用性的功能 Showcase。" },
            37: { title: "AI 與技術架構模組", desc: "探索 AI 語意標籤、提問生成與 PWA 離線快取等前瞻技術實作。" },
            38: { title: "UI 與美學升級策略", desc: "應用玻璃擬態、黃金比例佈局與可變字體提升介面視覺質感。" },
            39: { title: "Sakura Chat P2P", desc: "🌸 零伺服器、端對端加密的私密聊天工具，支援 QR Code 快速連線。" },
            40: { title: "實驗項目 #40", desc: "新構思開發中... 敬請期待後續更新。" }
        };

        function getInfo(idx) {
            return metaData[idx] || { title: `Prototype #${idx}`, desc: "正在規劃此創意的實驗方向與視覺設計。" };
        }

        // 生成卡片
        for (let i = 1; i <= totalItems; i++) {
            const isReady = i <= existingCount;
            const info = getInfo(i);
            const card = document.createElement('div');
            card.className = `glass p-6 rounded-2xl cursor-pointer relative flex flex-col h-full ${!isReady ? 'opacity-50 grayscale' : ''}`;
            card.innerHTML = `
                <div class="card-num">${i}</div>
                <div class="flex items-center mb-4">
                    <span class="status-dot ${isReady ? 'status-ready' : 'status-empty'}"></span>
                    <span class="text-xs uppercase tracking-widest font-bold text-slate-500">${isReady ? 'Ready' : 'Drafting'}</span>
                </div>
                <h3 class="header-font font-bold text-xl mb-3 ${isReady ? 'text-white' : 'text-slate-500'}">${info.title}</h3>
                <p class="text-sm text-slate-400 mb-6 leading-relaxed flex-grow">${info.desc}</p>
                <div class="flex items-center justify-between mt-auto">
                    <span class="text-[10px] text-slate-600 font-mono">${i}.html</span>
                    <button class="px-4 py-2 rounded-lg bg-primary/10 text-primary hover:bg-primary hover:text-white transition text-xs font-bold">
                        ${isReady ? 'OPEN ↗' : 'WAITING'}
                    </button>
                </div>
            `;
            
            if (isReady) {
                card.onclick = () => window.open(`${i}.html`, '_blank');
            }
            container.appendChild(card);
        }

        // 移除先前的 Viewer 邏輯 (不刪除 HTML 結構以防萬一，但邏輯改為 window.open)
    </script>
</body>
</html>
