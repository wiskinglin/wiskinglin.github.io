<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XR Vision Lab | 空間計算模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: #050505;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .viewport-container {
            position: relative;
            width: 100%;
            height: 450px;
            background: url('https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&q=80&w=1200') center/cover;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* FOV Mask Effect */
        #fov-mask {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.95) 70%);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* Screen Door Effect (SDE) */
        #sde-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-badge {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-extrabold tracking-tight text-white mb-2">XR <span class="text-indigo-500">Vision Lab</span></h1>
            <p class="text-gray-400">適應性空間計算硬體模擬與規格分析工具</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>設備選擇
                    </h2>
                    
                    <div class="space-y-4">
                        <button onclick="setDevice('avp')" class="w-full text-left p-4 rounded-xl border border-white/10 hover:bg-white/10 transition">
                            <div class="font-bold">Apple Vision Pro</div>
                            <div class="text-xs text-gray-400">Micro-OLED | 100°+ FOV | 40+ PPD</div>
                        </button>
                        <button onclick="setDevice('q3')" class="w-full text-left p-4 rounded-xl border border-white/10 hover:bg-white/10 transition">
                            <div class="font-bold">Meta Quest 3</div>
                            <div class="text-xs text-gray-400">LCD | 110° FOV | 25 PPD</div>
                        </button>
                        <button onclick="setDevice('index')" class="w-full text-left p-4 rounded-xl border border-white/10 hover:bg-white/10 transition">
                            <div class="font-bold">Valve Index</div>
                            <div class="text-xs text-gray-400">LCD | 130° FOV | 14 PPD</div>
                        </button>
                    </div>
                </div>

                <div class="glass-panel p-6 rounded-3xl">
                    <h2 class="text-xl font-semibold mb-6 flex items-center">
                        <span class="w-2 h-6 bg-purple-500 rounded-full mr-3"></span>手動參數調校
                    </h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">視野範圍 (FOV): <span id="fov-val">100</span>°</label>
                            <input type="range" id="fov-slider" min="60" max="150" value="100" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">紗窗效應 (SDE Intensity)</label>
                            <input type="range" id="sde-slider" min="0" max="100" value="20" class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-panel p-4 rounded-3xl">
                    <div class="viewport-container" id="viewport">
                        <div id="fov-mask"></div>
                        <div id="sde-layer"></div>
                        <div class="absolute bottom-6 left-6 z-10">
                            <span id="device-label" class="status-badge px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest text-white">Custom Mode</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div class="glass-panel p-4 rounded-2xl text-center">
                        <div class="text-xs text-gray-500 uppercase">像素密度</div>
                        <div class="text-2xl font-bold text-indigo-400" id="stat-ppd">--</div>
                        <div class="text-[10px] text-gray-400 italic">Pixels Per Degree</div>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl text-center">
                        <div class="text-xs text-gray-500 uppercase">沉浸感評級</div>
                        <div class="text-2xl font-bold text-purple-400" id="stat-immersion">B+</div>
                        <div class="text-[10px] text-gray-400 italic">Based on FOV</div>
                    </div>
                    <div class="glass-panel p-4 rounded-2xl text-center">
                        <div class="text-xs text-gray-500 uppercase">預期用途</div>
                        <div class="text-lg font-bold text-white leading-tight" id="stat-usage">General Use</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fovSlider = document.getElementById('fov-slider');
        const sdeSlider = document.getElementById('sde-slider');
        const fovMask = document.getElementById('fov-mask');
        const sdeLayer = document.getElementById('sde-layer');
        const fovValText = document.getElementById('fov-val');
        const deviceLabel = document.getElementById('device-label');

        const devices = {
            avp: { name: 'Apple Vision Pro', fov: 100, sde: 5, ppd: 42, usage: 'Spatial Productivity' },
            q3: { name: 'Meta Quest 3', fov: 110, sde: 25, ppd: 25, usage: 'Mixed Reality Gaming' },
            index: { name: 'Valve Index', fov: 130, sde: 60, ppd: 14, usage: 'PCVR Enthusiast' }
        };

        function updateVisuals() {
            const fov = fovSlider.value;
            const sde = sdeSlider.value;

            // Update Text
            fovValText.innerText = fov;

            // Simulate FOV (Map 60-150 to mask size)
            // Lower FOV = smaller hole = more black
            const percentage = 100 - ((fov - 60) / (150 - 60) * 60);
            fovMask.style.background = `radial-gradient(circle, transparent ${100 - percentage}%, rgba(0,0,0,0.95) ${130 - percentage}%)`;

            // Simulate Screen Door Effect
            sdeLayer.style.opacity = sde / 100;
            const cellSize = Math.max(1, (100 - (60 - sde/2)) / 20);
            sdeLayer.style.backgroundSize = `${cellSize}px ${cellSize}px`;

            // Update Stats
            document.getElementById('stat-ppd').innerText = Math.round(60 - (sde * 0.5));
            
            let immersion = 'C';
            if (fov > 120) immersion = 'S';
            else if (fov > 100) immersion = 'A';
            else if (fov > 80) immersion = 'B';
            document.getElementById('stat-immersion').innerText = immersion;
        }

        function setDevice(key) {
            const d = devices[key];
            fovSlider.value = d.fov;
            sdeSlider.value = d.sde;
            deviceLabel.innerText = d.name;
            document.getElementById('stat-usage').innerText = d.usage;
            updateVisuals();
        }

        fovSlider.addEventListener('input', () => {
            deviceLabel.innerText = 'Custom Mode';
            updateVisuals();
        });
        sdeSlider.addEventListener('input', () => {
            deviceLabel.innerText = 'Custom Mode';
            updateVisuals();
        });

        // Init
        updateVisuals();
    </script>
</body>
</html>
