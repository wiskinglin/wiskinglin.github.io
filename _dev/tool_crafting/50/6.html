<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大人味除臭劑 | 找回消失的少年感</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            transition: background 1.5s ease;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            min-height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2rem;
        }
        .btn-option {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-option:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.25);
        }
        #progress-bar { transition: width 0.5s ease; }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <div id="app" class="max-w-2xl w-full">
        <div id="start-screen" class="glass-card p-10 text-center shadow-2xl">
            <h1 class="text-4xl font-bold mb-6 tracking-tight">不要成為討厭的大人</h1>
            <p class="text-lg opacity-80 mb-8 leading-relaxed">
                成長是妥協的過程，但不是失去自我的藉口。<br>
                花三分鐘，檢測你現在的「純真殘留值」。
            </p>
            <button onclick="startQuiz()" class="bg-white text-gray-900 px-8 py-3 rounded-full font-bold hover:bg-opacity-90 transition-all shadow-lg">
                開始檢測
            </button>
        </div>

        <div id="quiz-screen" class="hidden glass-card p-8 shadow-2xl">
            <div class="mb-6">
                <div class="flex justify-between text-sm mb-2 opacity-70">
                    <span id="question-number">第 1 題 / 共 5 題</span>
                    <span id="progress-percent">20%</span>
                </div>
                <div class="w-full bg-gray-700 h-1.5 rounded-full">
                    <div id="progress-bar" class="bg-blue-400 h-1.5 rounded-full" style="width: 20%"></div>
                </div>
            </div>
            
            <h2 id="question-text" class="text-2xl font-medium mb-8 min-h-[4rem]">正在載入問題...</h2>
            
            <div id="options-container" class="space-y-4">
                </div>
        </div>

        <div id="result-screen" class="hidden glass-card p-10 text-center shadow-2xl">
            <h2 class="text-xl opacity-80 mb-2">你的純真殘留值</h2>
            <div id="score-display" class="text-7xl font-bold mb-6">0%</div>
            <p id="result-title" class="text-2xl font-bold mb-4 text-blue-300"></p>
            <p id="result-desc" class="text-lg opacity-80 mb-8 leading-relaxed"></p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                <div class="p-4 bg-white/5 rounded-xl text-sm">
                    <div class="opacity-60">勇氣</div>
                    <div id="stat-courage" class="font-bold text-lg text-yellow-300">--</div>
                </div>
                <div class="p-4 bg-white/5 rounded-xl text-sm">
                    <div class="opacity-60">同理心</div>
                    <div id="stat-empathy" class="font-bold text-lg text-pink-300">--</div>
                </div>
                <div class="p-4 bg-white/5 rounded-xl text-sm">
                    <div class="opacity-60">好奇心</div>
                    <div id="stat-curiosity" class="font-bold text-lg text-green-300">--</div>
                </div>
            </div>

            <button onclick="location.reload()" class="border border-white/30 px-6 py-2 rounded-full hover:bg-white/10 transition-all">
                重新提醒自己
            </button>
        </div>
    </div>

    <script>
        const questions = [
            {
                q: "當你在路上看到一個特別的街頭藝人表演時：",
                options: [
                    { t: "駐足欣賞並報以微笑或掌聲", s: 20, type: 'curiosity' },
                    { t: "看一眼錶，快速走過並覺得他們在擋路", s: 5, type: 'empathy' },
                    { t: "心裡默默計算他一天能賺多少錢", s: 0, type: 'courage' }
                ]
            },
            {
                q: "遇到與你意見完全相左的人，你的反應是：",
                options: [
                    { t: "試著理解對方的生命脈絡", s: 20, type: 'empathy' },
                    { t: "禮貌性點頭，心裡想著這人真難溝通", s: 10, type: 'empathy' },
                    { t: "為了和諧而附和，即便你完全不認同", s: 0, type: 'courage' }
                ]
            },
            {
                q: "對於小時候曾經擁有的「不切實際」夢想：",
                options: [
                    { t: "偶爾還會嘗試接觸，或保留相關愛好", s: 20, type: 'courage' },
                    { t: "覺得那是浪費時間，現在賺錢比較要緊", s: 0, type: 'courage' },
                    { t: "會拿來開玩笑自嘲", s: 10, type: 'curiosity' }
                ]
            },
            {
                q: "當你看到不公義的事情在眼前發生：",
                options: [
                    { t: "雖然害怕，但仍嘗試發聲或尋求協助", s: 20, type: 'courage' },
                    { t: "心裡難過，但告訴自己這就是社會現實", s: 10, type: 'empathy' },
                    { t: "關我什麼事？別惹麻煩上身", s: 0, type: 'courage' }
                ]
            },
            {
                q: "你上次單純為了「有趣」而學一件新東西是什麼時候？",
                options: [
                    { t: "最近一週內，我對世界仍感到好奇", s: 20, type: 'curiosity' },
                    { t: "除非對工作有幫助，否則不會亂學", s: 0, type: 'curiosity' },
                    { t: "我不記得了，生活已經被瑣事填滿", s: 5, type: 'curiosity' }
                ]
            }
        ];

        let currentQ = 0;
        let totalScore = 0;
        let stats = { courage: 0, empathy: 0, curiosity: 0 };

        function startQuiz() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQ];
            document.getElementById('question-number').innerText = `第 ${currentQ + 1} 題 / 共 ${questions.length} 題`;
            document.getElementById('progress-percent').innerText = `${Math.round(((currentQ + 1) / questions.length) * 100)}%`;
            document.getElementById('progress-bar').style.width = `${((currentQ + 1) / questions.length) * 100}%`;
            document.getElementById('question-text').innerText = q.q;

            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-5 glass-card btn-option text-lg";
                btn.innerText = opt.t;
                btn.onclick = () => selectOption(opt);
                container.appendChild(btn);
            });
        }

        function selectOption(opt) {
            totalScore += opt.s;
            stats[opt.type] += opt.s;
            
            // 改變背景色效果 (逐漸變亮或變暗)
            const hue = 200 + (totalScore / 100) * 100;
            document.body.style.background = `linear-gradient(135deg, hsl(${hue}, 40%, 30%), hsl(${hue + 40}, 50%, 50%))`;

            if (currentQ < questions.length - 1) {
                currentQ++;
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            
            const score = totalScore;
            document.getElementById('score-display').innerText = score + '%';
            
            let title = "";
            let desc = "";

            if (score >= 80) {
                title = "「靈魂未染塵的少年」";
                desc = "你太棒了。儘管世界試圖打磨你，你依然保留了最珍貴的稜角與光芒。請繼續保持這份不合時宜的勇敢。";
            } else if (score >= 50) {
                title = "「正在鋼索上平衡的旅人」";
                desc = "你感受到了成人的壓力，但你依然在夜深人靜時記得當初的自己。偶爾讓那個孩子出來透透氣吧，他想你了。";
            } else {
                title = "「急需除臭的重度大人」";
                desc = "警報響起！你是否太習慣於說「這就是現實」了？現實是灰色的，但你的眼睛可以是彩色的。今天就去做一件毫無利益、純粹快樂的小事吧。";
            }

            document.getElementById('result-title').innerText = title;
            document.getElementById('result-desc').innerText = desc;
            
            // 填充能力值
            document.getElementById('stat-courage').innerText = stats.courage + " pts";
            document.getElementById('stat-empathy').innerText = stats.empathy + " pts";
            document.getElementById('stat-curiosity').innerText = stats.curiosity + " pts";
        }
    </script>
</body>
</html>
