<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViralFlow // 社群內容策略預測工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 1);
        }
        .score-gradient {
            background: linear-gradient(90deg, #f43f5e 0%, #fbbf24 50%, #10b981 100%);
        }
        .animate-pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 tracking-tight">ViralFlow <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-500">內容策略師的病毒式傳播工作台</p>
            </div>
            <div class="hidden md:block">
                <span class="px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-sm font-medium">策略模式：增長駭客</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Editor & Controls -->
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-2xl p-6 shadow-sm">
                    <div class="flex gap-4 mb-6 overflow-x-auto pb-2">
                        <button onclick="setPlatform('Instagram')" id="btn-Instagram" class="platform-btn px-4 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-pink-100 hover:text-pink-700 transition-all font-medium whitespace-nowrap">Instagram</button>
                        <button onclick="setPlatform('Facebook')" id="btn-Facebook" class="platform-btn px-4 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-100 hover:text-blue-700 transition-all font-medium whitespace-nowrap">Facebook</button>
                        <button onclick="setPlatform('Threads')" id="btn-Threads" class="platform-btn px-4 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-slate-900 hover:text-white transition-all font-medium whitespace-nowrap">Threads</button>
                        <button onclick="setPlatform('LinkedIn')" id="btn-LinkedIn" class="platform-btn px-4 py-2 rounded-xl bg-slate-100 text-slate-600 hover:bg-blue-50 hover:text-blue-900 transition-all font-medium whitespace-nowrap">LinkedIn</button>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">步驟 1：撰寫吸引人的「鉤子」 (Hook)</label>
                            <input type="text" id="post-hook" oninput="updateAnalysis()" placeholder="例如：這是我如何在 30 天內增長 10k 粉絲的秘密..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">步驟 2：核心價值內容 (Body Content)</label>
                            <textarea id="post-body" oninput="updateAnalysis()" rows="6" placeholder="分享你的觀點、故事或教學..." class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"></textarea>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-2">步驟 3：行動呼籲 (CTA)</label>
                            <input type="text" id="post-cta" oninput="updateAnalysis()" placeholder="點擊連結了解更多 / 在下方留言你的看法！" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-2xl p-6 shadow-sm">
                    <h3 class="text-lg font-bold text-slate-800 mb-4">標籤策略與建議</h3>
                    <div class="flex flex-wrap gap-2" id="tag-suggestions">
                        <!-- Dynamic Tags -->
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-blue-500 hover:text-white">#數位行銷</span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-blue-500 hover:text-white">#社群經營</span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-blue-500 hover:text-white">#創業</span>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-lg text-sm cursor-pointer hover:bg-blue-500 hover:text-white">#內容創作</span>
                    </div>
                </div>
            </div>

            <!-- Right: Analysis Dashboard -->
            <div class="space-y-6">
                <!-- Score Meter -->
                <div class="glass-card rounded-3xl p-8 shadow-lg text-center border-t-4 border-blue-500">
                    <h3 class="text-slate-500 font-semibold mb-2 uppercase tracking-widest text-xs">病毒式傳播潛力</h3>
                    <div class="relative inline-flex items-center justify-center mb-4">
                        <svg class="w-32 h-32 transform -rotate-90">
                            <circle cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" class="text-slate-100"></circle>
                            <circle id="score-circle" cx="64" cy="64" r="58" stroke="currentColor" stroke-width="8" fill="transparent" stroke-dasharray="364.4" stroke-dashoffset="364.4" class="text-blue-500 transition-all duration-1000 ease-out"></circle>
                        </svg>
                        <span id="score-text" class="absolute text-4xl font-bold text-slate-800">0</span>
                    </div>
                    <p id="score-feedback" class="text-sm text-slate-600 px-4">請開始輸入文案來預測表現...</p>
                </div>

                <!-- Platform Checklists -->
                <div class="glass-card rounded-2xl p-6 shadow-sm">
                    <h3 class="font-bold text-slate-800 mb-4 flex items-center">
                        <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        平台適配檢查板
                    </h3>
                    <ul class="space-y-3">
                        <li class="flex justify-between items-center text-sm">
                            <span class="text-slate-600">目前平台：</span>
                            <span id="current-platform" class="font-bold text-blue-600">請選擇</span>
                        </li>
                        <li class="flex justify-between items-center text-sm">
                            <span class="text-slate-600">總字數：</span>
                            <span id="char-count" class="font-medium text-slate-800">0</span>
                        </li>
                        <li class="flex justify-between items-center text-sm">
                            <span class="text-slate-600">黃金前三行：</span>
                            <span id="hook-status" class="text-red-500">❌ 未優化</span>
                        </li>
                        <li class="flex justify-between items-center text-sm">
                            <span class="text-slate-600">CTA 引導：</span>
                            <span id="cta-status" class="text-red-500">❌ 缺失</span>
                        </li>
                    </ul>
                </div>

                <!-- Psychology Tips -->
                <div class="bg-indigo-900 rounded-2xl p-6 text-white shadow-xl overflow-hidden relative">
                    <div class="relative z-10">
                        <h4 class="font-bold mb-2 flex items-center">
                            <span class="animate-pulse-slow mr-2">💡</span> 專家建議
                        </h4>
                        <p id="expert-tip" class="text-indigo-100 text-sm italic">"選擇一個平台開始你的創作，我會給你最專業的點評。"</p>
                    </div>
                    <div class="absolute -right-4 -bottom-4 opacity-10">
                        <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                    </div>
                </div>

                <button onclick="copyPost()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-lg active:scale-95">
                    複製完整文案
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentPlatform = '';
        const platforms = {
            'Instagram': { limit: 2200, hookLimit: 60, tips: "IG 注意視覺描述。前兩行必須決定使用者是否點擊 '更多'。" },
            'Facebook': { limit: 5000, hookLimit: 80, tips: "FB 適合長故事。利用圖片標題與第一段的共鳴感。" },
            'Threads': { limit: 500, hookLimit: 40, tips: "Threads 講求即時與真實。直接進入重點，避免官腔。" },
            'LinkedIn': { limit: 3000, hookLimit: 100, tips: "LinkedIn 專注於專業洞察。用數據或職涯教訓開場。" }
        };

        const triggers = ["秘密", "驚人", "免費", "教學", "攻略", "不公開", "如何", "關鍵", "失敗", "成功"];

        function setPlatform(name) {
            currentPlatform = name;
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-blue-500', 'bg-white', 'shadow-md');
                btn.classList.add('bg-slate-100');
            });
            document.getElementById(`btn-${name}`).classList.add('ring-2', 'ring-blue-500', 'bg-white', 'shadow-md');
            document.getElementById('current-platform').innerText = name;
            updateAnalysis();
        }

        function updateAnalysis() {
            const hook = document.getElementById('post-hook').value;
            const body = document.getElementById('post-body').value;
            const cta = document.getElementById('post-cta').value;
            const fullText = `${hook}\n\n${body}\n\n${cta}`;
            
            // 1. 基本計數
            document.getElementById('char-count').innerText = fullText.length;
            
            // 2. 演算法算分
            let score = 0;
            if (hook.length > 5) score += 20;
            if (hook.length > 10 && hook.length < 80) score += 10;
            if (body.length > 30) score += 20;
            if (cta.length > 3) score += 20;
            
            // 情緒關鍵字檢查
            let triggerCount = 0;
            triggers.forEach(word => {
                if (fullText.includes(word)) triggerCount++;
            });
            score += Math.min(triggerCount * 10, 30);

            // 3. UI 反饋
            const circle = document.getElementById('score-circle');
            const scoreText = document.getElementById('score-text');
            const offset = 364.4 - (score / 100) * 364.4;
            circle.style.strokeDashoffset = offset;
            scoreText.innerText = score;

            // 狀態檢查
            if (hook.length > 0) {
                document.getElementById('hook-status').innerText = hook.length < (currentPlatform ? platforms[currentPlatform].hookLimit : 60) ? '✅ 完美長度' : '⚠️ 鉤子過長';
                document.getElementById('hook-status').className = 'font-medium text-green-500';
            }
            
            if (cta.length > 0) {
                document.getElementById('cta-status').innerText = '✅ 已加入行動呼籲';
                document.getElementById('cta-status').className = 'font-medium text-green-500';
            } else {
                document.getElementById('cta-status').innerText = '❌ 缺失';
                document.getElementById('cta-status').className = 'font-medium text-red-500';
            }

            // 評分評價與建議
            let feedback = "";
            let tip = "";

            if (!currentPlatform) {
                feedback = "請先選擇發布平台，以獲得精準建議。";
                tip = "選對平台，是內容成功的一半。";
            } else {
                tip = platforms[currentPlatform].tips;
                if (score < 40) feedback = "內容過於單薄，試著加入更多個人故事或價值點。";
                else if (score < 70) feedback = "表現不錯，如果能加入更多「情緒觸發詞」會更吸睛。";
                else feedback = "這是一篇極具潛力的文章！準備好迎接互動了嗎？";
            }
            
            document.getElementById('score-feedback').innerText = feedback;
            document.getElementById('expert-tip').innerText = tip;
        }

        function copyPost() {
            const hook = document.getElementById('post-hook').value;
            const body = document.getElementById('post-body').value;
            const cta = document.getElementById('post-cta').value;
            const textToCopy = `${hook}\n\n${body}\n\n${cta}`;
            
            const el = document.createElement('textarea');
            el.value = textToCopy;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = document.querySelector('button[onclick="copyPost()"]');
            const originalText = btn.innerText;
            btn.innerText = "✅ 已複製到剪貼簿";
            btn.classList.replace('bg-slate-900', 'bg-green-600');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.replace('bg-green-600', 'bg-slate-900');
            }, 2000);
        }
    </script>
</body>
</html>
