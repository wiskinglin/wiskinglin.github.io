<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財富養成鏡 | 投資複利視覺化工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'PingFang TC', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 24px;
        }
        .input-group:focus-within label { color: #3b82f6; }
        input[type="range"] { accent-color: #3b82f6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-900 mb-2">財富養成鏡</h1>
            <p class="text-slate-500">見證時間與複利的力量，開啟你的投資生活</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-6 shadow-sm">
                    <h3 class="text-lg font-semibold mb-6 text-slate-800 border-b pb-2">投資參數</h3>
                    
                    <div class="space-y-6">
                        <div class="input-group">
                            <label class="block text-sm font-medium text-slate-600 mb-2">初始資金 (NT$)</label>
                            <input type="number" id="initPrincipal" value="100000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div class="input-group">
                            <label class="block text-sm font-medium text-slate-600 mb-2">每月投入 (NT$)</label>
                            <input type="number" id="monthlyIn" value="10000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        </div>

                        <div class="input-group">
                            <label class="block text-sm font-medium text-slate-600 mb-2 flex justify-between">
                                預期年化報酬率 <span><span id="rateVal">7</span>%</span>
                            </label>
                            <input type="range" id="annualRate" min="1" max="20" step="0.5" value="7" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        </div>

                        <div class="input-group">
                            <label class="block text-sm font-medium text-slate-600 mb-2 flex justify-between">
                                養成時長 <span><span id="yearsVal">20</span>年</span>
                            </label>
                            <input type="range" id="years" min="1" max="40" step="1" value="20" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer">
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 bg-blue-600 text-white shadow-lg shadow-blue-200">
                    <h4 class="font-semibold mb-2">💡 專家洞察</h4>
                    <p class="text-sm opacity-90 leading-relaxed">
                        在你的設定下，第 <span id="breakEvenYear" class="font-bold underline">12</span> 年時，投資產生的「複利收益」將會超過你的「投入本金」。這就是所謂的財富引爆點！
                    </p>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-6 shadow-sm min-h-[400px] flex flex-col">
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <p class="text-sm text-slate-500">預計期末總資產</p>
                            <h2 class="text-4xl font-bold text-blue-600" id="finalBalance">NT$ 0</h2>
                        </div>
                        <div class="text-right">
                            <p class="text-sm text-slate-500">總回報率</p>
                            <p class="text-xl font-semibold text-emerald-500" id="totalROI">0%</p>
                        </div>
                    </div>
                    
                    <div class="flex-grow">
                        <canvas id="wealthChart"></canvas>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <p class="text-xs text-slate-400 uppercase tracking-wider">總投入本金</p>
                            <p class="text-lg font-semibold text-slate-700" id="totalPrincipal">NT$ 0</p>
                        </div>
                        <div class="p-4 bg-slate-50 rounded-2xl">
                            <p class="text-xs text-slate-400 uppercase tracking-wider">總複利收益</p>
                            <p class="text-lg font-semibold text-slate-700" id="totalInterest">NT$ 0</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('wealthChart').getContext('2d');
        let wealthChart;

        function calculateWealth() {
            const P = parseFloat(document.getElementById('initPrincipal').value) || 0;
            const PMT = parseFloat(document.getElementById('monthlyIn').value) || 0;
            const r = parseFloat(document.getElementById('annualRate').value) / 100 / 12;
            const n = parseInt(document.getElementById('years').value) * 12;

            document.getElementById('rateVal').innerText = document.getElementById('annualRate').value;
            document.getElementById('yearsVal').innerText = document.getElementById('years').value;

            let labels = [];
            let principalData = [];
            let totalData = [];
            
            let currentBalance = P;
            let currentPrincipal = P;
            let breakYear = 0;
            let foundBreak = false;

            for (let i = 0; i <= n; i++) {
                if (i % 12 === 0) {
                    labels.push(`第 ${i/12} 年`);
                    principalData.push(currentPrincipal);
                    totalData.push(Math.round(currentBalance));
                    
                    if (!foundBreak && (currentBalance - currentPrincipal) > currentPrincipal) {
                        breakYear = i/12;
                        foundBreak = true;
                    }
                }
                currentBalance = currentBalance * (1 + r) + PMT;
                currentPrincipal += PMT;
            }

            const finalBal = totalData[totalData.length - 1];
            const finalPrin = principalData[principalData.length - 1];
            const finalInt = finalBal - finalPrin;

            document.getElementById('finalBalance').innerText = `NT$ ${finalBal.toLocaleString()}`;
            document.getElementById('totalPrincipal').innerText = `NT$ ${finalPrin.toLocaleString()}`;
            document.getElementById('totalInterest').innerText = `NT$ ${finalInt.toLocaleString()}`;
            document.getElementById('totalROI').innerText = `+${((finalInt / finalPrin) * 100).toFixed(1)}%`;
            document.getElementById('breakEvenYear').innerText = foundBreak ? breakYear : '--';

            updateChart(labels, principalData, totalData);
        }

        function updateChart(labels, principal, total) {
            if (wealthChart) wealthChart.destroy();

            wealthChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '期末總資產',
                            data: total,
                            borderColor: '#3b82f6',
                            backgroundColor: 'rgba(59, 130, 246, 0.1)',
                            fill: true,
                            tension: 0.4,
                            borderWidth: 3,
                            pointRadius: 0,
                            pointHoverRadius: 6
                        },
                        {
                            label: '累計投入本金',
                            data: principal,
                            borderColor: '#94a3b8',
                            borderDash: [5, 5],
                            fill: false,
                            tension: 0,
                            pointRadius: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': NT$ ' + context.parsed.y.toLocaleString();
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            grid: { color: '#f1f5f9' },
                            ticks: { callback: value => 'NT$ ' + value / 10000 + '萬' }
                        },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        // Event Listeners
        ['initPrincipal', 'monthlyIn', 'annualRate', 'years'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateWealth);
        });

        // Initialize
        calculateWealth();
    </script>
</body>
</html>
