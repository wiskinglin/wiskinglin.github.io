<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - 敏捷組織管理中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'PingFang TC', sans-serif;
            background-color: #f8fafc;
        }
        .matrix-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .matrix-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 9999px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body class="text-slate-800">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 text-white flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6">
            <h1 class="text-2xl font-bold tracking-tight text-blue-400">NEXUS</h1>
            <p class="text-slate-400 text-xs mt-1">戰略管理系統</p>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600 rounded-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span>指揮中心</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-800 rounded-lg transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span>所有專案</span>
            </a>
            <a href="#" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-800 rounded-lg transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span>效率分析</span>
            </a>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <div class="flex items-center space-x-3">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">JD</div>
                <div>
                    <p class="text-sm font-medium">系統管理者</p>
                    <p class="text-xs text-slate-500">專業版帳戶</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto custom-scroll flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-slate-200 p-6 flex justify-between items-center sticky top-0 z-10">
            <div>
                <h2 class="text-xl font-bold">今日管理焦點</h2>
                <p class="text-slate-500 text-sm" id="currentDate"></p>
            </div>
            <button id="addTaskBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold flex items-center space-x-2 transition shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span>新增策略任務</span>
            </button>
        </header>

        <div class="p-6 flex-1">
            <!-- Stats Bar -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm font-medium">完成率</p>
                    <div class="flex items-end justify-between mt-2">
                        <span class="text-3xl font-bold" id="completionRate">0%</span>
                        <div class="w-24 bg-slate-100 h-2 rounded-full overflow-hidden">
                            <div id="completionBar" class="bg-green-500 h-full w-0 transition-all duration-500"></div>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm font-medium">待處理任務</p>
                    <p class="text-3xl font-bold mt-2" id="pendingTasksCount">0</p>
                </div>
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-slate-500 text-sm font-medium">重要且緊急</p>
                    <p class="text-3xl font-bold mt-2 text-red-500" id="criticalTasksCount">0</p>
                </div>
            </div>

            <!-- Eisenhower Matrix Grid -->
            <h3 class="text-lg font-bold mb-4 text-slate-600 uppercase tracking-wider">艾森豪決策矩陣</h3>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-[800px] lg:h-[600px]">
                <!-- Q1: Urgent & Important -->
                <div class="matrix-card bg-red-50 border border-red-100 rounded-2xl p-5 flex flex-col shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-red-700 flex items-center">
                            <span class="w-2 h-2 bg-red-500 rounded-full mr-2"></span>
                            象限 I：立即處理
                        </h4>
                        <span class="text-xs font-bold text-red-400">緊急且重要</span>
                    </div>
                    <div id="q1-list" class="space-y-3 overflow-y-auto flex-1 custom-scroll pr-2"></div>
                </div>

                <!-- Q2: Not Urgent & Important -->
                <div class="matrix-card bg-blue-50 border border-blue-100 rounded-2xl p-5 flex flex-col shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-blue-700 flex items-center">
                            <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span>
                            象限 II：戰略規劃
                        </h4>
                        <span class="text-xs font-bold text-blue-400">重要但不緊急</span>
                    </div>
                    <div id="q2-list" class="space-y-3 overflow-y-auto flex-1 custom-scroll pr-2"></div>
                </div>

                <!-- Q3: Urgent & Not Important -->
                <div class="matrix-card bg-orange-50 border border-orange-100 rounded-2xl p-5 flex flex-col shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-orange-700 flex items-center">
                            <span class="w-2 h-2 bg-orange-500 rounded-full mr-2"></span>
                            象限 III：授權委派
                        </h4>
                        <span class="text-xs font-bold text-orange-400">緊急但不重要</span>
                    </div>
                    <div id="q3-list" class="space-y-3 overflow-y-auto flex-1 custom-scroll pr-2"></div>
                </div>

                <!-- Q4: Not Urgent & Not Important -->
                <div class="matrix-card bg-slate-100 border border-slate-200 rounded-2xl p-5 flex flex-col shadow-sm">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="font-bold text-slate-700 flex items-center">
                            <span class="w-2 h-2 bg-slate-500 rounded-full mr-2"></span>
                            象限 IV：減少處理
                        </h4>
                        <span class="text-xs font-bold text-slate-400">不重要且不緊急</span>
                    </div>
                    <div id="q4-list" class="space-y-3 overflow-y-auto flex-1 custom-scroll pr-2"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Add Task Modal -->
<div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden transform transition-all">
        <div class="p-6 border-b border-slate-100">
            <h3 class="text-xl font-bold">建立新策略任務</h3>
        </div>
        <form id="taskForm" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">任務名稱</label>
                <input type="text" id="taskName" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="例如：完成 Q3 戰略報告">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">重要性</label>
                    <select id="importance" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="high">高重要度</option>
                        <option value="low">低重要度</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">緊急性</label>
                    <select id="urgency" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="high">高緊急度</option>
                        <option value="low">低緊急度</option>
                    </select>
                </div>
            </div>
            <div class="pt-4 flex space-x-3">
                <button type="button" id="closeModal" class="flex-1 px-4 py-2 border border-slate-200 text-slate-600 font-semibold rounded-lg hover:bg-slate-50">取消</button>
                <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 text-white font-semibold rounded-lg hover:bg-blue-700">儲存任務</button>
            </div>
        </form>
    </div>
</div>

<script>
    // State Management
    let tasks = JSON.parse(localStorage.getItem('nexus_tasks')) || [];

    // Selectors
    const taskForm = document.getElementById('taskForm');
    const modal = document.getElementById('modal');
    const addTaskBtn = document.getElementById('addTaskBtn');
    const closeModal = document.getElementById('closeModal');
    const lists = {
        q1: document.getElementById('q1-list'),
        q2: document.getElementById('q2-list'),
        q3: document.getElementById('q3-list'),
        q4: document.getElementById('q4-list')
    };

    // Date Header
    document.getElementById('currentDate').innerText = new Intl.DateTimeFormat('zh-TW', { dateStyle: 'full' }).format(new Date());

    // Functions
    function saveTasks() {
        localStorage.setItem('nexus_tasks', JSON.stringify(tasks));
        renderTasks();
        updateStats();
    }

    function toggleTask(id) {
        tasks = tasks.map(t => t.id === id ? {...t, completed: !t.completed} : t);
        saveTasks();
    }

    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
    }

    function updateStats() {
        const completed = tasks.filter(t => t.completed).length;
        const total = tasks.length;
        const rate = total === 0 ? 0 : Math.round((completed / total) * 100);
        
        document.getElementById('completionRate').innerText = `${rate}%`;
        document.getElementById('completionBar').style.width = `${rate}%`;
        document.getElementById('pendingTasksCount').innerText = total - completed;
        document.getElementById('criticalTasksCount').innerText = tasks.filter(t => t.urgency === 'high' && t.importance === 'high' && !t.completed).length;
    }

    function renderTasks() {
        // Clear lists
        Object.values(lists).forEach(l => l.innerHTML = '');

        tasks.forEach(task => {
            let quadrant = '';
            if (task.importance === 'high' && task.urgency === 'high') quadrant = 'q1';
            else if (task.importance === 'high' && task.urgency === 'low') quadrant = 'q2';
            else if (task.importance === 'low' && task.urgency === 'high') quadrant = 'q3';
            else quadrant = 'q4';

            const taskEl = document.createElement('div');
            taskEl.className = `group bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between shadow-sm animate-in fade-in duration-300 ${task.completed ? 'opacity-60' : ''}`;
            taskEl.innerHTML = `
                <div class="flex items-center space-x-3">
                    <button onclick="toggleTask(${task.id})" class="w-6 h-6 rounded-full border-2 border-slate-200 flex items-center justify-center transition-colors ${task.completed ? 'bg-green-500 border-green-500' : 'hover:border-blue-500'}">
                        ${task.completed ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                    </button>
                    <span class="${task.completed ? 'line-through text-slate-400' : 'font-medium'}">${task.name}</span>
                </div>
                <button onclick="deleteTask(${task.id})" class="text-slate-300 hover:text-red-500 transition opacity-0 group-hover:opacity-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            `;
            lists[quadrant].appendChild(taskEl);
        });
        
        // Empty state
        Object.keys(lists).forEach(key => {
            if (lists[key].innerHTML === '') {
                lists[key].innerHTML = `<p class="text-slate-400 text-sm italic text-center py-8">目前無任務</p>`;
            }
        });
    }

    // Event Listeners
    addTaskBtn.onclick = () => modal.classList.remove('hidden');
    closeModal.onclick = () => modal.classList.add('hidden');

    taskForm.onsubmit = (e) => {
        e.preventDefault();
        const newTask = {
            id: Date.now(),
            name: document.getElementById('taskName').value,
            importance: document.getElementById('importance').value,
            urgency: document.getElementById('urgency').value,
            completed: false
        };
        tasks.push(newTask);
        saveTasks();
        taskForm.reset();
        modal.classList.add('hidden');
    };

    // Initial Load
    renderTasks();
    updateStats();
</script>

</body>
</html>
