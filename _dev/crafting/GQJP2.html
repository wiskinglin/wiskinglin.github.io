<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GQ | THE ULTIMATE VISION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden; /* 完全鎖定，無滾動 */
            background-color: #000;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            cursor: none; /* 隱藏系統預設游標 */
        }

        /* 自訂動態游標 */
        .custom-cursor {
            position: fixed;
            top: 0;
            left: 0;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: #fff;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9999;
            /* 核心魔法：與底層色彩產生負片反轉 */
            mix-blend-mode: difference; 
            filter: blur(40px);
        }

        /* 巨大的遮罩文字設定 */
        .text-mask {
            font-size: 28vw; /* 佔據畫面的極大比例 */
            line-height: 0.8;
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            /* 將背景圖片限制在文字輪廓內 */
            background-image: url('https://images.unsplash.com/photo-1542062700-9b61ccbc1696?auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent; /* Fallback */
            /* 加入輕微的背景浮動動畫 */
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .subtitle {
            font-family: 'Noto Sans TC', sans-serif;
            mix-blend-mode: difference;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <div class="custom-cursor" id="cursor"></div>

    <div class="absolute top-1/2 left-0 w-full h-[1px] bg-white/20 z-0 pointer-events-none transform -translate-y-1/2"></div>
    <div class="absolute top-0 left-1/2 w-[1px] h-full bg-white/20 z-0 pointer-events-none transform -translate-x-1/2"></div>

    <main class="relative z-10 flex flex-col items-center pointer-events-none selection:bg-transparent">
        
        <p class="subtitle text-xl md:text-2xl tracking-[1em] mb-[-4vw] text-white z-20 font-black uppercase">
            Tokyo Issue 42
        </p>
        
        <h1 class="text-mask font-black tracking-tighter hover:scale-105 transition-transform duration-1000">
            URA-HARA
        </h1>
        <h1 class="text-mask font-black tracking-tighter mt-[-6vw] hover:scale-105 transition-transform duration-1000">
            SYNDICATE
        </h1>
        
        <p class="subtitle mt-8 text-sm md:text-base tracking-[0.5em] text-gray-400 uppercase font-light max-w-2xl text-center leading-loose">
            Move your cursor. Feel the contrast. <br> The ultimate digital editorial experience.
        </p>

    </main>

    <div class="absolute bottom-8 left-8 text-xs tracking-widest text-white/50 font-sans mix-blend-difference">
        © 2026 GQ DIGITAL ARCHIVE<br>DESIGNED BY HANK
    </div>
    <div class="absolute bottom-8 right-8 text-xs tracking-widest text-white/50 font-sans text-right mix-blend-difference">
        LAT: 35.6634° N<br>LONG: 139.7000° E
    </div>

    <script>
        // 確保 GSAP 載入後執行
        document.addEventListener("DOMContentLoaded", (event) => {
            const cursor = document.getElementById('cursor');

            // 初始將游標置中
            gsap.set(cursor, { x: window.innerWidth / 2, y: window.innerHeight / 2 });

            // 監聽滑鼠移動，使用 GSAP 創造帶有物理延遲的絲滑追蹤效果
            window.addEventListener('mousemove', (e) => {
                gsap.to(cursor, {
                    x: e.clientX,
                    y: e.clientY,
                    duration: 0.8, // 延遲秒數，創造拖曳感
                    ease: "power3.out"
                });
            });

            // 點擊時產生脈衝特效
            window.addEventListener('mousedown', () => {
                gsap.to(cursor, { scale: 0.5, duration: 0.2, ease: "power2.in" });
            });
            window.addEventListener('mouseup', () => {
                gsap.to(cursor, { scale: 1, duration: 0.5, ease: "elastic.out(1, 0.3)" });
            });
        });
    </script>
</body>
</html>
