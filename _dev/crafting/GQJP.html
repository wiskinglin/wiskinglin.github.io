<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GQ | ANTI-DESIGN MOODBOARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Noto+Sans+JP:wght@900&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* 鎖定畫面，專注於畫布內的拖曳 */
            background-color: #d4d4d4;
            /* 粗糙的網點背景，模擬紙張質感 */
            background-image: radial-gradient(#aaa 1px, transparent 0);
            background-size: 20px 20px;
            font-family: 'Space Mono', monospace;
            cursor: crosshair;
            user-select: none;
            /* 防止文字反白干擾拖曳 */
            -webkit-user-select: none;
        }

        .font-anton {
            font-family: 'Anton', sans-serif;
        }

        .font-jp {
            font-family: 'Noto Sans JP', sans-serif;
        }

        /* 所有元素都變成可拖曳的絕對定位區塊 */
        .draggable {
            position: absolute;
            cursor: grab;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.2));
            transition: filter 0.2s, transform 0.1s;
            will-change: transform, left, top;
        }

        .draggable:active {
            cursor: grabbing;
            filter: drop-shadow(15px 15px 20px rgba(0, 0, 0, 0.4));
            transform: scale(1.02);
        }

        /* 圖片的拍立得/剪報風格 */
        .polaroid {
            background: #fff;
            padding: 10px 10px 30px 10px;
            border: 1px solid #ddd;
        }

        .torn-edge {
            clip-path: polygon(0% 0%, 100% 2%, 98% 100%, 2% 98%);
        }

        /* 隨機旋轉類別 */
        .rot-1 {
            transform: rotate(-5deg);
        }

        .rot-2 {
            transform: rotate(3deg);
        }

        .rot-3 {
            transform: rotate(-12deg);
        }

        .rot-4 {
            transform: rotate(8deg);
        }
    </style>
</head>

<body class="relative w-screen h-screen">

    <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 opacity-20">
        <h1 class="font-anton text-[15vw] leading-none text-center text-gray-500">
            DRAG<br>EVERYTHING
        </h1>
    </div>

    <div class="draggable rot-1 z-10" style="top: 10%; left: 10%;">
        <h2 class="font-anton text-7xl md:text-9xl text-black mix-blend-overlay">G<span class="text-red-600">Q</span>
        </h2>
    </div>

    <div class="draggable rot-3 z-10 bg-black text-white px-4 py-2 font-jp text-xl md:text-3xl font-black tracking-widest"
        style="top: 25%; left: 40%;">
        裏原宿の反逆
    </div>

    <div class="draggable rot-2 z-10 polaroid w-48 md:w-64" style="top: 40%; left: 15%;">
        <img src="https://images.unsplash.com/photo-1550614000-4b95d4ebf0ae?auto=format&fit=crop&w=400&q=80" alt="Shoes"
            class="w-full h-auto pointer-events-none">
        <p class="mt-2 text-xs font-bold text-center">VISVIM.FBT</p>
    </div>

    <div class="draggable rot-4 z-10 bg-red-600 text-white p-2 text-sm font-bold border-2 border-black border-dashed"
        style="top: 15%; right: 20%;">
        WARNING: HYPED DROP
    </div>

    <div class="draggable rot-1 z-10 torn-edge bg-white p-2 w-56 md:w-72" style="top: 30%; right: 10%;">
        <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?auto=format&fit=crop&w=400&q=80"
            alt="Jacket" class="w-full h-auto pointer-events-none">
    </div>

    <div class="draggable rot-2 z-10 bg-white p-4 border-4 border-black" style="bottom: 15%; left: 30%;">
        <div class="w-32 h-12 bg-black opacity-80"
            style="clip-path: polygon(0 0, 5% 0, 5% 100%, 0 100%, 10% 0, 12% 0, 12% 100%, 10% 100%, 15% 0, 25% 0, 25% 100%, 15% 100%, 28% 0, 30% 0, 30% 100%, 28% 100%, 35% 0, 40% 0, 40% 100%, 35% 100%, 45% 0, 48% 0, 48% 100%, 45% 100%, 55% 0, 60% 0, 60% 100%, 55% 100%, 65% 0, 75% 0, 75% 100%, 65% 100%, 80% 0, 82% 0, 82% 100%, 80% 100%, 85% 0, 95% 0, 95% 100%, 85% 100%, 98% 0, 100% 0, 100% 100%, 98% 100%);">
        </div>
        <p class="text-center text-xs font-bold mt-2">¥ 145,000 / USD 990</p>
    </div>

    <div class="draggable rot-3 z-10 w-64 p-4 bg-yellow-300 text-black border-2 border-black"
        style="bottom: 20%; right: 15%;">
        <h3 class="font-bold text-lg mb-2 uppercase border-b-2 border-black pb-1">Editor's Note</h3>
        <p class="text-xs leading-relaxed font-bold">
            "We don't care about the grid. We don't care about the rules. Fashion is about destruction and recreation."
        </p>
    </div>

    <button onclick="location.reload()"
        class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-black text-white px-6 py-2 font-bold hover:bg-red-600 transition-colors z-50 uppercase tracking-widest text-sm shadow-xl">
        Reset Chaos
    </button>

    <script>
        // 拖曳邏輯 (支援滑鼠與觸控)
        const draggables = document.querySelectorAll('.draggable');
        let highestZIndex = 20; // 確保被點擊的元素永遠在最上層

        draggables.forEach(el => {
            let isDragging = false;
            let startX, startY, initialLeft, initialTop;

            const startDrag = (e) => {
                isDragging = true;
                // 提升 z-index
                highestZIndex++;
                el.style.zIndex = highestZIndex;

                // 處理滑鼠或觸控事件的座標
                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                startX = clientX;
                startY = clientY;
                initialLeft = el.offsetLeft;
                initialTop = el.offsetTop;

                // 阻止預設行為避免拖動時畫面滾動
                if (e.type.includes('touch')) e.preventDefault();
            };

            const drag = (e) => {
                if (!isDragging) return;

                const clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
                const clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;

                const dx = clientX - startX;
                const dy = clientY - startY;

                el.style.left = `${initialLeft + dx}px`;
                el.style.top = `${initialTop + dy}px`;
            };

            const endDrag = () => {
                isDragging = false;
            };

            // 滑鼠事件
            el.addEventListener('mousedown', startDrag);
            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', endDrag);

            // 觸控事件 (Mobile)
            el.addEventListener('touchstart', startDrag, { passive: false });
            document.addEventListener('touchmove', drag, { passive: false });
            document.addEventListener('touchend', endDrag);
        });
    </script>
</body>

</html>
