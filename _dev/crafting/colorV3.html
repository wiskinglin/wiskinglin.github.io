<html lang="zh-TW" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chroma OS | 自適應調色盤系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* =========================================
           OS Theme Engine (Adaptive System UI)
           ========================================= */
        :root[data-theme="dark"] {
            --os-bg: #09090b;
            --os-text: #fafafa;
            --os-text-muted: #a1a1aa;
            --os-surface: rgba(24, 24, 27, 0.6);
            --os-surface-hover: rgba(39, 39, 42, 0.6);
            --os-border: rgba(255, 255, 255, 0.08);
            --os-border-hover: rgba(255, 255, 255, 0.18);
            --os-shadow: rgba(0, 0, 0, 0.5);
            --os-nav-bg: rgba(255, 255, 255, 0.1);
            --os-nav-text: #a1a1aa;
            --os-nav-active: rgba(255, 255, 255, 0.15);
            --os-nav-active-text: #ffffff;
            --os-input-bg: rgba(24, 24, 27, 0.5);
            --os-badge-bg: rgba(255, 255, 255, 0.08);
            --ambient-opacity: 0.15;
            --icon-box-bg: linear-gradient(135deg, #3f3f46, #18181b);
        }

        :root[data-theme="light"] {
            --os-bg: #f8fafc; /* Slate 50 */
            --os-text: #0f172a; /* Slate 900 */
            --os-text-muted: #64748b; /* Slate 500 */
            --os-surface: rgba(255, 255, 255, 0.6);
            --os-surface-hover: rgba(255, 255, 255, 0.95);
            --os-border: rgba(0, 0, 0, 0.06);
            --os-border-hover: rgba(0, 0, 0, 0.15);
            --os-shadow: rgba(0, 0, 0, 0.05);
            --os-nav-bg: rgba(0, 0, 0, 0.05);
            --os-nav-text: #64748b;
            --os-nav-active: #ffffff;
            --os-nav-active-text: #0f172a;
            --os-input-bg: rgba(255, 255, 255, 0.7);
            --os-badge-bg: rgba(0, 0, 0, 0.05);
            --ambient-opacity: 0.25; /* Higher opacity for light mode blur */
            --icon-box-bg: linear-gradient(135deg, #ffffff, #e2e8f0);
        }

        /* Palette Dynamic Variables */
        :root {
            --p1: #18181b; --p2: #27272a; --p3: #52525b; --p4: #a1a1aa; --p5: #f4f4f5;
        }
        
        body {
            background-color: var(--os-bg);
            color: var(--os-text);
            overflow-x: hidden;
            transition: background-color 0.8s ease, color 0.8s ease;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, var(--p2) 0%, transparent 40%),
                radial-gradient(circle at 85% 30%, var(--p4) 0%, transparent 40%),
                radial-gradient(circle at 50% 80%, var(--p3) 0%, transparent 50%);
            opacity: var(--ambient-opacity);
            filter: blur(80px);
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
        }

        /* OS Components */
        .os-text { color: var(--os-text); transition: color 0.5s ease; }
        .os-muted { color: var(--os-text-muted); transition: color 0.5s ease; }
        .os-border-color { border-color: var(--os-border); transition: border-color 0.5s ease; }
        
        .os-surface {
            background: var(--os-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--os-border);
            box-shadow: 0 4px 24px -1px var(--os-shadow);
            transition: all 0.5s ease;
        }
        
        .os-surface-hover:hover {
            background: var(--os-surface-hover);
            border-color: var(--os-border-hover);
        }

        .active-item {
            background: var(--os-surface-hover) !important;
            border-color: var(--os-text) !important;
            box-shadow: 0 8px 24px var(--os-shadow);
        }

        .os-input {
            background: var(--os-input-bg);
            border: 1px solid var(--os-border);
            color: var(--os-text);
            transition: all 0.5s ease;
        }
        .os-input:focus { border-color: var(--os-text-muted); outline: none; }
        .os-input::placeholder { color: var(--os-text-muted); }

        .os-nav { background: var(--os-nav-bg); padding: 4px; border-radius: 9999px; transition: background 0.5s ease; }
        .os-nav-btn { color: var(--os-nav-text); transition: all 0.3s ease; }
        .os-nav-btn:hover { color: var(--os-text); }
        .os-nav-btn.active {
            background: var(--os-nav-active);
            color: var(--os-nav-active-text);
            box-shadow: 0 2px 8px var(--os-shadow);
        }

        .os-icon-box { background: var(--icon-box-bg); border: 1px solid var(--os-border); transition: all 0.5s ease; }

        /* Color Strips inside List */
        .color-strip { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .color-strip:hover { transform: scaleY(1.15) scaleX(1.02); z-index: 10; border-radius: 6px; box-shadow: 0 10px 30px -5px rgba(0,0,0,0.3); }
        
        /* Dynamic Preview Elements (Bento Grid) */
        .dyn-bg { background-color: var(--p1); transition: background-color 0.6s ease; }
        .dyn-surface { background-color: var(--p2); transition: background-color 0.6s ease; }
        .dyn-border { border-color: var(--p3); transition: border-color 0.6s ease; }
        .dyn-text-muted { color: var(--p4); transition: color 0.6s ease; }
        .dyn-text-primary { color: var(--p5); transition: color 0.6s ease; }
        .dyn-accent { background-color: var(--p5); color: var(--p1); transition: all 0.6s ease; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--os-border-hover); border-radius: 10px; }
        .hide-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>

        const database = [

        let activePalette = null;

        // --- WCAG Contrast Algorithm ---
        function getLuminance(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;
            let a = [r, g, b].map(v => v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4));
            return a[0] * 0.2126 + a[1] * 0.7152 + a[2] * 0.0722;
        }

        function calculateContrast(hex1, hex2) {
            let l1 = getLuminance(hex1);
            let l2 = getLuminance(hex2);
            let ratio = (Math.max(l1, l2) + 0.05) / (Math.min(l1, l2) + 0.05);
            return ratio.toFixed(2);
        }

        function updateWCAG(bgHex, textHex) {
            const ratio = calculateContrast(bgHex, textHex);
            document.getElementById('wcag-score').innerText = ratio;
            
            const aaaBadge = document.getElementById('wcag-aaa');
            const aaBadge = document.getElementById('wcag-aa');
            
            // Reset styles using inline CSS mapping to ensure it works across light/dark themes
            const badgeBg = "background: var(--os-badge-bg)";
            const passClass = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-green-500/20 text-green-500 border border-green-500/30 transition-colors";
            const failClass = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 bg-red-500/20 text-red-500 border border-red-500/30 transition-colors";
            const neutralClass = "text-xs font-bold px-2 py-0.5 rounded flex items-center gap-1 os-muted transition-colors";

            if (ratio >= 7.0) {
                aaaBadge.className = passClass;
                aaaBadge.style = "";
                aaaBadge.innerHTML = '<i class="ph-fill ph-check-circle"></i> AAA Pass';
            } else {
                aaaBadge.className = neutralClass;
                aaaBadge.style = badgeBg;
                aaaBadge.innerHTML = '<i class="ph-bold ph-x"></i> AAA (7.0+)';
            }

            if (ratio >= 4.5) {
                aaBadge.className = passClass;
                aaBadge.style = "";
                aaBadge.innerHTML = '<i class="ph-fill ph-check-circle"></i> AA Pass';
            } else {
                aaBadge.className = failClass;
                aaBadge.style = "";
                aaBadge.innerHTML = '<i class="ph-bold ph-warning-circle"></i> Fail';
            }
        }

        // --- Core Rendering ---
        function renderList(data) {
            const container = document.getElementById('palette-list');
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10">
                        <i class="ph-duotone ph-ghost text-4xl os-muted mb-2"></i>
                        <p class="os-muted text-sm">無相符色彩</p>
                    </div>`;
                return;
            }

            container.innerHTML = data.map((p) => `
                <div class="os-surface os-surface-hover rounded-2xl p-4 cursor-pointer transition-all group ${activePalette?.id === p.id ? 'active-item' : ''}" 
                     onclick="activatePalette('${p.id}')">
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 rounded-full ${p.theme === 'light' ? 'bg-amber-400' : 'bg-indigo-500'} shadow-sm" title="${p.theme === 'light' ? '淺色主題' : '深色主題'}"></span>
                            <h4 class="font-bold text-sm os-text">${p.name}</h4>
                        </div>
                        <i class="ph-bold ph-arrow-right os-muted opacity-0 group-hover:opacity-100 transition-all transform -translate-x-2 group-hover:translate-x-0"></i>
                    </div>
                    <div class="flex h-8 rounded-lg overflow-hidden border os-border-color">
                        ${p.colors.map(c => `<div class="flex-1 color-strip" style="background-color: ${c}"></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function activatePalette(id) {
            const p = database.find(x => x.id === id);
            activePalette = p;
            
            // --- 核心更新：切換全域主題 (Light / Dark Mode) ---
            document.documentElement.setAttribute('data-theme', p.theme);
            
            // Re-render list to show active state
            const currentCat = document.querySelector('.os-nav-btn.active').innerText.includes('動漫') ? 'anime' : 
                               (document.querySelector('.os-nav-btn.active').innerText.includes('專業') ? 'pro' : 'life');
            
            if(document.getElementById('search').value !== '') {
                handleSearch(document.getElementById('search').value);
            } else {
                renderList(database.filter(x => x.category === currentCat));
            }

            // Update Text Info
            document.getElementById('active-title').innerText = p.name;
            document.getElementById('active-category').innerText = p.category;
            document.getElementById('active-desc').innerText = p.desc;

            // Apply Dynamic Grid Colors (p1 -> p5)
            const root = document.documentElement;
            root.style.setProperty('--p1', p.colors[0]);
            root.style.setProperty('--p2', p.colors[1]);
            root.style.setProperty('--p3', p.colors[2]);
            root.style.setProperty('--p4', p.colors[3]);
            root.style.setProperty('--p5', p.colors[4]);

            // Update Color Patches in UI
            const patches = document.querySelectorAll('.color-patch');
            p.colors.forEach((color, i) => {
                patches[i].style.backgroundColor = color;
            });

            // Calculate WCAG (Background vs Primary Text)
            updateWCAG(p.colors[1], p.colors[4]); 
        }

        // --- Interaction Logic ---
        function filterPalettes(cat) {
            document.querySelectorAll('.os-nav-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('search').value = '';
            
            const filtered = database.filter(p => p.category === cat);
            renderList(filtered);
            if(filtered.length > 0) activatePalette(filtered[0].id);
        }

        function handleSearch(query) {
            const q = query.toLowerCase();
            const filtered = database.filter(p => 
                p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q)
            );
            renderList(filtered);
        }

        function copyHex(index) {
            if(!activePalette) return;
            const hex = activePalette.colors[index];
            navigator.clipboard.writeText(hex).then(() => {
                showToast('已複製色碼', hex);
            });
        }

        function exportTailwind() {
            if(!activePalette) return;
            const config = `// Tailwind CSS Config
module.exports = {
  theme: {
    extend: {
      colors: {
        '${activePalette.id}': {
          900: '${activePalette.colors[0]}', // Base BG
          800: '${activePalette.colors[1]}', // Surface
          600: '${activePalette.colors[2]}', // Border/Accent
          400: '${activePalette.colors[3]}', // Muted Text
          100: '${activePalette.colors[4]}', // Primary Text/Btn
        }
      }
    }
  }
}`;
            navigator.clipboard.writeText(config).then(() => {
                showToast('匯出成功', '已複製 Tailwind Config 至剪貼簿');
            });
        }

        let toastTimer;
        function showToast(title, msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');

            if(toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        // --- Initialization ---
        window.onload = () => {
            const initialData = database.filter(p => p.category === 'anime');
            renderList(initialData);
            activatePalette(initialData[0].id); // 觸發首次渲染，自動適配主題
        };
    </script>
</body>
</html>
