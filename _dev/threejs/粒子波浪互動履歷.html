<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>創意視覺特效與互動履歷 (Three.js)</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;700;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#000;font-family:'Outfit',sans-serif;color:#fff}
        #loading{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:100;transition:opacity 1s ease}
        .loader-bar{width:200px;height:2px;background:rgba(255,255,255,.1);border-radius:1px;overflow:hidden}
        .loader-bar-inner{width:0%;height:100%;background:linear-gradient(90deg,#00ffcc,#ff00ff);animation:load 1.5s ease forwards}
        @keyframes load{to{width:100%}}
        .loader-text{margin-top:15px;font-size:11px;letter-spacing:4px;color:#555;text-transform:uppercase}
        #canvas-container{position:absolute;top:0;left:0;width:100vw;height:100vh;z-index:1}
        .content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:2;text-align:center;pointer-events:none;user-select:none}
        .content h1{font-size:clamp(3rem,8vw,6rem);font-weight:900;letter-spacing:6px;line-height:1.1;background:linear-gradient(135deg,#fff 0%,#aaa 50%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none}
        .content .subtitle{font-size:clamp(.9rem,2vw,1.4rem);font-weight:200;letter-spacing:8px;color:rgba(255,255,255,.5);margin-top:20px;text-transform:uppercase}
        .content .divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#00ffcc,transparent);margin:25px auto}
        .content .tags{display:flex;gap:15px;justify-content:center;margin-top:10px}
        .content .tag{padding:6px 16px;border:1px solid rgba(255,255,255,.15);border-radius:20px;font-size:12px;font-weight:300;letter-spacing:2px;color:rgba(255,255,255,.4)}
        .overlay-tl{position:absolute;top:35px;left:45px;z-index:5;pointer-events:none}
        .overlay-tl .logo{font-size:18px;font-weight:700;letter-spacing:3px;color:rgba(255,255,255,.6)}
        .overlay-br{position:absolute;bottom:35px;right:45px;z-index:5;pointer-events:none;text-align:right}
        .overlay-br div{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.3);margin-bottom:6px}
        .overlay-bl{position:absolute;bottom:35px;left:45px;z-index:5;pointer-events:none}
        .overlay-bl div{font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.25)}
        .mouse-hint{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);z-index:5;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeInUp 2s ease 2s both}
        @keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .mouse-icon{width:24px;height:38px;border:2px solid rgba(255,255,255,.25);border-radius:12px;position:relative}
        .mouse-icon::after{content:'';position:absolute;top:6px;left:50%;transform:translateX(-50%);width:3px;height:8px;background:rgba(255,255,255,.5);border-radius:2px;animation:scroll 1.5s ease infinite}
        @keyframes scroll{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(12px)}}
        .mouse-text{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.2);text-transform:uppercase}
    </style>
</head>
<body>
    <div id="loading">
        <div class="loader-bar"><div class="loader-bar-inner"></div></div>
        <div class="loader-text">Initializing Particles</div>
    </div>
    <div class="overlay-tl"><div class="logo">KLIO.</div></div>
    <div class="content">
        <h1>CREATIVE<br>DEVELOPER</h1>
        <div class="divider"></div>
        <div class="subtitle">Interactive Experience Designer</div>
        <div class="tags">
            <span class="tag">Three.js</span>
            <span class="tag">WebGL</span>
            <span class="tag">GLSL</span>
            <span class="tag">Motion</span>
        </div>
    </div>
    <div class="mouse-hint">
        <div class="mouse-icon"></div>
        <div class="mouse-text">Move Mouse</div>
    </div>
    <div class="overlay-bl">
        <div>粒子數量：10,000</div>
        <div>渲染模式：GPU Points</div>
    </div>
    <div class="overlay-br">
        <div>FPS: <span id="fps">60</span></div>
        <div>© 2026 KLIO DESIGN</div>
    </div>
    <div id="canvas-container"></div>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
    <script type="module">
        import * as THREE from 'three';

        // 1. 場景
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
        camera.position.z = 150;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. 粒子系統 (100x100 網格)
        const GRID = 100;
        const COUNT = GRID * GRID;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(COUNT * 3);
        const colors = new Float32Array(COUNT * 3);
        const sizes = new Float32Array(COUNT);

        const colorA = new THREE.Color(0x00ffcc);
        const colorB = new THREE.Color(0xff00ff);
        const colorC = new THREE.Color(0x3366ff);

        let idx = 0;
        for (let ix = 0; ix < GRID; ix++) {
            for (let iy = 0; iy < GRID; iy++) {
                positions[idx * 3]     = ix * 4 - 200;
                positions[idx * 3 + 1] = 0;
                positions[idx * 3 + 2] = iy * 4 - 200;
                // 三色漸層
                const t = ix / GRID;
                const mixed = t < 0.5
                    ? colorA.clone().lerp(colorC, t * 2)
                    : colorC.clone().lerp(colorB, (t - 0.5) * 2);
                colors[idx * 3]     = mixed.r;
                colors[idx * 3 + 1] = mixed.g;
                colors[idx * 3 + 2] = mixed.b;
                // 隨機尺寸變化，增加層次
                sizes[idx] = 0.5 + Math.random() * 0.8;
                idx++;
            }
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const material = new THREE.PointsMaterial({
            size: 0.8,
            vertexColors: true,
            transparent: true,
            opacity: 0.85,
            sizeAttenuation: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(geometry, material);
        particles.rotation.x = Math.PI / 5;
        scene.add(particles);

        // 3. 環境星塵 (背景細小粒子)
        const dustCount = 500;
        const dustGeo = new THREE.BufferGeometry();
        const dustPos = new Float32Array(dustCount * 3);
        for (let i = 0; i < dustCount; i++) {
            dustPos[i * 3]     = THREE.MathUtils.randFloatSpread(400);
            dustPos[i * 3 + 1] = THREE.MathUtils.randFloatSpread(400);
            dustPos[i * 3 + 2] = THREE.MathUtils.randFloatSpread(400);
        }
        dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
        const dust = new THREE.Points(dustGeo, new THREE.PointsMaterial({
            color: 0xffffff, size: 0.3, transparent: true, opacity: 0.3
        }));
        scene.add(dust);

        // 4. 滑鼠互動
        let mouseX = 0, mouseY = 0;
        let targetX = 0, targetY = 0;
        document.addEventListener('mousemove', (e) => {
            targetX = (e.clientX - innerWidth / 2) * 0.05;
            targetY = (e.clientY - innerHeight / 2) * 0.05;
        });

        // 5. FPS 計算
        let frames = 0, lastTime = performance.now();
        const fpsEl = document.getElementById('fps');

        // 6. 動畫迴圈
        let count = 0;
        function animate() {
            requestAnimationFrame(animate);

            // 滑鼠跟隨 (有阻尼的平滑追蹤)
            mouseX += (targetX - mouseX) * 0.03;
            mouseY += (targetY - mouseY) * 0.03;
            camera.position.x = mouseX;
            camera.position.y = -mouseY;
            camera.lookAt(scene.position);

            // 粒子波浪動畫 (多層 sin/cos 疊加)
            const pos = particles.geometry.attributes.position.array;
            let i = 0;
            for (let ix = 0; ix < GRID; ix++) {
                for (let iy = 0; iy < GRID; iy++) {
                    pos[i * 3 + 1] =
                        Math.sin((ix + count) * 0.3) * 8 +
                        Math.cos((iy + count) * 0.5) * 8 +
                        Math.sin((ix + iy + count * 2) * 0.15) * 4;
                    i++;
                }
            }
            particles.geometry.attributes.position.needsUpdate = true;
            count += 0.04;

            // 星塵緩慢旋轉
            dust.rotation.y += 0.0003;
            dust.rotation.x += 0.0001;

            // FPS
            frames++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fpsEl.textContent = frames;
                frames = 0;
                lastTime = now;
            }

            renderer.render(scene, camera);
        }

        // 7. 載入
        window.addEventListener('load', () => {
            setTimeout(() => {
                const el = document.getElementById('loading');
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 1000);
            }, 1600);
        });

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        animate();
    </script>
</body>
</html>
