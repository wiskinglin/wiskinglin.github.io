<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cube Runner — 輕量 3D 跑酷遊戲 (Three.js)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{overflow:hidden;background:#1a1a2e;font-family:'Inter',sans-serif;color:#fff}
        /* 遊戲畫面 HUD */
        .hud{position:absolute;pointer-events:none;z-index:5}
        .hud-score{top:30px;left:50%;transform:translateX(-50%);text-align:center}
        .score-label{font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase}
        .score-value{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:#fff;line-height:1}
        .hud-tl{top:30px;left:35px}
        .hud-tl .logo{font-size:16px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.4)}
        .hud-tr{top:30px;right:35px;text-align:right}
        .hud-tr div{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:1px;margin-bottom:4px}
        .hud-tr .val{color:rgba(255,255,255,.5);font-weight:600}
        .hud-bl{bottom:30px;left:35px}
        .hud-bl div{font-size:11px;color:rgba(255,255,255,.2);margin-bottom:3px}
        .hud-br{bottom:30px;right:35px;text-align:right}
        .hud-br div{font-size:11px;color:rgba(255,255,255,.2)}
        /* 開始/結束畫面 */
        #overlay-screen{position:absolute;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:10;transition:opacity .5s}
        .screen-card{text-align:center;max-width:400px;padding:50px}
        .screen-card h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;letter-spacing:4px;margin-bottom:8px;background:linear-gradient(135deg,#00ffcc,#3366ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .screen-card .sub{font-size:14px;color:rgba(255,255,255,.4);margin-bottom:30px;line-height:1.6}
        .screen-card .final-score{font-family:'JetBrains Mono',monospace;font-size:60px;font-weight:700;color:#ffcc00;margin-bottom:20px}
        .screen-card .final-label{font-size:11px;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:5px}
        .play-btn{display:inline-block;padding:16px 40px;border-radius:12px;background:linear-gradient(135deg,#00ffcc,#00aaff);color:#000;font-weight:700;font-size:15px;letter-spacing:1px;cursor:pointer;border:none;transition:transform .2s,box-shadow .2s;font-family:'Inter',sans-serif}
        .play-btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,255,204,.3)}
        .ctrl-hint{margin-top:25px;font-size:12px;color:rgba(255,255,255,.25)}
        .ctrl-hint kbd{display:inline-block;padding:3px 10px;border-radius:5px;background:rgba(255,255,255,.08);font-family:monospace;font-size:11px;color:rgba(255,255,255,.5);margin:0 3px}
    </style>
</head>
<body>
    <!-- HUD -->
    <div class="hud hud-score"><div class="score-label">Score</div><div class="score-value" id="score-display">0</div></div>
    <div class="hud hud-tl"><div class="logo">CUBE RUNNER</div></div>
    <div class="hud hud-tr">
        <div>速度: <span class="val" id="speed-display">1.0×</span></div>
        <div>障礙物: <span class="val" id="obs-count">0</span></div>
        <div>難度: <span class="val" id="difficulty">EASY</span></div>
    </div>
    <div class="hud hud-bl"><div>引擎：Three.js r160</div><div>物理：AABB Collision</div></div>
    <div class="hud hud-br"><div>最高分: <span id="highscore">0</span></div></div>

    <!-- 開始/結束畫面 -->
    <div id="overlay-screen">
        <div class="screen-card">
            <h1 id="screen-title">CUBE RUNNER</h1>
            <div class="sub" id="screen-sub">在 3D 空間中閃避障礙物，存活越久分數越高。<br>速度會隨著時間加快！</div>
            <div class="final-label" id="final-label" style="display:none">最終得分</div>
            <div class="final-score" id="final-score" style="display:none">0</div>
            <button class="play-btn" id="play-btn">開始遊戲</button>
            <div class="ctrl-hint"><kbd>空白鍵</kbd> 或 <kbd>↑</kbd> 跳躍 · <kbd>←</kbd><kbd>→</kbd> 左右閃避</div>
        </div>
    </div>

    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}</script>
    <script type="module">
        import * as THREE from 'three';

        // ========================================
        // 1. 場景設置
        // ========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 15, 70);

        const camera = new THREE.PerspectiveCamera(65, innerWidth/innerHeight, 0.1, 200);
        camera.position.set(0, 6, 14);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // 2. 燈光
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(2048, 2048);
        scene.add(dirLight);

        const hemiLight = new THREE.HemisphereLight(0x4466ff, 0x002244, 0.6);
        scene.add(hemiLight);

        // 3. 地面 (無限跑道感)
        const laneWidth = 12;
        const floorGeo = new THREE.PlaneGeometry(laneWidth, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x16213e, roughness: 0.3, metalness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = -80;
        floor.receiveShadow = true;
        scene.add(floor);

        // 跑道邊線 (發光)
        [-laneWidth/2, laneWidth/2].forEach(x => {
            const lineGeo = new THREE.PlaneGeometry(0.1, 200);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, transparent: true, opacity: 0.3 });
            const line = new THREE.Mesh(lineGeo, lineMat);
            line.rotation.x = -Math.PI / 2;
            line.position.set(x, 0.01, -80);
            scene.add(line);
        });

        // 跑道虛線 (中間分隔)
        for (let i = 0; i < 40; i++) {
            const dGeo = new THREE.PlaneGeometry(0.08, 2);
            const dMat = new THREE.MeshBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.4 });
            const dash = new THREE.Mesh(dGeo, dMat);
            dash.rotation.x = -Math.PI / 2;
            dash.position.set(0, 0.01, -i * 5);
            scene.add(dash);
        }

        // 4. 玩家
        const playerGeo = new THREE.BoxGeometry(1, 1, 1);
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, metalness: 0.6, roughness: 0.3, emissive: 0x004433 });
        const player = new THREE.Mesh(playerGeo, playerMat);
        player.position.set(0, 0.5, 5);
        player.castShadow = true;
        scene.add(player);

        // 玩家光暈
        const glowLight = new THREE.PointLight(0x00ffcc, 3, 8);
        glowLight.position.copy(player.position);
        scene.add(glowLight);

        // ========================================
        // 5. 遊戲邏輯
        // ========================================
        let isPlaying = false;
        let score = 0;
        let highScore = parseInt(localStorage.getItem('cubeRunnerHigh') || '0');
        let gameSpeed = 0.3;
        let velocityY = 0;
        let isGrounded = true;
        let playerLane = 0; // -1, 0, 1
        let targetX = 0;
        let obstacles = [];
        let spawnTimer = 0;
        let totalObstacles = 0;

        document.getElementById('highscore').textContent = highScore;

        const gravity = -0.018;
        const jumpForce = 0.38;
        const laneOffset = 3.5;

        // 障礙物材質 (多種顏色)
        const obstacleMats = [
            new THREE.MeshStandardMaterial({ color: 0xff3366, metalness: 0.4, roughness: 0.4, emissive: 0x330011 }),
            new THREE.MeshStandardMaterial({ color: 0xff6600, metalness: 0.4, roughness: 0.4, emissive: 0x331100 }),
            new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.4, roughness: 0.4, emissive: 0x332200 }),
            new THREE.MeshStandardMaterial({ color: 0x9933ff, metalness: 0.4, roughness: 0.4, emissive: 0x110033 })
        ];

        // 障礙物幾何體 (多種形狀)
        const obsGeos = [
            new THREE.BoxGeometry(1.2, 1.2, 1.2),
            new THREE.ConeGeometry(0.8, 1.5, 4),
            new THREE.OctahedronGeometry(0.8),
            new THREE.CylinderGeometry(0.6, 0.6, 1.5, 8)
        ];

        function spawnObstacle() {
            const lane = Math.floor(Math.random() * 3) - 1;
            const geoIdx = Math.floor(Math.random() * obsGeos.length);
            const matIdx = Math.floor(Math.random() * obstacleMats.length);
            const obs = new THREE.Mesh(obsGeos[geoIdx], obstacleMats[matIdx]);
            obs.position.set(lane * laneOffset, 0.75, -50);
            obs.castShadow = true;
            scene.add(obs);
            obstacles.push(obs);
            totalObstacles++;
            document.getElementById('obs-count').textContent = totalObstacles;
        }

        function resetGame() {
            score = 0;
            gameSpeed = 0.3;
            totalObstacles = 0;
            playerLane = 0;
            targetX = 0;
            player.position.set(0, 0.5, 5);
            velocityY = 0;
            isGrounded = true;
            player.rotation.set(0, 0, 0);
            obstacles.forEach(o => scene.remove(o));
            obstacles = [];
            spawnTimer = 0;
            document.getElementById('score-display').textContent = '0';
            document.getElementById('speed-display').textContent = '1.0×';
            document.getElementById('obs-count').textContent = '0';
            document.getElementById('difficulty').textContent = 'EASY';
        }

        function gameOver() {
            isPlaying = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('cubeRunnerHigh', highScore.toString());
                document.getElementById('highscore').textContent = highScore;
            }
            const overlay = document.getElementById('overlay-screen');
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
            document.getElementById('screen-title').textContent = 'GAME OVER';
            document.getElementById('screen-sub').textContent = '再試一次？速度會隨時間增加！';
            document.getElementById('final-label').style.display = 'block';
            document.getElementById('final-score').style.display = 'block';
            document.getElementById('final-score').textContent = score;
            document.getElementById('play-btn').textContent = '重新開始';
        }

        // 6. 輸入
        document.addEventListener('keydown', (e) => {
            if (!isPlaying) return;
            switch (e.code) {
                case 'Space': case 'ArrowUp': case 'KeyW':
                    if (isGrounded) { velocityY = jumpForce; isGrounded = false; }
                    break;
                case 'ArrowLeft': case 'KeyA':
                    playerLane = Math.max(playerLane - 1, -1);
                    targetX = playerLane * laneOffset;
                    break;
                case 'ArrowRight': case 'KeyD':
                    playerLane = Math.min(playerLane + 1, 1);
                    targetX = playerLane * laneOffset;
                    break;
            }
        });

        document.getElementById('play-btn').addEventListener('click', () => {
            resetGame();
            isPlaying = true;
            const overlay = document.getElementById('overlay-screen');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        });

        // 7. AABB 碰撞
        const playerBox = new THREE.Box3();
        const obsBox = new THREE.Box3();
        function checkCollision(obs) {
            playerBox.setFromObject(player);
            obsBox.setFromObject(obs);
            // 稍微縮小碰撞框，讓遊戲更友善
            playerBox.expandByScalar(-0.1);
            return playerBox.intersectsBox(obsBox);
        }

        // 8. 動畫
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (!isPlaying) {
                // 非遊戲中：自動旋轉展示
                player.rotation.y += 0.02;
                player.position.y = 1.5 + Math.sin(clock.getElapsedTime() * 2) * 0.3;
                glowLight.position.copy(player.position);
                renderer.render(scene, camera);
                return;
            }

            const delta = clock.getDelta();

            // 加速
            gameSpeed += 0.00008;
            const speedRatio = (gameSpeed / 0.3).toFixed(1);
            document.getElementById('speed-display').textContent = speedRatio + '×';

            // 難度顯示
            if (gameSpeed < 0.45) document.getElementById('difficulty').textContent = 'EASY';
            else if (gameSpeed < 0.6) document.getElementById('difficulty').textContent = 'MEDIUM';
            else if (gameSpeed < 0.8) document.getElementById('difficulty').textContent = 'HARD';
            else document.getElementById('difficulty').textContent = 'INSANE';

            // 玩家水平移動 (平滑插值)
            player.position.x += (targetX - player.position.x) * 0.15;

            // 跳躍物理
            player.position.y += velocityY;
            if (player.position.y > 0.5) {
                velocityY += gravity;
            } else {
                player.position.y = 0.5;
                velocityY = 0;
                isGrounded = true;
            }

            // 跳躍旋轉
            if (!isGrounded) {
                player.rotation.x -= 0.12;
            } else {
                // 歸正 (平滑)
                player.rotation.x += (0 - player.rotation.x) * 0.2;
            }

            glowLight.position.copy(player.position);

            // 障礙物生成
            spawnTimer += gameSpeed;
            if (spawnTimer > 2.5) {
                spawnObstacle();
                // 有機率生成雙障礙物
                if (Math.random() > 0.6) {
                    setTimeout(spawnObstacle, 100);
                }
                spawnTimer = 0;
            }

            // 障礙物移動與碰撞
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += gameSpeed;
                obs.rotation.y += 0.03;
                obs.rotation.x += 0.02;

                if (checkCollision(obs)) {
                    gameOver();
                    return;
                }

                if (obs.position.z > 15) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 10;
                    document.getElementById('score-display').textContent = score;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = innerWidth / innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(innerWidth, innerHeight);
        });

        animate();
    </script>
</body>
</html>
