<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTW Editor V5</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" type="text/css" href="styles.css?v=2">
</head>
<body class="dark-theme">
    <div id="app" class="app-shell">
        <header class="glass-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <div class="logo-blob"></div>
                    <span class="logo-text-inner">V5</span>
                </div>
                <h1 class="logo-text">iTW <span>Editor</span></h1>
            </div>
            
            <div class="document-title-area">
                <div class="title-wrapper">
                    <input type="text" id="doc-title" value="Untitled Intelligence" spellcheck="false" class="doc-title-input">
                    <div class="title-underline"></div>
                </div>
                <span class="status-indicator saved" id="save-status"><i class="fa-solid fa-cloud"></i> Synced</span>
            </div>
            
            <div class="header-actions">
                <button class="btn-icon" title="Toggle Theme" id="theme-toggle"><i class="fa-solid fa-moon"></i></button>
                <button class="btn-primary" id="export-btn">
                    <span>Present</span>
                    <i class="fa-solid fa-play"></i>
                </button>
            </div>
        </header>

        <main class="app-main">
            <!-- Sidebar Navigation -->
            <nav class="sidebar glass-sidebar">
                <div class="nav-group">
                    <button class="nav-item active" data-tool="text" title="Document Mode">
                        <i class="fa-solid fa-align-left"></i>
                        <span class="tooltip">Document</span>
                    </button>
                    <button class="nav-item" data-tool="slide" title="Presentation Mode">
                        <i class="fa-solid fa-chalkboard"></i>
                        <span class="tooltip">Deck</span>
                    </button>
                    <button class="nav-item" data-tool="table" title="DataGrid Mode">
                        <i class="fa-solid fa-table-cells"></i>
                        <span class="tooltip">DataGrid</span>
                    </button>
                    <button class="nav-item" data-tool="image" title="Visual Mode">
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                        <span class="tooltip">Visual</span>
                    </button>
                </div>
                
                <div class="nav-group bottom">
                    <button class="nav-item" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
            </nav>

            <!-- WYSIWYG Canvas -->
            <div class="canvas-area" id="canvas-area">
                <!-- Background ambient glow -->
                <div class="ambient-glow glow-1"></div>
                <div class="ambient-glow glow-2"></div>

                <div class="canvas-document" id="canvas-document">
                    <div class="itw-block text-block" contenteditable="true" data-type="MD">
                        <h1 class="block-title">Visionary Thoughts</h1>
                        <p class="block-text">Start typing your ideas here. This canvas is entirely WYSIWYG, focusing on pure creation.</p>
                    </div>
                </div>
            </div>

            <!-- AI Assistant Panel (Slide-out) -->
            <aside class="ai-panel glass-panel" id="ai-panel">
                <div class="ai-header">
                    <h3><i class="fa-solid fa-wand-magic-sparkles"></i> AI Engine</h3>
                    <button class="btn-icon" id="close-ai"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="ai-body">
                    <div class="ai-module">
                        <label>Web Extraction (Jina)</label>
                        <div class="input-group">
                            <input type="text" id="ai-url-input" placeholder="https://..." class="glass-input">
                            <button id="ai-extract-btn" class="btn-primary small"><i class="fa-solid fa-download"></i></button>
                        </div>
                    </div>
                    <div class="ai-module">
                        <label>Chat / Generation</label>
                        <textarea id="ai-prompt-input" rows="4" placeholder="Ask AI to generate or summarize content..." class="glass-input"></textarea>
                        <button id="ai-gen-btn" class="btn-primary w-full" style="margin-top: 8px;"><i class="fa-solid fa-bolt"></i> Generate</button>
                    </div>
                    <div class="ai-result" id="ai-result">
                        <!-- AI stream output goes here -->
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <!-- Floating Format Toolbar -->
    <div id="format-toolbar" class="format-toolbar glass-panel hidden">
        <button data-format="bold" title="Bold"><i class="fa-solid fa-bold"></i></button>
        <button data-format="italic" title="Italic"><i class="fa-solid fa-italic"></i></button>
        <div class="divider"></div>
        <button data-format="h1" title="Heading 1">H1</button>
        <button data-format="h2" title="Heading 2">H2</button>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
