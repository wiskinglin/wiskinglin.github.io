<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playwright Web Extractor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #6366f1, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 1rem;
            background: var(--card-bg);
            padding: 0.5rem;
            border-radius: 1rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            margin-bottom: 2rem;
            transition: transform 0.3s ease;
        }

        .input-group:focus-within {
            transform: scale(1.02);
            border-color: var(--primary);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-family: inherit;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background-color: var(--primary-hover);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #loading {
            display: none;
            text-align: center;
            margin: 2rem 0;
            color: var(--accent);
            font-weight: 600;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #results {
            display: none;
            background: var(--card-bg);
            border-radius: 1.5rem;
            padding: 2rem;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-section {
            margin-bottom: 2rem;
        }

        .result-section h3 {
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 0.5rem;
        }

        .meta-info {
            display: grid;
            gap: 0.5rem;
        }

        .meta-title {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .meta-desc {
            color: var(--text-dim);
            line-height: 1.5;
        }

        .content-block {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .link-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }

        .link-item a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .link-item a:hover {
            color: white;
            text-decoration: underline;
        }

        #error-msg {
            color: var(--error);
            background: rgba(239, 68, 68, 0.1);
            padding: 1rem;
            border-radius: 0.75rem;
            margin-top: 1rem;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Playwright Extractor</h1>
            <p class="subtitle">AI-powered web data analysis with stealth automation</p>
        </header>

        <div class="input-group">
            <input type="text" id="url-input" placeholder="Enter target URL (e.g., https://google.com)" autocomplete="off">
            <button id="extract-btn">
                <span>Extract Data</span>
            </button>
        </div>

        <div id="loading">
            <div class="loader"></div>
            Analyzing page... This may take a few seconds.
        </div>

        <div id="error-msg"></div>

        <div id="results">
            <div class="result-section">
                <h3>Page Information</h3>
                <div class="meta-info">
                    <div class="meta-title" id="res-title"></div>
                    <div class="meta-desc" id="res-desc"></div>
                </div>
            </div>

            <div class="result-section">
                <h3>Top Content Blocks</h3>
                <div id="res-content"></div>
            </div>

            <div class="result-section">
                <h3>Discovery Links</h3>
                <ul class="link-list" id="res-links"></ul>
            </div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('extract-btn');
        const input = document.getElementById('url-input');
        const loading = document.getElementById('loading');
        const results = document.getElementById('results');
        const errorMsg = document.getElementById('error-msg');

        btn.addEventListener('click', async () => {
            const url = input.value.trim();
            if (!url) return;

            // Reset UI
            btn.disabled = true;
            loading.style.display = 'block';
            results.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                // Render Results
                document.getElementById('res-title').textContent = data.metadata.title;
                document.getElementById('res-desc').textContent = data.metadata.description || 'No description available.';

                const contentDiv = document.getElementById('res-content');
                contentDiv.innerHTML = data.mainContent.map(p => `
                    <div class="content-block">${p}</div>
                `).join('');

                const linkList = document.getElementById('res-links');
                linkList.innerHTML = data.links.map(l => `
                    <li class="link-item"><a href="${l.href}" target="_blank" title="${l.href}">${l.text}</a></li>
                `).join('');

                results.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = 'Error: ' + err.message;
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });

        // Enter key support
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
