<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECTS | KINLIN 未來誌</title>
  <style>
    /* 基礎重置與字體設定 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Helvetica Neue', Arial, 'Microsoft JhengHei', sans-serif;
      background-color: #ffffff;
      color: #333;
      line-height: 1.6;
    }

    /* 頁首與導覽列 */
    header {
      text-align: center;
      padding: 40px 20px 20px;
      border-bottom: 1px solid #eaeaea;
    }
    header h1 {
      font-size: 2.5rem;
      letter-spacing: 2px;
      margin-bottom: 5px;
      color: #000;
    }
    header p {
      font-size: 1.2rem;
      color: #666;
      letter-spacing: 1px;
      margin-bottom: 30px;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
    nav ul li a {
      text-decoration: none;
      color: #333;
      font-size: 0.95rem;
      transition: color 0.3s;
    }
    nav ul li a:hover, nav ul li a.active {
      color: #007BFF;
    }

    /* 專案網格區塊 (CSS Grid) */
    .gallery-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
      display: grid;
      /* 自動排版：螢幕大時多排，螢幕小時少排 */
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      align-items: start;
    }

    /* 個別專案卡片 */
    .project-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      border-radius: 4px;
    }
    .project-card img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s ease;
    }
    .project-card:hover img {
      transform: scale(1.05); /* 滑鼠游標經過時微微放大 */
    }
    
    /* 專案名稱遮罩效果 (滑鼠游標經過時顯示) */
    .project-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-size: 1.2rem;
      letter-spacing: 1px;
    }
    .project-card:hover .project-overlay {
      opacity: 1;
    }

    /* 頁尾 */
    footer {
      text-align: center;
      padding: 30px 20px;
      background-color: #fafafa;
      color: #888;
      font-size: 0.85rem;
      border-top: 1px solid #eaeaea;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>KINLIN</h1>
    <p>未來誌</p>
    <nav>
      <ul>
        <li><a href="#" class="active">PROJECTS</a></li>
        <li><a href="#">未來誌</a></li>
        <li><a href="#">專案管理</a></li>
        <li><a href="#">設計驗證</a></li>
        <li><a href="#">3C科技</a></li>
        <li><a href="#">評論</a></li>
        <li><a href="#">職場</a></li>
      </ul>
    </nav>
  </header>

  <main class="gallery-container">
    
    <div class="project-card">
      <img src="https://static.wixstatic.com/media/fa736d_6ee88c5019504037bf14a39032198440~mv2.jpg/v1/fill/w_300,h_388,q_90/fa736d_6ee88c5019504037bf14a39032198440~mv2.jpg" alt="LARYNGOSCOPE">
      <div class="project-overlay">LARYNGOSCOPE</div>
    </div>

    <div class="project-card">
      <img src="https://static.wixstatic.com/media/fa736d_ad712fd9147642eb9f584ff442c490bf~mv2.jpg/v1/fill/w_312,h_399,q_90/fa736d_ad712fd9147642eb9f584ff442c490bf~mv2.jpg" alt="Brewi Smart Cafe">
      <div class="project-overlay">Brewi Smart Cafe</div>
    </div>

    <div class="project-card">
      <img src="https://static.wixstatic.com/media/fa736d_3bf896da8a3a4dbb8ddf77cf6ad1c12d~mv2.jpg/v1/fill/w_312,h_423,q_90/fa736d_3bf896da8a3a4dbb8ddf77cf6ad1c12d~mv2.jpg" alt="Open Compute Project">

    <div class="project-card">
      <img src="https://static.wixstatic.com/media/fa736d_2cabd53ad16c4e758ea30f416b6ef9a0~mv2.jpg/v1/fill/w_312,h_267,q_90/fa736d_2cabd53ad16c4e758ea30f416b6ef9a0~mv2.jpg" alt="CTMachine">
      <div class="project-overlay">CTMachine</div>
    </div>

    <div class="project-card">
      <img src="https://static.wixstatic.com/media/fa736d_635b7cdca70044e6848635462c2fb72f~mv2.jpg/v1/fill/w_312,h_234,q_90/fa736d_635b7cdca70044e6848635462c2fb72f~mv2.jpg" alt="Espresso Grinder">
      <div class="project-overlay">Espresso Grinder</div>

  </main>
