<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#45 Dopamine Colors — 多巴胺色彩美學 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* Reset */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Fredoka One', 'Noto Sans TC', cursive;
  background-color: #ff3366; /* Hot pink */
  color: #fff;
  overflow-x: hidden;
  padding-bottom: 120px;
  transition: background-color 0.5s;
}

/* Style Info Header (A) */
.style-info {
  background: #ffcc00; /* Neon yellow */
  color: #000;
  padding: 60px 24px;
  border-bottom: 8px solid #000;
  border-radius: 0 0 50px 50px;
  position: relative;
  z-index: 10;
  box-shadow: 0 20px 0px rgba(0,0,0,0.1);
}
.style-info-inner {
  max-width: 1000px;
  margin: 0 auto;
}
.cat {
  display: inline-block;
  background: #00ffcc; /* Cyan */
  color: #000;
  padding: 8px 20px;
  border-radius: 30px;
  border: 4px solid #000;
  font-size: 0.9rem;
  text-transform: uppercase;
  margin-bottom: 16px;
  box-shadow: 4px 4px 0 #000;
}
.style-info h1 {
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  text-transform: uppercase;
  color: #ff3366;
  text-shadow: 4px 4px 0 #000;
  margin-bottom: 20px;
  letter-spacing: 2px;
}
.info-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  margin-top: 30px;
}
.info-card {
  flex: 1;
  min-width: 250px;
  background: #fff;
  color: #000;
  border: 4px solid #000;
  padding: 24px;
  border-radius: 20px;
  box-shadow: 6px 6px 0 #000;
  transform: rotate(-1deg);
  transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.info-card:nth-child(2) { transform: rotate(2deg); background: #ccff00; }
.info-card:nth-child(3) { transform: rotate(-2deg); background: #ff99ff; }
.info-card:hover { transform: scale(1.05) rotate(0deg); }
.info-card h4 {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 900;
  font-size: 0.9rem;
  background: #000;
  color: #fff;
  padding: 4px 10px;
  border-radius: 10px;
  display: inline-block;
  margin-bottom: 12px;
}
.info-card p {
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  line-height: 1.5;
}

/* Demo Content (B) */
.demo-content {
  max-width: 1200px;
  margin: 60px auto;
  padding: 0 24px;
  text-align: center;
}
.candy-hero {
  position: relative;
  height: 600px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.candy-hero h2 {
  font-size: 8vw;
  color: #fff;
  text-shadow: 6px 6px 0 #000, -2px -2px 0 #00ffcc, 4px -4px 0 #ffcc00;
  line-height: 1.1;
  z-index: 5;
  pointer-events: none;
}
.candy-btn {
  margin-top: 40px;
  background: #00ffcc;
  color: #000;
  font-size: 2rem;
  font-family: inherit;
  padding: 20px 60px;
  border: 6px solid #000;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 10px 0 #000;
  transition: all 0.1s;
  z-index: 10;
}
.candy-btn:active {
  transform: translateY(10px);
  box-shadow: 0 0px 0 #000;
}

/* Bouncy floating elements */
.floater {
  position: absolute;
  border: 4px solid #000;
  border-radius: 50%;
  animation: float 3s ease-in-out infinite alternate;
  z-index: 1;
}
.f1 { width: 100px; height: 100px; background: #ffcc00; top: 10%; left: 10%; animation-delay: 0s; }
.f2 { width: 150px; height: 150px; background: #9933ff; bottom: 20%; left: 20%; animation-delay: 1s; border-radius: 30%; }
.f3 { width: 80px; height: 80px; background: #00ffcc; top: 30%; right: 15%; animation-delay: 2s; }
.f4 { width: 200px; height: 200px; background: #ff99ff; bottom: 10%; right: 5%; animation-delay: 0.5s; border-radius: 40% 60% 70% 30%; }

@keyframes float {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(-40px) rotate(20deg); }
}

/* Navigation (C) */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 20px;
  border-top: 8px solid #ffcc00;
  z-index: 100;
}
.bottom-nav a {
  color: #fff;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 900;
  text-decoration: none;
  font-size: 1rem;
  background: #ff3366;
  padding: 10px 20px;
  border-radius: 20px;
  border: 3px solid #fff;
  transition: transform 0.2s;
}
.bottom-nav a:hover {
  transform: scale(1.1) rotate(2deg);
  background: #00ffcc;
  color: #000;
}
</style>
</head>
<body>

<header class="style-info">
  <div class="style-info-inner">
    <div class="cat">🍭 特殊材質、反叛與情感化設計</div>
    <h1>#45 — Dopamine Colors</h1>
    
    <div class="info-grid">
      <div class="info-card">
        <h4>📖 風格定義與視覺特徵</h4>
        <p>運用極度鮮豔、明亮且充滿活力的螢光色系進行撞色搭配。此設計邏輯基於色彩心理學，旨在瞬間激發大腦的獎勵機制，為使用者帶來愉悅感與強烈的正向情緒體驗。</p>
      </div>
      <div class="info-card">
        <h4>🏢 適用產業與場景</h4>
        <p>糖果零食品牌官網、青少年流行服飾、大型派對與節慶活動</p>
      </div>
      <div class="info-card">
        <h4>🌍 主要流行地區</h4>
        <p>美國、全球</p>
      </div>
    </div>
  </div>
</header>

<main class="demo-content">
  <div class="candy-hero">
    <div class="floater f1"></div>
    <div class="floater f2"></div>
    <div class="floater f3"></div>
    <div class="floater f4"></div>
    
    <h2>TASTE<br>THE JOY!</h2>
    <button class="candy-btn" id="popBtn">POP IT 💥</button>
  </div>
</main>

<nav class="bottom-nav">

</nav>

<script>
  // Interaction 1: Random background color on click
  const bgColors = ['#ff3366', '#9933ff', '#ff9900', '#00ccff', '#ff0055'];
  const popBtn = document.getElementById('popBtn');
  
  popBtn.addEventListener('click', () => {
    // Jump animation
    document.body.style.backgroundColor = bgColors[Math.floor(Math.random() * bgColors.length)];
    
    // Popper particle effect
    for(let i=0; i<10; i++) {
      createParticle();
    }
  });

  // Interaction 2: Dynamic particles
  function createParticle() {
    const p = document.createElement('div');
    p.style.position = 'fixed';
    p.style.width = '20px';
    p.style.height = '20px';
    p.style.background = ['#fff', '#ffcc00', '#00ffcc'][Math.floor(Math.random()*3)];
    p.style.borderRadius = '50%';
    p.style.border = '2px solid #000';
    p.style.left = '50%';
    p.style.top = '70%'; // approx button position
    p.style.zIndex = '50';
    p.style.pointerEvents = 'none';
    
    document.body.appendChild(p);
    
    const angle = Math.random() * Math.PI * 2;
    const velocity = 50 + Math.random() * 100;
    const tx = Math.cos(angle) * velocity * 3 + 'px';
    const ty = Math.sin(angle) * velocity * 3 - 200 + 'px';
    
    p.animate([
      { transform: 'translate(0,0) scale(1)', opacity: 1 },
      { transform: `translate(${tx}, ${ty}) scale(0)`, opacity: 0 }
    ], {
      duration: 800 + Math.random()*400,
      easing: 'cubic-bezier(0.25, 1, 0.5, 1)'
    }).onfinish = () => p.remove();
  }
</script>
</body>
</html>
