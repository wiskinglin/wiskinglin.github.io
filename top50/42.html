<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#42 Anti-Design 2.0 — 反設計 2.0 | Top 50 UX/UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Grotesk:wght@700&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
/* Anti-reset */
body {
  font-family: 'Space Grotesk', 'Noto Sans TC', sans-serif;
  background-color: #00ff00; /* Neon green */
  color: #ff00ff; /* Magenta text */
  margin: 0;
  padding: 0;
  overflow-x: hidden;
  padding-bottom: 120px;
}

/* Style Info Header (A) - intentionally chaotic */
.style-info {
  background: repeating-linear-gradient(45deg, #ffff00, #ffff00 10px, #000 10px, #000 20px);
  padding: 60px 24px;
  position: relative;
  z-index: 10;
  margin-bottom: -50px; /* Overlapping */
  transform: rotate(2deg);
}
.style-info-inner {
  background: rgba(0, 0, 255, 0.8);
  border: 10px dashed red;
  padding: 40px;
  max-width: 900px;
  margin: 0 auto;
  color: #fff;
  transform: rotate(-3deg);
  box-shadow: -20px 20px 0px #00ff00;
}
.cat {
  background: #ff00ff;
  color: #ffff00;
  font-size: 0.8rem;
  font-weight: 700;
  padding: 10px;
  position: absolute;
  top: -20px; left: -20px;
  border-radius: 50%;
  width: 120px; height: 120px;
  display: flex; justify-content: center; align-items: center; text-align: center;
  animation: spin 5s infinite linear;
}
@keyframes spin { 100% { transform: rotate(360deg); } }

.style-info h1 {
  font-size: 5rem;
  font-family: 'Creepster', cursive;
  margin-bottom: 20px;
  color: #00ffff;
  text-shadow: 4px 4px 0px red, -4px -4px 0px blue;
  mix-blend-mode: difference;
}
.info-grid {
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.info-card {
  background: yellow;
  color: black;
  padding: 20px;
  border-left: 20px solid magenta;
}
.info-card:nth-child(2) {
  margin-left: 40px; background: cyan; border-left: 20px solid red;
}
.info-card:nth-child(3) {
  margin-left: -20px; background: black; color: white; border-left: 20px solid lime;
}
.info-card h4 {
  font-size: 1.2rem;
  margin-bottom: 5px;
  text-decoration: line-through;
}

/* Demo Content (B) */
.demo-content {
  position: relative;
  height: 800px;
  max-width: 1200px;
  margin: 0 auto;
}
.demo-header {
  position: absolute;
  top: 100px; right: 20px;
  font-size: 4rem;
  color: rgba(255, 0, 0, 0.4);
  z-index: 1;
  pointer-events: none;
}
.messy-img {
  position: absolute;
  width: 400px; height: 300px;
  background: url('https://picsum.photos/400/300?random=1') center/cover;
  filter: contrast(200%) saturate(200%) invert(100%);
  top: 200px; left: 50px;
  z-index: 2;
  mix-blend-mode: exclusion;
  animation: float 4s ease-in-out infinite alternate;
}
@keyframes float { 100% { transform: translateY(-50px) rotate(10deg); } }

.messy-text {
  position: absolute;
  top: 400px; left: 300px;
  font-size: 6rem;
  font-family: 'Space Grotesk', sans-serif;
  color: blue;
  z-index: 3;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  line-height: 0.5;
  mix-blend-mode: overlay;
}

.hidden-nav {
  position: absolute;
  top: 150px; left: 200px;
  width: 20px; height: 20px;
  background: transparent;
  cursor: grab;
  z-index: 100;
}
.hidden-nav:active { cursor: grabbing; }
.hidden-nav::after {
  content: 'find me';
  font-size: 10px;
  position: absolute;
  color: #00ff00; /* Same as bg */
  text-transform: uppercase;
}

.chaos-btn {
  position: absolute;
  bottom: 100px; right: 100px;
  background: red;
  color: yellow;
  padding: 30px;
  font-size: 2rem;
  border: none;
  border-radius: 50% 20% / 10% 40%;
  cursor: pointer;
  z-index: 5;
  transition: transform 0.1s;
}
.chaos-btn:hover {
  transform: scale(2) rotate(180deg);
  background: blue;
  color: lime;
}

/* Navigation (C) */
.bottom-nav {
  position: fixed;
  bottom: 10px; left: 10px; right: 10px;
  background: rgba(0, 255, 255, 0.8);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 5px 20px;
  border: 4px dotted magenta;
  z-index: 9000;
}
.bottom-nav a {
  color: red;
  font-weight: 900;
  text-decoration: none;
  font-size: 1.5rem;
  text-transform: uppercase;
}
.bottom-nav a:hover {
  background: yellow;
  color: black;
  padding: 10px;
}
</style>
</head>
<body>

<header class="style-info">
  <div class="style-info-inner">
    <div class="cat">⚡ 特別/反叛</div>
    <h1>#42 Anti-Design 2.0</h1>
    <div class="info-grid">
      <div class="info-card">
        <h4>📖 風格定義與視覺特徵</h4>
        <p>刻意違反所有易讀性與排版原則的極端風格。特徵包括混亂的不對稱佈局、極度不和諧的色彩衝突、文字與圖片的惡意重疊，以及隱晦難尋的導航，極度追求視覺刺激與解謎感。</p>
      </div>
      <div class="info-card">
        <h4>🏢 適用產業與場景</h4>
        <p>前衛藝術展覽與地下畫廊、獨立音樂廠牌、實驗性服飾</p>
      </div>
      <div class="info-card">
        <h4>🌍 主要流行地區</h4>
        <p>全球</p>
      </div>
    </div>
  </div>
</header>

<main class="demo-content">
  <div class="demo-header">UNDERGROUND GALLERY</div>
  
  <div class="messy-img"></div>
  <div class="messy-text">E X H I B I T I O N</div>
  
  <!-- Draggable hidden nav -->
  <div class="hidden-nav" id="dragMe"></div>

  <button class="chaos-btn" id="chaosBtn">DO NOT CLICK</button>
</main>

<nav class="bottom-nav">
  <a href="41.html">← 上一頁</a>
  <a href="index.html">🏠 回首頁</a>
  <a href="43.html">下一頁 →</a>
</nav>

<script>
  // Interaction 1: Chaotic button teleportation
  const chaosBtn = document.getElementById('chaosBtn');
  chaosBtn.addEventListener('mousemove', () => {
    if (Math.random() > 0.5) {
      chaosBtn.style.right = Math.random() * 80 + '%';
      chaosBtn.style.bottom = Math.random() * 80 + '%';
    }
  });

  // Interaction 2: Draggable hidden element that uncovers text
  const dragMe = document.getElementById('dragMe');
  let isDragging = false;
  dragMe.addEventListener('mousedown', () => isDragging = true);
  document.addEventListener('mouseup', () => isDragging = false);
  document.addEventListener('mousemove', (e) => {
    if (isDragging) {
      dragMe.style.left = e.clientX + 'px';
      dragMe.style.top = e.clientY + 'px';
      dragMe.style.background = `radial-gradient(circle, #fff 0%, transparent 100%)`;
      dragMe.style.mixBlendMode = 'difference';
      dragMe.style.width = '200px';
      dragMe.style.height = '200px';
      dragMe.style.transform = 'translate(-50%, -50%)';
    } else {
      dragMe.style.background = 'transparent';
      dragMe.style.width = '20px';
      dragMe.style.height = '20px';
      dragMe.style.transform = 'none';
      dragMe.style.mixBlendMode = 'normal';
    }
  });
</script>
</body>
</html>
