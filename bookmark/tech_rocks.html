        rel="stylesheet">

        /* ===== Themes ===== */
        :root {
            --bg: #0a0800;
            --card-bg: rgba(18, 16, 8, 0.75);
            --text: #ffd000;
            --muted: #a68b00;
            --accent: #ffb800;
            --glow: rgba(255, 184, 0, 0.1);
            --line: rgba(255, 184, 0, 0.1);
            --grid: rgba(255, 184, 0, 0.025);
            --scan: rgba(255, 184, 0, 0.015);
        }

        .theme-alt {
            --bg: #f5f5f5;
            --card-bg: rgba(255, 255, 255, 0.85);
            --text: #1e293b;
            --muted: #64748b;
            --accent: #3b82f6;
            --glow: rgba(59, 130, 246, 0.08);
            --line: rgba(59, 130, 246, 0.1);
            --grid: rgba(59, 130, 246, 0.02);
            --scan: rgba(0, 0, 0, 0.01);
        }

        .theme-contrast {
            --bg: #050508;
            --card-bg: rgba(13, 13, 18, 0.75);
            --text: #e0f2fe;
            --muted: #64748b;
            --accent: #00ffd5;
            --glow: rgba(0, 255, 213, 0.12);
            --line: rgba(0, 255, 213, 0.1);
            --grid: rgba(0, 255, 213, 0.025);
            --scan: rgba(0, 0, 0, 0.04);
        }

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            background: var(--bg);
            color: var(--text);
            transition: background 0.5s, color 0.5s;
            overflow-x: hidden;
        }

        /* ===== Background Layers ===== */
        .bg-grid {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        .bg-scan {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan) 2px, var(--scan) 4px);
        }

        /* ===== Nav ===== */
        .nav {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: color-mix(in srgb, var(--bg) 80%, transparent);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--line);
        }

        .klio-logo {
            font-family: 'Inter', sans-serif;
            font-size: 1.2rem;
            font-weight: 900;
            color: #0f172a !important;
            text-decoration: none;
            letter-spacing: -0.05em;
            padding: 4px 14px;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .klio-logo:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .theme-sw {
            display: flex;
            gap: 5px;
        }

        .theme-sw button {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 10px;
            transition: transform 0.2s, border-color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-sw button:hover {
            transform: scale(1.15);
        }

        .theme-sw button.on {
            border-color: var(--accent);
        }

        .b1 {
            background: #1a1400;
            color: #ffb800;
        }

        .b2 {
            background: #e0e7ff;
            color: #3b82f6;
        }

        .b3 {
            background: #0d0d12;
            color: #00ffd5;
        }

        .hero {
            padding: 100px clamp(24px, 5vw, 60px) 48px;
            max-width: 900px;
            position: relative;
            z-index: 1;
        }

        .boot-line {
            font-size: clamp(15px, 2.2vw, 19px);
            line-height: 2;
            color: var(--accent);
            opacity: 0;
            animation: bootIn 0.3s forwards;
        }

        .boot-line.dim {
            color: var(--muted);
        }

        .boot-line .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 1.1em;
            background: var(--accent);
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes bootIn {
            to {
                opacity: 1;
            }
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .hero-main {
            margin-top: 32px;
            opacity: 0;
            animation: fadeUp 0.6s 2.2s forwards;
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-main {
            transform: translateY(16px);
        }

        .hero-main h1 {
            font-size: clamp(43px, 8.4vw, 76px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .hero-main h1 span {
            color: var(--accent);
        }

        .hero-main p {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            font-size: clamp(16px, 2.2vw, 19px);
            font-weight: 300;
            color: var(--muted);
            margin-top: 16px;
            max-width: 480px;
            line-height: 1.7;
        }

        /* ===== Section ===== */
        .ts-section {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 clamp(24px, 5vw, 60px) 64px;
            position: relative;
            z-index: 1;
        }

        .section-head {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--line);
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .section-head.vis {
            opacity: 1;
            transform: none;
        }

        .section-prefix {
            font-size: 13px;
            font-weight: 500;
            color: var(--accent);
            opacity: 0.6;
            letter-spacing: 0.06em;
            white-space: nowrap;
        }

        .section-head h2 {
            font-size: clamp(21px, 3.6vw, 28px);
            font-weight: 700;
        }

        /* ===== Data Panel Grid — 3 columns, consistent sizing ===== */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        @media (max-width: 900px) {
            .data-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 580px) {
            .data-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== HUD Card — terminal data panel ===== */
        .card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
            border-radius: 6px;
            padding: 22px 20px 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            transition: all 0.3s ease;
            /* Scan-in animation */
            opacity: 0;
            clip-path: inset(0 100% 0 0);
        }

        .card.vis {
            opacity: 1;
            clip-path: inset(0 0% 0 0);
            transition: clip-path 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                opacity 0.4s ease,
                border-color 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .card:hover {
            border-color: color-mix(in srgb, var(--accent) 50%, transparent);
            box-shadow: 0 0 24px var(--glow), inset 0 0 24px rgba(0, 0, 0, 0.15);
        }

        /* HUD corners */
        .card::before,
        .card::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--accent);
            opacity: 0.25;
            transition: opacity 0.3s;
        }

        .card::before {
            top: 5px;
            left: 5px;
            border-top: 2px solid;
            border-left: 2px solid;
        }

        .card::after {
            bottom: 5px;
            right: 5px;
            border-bottom: 2px solid;
            border-right: 2px solid;
        }

        .card:hover::before,
        .card:hover::after {
            opacity: 0.7;
        }

        /* Card scanline overlay */
        .card-scan {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, var(--scan) 3px, var(--scan) 4px);
            border-radius: 6px;
        }

        .card h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .card:hover h3 {
            color: var(--accent);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .tag {
            font-size: 16px;
            padding: 4px 12px;
            border-radius: 4px;
            background: color-mix(in srgb, var(--accent) 8%, transparent);
            border: 1px solid color-mix(in srgb, var(--accent) 15%, transparent);
            color: var(--muted);
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tag:hover {
            color: var(--accent);
            background: color-mix(in srgb, var(--accent) 15%, transparent);
        }

        .tag i {
            font-size: 13px;
        }

        .card-link {
            font-size: 15px;
            font-weight: 500;
            color: var(--accent);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 1;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .card-link:hover {
            opacity: 1;
        }

        .card-link i {
            font-size: 13px;
        }

        /* ===== Status Bar (bottom) ===== */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 100;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: color-mix(in srgb, var(--bg) 85%, transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid var(--line);
        }

        .status-text {
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 0.08em;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .status-text .blink {
            animation: blink 1.2s step-end infinite;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 2px;
        }

        @media (max-width: 580px) {
            .hero {
                padding: 84px 20px 36px;
            }

            .ts-section {
                padding: 0 20px 48px;
            }
        }
    </style>
</head>

        // ===== Boot Sequence =====
        function boot() {
            const hero = document.getElementById('hero');
            const lines = [
                { text: '> INITIALIZING TECH_ROCKS!! v3.0...', delay: 0 },
                { text: '> LOADING MODULE::MOBILE ████████░░ 80%', delay: 400, dim: true },
                { text: '> LOADING MODULE::COMPONENTS ██████████ 100%', delay: 700, dim: true },
                { text: '> LOADING MODULE::AI_CORE ██████████ 100%', delay: 1000, dim: true },
                { text: '> ALL SYSTEMS ONLINE.', delay: 1400 },
                { text: '> WELCOME, OPERATOR.█', delay: 1800, cursor: true },
            ];

            lines.forEach((line) => {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'boot-line' + (line.dim ? ' dim' : '');
                    el.style.animationDelay = '0s';
                    if (line.cursor) {
                        el.innerHTML = line.text.replace('█', '<span class="cursor-blink"></span>');
                    } else {
                        el.textContent = line.text;
                    }
                    // Insert before hero-main if it exists
                    const main = hero.querySelector('.hero-main');
                    if (main) hero.insertBefore(el, main);
                    else hero.appendChild(el);
                }, line.delay);
            });

            // Insert hero-main after boot
            setTimeout(() => {
                const main = document.createElement('div');
                main.className = 'hero-main';
                main.innerHTML = `
                    <h1>Tech <span>ROCKS!</span></h1>
                    <p>科技品牌與工具的策展清單。手機、PC、AI——你的數位武器庫。</p>
                `;
                hero.appendChild(main);
            }, 100);
        }

        function render() {
            const feed = document.getElementById('feed');
            feed.innerHTML = '';

            data.forEach((section, sIdx) => {
                const sec = document.createElement('section');
                sec.className = 'ts-section';

                const head = document.createElement('div');
                head.className = 'section-head obs';
                head.innerHTML = `<span class="section-prefix">&gt; MODULE::${section.prefix}</span><h2>${section.category}</h2>`;
                sec.appendChild(head);

                const grid = document.createElement('div');
                grid.className = 'data-grid';

                section.items.forEach((item, i) => {
                    const card = document.createElement('div');
                    card.className = 'card obs';
                    card.style.transitionDelay = `${i * 0.12}s`;
                    card.innerHTML = `
                        <div class="card-scan"></div>
                        <div>
                            <h3>${item.name}</h3>
                            <p class="card-desc" style="font-size: 16px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; font-family: 'Inter', 'Noto Sans TC', sans-serif;">${item.desc || ''}</p>
                            <div class="tag-row">${item.tags.map(t =>
                        `<a href="${t.url}" target="_blank" rel="noopener" class="tag"><i class="${t.icon}"></i> ${t.label}</a>`
                    ).join('')}</div>
                        </div>
                        <a href="${item.url}" target="_blank" rel="noopener" class="card-link">
                            &gt; access <i class="fas fa-arrow-up-right-from-square"></i>
                        </a>
                    `;
                    grid.appendChild(card);
                });

                sec.appendChild(grid);
                feed.appendChild(sec);
            });

            initObs();
        }

        function initObs() {
            const io = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); } });
            }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('.obs').forEach(el => io.observe(el));

            // Status bar update
            const sio = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    if (e.isIntersecting) {
                        const prefix = e.target.querySelector('.section-prefix');
                        if (prefix) {
                            const st = document.getElementById('statusText');
                            st.innerHTML = `[SYS] <span class="blink">●</span> ${prefix.textContent.replace('> ', '')} — ACTIVE`;
                        }
                    }
                });
            }, { threshold: 0.5 });
            document.querySelectorAll('.section-head').forEach(el => sio.observe(el));
        }

        function setTheme(t) {
            document.body.classList.remove('theme-alt', 'theme-contrast');
            if (t !== 'default') document.body.classList.add('theme-' + t);
            document.querySelectorAll('.theme-sw button').forEach(b => b.classList.remove('on'));
            document.querySelector('.b' + (t === 'default' ? '1' : t === 'alt' ? '2' : '3')).classList.add('on');
            localStorage.setItem('ts-theme', t);
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTheme(localStorage.getItem('ts-theme') || 'default');
            boot();
            render();
        });
    </script>
