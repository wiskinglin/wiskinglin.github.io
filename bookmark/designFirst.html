        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .glass-hero {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .glass-hero::before, .glass-hero::after {
            content: "";
            position: absolute;
            width: 60vw;
            height: 60vw;
            max-width: 800px;
            max-height: 800px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            opacity: 0.15;
            filter: blur(80px);
            animation: blob 15s infinite alternate;
        }

        .glass-hero::before {
            top: -20%;
            left: -10%;
            animation-delay: 0s;
        }

        .glass-hero::after {
            bottom: -20%;
            right: -10%;
            animation-duration: 20s;
            animation-direction: alternate-reverse;
        }

        .resource-card {
            background: rgba(var(--bg-secondary-rgb), 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05), inset 1px 0 0 rgba(255, 255, 255, 0.02);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .resource-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.4s, transform 0.4s;
            transform: scaleY(0);
            transform-origin: center;
        }

        .resource-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent);
            background: rgba(var(--bg-secondary-rgb), 0.7);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px var(--accent-glow);
        }

        .resource-card:hover::before {
            opacity: 1;
            transform: scaleY(1);
        }

        .sticky-nav {
            background: rgba(var(--bg-primary-rgb), 0.7);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }

        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
        }

        .theme-btn.active {
            border-color: var(--accent);
        }

        /* Section dividers */
        .section-header::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: var(--accent);
            margin-top: 8px;
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .resource-grid {
                grid-template-columns: 1fr;
            }
        }

        function initContent() {
            const container = document.getElementById('content-area');
            data.forEach((section, idx) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'animate-slide-up';
                sectionEl.style.animationDelay = `${idx * 0.1}s`;
                
                sectionEl.innerHTML = `
                    <h2 class="section-header font-display text-2xl font-bold mb-8 uppercase tracking-wider opacity-80">
                        ${section.category}
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 resource-grid">
                        ${section.items.map(item => `
                            <div class="resource-card p-6 rounded-2xl flex flex-col justify-between group/card">
                                <div>
                                    <h3 class="text-xl font-bold mb-2 font-display transition-colors duration-300 group-hover/card:text-[var(--accent)]">${item.name}</h3>
                                    <p class="text-sm opacity-60 leading-relaxed mb-6">${item.desc}</p>
                                </div>
                                <a href="javascript:void(0)" onclick="openUrl('${item.url}')" style="color: var(--accent);" class="flex items-center gap-2 text-sm font-bold hover:opacity-80 transition-all uppercase tracking-wider group/link">
                                    Visit Website
                                    <i data-lucide="external-link" class="w-4 h-4 transform group-hover/link:translate-x-1 group-hover/link:-translate-y-1 transition-transform"></i>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(sectionEl);
            });
            lucide.createIcons();
        }

        function openUrl(url) {
            const newWindow = window.open(url, '_blank');
            if (newWindow) {
                // 嘗試將焦點帶回原視窗，實現「背景開啟」效果 (視瀏覽器設定可能有所不同)
                window.focus();
            }
        }

        function setTheme(theme) {
            document.documentElement.className = `theme-${theme}`;
            
            // Update active state of buttons
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${theme}`).classList.add('active');
            
            // Store theme preference
            localStorage.setItem('df-theme', theme);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initContent();
            const savedTheme = localStorage.getItem('df-theme') || 'dark';
            setTheme(savedTheme);
        });
    </script>
