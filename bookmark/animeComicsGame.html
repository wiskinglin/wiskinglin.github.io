            height: 28px;

            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .theme-btn:hover {

        }

        .theme-btn.active {
            border-color: var(--accent);
        }

        .section-header::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: var(--accent);
            margin-top: 8px;
        }

        @media (max-width: 640px) {
            .resource-grid {
                grid-template-columns: 1fr;
            }
        }

</head>

                                    <p class="text-sm opacity-60 leading-relaxed mb-6">${item.desc}</p>
                                </div>
                                <a href="javascript:void(0)" onclick="openUrl('${item.url}')" class="flex items-center gap-2 text-sm font-bold text-rose-500 hover:text-rose-400 transition-colors uppercase tracking-wider group">
                                    Visit Official
                                    <i data-lucide="external-link" class="w-4 h-4 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                                </a>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(sectionEl);
            });
            lucide.createIcons();
        }

        function openUrl(url) {
            const newWindow = window.open(url, '_blank');
            if (newWindow) {
                window.focus();
            }
        }

        function setTheme(theme) {
            document.documentElement.className = `theme-${theme}`;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-${theme}`);
            if(activeBtn) activeBtn.classList.add('active');
            localStorage.setItem('acg-theme', theme);
        }

        document.addEventListener('DOMContentLoaded', () => {
            initContent();
            const savedTheme = localStorage.getItem('acg-theme') || 'dark';
            setTheme(savedTheme);
        });
    </script>
</body>

</html>
