    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --card-border: rgba(255, 255, 255, 0.1);
        }

        .theme-light {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --accent: #4f46e5;
            --card-border: rgba(0, 0, 0, 0.05);
        }

        .theme-design {
            --bg-primary: #000000;
            --bg-secondary: #111111;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --accent: #f59e0b;
            --card-border: rgba(245, 158, 11, 0.2);
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        .glass-hero {
            background: radial-gradient(circle at 50% 0%, var(--accent) 0%, transparent 70%);
            opacity: 0.15;
            pointer-events: none;
        }

        .resource-card {
            background: var(--bg-secondary);
            border: 1px solid var(--card-border);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .resource-card:hover {
            transform: translateY(-4px) scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .sticky-nav {
            background: rgba(var(--bg-primary-rgb), 0.7);
            -webkit-backdrop-filter: blur(16px);
            backdrop-filter: blur(16px);
        }

        .theme-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s;
        }

        .theme-btn:hover {
            transform: scale(1.1);
        }

        .theme-btn.active {
            border-color: var(--accent);
        }

        /* Section dividers */
        .section-header::after {
            content: '';
            display: block;
            width: 40px;
            height: 3px;
            background: var(--accent);
            margin-top: 8px;
        }

        /* Mobile Adjustments */
        @media (max-width: 640px) {
            .resource-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        function initContent() {
            const container = document.getElementById('content-area');
            data.forEach((section, idx) => {
                const sectionEl = document.createElement('section');
                sectionEl.className = 'animate-slide-up';
                sectionEl.style.animationDelay = `${idx * 0.1}s`;
                
                sectionEl.innerHTML = `
                    <h2 class="section-header font-display text-2xl font-bold mb-8 uppercase tracking-wider opacity-80">
                        ${section.category}
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 resource-grid">
                        ${section.items.map(item => {
                            const getIcon = (url) => {
                                if(url.includes('facebook.com')) return 'facebook';
                                if(url.includes('instagram.com')) return 'instagram';
                                if(url.includes('youtube.com')) return 'youtube';
                                return 'link';
                            };
                            return `
                            <div class="resource-card p-6 rounded-2xl flex flex-col justify-between h-full">
                                <div>
                                    <h3 class="text-xl font-bold mb-2 font-display">${item.name}</h3>
                                    ${item.desc ? `<p class="text-sm opacity-60 leading-relaxed mb-4">${item.desc}</p>` : ''}
                                    <div class="flex flex-wrap gap-2 mb-6">
                                        ${item.links && item.links.length > 0 ? item.links.map(link => `
                                            <a href="${link.url}" target="_blank" class="flex items-center gap-1.5 text-xs px-2.5 py-1.5 bg-black/20 hover:bg-black/40 rounded border border-[var(--card-border)] transition-all" title="${link.label}">
                                                <i data-lucide="${getIcon(link.url)}" class="w-3 h-3"></i>
                                                <span class="opacity-80 truncate max-w-[110px]">${link.label}</span>
                                            </a>
                                        `).join('') : ''}
                                    </div>
                                </div>
                                <a href="javascript:void(0)" onclick="openUrl('${item.url || (item.links && item.links.length > 0 ? item.links[0].url : '')}')" class="flex items-center gap-2 text-sm font-bold text-indigo-500 hover:text-indigo-400 transition-colors uppercase tracking-wider group mt-auto">
                                    Visit Website
                                    <i data-lucide="external-link" class="w-4 h-4 transform group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform"></i>
                                </a>
                            </div>
                            `;
                        }).join('')}
                    </div>
                `;
                container.appendChild(sectionEl);
            });
            lucide.createIcons();
        }

        function openUrl(url) {
            const newWindow = window.open(url, '_blank');
            if (newWindow) {
                // 嘗試將焦點帶回原視窗，實現「背景開啟」效果 (視瀏覽器設定可能有所不同)
                window.focus();
            }
        }

        function setTheme(theme) {
            document.documentElement.className = `theme-${theme}`;
            
            // Update active state of buttons
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${theme}`).classList.add('active');
            
            // Store theme preference
            localStorage.setItem('df-theme', theme);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initContent();
            const savedTheme = localStorage.getItem('df-theme') || 'dark';
            setTheme(savedTheme);
        });
    </script>
